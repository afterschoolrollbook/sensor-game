<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>대진표 — SGP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08080f;--bg2:#0f0f1a;--card:#13131f;--card2:#1a1a2a;
  --border:#2a2a40;--border2:#3a3a55;
  --red:#e63946;--accent:#4cc9f0;--green:#06d6a0;--yellow:#ffd60a;
  --text:#f0f0f8;--text2:#9090b0;--text3:#5a5a7a;
}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;overflow:hidden;}
button{cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
#wrap{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
#hdr{padding:11px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--bg2);}
.step{display:none;flex-direction:column;flex:1;min-height:0;}
.step.on{display:flex;}
.subhdr{padding:10px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0;background:var(--bg);flex-wrap:wrap;}
/* 스크롤은 이 영역에만 — 창 테두리에 스크롤바 1개만 */
.scroll-area{flex:1;overflow-x:auto;overflow-y:scroll;padding:16px 18px;min-height:0;scrollbar-width:thin;scrollbar-color:var(--border2) var(--bg2);}
.scroll-area::-webkit-scrollbar{width:6px;height:6px;}
.scroll-area::-webkit-scrollbar-track{background:var(--bg2);}
.scroll-area::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
.btn-back{padding:4px 10px;background:transparent;border:1px solid var(--border);color:var(--text3);border-radius:6px;font-size:11px;}
.pts-sort-btn,.pts-mode-btn{padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text3);font-size:11px;transition:all .15s;}
.pt-card{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;}
.order-row{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--card);border:1px solid var(--border);border-radius:7px;cursor:grab;user-select:none;margin-bottom:4px;}
#league-overlay{display:none;position:absolute;inset:0;background:rgba(10,10,15,.88);z-index:10;align-items:center;justify-content:center;flex-direction:column;gap:12px;}
#tc{position:fixed;bottom:16px;right:16px;display:flex;flex-direction:column;gap:6px;z-index:9999;}
.tos{padding:9px 14px;border-radius:8px;font-size:12px;font-weight:600;background:var(--card2);border:1px solid var(--border2);color:var(--text);box-shadow:0 4px 12px rgba(0,0,0,.4);animation:tsin .25s ease;}
.tos.success{border-color:var(--green);color:var(--green);}
.tos.error{border-color:var(--red);color:var(--red);}
.tos.info{border-color:var(--accent);color:var(--accent);}
@keyframes tsin{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="wrap">
  <div id="hdr">
    <div>
      <div style="font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--red);letter-spacing:3px;margin-bottom:2px;">// PARTICIPANTS</div>
      <div style="font-size:15px;font-weight:700;" id="win-title">참가자 명단</div>
    </div>
    <button onclick="window.close()" style="background:rgba(230,57,70,.1);border:1px solid rgba(230,57,70,.3);color:var(--red);font-size:13px;padding:5px 14px;border-radius:6px;font-weight:700;">✕ 닫기</button>
  </div>

  <!-- STEP 1 -->
  <div id="pts-step1" class="step on">
    <div class="subhdr">
      <span style="font-size:11px;color:var(--text3);font-weight:700;letter-spacing:1px;">① 그룹 기준 선택:</span>
      <button onclick="togglePtsSort('gender')"   id="sort-gender"   class="pts-sort-btn">성별</button>
      <button onclick="togglePtsSort('division')" id="sort-division" class="pts-sort-btn">부문별</button>
      <button onclick="togglePtsSort('weight')"   id="sort-weight"   class="pts-sort-btn">체급별</button>
      <button onclick="togglePtsSort('team')"     id="sort-team"     class="pts-sort-btn">팀별</button>
      <span style="font-size:10px;color:var(--text3);">복수 선택 가능</span>
      <span id="pts-summary" style="font-size:10px;color:var(--accent);font-family:'Share Tech Mono',monospace;margin-left:8px;"></span>
      <button onclick="confirmPtsGroup()" style="margin-left:auto;padding:5px 16px;background:var(--red);border:none;color:#fff;border-radius:8px;font-size:12px;font-weight:700;">확정 →</button>
    </div>
    <div id="pts-popup-list" class="scroll-area"></div>
  </div>

  <!-- STEP 2 -->
  <div id="pts-step2" class="step" style="position:relative;">
    <div class="subhdr">
      <button onclick="goStep1()" class="btn-back">← 뒤로</button>
      <span style="font-size:11px;color:var(--text3);font-weight:700;letter-spacing:1px;">② 조건 설정</span>
      <div style="margin-left:auto;">
        <button onclick="generateAllBrackets()" id="btn-generate" style="padding:5px 18px;background:var(--red);border:none;color:#fff;border-radius:8px;font-size:12px;font-weight:700;">대진표 만들기 →</button>
      </div>
    </div>
    <div class="scroll-area" style="padding:16px 20px;display:block;">

      <!-- 경기 규모 -->
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:16px;">
        <span style="font-size:10px;color:var(--accent);font-family:'Share Tech Mono',monospace;letter-spacing:1px;white-space:nowrap;">// 경기 규모</span>
        <div style="display:flex;gap:6px;" id="comp-type-btns">
          <button onclick="setCompType('national')" data-type="national" class="comp-type-btn" style="padding:5px 14px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:11px;font-weight:600;cursor:pointer;">🏅 전국대회</button>
          <button onclick="setCompType('regional')" data-type="regional" class="comp-type-btn" style="padding:5px 14px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:11px;font-weight:600;cursor:pointer;">📍 지역대회</button>
          <button onclick="setCompType('club')" data-type="club" class="comp-type-btn" style="padding:5px 14px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:11px;font-weight:600;cursor:pointer;">🏠 클럽/동호회</button>
          <button onclick="setCompType('other')" data-type="other" class="comp-type-btn" style="padding:5px 14px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:11px;font-weight:600;cursor:pointer;">기타</button>
        </div>
      </div>

      <!-- 동시 경기장 수 -->
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:16px;">
        <span style="font-size:10px;color:var(--accent);font-family:'Share Tech Mono',monospace;letter-spacing:1px;white-space:nowrap;">// 경기장 수</span>
        <div style="display:flex;gap:6px;flex-wrap:wrap;" id="court-count-btns">
          <button onclick="setCourtCount(1)"  data-count="1"  class="court-btn" style="width:40px;height:36px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:15px;font-weight:700;cursor:pointer;">1</button>
          <button onclick="setCourtCount(2)"  data-count="2"  class="court-btn" style="width:40px;height:36px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:15px;font-weight:700;cursor:pointer;">2</button>
          <button onclick="setCourtCount(3)"  data-count="3"  class="court-btn" style="width:40px;height:36px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:15px;font-weight:700;cursor:pointer;">3</button>
          <button onclick="setCourtCount(4)"  data-count="4"  class="court-btn" style="width:40px;height:36px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:15px;font-weight:700;cursor:pointer;">4</button>
          <button onclick="setCourtCount(5)"  data-count="5"  class="court-btn" style="width:40px;height:36px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:15px;font-weight:700;cursor:pointer;">5</button>
          <button onclick="setCourtCount(6)"  data-count="6"  class="court-btn" style="width:40px;height:36px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:15px;font-weight:700;cursor:pointer;">6</button>
          <button onclick="setCourtCount(7)"  data-count="7"  class="court-btn" style="width:40px;height:36px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:15px;font-weight:700;cursor:pointer;">7</button>
          <button onclick="setCourtCount(8)"  data-count="8"  class="court-btn" style="width:40px;height:36px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:15px;font-weight:700;cursor:pointer;">8</button>
          <button onclick="setCourtCount(9)"  data-count="9"  class="court-btn" style="width:40px;height:36px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:15px;font-weight:700;cursor:pointer;">9</button>
          <button onclick="setCourtCount(10)" data-count="10" class="court-btn" style="width:40px;height:36px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:13px;font-weight:700;cursor:pointer;">10</button>
        </div>
      </div>

      <!-- 대진표 분석 -->
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
        <span style="font-size:10px;color:var(--accent);font-family:'Share Tech Mono',monospace;letter-spacing:1px;white-space:nowrap;">// 대진표 분석</span>
        <button onclick="runBracketAnalysis()" id="btn-analyze" style="padding:5px 16px;background:rgba(76,201,240,.15);border:1px solid var(--accent);color:var(--accent);border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;">🔍 대진표 분석</button>
      </div>
      <div id="analysis-result" style="display:none;margin-bottom:20px;border:1px solid rgba(76,201,240,0.3);border-radius:10px;overflow:hidden;">
        <div style="padding:8px 14px;background:rgba(76,201,240,0.08);border-bottom:1px solid rgba(76,201,240,0.2);display:flex;align-items:center;gap:8px;">
          <span style="font-size:10px;color:var(--accent);font-family:'Share Tech Mono',monospace;letter-spacing:1px;">// AI 분석 결과</span>
          <span id="analysis-status" style="font-size:10px;color:var(--text3);"></span>
        </div>
        <div id="analysis-body" style="padding:14px 16px;font-size:12px;line-height:1.8;color:var(--text2);"></div>
      </div>
      <div id="pts-overview" style="margin-bottom:16px;display:none;">
        <span style="font-size:10px;color:var(--accent);font-family:'Share Tech Mono',monospace;letter-spacing:1px;">// 참가 현황</span>
        <div id="pts-overview-body" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;align-items:flex-start;"></div>
      </div>

      <!-- 레이아웃 선택 -->
      <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:16px;">
        <span style="font-size:10px;color:var(--accent);font-family:'Share Tech Mono',monospace;letter-spacing:1px;white-space:nowrap;">// 레이아웃 예시</span>
        <div style="display:flex;gap:8px;" id="layout-btns">

          <div style="position:relative;display:inline-block;">
            <button onclick="setLayoutAndHighlight('A')" id="setup-lay-A" class="layout-btn" style="width:72px;height:60px;border-radius:8px;border:1px solid var(--red);background:rgba(230,57,70,.2);color:var(--red);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:0;">
              <svg width="48" height="36" viewBox="0 0 36 28" fill="none"><rect x="1" y="2" width="9" height="5" rx="1" fill="currentColor" opacity=".7"/><rect x="1" y="11" width="9" height="5" rx="1" fill="currentColor" opacity=".7"/><rect x="1" y="20" width="9" height="5" rx="1" fill="currentColor" opacity=".7"/><rect x="14" y="6" width="9" height="5" rx="1" fill="currentColor" opacity=".85"/><rect x="14" y="20" width="9" height="5" rx="1" fill="currentColor" opacity=".85"/><rect x="27" y="13" width="8" height="5" rx="1" fill="currentColor"/><path d="M10 4.5h2v7.5h2" stroke="currentColor" stroke-width=".8" opacity=".5"/><path d="M10 12h2v7h2" stroke="currentColor" stroke-width=".8" opacity=".5"/><path d="M10 22.5h2v0h2" stroke="currentColor" stroke-width=".8" opacity=".5"/><path d="M23 8.5h2v7h2" stroke="currentColor" stroke-width=".8" opacity=".5"/><path d="M23 22.5h2v-7h2" stroke="currentColor" stroke-width=".8" opacity=".5"/></svg>
              <span style="font-size:10px;font-weight:700;">A형</span>
            </button>
            <div class="layout-tip" style="display:none;position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:#1a1a2e;border:1px solid var(--border2);border-radius:8px;padding:8px 12px;font-size:11px;color:var(--text2);white-space:nowrap;z-index:100;line-height:1.6;">단방향 (좌→우)<br>경기장 1개에 적합<div style="position:absolute;bottom:-5px;left:50%;width:8px;height:8px;background:#1a1a2e;border-right:1px solid var(--border2);border-bottom:1px solid var(--border2);transform:translateX(-50%) rotate(45deg);"></div></div>
          </div>

          <div style="position:relative;display:inline-block;">
            <button onclick="setLayoutAndHighlight('B')" id="setup-lay-B" class="layout-btn" style="width:72px;height:60px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:0;">
              <svg width="48" height="36" viewBox="0 0 36 28" fill="none"><rect x="1" y="21" width="9" height="5" rx="1" fill="currentColor" opacity=".7"/><rect x="14" y="21" width="9" height="5" rx="1" fill="currentColor" opacity=".7"/><rect x="27" y="21" width="8" height="5" rx="1" fill="currentColor" opacity=".7"/><rect x="7" y="13" width="9" height="5" rx="1" fill="currentColor" opacity=".85"/><rect x="21" y="13" width="9" height="5" rx="1" fill="currentColor" opacity=".85"/><rect x="14" y="2" width="9" height="5" rx="1" fill="currentColor"/><path d="M5.5 21v-2h10v-2" stroke="currentColor" stroke-width=".8" opacity=".5"/><path d="M18.5 21v-2h10v-2" stroke="currentColor" stroke-width=".8" opacity=".5"/><path d="M31 21v-2h-6" stroke="currentColor" stroke-width=".8" opacity=".5"/><path d="M11.5 13v-2h7v-2" stroke="currentColor" stroke-width=".8" opacity=".5"/><path d="M25.5 13v-2h-7" stroke="currentColor" stroke-width=".8" opacity=".5"/></svg>
              <span style="font-size:10px;font-weight:700;">B형</span>
            </button>
            <div class="layout-tip" style="display:none;position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:#1a1a2e;border:1px solid var(--border2);border-radius:8px;padding:8px 12px;font-size:11px;color:var(--text2);white-space:nowrap;z-index:100;line-height:1.6;">단방향 (아래→위)<br>경기장 1개에 적합<div style="position:absolute;bottom:-5px;left:50%;width:8px;height:8px;background:#1a1a2e;border-right:1px solid var(--border2);border-bottom:1px solid var(--border2);transform:translateX(-50%) rotate(45deg);"></div></div>
          </div>

          <div style="position:relative;display:inline-block;">
            <button onclick="setLayoutAndHighlight('C')" id="setup-lay-C" class="layout-btn" style="width:72px;height:60px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:0;">
              <svg width="48" height="36" viewBox="0 0 36 28" fill="none"><rect x="1" y="2" width="9" height="5" rx="1" fill="currentColor" opacity=".7"/><rect x="14" y="2" width="9" height="5" rx="1" fill="currentColor" opacity=".7"/><rect x="27" y="2" width="8" height="5" rx="1" fill="currentColor" opacity=".7"/><rect x="7" y="11" width="9" height="5" rx="1" fill="currentColor" opacity=".85"/><rect x="21" y="11" width="9" height="5" rx="1" fill="currentColor" opacity=".85"/><rect x="14" y="21" width="9" height="5" rx="1" fill="currentColor"/><path d="M5.5 7v2h10v2" stroke="currentColor" stroke-width=".8" opacity=".5"/><path d="M18.5 7v2h10v2" stroke="currentColor" stroke-width=".8" opacity=".5"/><path d="M31 7v2h-6" stroke="currentColor" stroke-width=".8" opacity=".5"/><path d="M11.5 16v2h7v2" stroke="currentColor" stroke-width=".8" opacity=".5"/><path d="M25.5 16v2h-7" stroke="currentColor" stroke-width=".8" opacity=".5"/></svg>
              <span style="font-size:10px;font-weight:700;">C형</span>
            </button>
            <div class="layout-tip" style="display:none;position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:#1a1a2e;border:1px solid var(--border2);border-radius:8px;padding:8px 12px;font-size:11px;color:var(--text2);white-space:nowrap;z-index:100;line-height:1.6;">단방향 (위→아래)<br>경기장 1개에 적합<div style="position:absolute;bottom:-5px;left:50%;width:8px;height:8px;background:#1a1a2e;border-right:1px solid var(--border2);border-bottom:1px solid var(--border2);transform:translateX(-50%) rotate(45deg);"></div></div>
          </div>

          <div style="position:relative;display:inline-block;">
            <button onclick="setLayoutAndHighlight('D')" id="setup-lay-D" class="layout-btn" style="width:72px;height:60px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:0;">
              <svg width="48" height="36" viewBox="0 0 36 28" fill="none"><rect x="0" y="4" width="7" height="4" rx="1" fill="currentColor" opacity=".6"/><rect x="0" y="11" width="7" height="4" rx="1" fill="currentColor" opacity=".6"/><rect x="0" y="18" width="7" height="4" rx="1" fill="currentColor" opacity=".6"/><rect x="10" y="7" width="7" height="4" rx="1" fill="currentColor" opacity=".8"/><rect x="10" y="18" width="7" height="4" rx="1" fill="currentColor" opacity=".8"/><rect x="14.5" y="12" width="7" height="4" rx="1" fill="currentColor"/><rect x="29" y="4" width="7" height="4" rx="1" fill="currentColor" opacity=".6"/><rect x="29" y="11" width="7" height="4" rx="1" fill="currentColor" opacity=".6"/><rect x="29" y="18" width="7" height="4" rx="1" fill="currentColor" opacity=".6"/><rect x="19" y="7" width="7" height="4" rx="1" fill="currentColor" opacity=".8"/><rect x="19" y="18" width="7" height="4" rx="1" fill="currentColor" opacity=".8"/><path d="M7 6h2v3.5h2" stroke="currentColor" stroke-width=".8" opacity=".45"/><path d="M7 13h2v-3.5" stroke="currentColor" stroke-width=".8" opacity=".45"/><path d="M7 20h2v-2.5h2" stroke="currentColor" stroke-width=".8" opacity=".45"/><path d="M17 9h1.5v5h-4" stroke="currentColor" stroke-width=".8" opacity=".45"/><path d="M17 20h1.5v-7" stroke="currentColor" stroke-width=".8" opacity=".45"/><path d="M29 6h-2v3.5h-2" stroke="currentColor" stroke-width=".8" opacity=".45"/><path d="M29 13h-2v-3.5" stroke="currentColor" stroke-width=".8" opacity=".45"/><path d="M29 20h-2v-2.5h-2" stroke="currentColor" stroke-width=".8" opacity=".45"/></svg>
              <span style="font-size:10px;font-weight:700;">D형</span>
            </button>
            <div class="layout-tip" id="tip-D" style="display:none;position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:#1a1a2e;border:1px solid var(--border2);border-radius:8px;padding:8px 12px;font-size:11px;color:var(--text2);white-space:nowrap;z-index:100;line-height:1.6;">좌우 양방향 → 가운데 결승<br><span id="tip-D-court" style="color:var(--accent);"></span><div style="position:absolute;bottom:-5px;left:50%;width:8px;height:8px;background:#1a1a2e;border-right:1px solid var(--border2);border-bottom:1px solid var(--border2);transform:translateX(-50%) rotate(45deg);"></div></div>
          </div>

// generateBracket은 step4.js 원본 그대로 사용
// 대진표 설정 화면에서는 현재 경기 강조 표시 비활성화
function isCurrentMatchIdx(){ return false; }

// renderBracketD/E 오버라이드 — 내부 overflow 제거, 외부 하나만 스크롤
function _stripInnerScroll(div){
  div.querySelectorAll('*').forEach(el=>{
    if(el.style.overflow==='auto'||el.style.overflowX==='auto'||el.style.overflowY==='auto'){
      el.style.overflow='visible';
    }
  });
}

renderBracketD = function(wrap){
  if(!S.matches||!S.matches.length)return;
  const leftRounds=[], rightRounds=[];
  S.matches.forEach(round=>{
    const h=Math.ceil(round.length/2);
    leftRounds.push(round.slice(0,h));
    rightRounds.push(round.slice(h));
  });
  const outerWrap=document.createElement('div');
  outerWrap.style.cssText='display:flex;flex-direction:row;align-items:flex-start;overflow:auto;padding-bottom:8px;';
  const lDiv=document.createElement('div');
  const rDiv=document.createElement('div');
  _renderBracketHTML(lDiv,leftRounds,'top',false);
  _renderBracketHTML(rDiv,[...rightRounds].reverse(),'top',true);
  _stripInnerScroll(lDiv);
  _stripInnerScroll(rDiv);
  outerWrap.appendChild(lDiv);
  outerWrap.appendChild(rDiv);
  wrap.appendChild(outerWrap);
};

renderBracketE = function(wrap){
  if(!S.matches||!S.matches.length)return;
  const topRounds=[], botRounds=[];
  S.matches.forEach(round=>{
    const h=Math.ceil(round.length/2);
    topRounds.push(round.slice(0,h));
    botRounds.push(round.slice(h));
  });
  const outerWrap=document.createElement('div');
  outerWrap.style.cssText='display:flex;flex-direction:column;overflow:auto;padding-bottom:8px;';
  const tDiv=document.createElement('div');
  const bDiv=document.createElement('div');
  _renderBracketHTML(tDiv,topRounds,'top-down');
  _renderBracketHTML(bDiv,[...botRounds].reverse(),'bottom-up');
  _stripInnerScroll(tDiv);
  _stripInnerScroll(bDiv);
  outerWrap.appendChild(tDiv);
  outerWrap.appendChild(bDiv);
  wrap.appendChild(outerWrap);
};
// ── localStorage에서 참가자 데이터 읽기 ──
let _pts = [];
try { _pts = JSON.parse(localStorage.getItem('sgp_bw_pts') || '[]'); } catch(e) {}

// step4.js가 전역에서 참조하는 S 객체
let S = { pts:_pts, matches:[], groupBrackets:[], activeGroup:0, laps:1 };

function toast(msg, type='info'){
  const c=document.getElementById('tc');
  const d=document.createElement('div');
  d.className='tos '+(type||'');
  d.textContent=msg;
  c.appendChild(d);
  setTimeout(()=>d.remove(), 2500);
}

function showByeSelector(players, title, callback){ callback(players[0]); }

window.addEventListener('message', e=>{
  if(!e.data||e.data.type!=='sgp_pts_update') return;

  autoDetectSortKeys();
  renderList();
  renderPtsOverview();
});

window.addEventListener('load', ()=>{

let _sortKeys=[], _groups={}, _mode='tournament';
let _assignMode=false, _assignSlotNum=null, _linkSel=null;

function autoDetectSortKeys(){
  _sortKeys=[];
  if(S.pts.some(p=>p.gender&&p.gender.trim())) _sortKeys.push('gender');
  if(S.pts.some(p=>p.division&&p.division.trim())) _sortKeys.push('division');
  if(S.pts.some(p=>p.weight&&p.weight.trim())) _sortKeys.push('weight');
  if(S.pts.some(p=>p.team&&p.team.trim()) && !_sortKeys.length) _sortKeys.push('team');
  // 버튼 하이라이트 동기화
  ['gender','division','weight','team'].forEach(k=>{
    const btn=document.getElementById('sort-'+k);
    if(!btn) return;
    const on=_sortKeys.includes(k);
    btn.style.borderColor=on?'var(--accent)':'var(--border)';

function show(stepId){
  ['pts-step1','pts-step2','pts-step3'].forEach(id=>{
    document.getElementById(id).classList.toggle('on', id===stepId);
  });
  if(stepId==='pts-step3'){
    const ci=document.getElementById('step3-court-info');
    if(ci) ci.textContent=`경기장 ${_courtCount||1}개`;
    // 앞에서 선택된 레이아웃 그대로 하이라이트
    ['A','B','C','D','E'].forEach(x=>{
      const btn=document.getElementById('popup-lay-'+x);
      if(!btn) return;
      const active=x===(_bracketLayout||'A');
      btn.style.borderColor=active?'var(--red)':'var(--border2)';
      btn.style.background=active?'rgba(230,57,70,.2)':'transparent';
      btn.style.color=active?'var(--red)':'var(--text2)';
    });
  }
}

function togglePtsSort(key){
  const idx=_sortKeys.indexOf(key);
  if(idx>=0) _sortKeys.splice(idx,1); else _sortKeys.push(key);
  const on=_sortKeys.includes(key);
  const btn=document.getElementById('sort-'+key);
  btn.style.borderColor=on?'var(--accent)':'var(--border)';
  btn.style.background=on?'rgba(76,201,240,.12)':'transparent';
  btn.style.color=on?'var(--accent)':'var(--text3)';
  renderList();
}

function renderList(){
  const list=document.getElementById('pts-popup-list');
  document.getElementById('win-title').textContent='참가자 명단 (총 '+S.pts.length+'명)';
  list.innerHTML='';

  // 요약 정보
  const summaryEl=document.getElementById('pts-summary');
  if(summaryEl){
    const parts=[];
    const genders=[...new Set(S.pts.map(p=>p.gender).filter(Boolean))];
    const divisions=[...new Set(S.pts.map(p=>p.division).filter(Boolean))];
    const weights=[...new Set(S.pts.map(p=>p.weight).filter(Boolean))];
    if(genders.length) parts.push('성별 '+genders.length);
    if(divisions.length) parts.push('부문 '+divisions.length);
    if(weights.length) parts.push('체급 '+weights.length);
    summaryEl.textContent=parts.join(' / ');
  }

  const groups={};
  if(!_sortKeys.length){
    groups['전체']=[...S.pts];
  } else {
    S.pts.forEach(p=>{
      const key=_sortKeys.map(k=>p[k]||'미분류').join(' / ');
      if(!groups[key]) groups[key]=[];
      groups[key].push(p);
    });
  }

  Object.entries(groups).sort((a,b)=>a[0].localeCompare(b[0],'ko')).forEach(([gname,members])=>{
    const sec=document.createElement('div');
    sec.style.cssText='margin-bottom:14px;';
    sec.innerHTML=`
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;padding-bottom:5px;border-bottom:1px solid var(--border);">
        <span style="font-size:11px;font-weight:700;">${gname}</span>
        <span style="font-size:10px;color:var(--text3);background:var(--card2);padding:1px 7px;border-radius:8px;">${members.length}명</span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:4px;">
        ${members.map((p,i)=>`
          <div style="display:flex;align-items:center;gap:5px;padding:4px 7px;background:var(--card);border:1px solid var(--border);border-radius:5px;min-width:0;">
            <span style="font-size:9px;color:var(--text3);flex-shrink:0;">${i+1}</span>
            <div style="width:5px;height:5px;border-radius:50%;background:${p.color||'var(--text3)'};flex-shrink:0;"></div>
            ${p.gender?`<span style="font-size:8px;padding:0 3px;border-radius:2px;flex-shrink:0;background:${p.gender==='남'?'rgba(76,201,240,0.2)':'rgba(255,100,150,0.2)'};color:${p.gender==='남'?'#4cc9f0':'#ff6496'}">${p.gender}</span>`:''}
            <span style="font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${p.name}</span>
          </div>`).join('')}
      </div>`;
    list.appendChild(sec);
  });
}

function confirmPtsGroup(){
  if(!_sortKeys.length){ _groups={'전체':[...S.pts]}; }
  else {
    _groups={};
    S.pts.forEach(p=>{
      const k=_sortKeys.map(k2=>p[k2]||'미분류').join(' / ');
      if(!_groups[k]) _groups[k]=[];
      _groups[k].push(p);
    });
  }
  try {
    localStorage.setItem('sgp_groups', JSON.stringify(_groups));
    localStorage.setItem('sgp_sortKeys', JSON.stringify(_sortKeys));
    localStorage.setItem('sgp_pts', JSON.stringify(S.pts));
    localStorage.setItem('sgp_courtCount', String(_courtCount||1));
    localStorage.setItem('sgp_layout', _bracketLayout||'A');
  } catch(e){}
  toast('저장 완료!', 'success');
  show('pts-step2'); setPtsMode('tournament'); renderOrderArea();
  setCompType(_compType||'national');
  setCourtCount(_courtCount||1);
  _bracketLayout='A';
  setLayoutAndHighlight('A');
  requestAnimationFrame(_initLayoutTooltips);
  document.getElementById('bracket-preview-panel').style.display='block';
  updateBracketPreview();
  renderPtsOverview();
}
function goStep1(){ show('pts-step1'); }
let _compType='national';
let _courtCount=1;

function setCompType(type){
  _compType=type;
  document.querySelectorAll('.comp-type-btn').forEach(b=>{
    const active=b.dataset.type===type;
    b.style.borderColor=active?'var(--accent)':'var(--border)';
    b.style.background=active?'rgba(76,201,240,.15)':'transparent';
    b.style.color=active?'var(--accent)':'var(--text2)';
  });
}

function setCourtCount(n){
  _courtCount=n;
  try{ localStorage.setItem('sgp_courtCount', String(n)); }catch(e){}
  document.querySelectorAll('.court-btn').forEach(b=>{
    const active=Number(b.dataset.count)===n;
    b.style.borderColor=active?'var(--red)':'var(--border)';
    b.style.background=active?'rgba(230,57,70,.2)':'transparent';
    b.style.color=active?'var(--red)':'var(--text2)';

function setLayoutAndHighlight(l){
  _bracketLayout=l;
  ['A','B','C','D','E'].forEach(x=>{
    const btn=document.getElementById('setup-lay-'+x);
    if(!btn) return;
    const active=x===l;
    btn.style.borderColor=active?'var(--red)':'var(--border2)';
    btn.style.background=active?'rgba(230,57,70,.2)':'transparent';
    btn.style.color=active?'var(--red)':'var(--text2)';
  });

  const tipD=document.getElementById('tip-D-court');
  if(tipD){
    tipD.textContent=`경기장 ${_courtCount}개 → ${_courtCount}곳에서 출발해 가운데 결승`;

  updateBracketPreview();

function updateBracketPreview(){
  const panel=document.getElementById('bracket-preview-panel');
  const svgWrap=document.getElementById('bracket-preview-svg');
  const label=document.getElementById('preview-label');
  const desc=document.getElementById('preview-desc');
  const stats=document.getElementById('preview-stats');
  const n=_courtCount||1, ly=_bracketLayout||'A';
  if(!ly){panel.style.display='none';return;}
  panel.style.display='block';

  const layoutNames={A:'A형 (좌→우)',B:'B형 (아래→위)',C:'C형 (위→아래)',D:'D형 (양방향→중앙)',E:'E형 (상하→중앙)'};

  label.textContent=layoutNames[ly]||ly+'형';
  desc.textContent=layoutDescs[ly]||'';

  const _ec=(ly==='D'||ly==='E')?Math.max(2,n):1;

  }
  return `<svg viewBox="0 0 340 60" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block;">
    <text x="170" y="35" text-anchor="middle" fill="rgba(144,144,176,0.6)" font-size="13" font-family="sans-serif">미리보기 준비 중...</text>
  </svg>`;
}

function renderPtsOverview(){
  const panel=document.getElementById('pts-overview');
  const body=document.getElementById('pts-overview-body');
  if(!panel||!body) return;

  // _groups에서 전체 참가자 수집
  const allPts=Object.values(_groups).flat();
  if(!allPts.length){panel.style.display='none';return;}

  const hasGender=allPts.some(p=>p.gender&&p.gender.trim());
  const hasDiv=allPts.some(p=>p.division&&p.division.trim());
  const hasWeight=allPts.some(p=>p.weight&&p.weight.trim());
  if(!hasGender&&!hasDiv&&!hasWeight){panel.style.display='none';return;}
  panel.style.display='block';
  body.innerHTML='';

  // 성별 기준으로 최상위 그룹
  const topGroups={};
  allPts.forEach(p=>{
    const gk=hasGender?(p.gender||'미분류'):'전체';
    if(!topGroups[gk]) topGroups[gk]=[];
    topGroups[gk].push(p);
  });

  Object.entries(topGroups).sort((a,b)=>a[0].localeCompare(b[0],'ko')).forEach(([gname,gpts])=>{
    const genderColor=gname==='남'?'rgba(76,201,240,0.15)':gname==='여'?'rgba(255,100,150,0.15)':'rgba(255,255,255,0.05)';
    const genderBorder=gname==='남'?'rgba(76,201,240,0.4)':gname==='여'?'rgba(255,100,150,0.4)':'var(--border)';
    const genderText=gname==='남'?'#4cc9f0':gname==='여'?'#ff6496':'var(--text2)';

    const box=document.createElement('div');
    box.style.cssText=`background:${genderColor};border:1px solid ${genderBorder};border-radius:10px;padding:10px 14px;flex:1;min-width:0;`;

    let html=`<div style="display:flex;align-items:center;gap:6px;margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid ${genderBorder};">
      <span style="font-size:13px;font-weight:700;color:${genderText};">${gname}</span>
      <span style="font-size:10px;color:var(--text3);">${gpts.length}명</span>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;">`;

    if(hasDiv){
      const divGroups={};
      gpts.forEach(p=>{const dk=p.division||'미분류';if(!divGroups[dk])divGroups[dk]=[];divGroups[dk].push(p);});
      Object.entries(divGroups).sort((a,b)=>a[0].localeCompare(b[0],'ko')).forEach(([dname,dpts])=>{
        html+=`<div style="background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:7px;padding:6px 10px;">
          <div style="display:flex;align-items:center;gap:5px;margin-bottom:5px;">
            <span style="font-size:11px;font-weight:700;color:var(--text2);">${dname}</span>
            <span style="font-size:10px;color:var(--text3);">${dpts.length}명</span>
          </div>
          <div style="display:flex;flex-wrap:wrap;gap:4px;">`;
        if(hasWeight){
          const wtGroups={};
          dpts.forEach(p=>{const wk=p.weight||'미분류';if(!wtGroups[wk])wtGroups[wk]=[];wtGroups[wk].push(p);});
          Object.entries(wtGroups).sort((a,b)=>a[0].localeCompare(b[0],'ko')).forEach(([wname,wpts])=>{
            html+=`<span style="font-size:10px;background:rgba(255,255,255,0.07);border:1px solid var(--border);border-radius:5px;padding:2px 7px;color:var(--text3);">${wname} <b style="color:var(--text2);font-weight:700;">${wpts.length}</b></span>`;
          });
        }
        html+=`</div></div>`;
      });
    } else if(hasWeight){
      const wtGroups={};
      gpts.forEach(p=>{const wk=p.weight||'미분류';if(!wtGroups[wk])wtGroups[wk]=[];wtGroups[wk].push(p);});
      Object.entries(wtGroups).sort((a,b)=>a[0].localeCompare(b[0],'ko')).forEach(([wname,wpts])=>{

    html+=`</div>`;
    box.innerHTML=html;
    body.appendChild(box);
  });

async function runBracketAnalysis(){
  const btn=document.getElementById('btn-analyze');
  const result=document.getElementById('analysis-result');
  const body=document.getElementById('analysis-body');
  const status=document.getElementById('analysis-status');

  const allPts=Object.values(_groups).flat();
  if(!allPts.length){ toast('참가자 데이터가 없어요','error'); return; }

  btn.disabled=true; btn.textContent='분석 중...'; btn.style.opacity='0.6';
  result.style.display='block'; body.innerHTML=''; status.textContent='';

  const entries=Object.entries(_groups).sort((a,b)=>a[0].localeCompare(b[0],'ko'));
  const totalGroups=entries.length;
  const courts=_courtCount||1;

  // ── 그룹별 분석 ──
  let totalMatches=0;
  const groupStats=entries.map(([gname,members])=>{
    const n=members.length;
    const rounds=Math.ceil(Math.log2(n));
    const matches=n-1; // 토너먼트 총 경기수 = 참가자-1
    const hasBye=n&(n-1); // 2의 거듭제곱이 아니면 부전승 있음
    totalMatches+=matches;
    return {gname,n,rounds,matches,hasBye:!!hasBye};
  });

  // ── 레이아웃 추천 (A~E형 모두 고려) ──
  let layoutRec, layoutReason;
  if(courts===1){
    if(totalGroups<=4 && maxInGroup<=8){
      layoutRec='B형 (아래→위)'; layoutReason='소규모 단일 경기장은 아래→위 흐름이 시각적으로 깔끔합니다.';
    } else if(totalGroups<=4){
      layoutRec='C형 (위→아래)'; layoutReason='단일 경기장에서 인원이 많을 때 위→아래 흐름이 보기 편합니다.';
    } else {
      layoutRec='A형 (좌→우)'; layoutReason='그룹이 많은 단일 경기장은 좌→우 단방향이 진행 흐름 파악에 가장 유리합니다.';
    }
  } else if(courts===2){
    layoutRec='D형 (양방향→중앙)'; layoutReason='경기장 2개는 좌우로 나눠 진행하고 가운데서 결승하는 D형이 최적입니다.';
  } else if(courts>=3 && courts%2===0){
    layoutRec='D형 (양방향→중앙)'; layoutReason=`경기장 ${courts}개(짝수)는 좌우 균등 분배 D형을 권장합니다.`;
  } else {
    layoutRec='E형 (상하→중앙)'; layoutReason=`경기장 ${courts}개(홀수)는 위아래로 나눠 가운데 결승하는 E형을 권장합니다.`;
  }

  // ── 경기 배정 추천: 그룹을 경기장에 나눠 배치 ──
  // 인원 많은 그룹 → 여러 경기장에 분산, 적은 그룹 → 한 경기장에 집중
  const sortedBig=[...groupStats].sort((a,b)=>b.n-a.n);
  const courtAssign=Array.from({length:courts},(_,i)=>({court:i+1,groups:[],matches:0}));
  sortedBig.forEach(g=>{
    // 현재 경기 수가 가장 적은 경기장에 배정
    courtAssign.sort((a,b)=>a.matches-b.matches);
    courtAssign[0].groups.push(g.gname);
    courtAssign[0].matches+=g.matches;
  });
  courtAssign.sort((a,b)=>a.court-b.court);

  // ── 부전승 필요 그룹 ──
  const byeGroups=groupStats.filter(g=>g.hasBye);

  // ── HTML 결과 렌더링 ──
  let html='';

  // 요약 카드
  html+=`<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;">
    <div style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 14px;text-align:center;">
      <div style="font-size:20px;font-weight:700;color:var(--accent);">${allPts.length}<span style="font-size:11px;color:var(--text3);margin-left:2px;">명</span></div>
      <div style="font-size:10px;color:var(--text3);margin-top:2px;">전체 참가자</div>
    </div>
    <div style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 14px;text-align:center;">
      <div style="font-size:20px;font-weight:700;color:var(--accent);">${totalGroups}<span style="font-size:11px;color:var(--text3);margin-left:2px;">그룹</span></div>
      <div style="font-size:10px;color:var(--text3);margin-top:2px;">체급/부문 수</div>
    </div>
    <div style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 14px;text-align:center;">
      <div style="font-size:20px;font-weight:700;color:var(--yellow);">${totalMatches}<span style="font-size:11px;color:var(--text3);margin-left:2px;">경기</span></div>
      <div style="font-size:10px;color:var(--text3);margin-top:2px;">총 경기 수</div>
    </div>
  </div>`;

  // 레이아웃 추천
  const layoutCode=layoutRec.charAt(0); // 'A','D','E' 등 첫 글자
  html+=`<div style="margin-bottom:12px;padding:10px 14px;background:rgba(76,201,240,0.07);border:1px solid rgba(76,201,240,0.25);border-radius:8px;">
    <div style="font-size:10px;color:var(--accent);font-family:'Share Tech Mono',monospace;margin-bottom:5px;">// 레이아웃 추천</div>
    <span style="font-size:13px;font-weight:700;color:var(--text);">${layoutRec}</span>
    <span style="font-size:11px;color:var(--text3);margin-left:8px;">${layoutReason}</span>
  </div>`;

  // 경기장별 배정
  html+=`<div style="margin-bottom:12px;">
    <div style="font-size:10px;color:var(--accent);font-family:'Share Tech Mono',monospace;margin-bottom:7px;">// 경기장별 그룹 배정 추천</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;">`;
  courtAssign.forEach(c=>{
    html+=`<div style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 12px;min-width:120px;">
      <div style="font-size:10px;font-weight:700;color:var(--red);margin-bottom:5px;">경기장 ${c.court} <span style="color:var(--text3);font-weight:400;">(${c.matches}경기)</span></div>
      ${c.groups.map(g=>`<div style="font-size:11px;color:var(--text2);padding:1px 0;">${g}</div>`).join('')}
    </div>`;
  });
  html+=`</div></div>`;

  // 부전승
  if(byeGroups.length){
    html+=`<div style="margin-bottom:12px;padding:10px 14px;background:rgba(255,214,10,0.07);border:1px solid rgba(255,214,10,0.3);border-radius:8px;">
      <div style="font-size:10px;color:var(--yellow);font-family:'Share Tech Mono',monospace;margin-bottom:5px;">// 부전승 필요 그룹</div>
      <div style="font-size:11px;color:var(--text2);">${byeGroups.map(g=>`<b>${g.gname}</b> (${g.n}명)`).join(' · ')}은 홀수 인원이므로 1라운드에서 부전승 1명을 지정해야 합니다.</div>
    </div>`;
  }

  // 그룹별 세부 라운드 수
  html+=`<div>
    <div style="font-size:10px;color:var(--accent);font-family:'Share Tech Mono',monospace;margin-bottom:7px;">// 그룹별 라운드 구성</div>
    <div style="display:flex;gap:5px;flex-wrap:wrap;">
    ${groupStats.map(g=>`<div style="background:var(--card);border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:11px;">
      <span style="color:var(--text2);">${g.gname}</span>
      <span style="color:var(--text3);margin-left:6px;">${g.n}명 / ${g.rounds}라운드 / ${g.matches}경기</span>
    </div>`).join('')}
    </div>
  </div>`;

  status.textContent='분석 완료';
  status.style.color='var(--green)';

  // 추천 적용 버튼 (레이아웃 저장만, 대진표 생성은 사용자가 직접)
  html+=`<div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:flex-end;gap:10px;">
    <span style="font-size:11px;color:var(--text3);">추천 레이아웃 <b style="color:var(--text2);">${layoutRec}</b></span>
    <button onclick="applyAnalysisLayout('${layoutCode}')" style="padding:6px 16px;background:rgba(76,201,240,.15);border:1px solid var(--accent);color:var(--accent);border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;">✔ 추천 레이아웃 적용</button>
  </div>`;

  body.innerHTML=html;
  btn.disabled=false; btn.textContent='🔍 대진표 분석'; btn.style.opacity='1';
}

function renderOrderArea(){
  const area=document.getElementById('pts-order-area'); if(!area) return; area.innerHTML='';
  Object.entries(_groups).sort((a,b)=>a[0].localeCompare(b[0],'ko')).forEach(([gname,members])=>{
    const sec=document.createElement('div'); sec.style.marginBottom='20px';
    sec.innerHTML=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border);">
      <span style="font-size:12px;font-weight:700;">${gname}</span>
      <span style="font-size:10px;color:var(--text3);background:var(--card2);padding:1px 8px;border-radius:10px;">${members.length}명</span>
      <span style="font-size:10px;color:var(--text3);margin-left:4px;">이름 클릭→번호지정 · 드래그→순서변경</span></div>`;
    const grid=document.createElement('div'); grid.dataset.group=gname;
    members.forEach((p,i)=>grid.appendChild(buildOrderRow(p,i,gname,members)));

function buildOrderRow(p,i,gname,members){
  const row=document.createElement('div'); row.className='order-row'; row.draggable=true; row.dataset.pid=p.id;
  row.innerHTML=`<span class="onum" style="font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--red);width:20px;font-weight:700;flex-shrink:0;">${i+1}</span>
    <div style="width:6px;height:6px;border-radius:50%;background:${p.color||'var(--text3)'};flex-shrink:0;"></div>
    <span style="flex:1;font-size:13px;font-weight:600;">${p.name}</span>
    ${p.weight||p.division?`<span style="font-size:10px;color:var(--text3);">${[p.division,p.weight].filter(Boolean).join(' / ')}</span>`:''}
    <span style="font-size:10px;color:var(--text3);opacity:.5;">≡</span>`;
  row.onclick=e=>{
    if(e.target.tagName==='INPUT') return;
    const cur=parseInt(row.querySelector('.onum').textContent);
    const inp=document.createElement('input');
    inp.type='number'; inp.min=1; inp.max=members.length; inp.value=cur;
    inp.style.cssText='width:40px;font-size:12px;background:var(--bg);border:1px solid var(--accent);border-radius:4px;color:var(--text);text-align:center;padding:2px;';
    row.querySelector('.onum').replaceWith(inp); inp.focus(); inp.select();
    const apply=()=>{
      const nv=Math.max(1,Math.min(members.length,parseInt(inp.value)||cur));
      const g=_groups[gname]; const fi=g.findIndex(x=>x.id===p.id);
      g.splice(nv-1,0,g.splice(fi,1)[0]); renderOrderArea();
    };
    inp.onblur=apply;
    inp.onkeydown=e2=>{if(e2.key==='Enter')apply();if(e2.key==='Escape')renderOrderArea();};
    e.stopPropagation();
  };
  return row;
}

function initDragSort(grid,gname){
  let dragEl=null;
  grid.addEventListener('dragstart',e=>{dragEl=e.target.closest('[data-pid]');if(dragEl)setTimeout(()=>dragEl.style.opacity='.4',0);});
  grid.addEventListener('dragend',()=>{if(dragEl){dragEl.style.opacity='1';dragEl=null;}});
  grid.addEventListener('dragover',e=>{
    e.preventDefault();
    const over=e.target.closest('[data-pid]'); if(!over||over===dragEl) return;
    const rows=[...grid.querySelectorAll('[data-pid]')];
    const fi=rows.indexOf(dragEl),ti=rows.indexOf(over); if(fi<0||ti<0) return;
    const g=_groups[gname]; g.splice(ti,0,g.splice(fi,1)[0]);
    g.forEach((p,idx)=>{const r=grid.querySelector(`[data-pid="${p.id}"]`);if(r){r.querySelector('.onum').textContent=idx+1;grid.appendChild(r);}});
  });
}

function shuffleAllGroups(){
  Object.keys(_groups).forEach(k=>{_groups[k]=[..._groups[k]].sort(()=>Math.random()-.5);});
  renderOrderArea(); toast('무작위로 섞었어요','success');
}

function generateAllBrackets(){
  // 경기장 수에 따라 레이아웃 자동 설정
  const courts=_courtCount||1;
  _bracketLayout = courts >= 2 ? 'D' : 'A';

  const entries=Object.entries(_groups).sort((a,b)=>a[0].localeCompare(b[0],'ko'));

  // 경기장별 그룹 배정 (분석과 동일 로직 — 경기 수 균등 분배)
  const courtSlots=Array.from({length:courts},(_,i)=>({court:i+1,groups:[],matchCount:0}));
  [...entries].sort((a,b)=>b[1].length-a[1].length).forEach(([gname,members])=>{
    courtSlots.sort((a,b)=>a.matchCount-b.matchCount);
    courtSlots[0].groups.push(gname);
    courtSlots[0].matchCount+=members.length-1;
  });
  courtSlots.sort((a,b)=>a.court-b.court);

  // groupBrackets 생성 (탭용 — 빈 matches)
  S.groupBrackets=entries.map(([gname,members])=>({
    label:gname,
    matches:generateBracket([...members]),
    slots:members.map((p,i)=>({num:i+1,player:p})),
    court:courtSlots.findIndex(c=>c.groups.includes(gname))+1
  }));

  S.activeGroup=0; _assignMode=false; _linkSel=null;
  try{
    localStorage.setItem('sgp_step','3');
    localStorage.setItem('sgp_courtCount', String(_courtCount||1));
    localStorage.setItem('sgp_layout', _bracketLayout||'A');
    localStorage.setItem('sgp_groupBrackets', JSON.stringify(S.groupBrackets));
  }catch(e){}
  // 중간저장 데이터가 있으면 matches만 복원
  try{
    const saved=JSON.parse(localStorage.getItem('sgp_bracket_temp'));
    if(saved&&saved.groupBrackets){
      // label 기준으로 매칭해서 matches만 복원
      saved.groupBrackets.forEach(savedG=>{
        const target=S.groupBrackets.find(g=>g.label===savedG.label);
        if(target&&savedG.matches) target.matches=savedG.matches;
      });
      toast(`중간저장 불러옴 (${saved.savedAt})`,'success');
    }
  } catch(e){}

  show('pts-step3');
  renderBracketTabs();
  _redrawBracketView();
}

function _redrawBracketView(){
  _linkSel=null;
  const courts=_courtCount||1;
  const view=document.getElementById('pts-bracket-view');
  if(!view||!S.groupBrackets?.length) return;

  const prevScrollEl=view.querySelector('[style*="overflow"]');
  const savedScrollTop=prevScrollEl?prevScrollEl.scrollTop:0;
  const savedScrollLeft=prevScrollEl?prevScrollEl.scrollLeft:0;
  view.innerHTML='';

  const noByeMatches=matches=>(matches||[]).filter(m=>!m.bye);
  const saved=S.matches;

  if(_bracketLayout==='D' && courts>=2){
    const outerWrap=document.createElement('div');
    outerWrap.style.cssText='display:flex;flex-direction:row;overflow:auto;flex:1;height:100%;';

    lDiv.style.cssText='flex:1;padding:12px;min-width:0;';

    const rDiv=document.createElement('div');
    rDiv.style.cssText='flex:1;padding:12px;min-width:0;display:flex;flex-direction:column;align-items:flex-end;';

    const mkLabel=(txt,align='left')=>{ const d=document.createElement('div'); d.style.cssText=`font-size:10px;color:var(--accent);font-family:"Share Tech Mono",monospace;letter-spacing:2px;margin-bottom:10px;width:100%;text-align:${align};`; d.textContent=txt; return d; };
    lDiv.appendChild(mkLabel('// 경기장 1','left'));
    rDiv.appendChild(mkLabel('// 경기장 2','right'));

    // 각 그룹을 개별 렌더링 - 연결선이 그룹 내에서만 올바르게 그려짐
    const renderCourtGroups=(courtNum, container)=>{
      const groups=(S.groupBrackets||[]).filter(g=>g.court===courtNum);
      const reversed=(courtNum===2);
      groups.forEach(g=>{
        const labelParts=g.label.split('/').map(s=>s.trim());
        const shortLabel=labelParts.map((p,pi)=>pi===0?p:p.replace('부','')).join('·');

        // 그룹 헤더
        const hdr=document.createElement('div');
        hdr.style.cssText='font-size:9px;color:#555;font-family:"Share Tech Mono",monospace;letter-spacing:1px;margin-bottom:4px;margin-top:8px;';
        hdr.textContent=shortLabel;
        container.appendChild(hdr);

        // 그룹 대진표 래퍼
        const groupWrap=document.createElement('div');
        groupWrap.style.cssText='margin-bottom:16px;position:relative;';

        // 1라운드 match에 태깅 (_groupObj, _origMi)
        const taggedMatches=g.matches.map((round,ri)=>
          round.map((m,mi)=>({...m,
            _groupObj:g,
            _origMi:mi,
            _origRi:ri,
            _groupLabel:shortLabel
          }))
        );

        S.matches=taggedMatches;
        _renderBracketHTML(groupWrap, taggedMatches, 'top', reversed);
        container.appendChild(groupWrap);
      });
    };

    renderCourtGroups(1, lDiv);
    renderCourtGroups(2, rDiv);

    // 각 경기장이 자기 영역(50%)을 넘지 않도록 scale 조정
    const scaleToFit=(div)=>{
      requestAnimationFrame(()=>requestAnimationFrame(()=>{
        const available=outerWrap.offsetWidth/2 - 24;
        const actual=div.scrollWidth;
        if(actual>available){
          const scale=available/actual;
          div.style.transformOrigin='top left';
          div.style.transform=`scale(${scale})`;
          div.style.height=(div.scrollHeight*scale)+'px';
        }
      }));
    };
    scaleToFit(lDiv);
    // rDiv는 오른쪽 끝 정렬이라 transform-origin 다르게
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      const available=outerWrap.offsetWidth/2 - 24;
      const actual=rDiv.scrollWidth;
      if(actual>available){
        const scale=available/actual;
        rDiv.style.transformOrigin='top right';
        rDiv.style.transform=`scale(${scale})`;
        rDiv.style.height=(rDiv.scrollHeight*scale)+'px';
      }
    }));

    _stripInnerScroll(lDiv);
    _stripInnerScroll(rDiv);
    outerWrap.appendChild(lDiv);
    outerWrap.appendChild(rDiv);
    view.appendChild(outerWrap);
  } else {
    const allMatches=(S.groupBrackets||[]).flatMap(g=>noByeMatches(g.matches[0]));
    S.matches=allMatches.length?[allMatches]:[[]];
    renderBracketA(view);
  }
  S.matches=saved;
  // 탭 체크 상태 갱신
  renderBracketTabs();
  // 스크롤 위치 복원 (새로 생성된 내부 스크롤 컨테이너에 적용)
  if(savedScrollTop||savedScrollLeft){
    requestAnimationFrame(()=>{
      const newScrollEl=view.querySelector('[style*="overflow"]');
      if(newScrollEl){
        newScrollEl.scrollTop=savedScrollTop;
        newScrollEl.scrollLeft=savedScrollLeft;
      }
    });
  }
}

// 부전승 배정 선택 팝업
// 특정 라운드에서 아직 연결되지 않은 경기 목록 반환
function _getUnlinkedMatches(g, ri){
  const curRound=g.matches[ri];
  const nextRound=g.matches[ri+1]||[];
  return curRound.map((m,mi)=>{
    const key=`${ri}-${mi}`;
    const linked=nextRound.find(nm=>nm.fromA===key||nm.fromB===key);
    return linked?null:{ri,mi,m};
  }).filter(Boolean);
}

// 수동 연결 후 홀수 체크 → 모든 경기 연결 완료 + 다음 라운드 진출자 홀수면 바로 팝업
function _checkAndHandleOddAfterLink(g, ri){
  const curRound=g.matches[ri];
  const nextRound=g.matches[ri+1]||[];

  // 현재 라운드 전체 경기 수 (BYE 포함)
  const totalMatches=curRound.length;

  // 다음 라운드에 연결된 경기 수
  const linkedCount=nextRound.length;

  // 진출자 수 = 현재 라운드 경기 수 (각 경기에서 1명 진출)
  const advancers=totalMatches;

  // 아직 다 연결 안 됐으면 패스
  // 짝수면 BYE 필요 없으니 패스
  // 이미 BYE가 배정돼 있으면 패스
  const alreadyHasBye=nextRound.some(m=>m.bye);
  if(alreadyHasBye) return;
  if(advancers%2===0) return;

  // 홀수 진출자 확정: 다음 라운드에서 짝 못 맞추는 1명이 생김
  // → 현재까지 연결된 경기 + 아직 미연결 경기 합쳐서 전체 진출자 목록으로 팝업
  const allCandidates=curRound.map((m,mi)=>({
    id:`bye_${ri}_${mi}`,
    name:`${ri+1}-${mi+1} 승자`,
    color:'var(--accent)',
    _ri:ri, _mi:mi
  }));

  showByeSelector(
    allCandidates,
    `${ri+1}라운드 진출자 ${advancers}명 — 부전승 배정`,
    (sel)=>{
      if(!g.matches[ri+1]) g.matches.push([]);
      const key=`${sel._ri}-${sel._mi}`;
      if(g.matches[ri+1].find(nm=>nm.fromA===key||nm.fromB===key)){
        toast('이미 연결된 경기입니다','error');
        _redrawBracketView(); return;
      }
      g.matches[ri+1].push({p1:{name:sel.name,tbd:true},p2:null,fromA:key,fromB:null,bye:true});
      _redrawBracketView();
      toast(sel.name+' 부전승 배정!','success');
    },
    ()=>{
      // 랜덤: 전체 진출자 중 랜덤
      const pick=allCandidates[Math.floor(Math.random()*allCandidates.length)];
      if(!g.matches[ri+1]) g.matches.push([]);
      const key=`${pick._ri}-${pick._mi}`;
      if(g.matches[ri+1].find(nm=>nm.fromA===key||nm.fromB===key)){
        _redrawBracketView(); return;
      }
      g.matches[ri+1].push({p1:{name:pick.name,tbd:true},p2:null,fromA:key,fromB:null,bye:true});
      _redrawBracketView();
      showByeResult(pick.name);
    }
  );
}

function renderBracketTabs(){
  const tabs=document.getElementById('pts-bracket-tabs');
  const groups=S.groupBrackets||[];
  tabs.innerHTML='';
  if(groups.length<1){tabs.style.display='none';return;}
  tabs.style.display='block';

  // 경기장별로 그룹 분류
  const courts={};
  groups.forEach((g,i)=>{
    const c=g.court||1;
    if(!courts[c]) courts[c]=[];
    courts[c].push({g,i});
  });

  const courtNums=Object.keys(courts).map(Number).sort((a,b)=>a-b);

  // 좌우 분리 컨테이너
  const row=document.createElement('div');
  row.style.cssText='display:flex;gap:0;width:100%;';

  courtNums.forEach((courtNum, ci)=>{
    const col=document.createElement('div');
    col.style.cssText=`flex:1;padding:8px 14px;${ci>0?'border-left:1px solid var(--border)':''}`;

    // 경기장 헤더
    const hdr=document.createElement('div');
    hdr.style.cssText='font-size:9px;color:var(--accent);font-family:"Share Tech Mono",monospace;letter-spacing:2px;margin-bottom:6px;';
    hdr.textContent=`// 경기장 ${courtNum}`;
    col.appendChild(hdr);

    // 그룹 목록
    const list=document.createElement('div');
    list.style.cssText='display:flex;flex-wrap:wrap;gap:4px;';

    courts[courtNum].forEach(({g,i})=>{
      // 현재 그려진 non-bye 경기 박스 수
      // 총 목표 박스 수 계산 (BYE 포함, 참가자 수 기준)
      const calcTotalBoxes=(n)=>{ let t=0,c=n; while(c>1){t+=Math.ceil(c/2);c=Math.ceil(c/2);} return t; };
      const totalBoxes=calcTotalBoxes(g.slots.length);
      // 현재 그려진 박스 수 (BYE 포함)
      const drawnBoxes=g.matches.reduce((acc,round)=>acc+round.length, 0);
      const allDone=drawnBoxes>=totalBoxes;

      const checkboxes=Array.from({length:totalBoxes},(_,ci)=>
        `<span style="font-size:11px;color:${ci<drawnBoxes?'var(--green)':'var(--border2)'};">${ci<drawnBoxes?'☑':'☐'}</span>`
      ).join('');

      const btn=document.createElement('button');
      const active=i===S.activeGroup;

      const labelParts=g.label.split('/').map(s=>s.trim());
      const shortLabel=labelParts.map((p,pi)=>pi===0?p:p.replace('부','')).join('·');

      btn.style.cssText=`
        display:inline-flex;align-items:center;gap:5px;
        padding:3px 8px;border-radius:5px;
        border:1px solid ${allDone?'var(--green)':active?'var(--red)':'var(--border)'};
        background:${allDone?'rgba(6,214,160,.1)':active?'rgba(230,57,70,.15)':'transparent'};
        color:${allDone?'var(--green)':active?'var(--red)':'var(--text3)'};
        font-size:10px;cursor:pointer;font-weight:${active?'700':'400'};
        white-space:nowrap;
      `;

      btn.innerHTML=`
        <span style="font-size:10px;">${shortLabel}</span>
        <span style="font-size:9px;color:var(--text3);">(${g.slots.length}명)</span>
        <span style="display:inline-flex;gap:1px;align-items:center;">${checkboxes}</span>
      `;
      btn.onclick=()=>{ S.activeGroup=i; renderBracketTabs(); _redrawBracketView(); };
      list.appendChild(btn);
    });

    col.appendChild(list);
    row.appendChild(col);
  });

  tabs.appendChild(row);
}

function _hideMatchModal(){ const m=document.getElementById('match-action-modal'); if(m) m.remove(); }

function _showMatchModal(anchorEl, ri, mi, matchObj){
  _hideMatchModal();
  const grpObj = matchObj&&matchObj._groupObj ? matchObj._groupObj : null;
  const origMi = (matchObj&&matchObj._origMi!=null) ? matchObj._origMi : mi;
  const origRi = (matchObj&&matchObj._origRi!=null) ? matchObj._origRi : ri;

  modal.style.cssText = `
    position:fixed;z-index:9999;

    box-shadow:0 8px 32px rgba(0,0,0,.6);

  `;

  const mkBtn=(icon,text,color,fn)=>{
    const b=document.createElement('button');
    b.style.cssText=`display:flex;align-items:center;gap:9px;padding:9px 13px;border-radius:8px;border:none;background:transparent;color:${color};font-size:12px;font-weight:600;cursor:pointer;text-align:left;transition:background .1s;font-family:'Noto Sans KR',sans-serif;width:100%;`;

    b.onmouseout=()=>b.style.background='transparent';
    b.innerHTML=`<span style="font-size:15px;width:20px;text-align:center;">${icon}</span><span>${text}</span>`;
    b.addEventListener('click',(e)=>{ e.stopPropagation(); _hideMatchModal(); fn(); });
    return b;
  };

  // 헤더
  const hdr=document.createElement('div');
  hdr.style.cssText='padding:5px 13px 7px;font-size:10px;color:var(--text3);font-family:"Share Tech Mono",monospace;letter-spacing:1px;border-bottom:1px solid var(--border);margin-bottom:2px;';
  hdr.textContent=`// 경기 ${label}`;
  modal.appendChild(hdr);

  // 연결 대기 중이면 → "이 경기와 연결" 옵션만
  if(_linkSel){
    modal.appendChild(mkBtn('🔗','이 경기와 연결','var(--accent)',()=>{
      _doLink(ri,mi,grpObj,origMi,origRi);
    }));
    modal.appendChild(mkBtn('✕','선택 취소','var(--text3)',()=>{
      _linkSel=null; _redrawBracketView();
    }));
  } else {
    modal.appendChild(mkBtn('🔗','다른 경기와 연결','var(--accent)',()=>{
      _linkSel={ri,mi,grpObj,origMi,origRi,matchObj};
      if(matchObj&&matchObj._domId){
        const el=document.querySelector(`[data-match-id="${matchObj._domId}"]`);
        if(el){ el.style.borderColor='#4cc9f0'; el.style.boxShadow='0 0 8px rgba(76,201,240,.5)'; }
      }
      toast(`${label} 선택됨 — 연결할 경기를 클릭하세요`,'info');
    }));
    modal.appendChild(mkBtn('▶','부전승 직행','var(--green)',()=>{
      _doAdvance(origRi, origMi, grpObj);
    }));
    modal.appendChild(mkBtn('🗑','이 라운드 연결 삭제','var(--red)',()=>{
      _doRemoveRound(origRi, grpObj);
    }));
  }

  document.body.appendChild(modal);

  // 위치 잡기 — 클릭 박스 바로 아래, 화면 벗어나면 위로
  const rect = anchorEl.getBoundingClientRect();
  let top = rect.bottom + 6;
  let left = rect.left;
  if(top + 220 > window.innerHeight) top = rect.top - 220;
  if(left + 200 > window.innerWidth) left = window.innerWidth - 210;
  modal.style.top = top + 'px';
  modal.style.left = left + 'px';

  // 외부 클릭 시 닫기 — 모달 자신 클릭은 제외
  const onOutside = (e)=>{
    if(!modal.contains(e.target)){ _hideMatchModal(); document.removeEventListener('click', onOutside); }
  };
  setTimeout(()=>{ document.addEventListener('click', onOutside); }, 0);
}

function _doLink(ri, mi, grpObj, origMi, origRi){
  const a = _linkSel;
  const b = {ri, mi, grpObj, origMi, origRi};
  _linkSel = null;

  if(a.origRi===origRi && a.origMi===origMi && a.grpObj===grpObj){
    _redrawBracketView(); return; // 같은 경기 재클릭 → 취소
  }

  const grpA = a.grpObj || S.groupBrackets[S.activeGroup];
  const grpB = b.grpObj || S.groupBrackets[S.activeGroup];
  if(grpA !== grpB){ toast('같은 체급 경기끼리만 연결할 수 있어요','error'); _redrawBracketView(); return; }
  if(a.origRi !== b.origRi){ toast('라운드가 맞지 않습니다','error'); _redrawBracketView(); return; }

  const grp = grpA;
  const targetRi = Math.max(a.origRi, b.origRi) + 1;
  while(grp.matches.length <= targetRi) grp.matches.push([]);
  const nextRound = grp.matches[targetRi];

  const aKey=`${a.origRi}-${a.origMi}`, bKey=`${b.origRi}-${b.origMi}`;
  const aLinked=nextRound.find(m=>m.fromA===aKey||m.fromB===aKey);
  const bLinked=nextRound.find(m=>m.fromA===bKey||m.fromB===bKey);
  if(aLinked||bLinked){ toast('이미 연결된 경기입니다','error'); _redrawBracketView(); return; }

  nextRound.push({p1:{name:`${a.origRi+1}-${a.origMi+1} 승자`,tbd:true},p2:{name:`${b.origRi+1}-${b.origMi+1} 승자`,tbd:true},fromA:aKey,fromB:bKey,bye:false});
  _redrawBracketView();
  toast(`${grp.label} ${a.origRi+1}-${a.origMi+1} vs ${b.origRi+1}-${b.origMi+1} 연결됨!`,'success');
}

function _doAdvance(origRi, origMi, grpObj){
  const g = grpObj || S.groupBrackets[S.activeGroup];
  while(g.matches.length <= origRi+1) g.matches.push([]);
  const nextRound = g.matches[origRi+1];
  const aKey = `${origRi}-${origMi}`;
  if(nextRound.find(m=>m.fromA===aKey||m.fromB===aKey)){ toast('이미 연결된 경기입니다','error'); _redrawBracketView(); return; }
  nextRound.push({p1:{name:`${origRi+1}-${origMi+1} 승자`,tbd:true},p2:null,fromA:aKey,fromB:null,bye:true});
  _redrawBracketView();
  toast(`${origRi+1}-${origMi+1} 승자 다음 라운드 직행!`,'success');
}

function _doRemoveRound(origRi, grpObj){
  const g = grpObj || S.groupBrackets[S.activeGroup];
  if(!g){ toast('그룹을 찾을 수 없어요','error'); return; }
  if(g.matches.length <= origRi + 1){ toast('삭제할 연결이 없어요','info'); return; }
  // origRi 다음 라운드부터 모두 제거 (연결 정보 삭제)
  g.matches.splice(origRi + 1);
  _redrawBracketView();
  toast(`${origRi+1}라운드 이후 연결이 삭제됐어요`,'success');
}

function onMatchClick(ri, mi, matchObj, event){
  event = event || window.event;
  // 클릭된 경기 박스 DOM 요소 찾기
  let anchorEl = null;
  if(matchObj&&matchObj._domId){
    anchorEl = document.querySelector(`[data-match-id="${matchObj._domId}"]`);
  }
  if(!anchorEl && event) anchorEl = event.currentTarget || event.target;
  if(!anchorEl) anchorEl = document.getElementById('pts-bracket-view');

  // 연결 대기 중이고 다른 경기 클릭 → 모달에 "이 경기와 연결" 표시
  if(_linkSel){
    const isSame = matchObj&&matchObj._domId && _linkSel.matchObj&&matchObj._domId===_linkSel.matchObj._domId;
    if(!isSame){ _showMatchModal(anchorEl, ri, mi, matchObj); return; }
  }

  _showMatchModal(anchorEl, ri, mi, matchObj);
}

function advanceMatch(ri,mi){
  // 하위 호환 — 직접 호출되는 경우 대비
  _doAdvance(ri, mi, null);
}

function _showLinkBar(){ /* 모달로 대체됨 — 빈 함수 유지 (step4.js 등 외부 참조 대비) */ }
function _hideLinkBar(){ _hideMatchModal(); }

document.addEventListener('keydown', e=>{ 
  if(e.key==='Escape'){
    if(document.getElementById('match-action-modal')){ _hideMatchModal(); _linkSel=null; _redrawBracketView(); }
    else window.close();
  }
});

// localStorage 복원 — 저장된 단계로 이동
(function restoreFromStorage(){
  try {
    const savedGroups = localStorage.getItem('sgp_groups');
    const savedKeys   = localStorage.getItem('sgp_sortKeys');
    const savedPts    = localStorage.getItem('sgp_pts');
    const savedStep   = localStorage.getItem('sgp_step');
    if(savedGroups){
      _groups   = JSON.parse(savedGroups);
      _sortKeys = JSON.parse(savedKeys||'[]');
      if(savedPts){ _pts=JSON.parse(savedPts); S.pts=_pts; }
      const savedCourtCount = localStorage.getItem('sgp_courtCount');
      const savedLayout     = localStorage.getItem('sgp_layout');
      if(savedCourtCount) _courtCount=parseInt(savedCourtCount);
      if(savedLayout) _bracketLayout=savedLayout;
      setTimeout(()=>{
        if(savedStep==='3'){
          const savedGB=localStorage.getItem('sgp_groupBrackets');
          if(savedGB) S.groupBrackets=JSON.parse(savedGB);
          show('pts-step3');
          renderBracketTabs();
          _redrawBracketView();
          toast('이전 설정 불러왔어요','info');
        } else {
          goStep2();
          toast('이전 설정 불러왔어요','info');
        }
      }, 0);
    }
  } catch(e){}
})();

function restoreThenGo(){
  if(window._restoreBanner) window._restoreBanner.remove();
  goStep2();
  toast('이어서 진행합니다!','success');
}

function clearSavedAndRestart(){
  try{ localStorage.removeItem('sgp_groups'); localStorage.removeItem('sgp_sortKeys'); localStorage.removeItem('sgp_pts'); }catch(e){}
  if(window._restoreBanner) window._restoreBanner.remove();
  toast('초기화됐어요','info');
}

autoDetectSortKeys();
renderList();
</script>
