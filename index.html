<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SGP — 멀티 게임 센서 플랫폼</title>
<link rel="stylesheet" href="css/style.css">
<style>
.hero {
  padding: 80px 0 60px;
  text-align: center;
  position: relative;
}
.hero-title {
  font-family: var(--font-display);
  font-size: clamp(48px, 10vw, 100px);
  letter-spacing: 4px; line-height: 1;
  margin-bottom: 16px;
}
.hero-title span { color: var(--red); }
.hero-sub {
  color: var(--text-dim);
  font-size: 18px; margin-bottom: 40px;
  font-family: var(--font-mono);
  letter-spacing: 2px;
}
.hero-badge-row {
  display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
  margin-bottom: 48px;
}

/* 게임 카드 */
.game-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 16px;
}
.game-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px 20px;
  cursor: pointer;
  transition: all .25s;
  text-decoration: none;
  display: block;
  position: relative;
  overflow: hidden;
}
.game-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: var(--accent, var(--red));
  transform: scaleX(0); transform-origin: left;
  transition: transform .25s;
}
.game-card:hover { border-color: var(--accent, var(--red)); transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,0,0,.4); }
.game-card:hover::before { transform: scaleX(1); }
.game-icon { font-size: 36px; margin-bottom: 12px; display: block; }
.game-name {
  font-family: var(--font-display);
  font-size: 20px; letter-spacing: 1px;
  margin-bottom: 6px; color: var(--text);
}
.game-desc { font-size: 13px; color: var(--text-dim); line-height: 1.5; }
.game-tag {
  position: absolute; top: 14px; right: 14px;
  font-family: var(--font-mono);
  font-size: 10px; letter-spacing: 1px;
  padding: 3px 8px; border-radius: 4px;
  background: var(--bg3);
  color: var(--text-dim);
}

/* 최근 행사 */
.recent-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px 24px;
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
  cursor: pointer; transition: border-color .2s;
}
.recent-card:hover { border-color: var(--blue); }

/* 통계 */
.stat-row {
  display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px;
  margin-bottom: 48px;
}
.stat-box {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px;
  text-align: center;
}
.stat-val {
  font-family: var(--font-display);
  font-size: 36px; letter-spacing: 1px;
  color: var(--blue);
}
.stat-label { font-size: 12px; color: var(--text-dim); margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }

@media (max-width: 600px) {
  .stat-row { grid-template-columns: repeat(3, 1fr); }
}
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a class="nav-logo" href="index.html">SGP<span>.</span></a>
    <div class="nav-steps">
      <a class="nav-step active" data-page="home" href="index.html">홈</a>
      <a class="nav-step" data-page="setup" href="setup.html">행사 설정</a>
      <a class="nav-step" data-page="customize" href="customize.html">커스터마이징</a>
      
      <a class="nav-step" data-page="game" href="game.html">게임 진행</a>
      <a class="nav-step" data-page="result" href="result.html">결과</a>
    </div>
  </div>
</nav>

<div class="page">
<div class="container">

  <!-- 히어로 -->
  <div class="hero anim-fade-in">
    <div class="hero-title">SENSOR<br><span>GAME</span><br>PLATFORM</div>
    <div class="hero-sub">// 센서 하나로 무한한 게임</div>
    <div class="hero-badge-row">
      <span class="badge badge-red">서버 불필요</span>
      <span class="badge badge-blue">Web Serial API</span>
      <span class="badge badge-green">HDMI 지원</span>
      <span class="badge badge-yellow">엑셀 저장</span>
    </div>
    <a href="setup.html" class="btn btn-primary btn-lg">
      새 행사 시작 →
    </a>
    &nbsp;
    <button class="btn btn-secondary btn-lg" onclick="loadLast()">
      이어서 진행
    </button>
  </div>

  <!-- 통계 -->
  <div class="stat-row anim-fade-in" id="stats-row">
    <div class="stat-box">
      <div class="stat-val" id="stat-events">0</div>
      <div class="stat-label">총 행사</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" id="stat-participants">0</div>
      <div class="stat-label">총 참가자</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" id="stat-records">0</div>
      <div class="stat-label">총 기록</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" id="stat-sensor-games">12</div>
      <div class="stat-label">센서 게임</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" id="stat-sport-games">57</div>
      <div class="stat-label">종목 모드</div>
    </div>
  </div>

  <!-- 게임 선택 -->
  <div style="margin-bottom: 24px;">
    <div class="flex items-center justify-between mb-16">
      <h2 class="text-display" style="font-size:24px; letter-spacing:2px;">게임 모드 선택</h2>
      <span class="text-dim text-sm">선택하면 설정 화면으로 이동해요</span>
    </div>

    <!-- 탭 -->
    <div style="display:flex;gap:0;margin-bottom:20px;border:2px solid var(--border);border-radius:var(--radius);overflow:hidden;">
      <button id="home-tab-sensor" onclick="switchHomeTab('sensor')"
        style="flex:1;padding:14px;background:var(--bg2);color:var(--text-dim);border:none;cursor:pointer;font-size:14px;font-weight:700;letter-spacing:1px;transition:all .2s;">
        🔌 센서 게임
      </button>
      <button id="home-tab-sport" onclick="switchHomeTab('sport')"
        style="flex:1;padding:14px;background:var(--red);color:white;border:none;border-left:2px solid var(--border);cursor:pointer;font-size:14px;font-weight:700;letter-spacing:1px;transition:all .2s;">
        🏆 종목 선택
      </button>
    </div>

    <!-- 센서 게임 필터 -->
    <div id="home-filter-sensor" style="margin-bottom:12px;display:none;">
      <span class="badge badge-red"   style="margin-right:8px;cursor:pointer;" onclick="filterGames('all')">전체</span>
      <span class="badge badge-blue"  style="margin-right:8px;cursor:pointer;" onclick="filterGames('speed')">속도/시간</span>
      <span class="badge badge-green" style="margin-right:8px;cursor:pointer;" onclick="filterGames('strength')">힘/무게</span>
      <span class="badge badge-yellow" style="cursor:pointer;"                 onclick="filterGames('fun')">운/재미</span>
    </div>

    <!-- 종목 선택 필터 -->
    <div id="home-filter-sport" style="margin-bottom:12px;display:flex;flex-wrap:wrap;gap:6px;">
      <span class="badge badge-red"    style="cursor:pointer;" onclick="filterSports('all')">전체</span>
      <span class="badge badge-blue"   style="cursor:pointer;" onclick="filterSports('athletics')">육상/체조</span>
      <span class="badge badge-green"  style="cursor:pointer;" onclick="filterSports('ball')">구기</span>
      <span class="badge badge-yellow" style="cursor:pointer;" onclick="filterSports('martial')">무술/격투</span>
      <span class="badge badge-blue"   style="cursor:pointer;" onclick="filterSports('aqua')">수영/수상</span>
      <span class="badge badge-green"  style="cursor:pointer;" onclick="filterSports('target')">표적/정확도</span>
      <span class="badge badge-yellow" style="cursor:pointer;" onclick="filterSports('winter')">빙상/설상</span>
      <span class="badge badge-blue"   style="cursor:pointer;" onclick="filterSports('cycle')">사이클</span>
      <span class="badge badge-red"    style="cursor:pointer;" onclick="filterSports('etc')">기타</span>
    </div>

    <div class="game-grid" id="game-grid"></div>
  </div>

  <!-- 최근 기록 -->
  <hr class="divider">
  <div class="flex items-center justify-between mb-16">
    <h2 class="text-display" style="font-size:24px; letter-spacing:2px;">최근 행사 기록</h2>
    <div style="display:flex; gap:10px;">
      <button class="btn btn-outline btn-sm" onclick="resetCurrentEvent()" style="display:flex;align-items:center;gap:6px;">
        🔄 <span>현재 행사 리셋</span>
      </button>
      <button class="btn btn-outline btn-sm" style="display:flex;align-items:center;gap:6px; border-color:#e63946; color:#e63946;" onclick="resetAllHistory()">
        🗑️ <span>전체 기록 삭제</span>
      </button>
    </div>
  </div>
  <div id="recent-list">
    <div class="text-dim text-sm">아직 기록이 없어요.</div>
  </div>

</div>
</div>

<script src="js/app.js"></script>
<script>

let currentFilter = 'all';
let currentSportFilter = 'all';
let homeTab = 'sport';

function switchHomeTab(tab) {
  homeTab = tab;
  const s = document.getElementById('home-tab-sensor');
  const sp = document.getElementById('home-tab-sport');
  const fs = document.getElementById('home-filter-sensor');
  const fsp = document.getElementById('home-filter-sport');
  s.style.background  = tab==='sensor' ? 'var(--red)' : 'var(--bg2)';
  s.style.color       = tab==='sensor' ? 'white' : 'var(--text-dim)';
  sp.style.background = tab==='sport'  ? 'var(--red)' : 'var(--bg2)';
  sp.style.color      = tab==='sport'  ? 'white' : 'var(--text-dim)';
  fs.style.display    = tab==='sensor' ? 'block' : 'none';
  fsp.style.display   = tab==='sport'  ? 'flex'  : 'none';
  renderGames();
}

function filterGames(cat) { currentFilter = cat; renderGames(); }
function filterSports(cat) { currentSportFilter = cat; renderGames(); }

function renderGames() {
  const grid = document.getElementById('game-grid');
  let list;
  if (homeTab === 'sensor') {
    list = currentFilter === 'all' ? SENSOR_GAMES : SENSOR_GAMES.filter(g => g.cat === currentFilter);
  } else {
    list = currentSportFilter === 'all' ? SPORT_GAMES : SPORT_GAMES.filter(g => g.cat === currentSportFilter);
  }
  grid.innerHTML = list.map(g => `
    <a class="game-card" href="setup.html?game=${g.id}&tab=${homeTab}" style="--accent:${g.accent}" onclick="selectGame('${g.id}')">
      <span class="game-tag">${g.tag}</span>
      <span class="game-icon">${g.icon}</span>
      <div class="game-name">${g.name}</div>
      <div class="game-desc">${g.desc}</div>
    </a>
  `).join('');
}

function selectGame(id) {
  App.setState({ gameType: id, gameTab: homeTab });
}

function loadLast() {
  const state = App.getState();
  if (state.participants.length > 0) {
    window.location.href = 'game.html';
  } else {
    App.toast('이전 행사 데이터가 없어요. 새 행사를 시작하세요!', 'info');
  }
}

function updateStats() {
  const state = App.getState();
  const history = JSON.parse(localStorage.getItem('sgp_history') || '[]');
  document.getElementById('stat-events').textContent = history.length;
  document.getElementById('stat-participants').textContent = state.participants.length;
  document.getElementById('stat-records').textContent = state.records.length;
}

function renderRecent() {
  const history = JSON.parse(localStorage.getItem('sgp_history') || '[]');
  const el = document.getElementById('recent-list');
  if (!history.length) {
    el.innerHTML = '<div class="text-dim text-sm">아직 기록이 없어요.</div>';
    return;
  }
  el.innerHTML = [...history].reverse().map((h, idx) => {
    const realIdx = history.length - 1 - idx;
    const GAME_LABELS = { timelap:'🏁 타임랩', reaction:'⚡ 반응속도', balance:'🎯 균형버티기', jump:'🤸 점프력', distance:'📏 멀리뛰기', weight:'⚖️ 무게', strength:'💪 악력', oddeven:'🎲 홀짝', roulette:'🎰 룰렛', count:'🔢 카운트', sound:'🔊 소리' };
    const MODE_LABELS = { individual:'👤 개인전', team:'👥 팀대결', tournament:'🏆 토너먼트' };
    return `
    <div class="recent-card mt-8" id="hcard-${realIdx}">
      <div style="flex:1;">
        <div id="hname-${realIdx}" style="font-weight:700; font-size:16px;">${h.name}</div>
        <div class="text-dim text-sm">${h.date} · ${GAME_LABELS[h.game]||h.game} · 참가자 ${h.participants}명</div>
      </div>
      <div class="flex gap-8 items-center">
        <span class="badge badge-green">${MODE_LABELS[h.mode]||h.mode}</span>
        <button class="btn btn-outline btn-sm" onclick="editHistory(${realIdx})" title="수정" style="padding:5px 10px;">✏️</button>
        <button class="btn btn-outline btn-sm" onclick="deleteHistory(${realIdx})" title="삭제" style="padding:5px 10px; border-color:#e63946; color:#e63946;">🗑️</button>
      </div>
    </div>`;
  }).join('');
}

function deleteHistory(idx) {
  const history = JSON.parse(localStorage.getItem('sgp_history') || '[]');
  const name = history[idx]?.name || '이 기록';
  if (!confirm(`"${name}" 기록을 삭제할까요?`)) return;
  history.splice(idx, 1);
  localStorage.setItem('sgp_history', JSON.stringify(history));
  updateStats();
  renderRecent();
  App.toast(`"${name}" 삭제됨`, 'info');
}

function editHistory(idx) {
  const history = JSON.parse(localStorage.getItem('sgp_history') || '[]');
  const h = history[idx];
  if (!h) return;
  document.getElementById('edit-idx').value = idx;
  document.getElementById('edit-name').value = h.name;
  document.getElementById('edit-date').value = h.date;
  document.getElementById('edit-participants').value = h.participants;
  document.getElementById('edit-modal').classList.remove('hidden');
}

function saveEdit() {
  const idx = parseInt(document.getElementById('edit-idx').value);
  const history = JSON.parse(localStorage.getItem('sgp_history') || '[]');
  history[idx].name         = document.getElementById('edit-name').value.trim() || history[idx].name;
  history[idx].date         = document.getElementById('edit-date').value.trim() || history[idx].date;
  history[idx].participants = document.getElementById('edit-participants').value || history[idx].participants;
  localStorage.setItem('sgp_history', JSON.stringify(history));
  closeEditModal();
  renderRecent();
  updateStats();
  App.toast('수정됨!', 'success');
}

function closeEditModal() {
  document.getElementById('edit-modal').classList.add('hidden');
}

renderGames();
updateStats();
renderRecent();

function resetCurrentEvent() {
  if (!confirm('현재 행사 참가자와 기록을 초기화할까요?\n(최근 행사 이력은 유지됩니다)')) return;
  App.resetState();
  updateStats();
  App.toast('현재 행사 초기화됨!', 'success');
}

function resetAllHistory() {
  if (!confirm('최근 행사 이력을 전부 삭제할까요?\n이 작업은 되돌릴 수 없어요!')) return;
  localStorage.removeItem('sgp_history');
  App.resetState();
  updateStats();
  renderRecent();
  App.toast('전체 기록 삭제됨!', 'info');
}
</script>

<!-- 수정 모달 -->
<div class="modal-overlay hidden" id="edit-modal">
  <div class="modal">
    <div class="modal-title">✏️ 행사 기록 수정</div>
    <input type="hidden" id="edit-idx">
    <div class="form-group">
      <label class="form-label">행사명</label>
      <input class="form-input" id="edit-name" placeholder="행사명">
    </div>
    <div class="form-group">
      <label class="form-label">날짜</label>
      <input class="form-input" id="edit-date" placeholder="예) 2026. 5. 3.">
    </div>
    <div class="form-group">
      <label class="form-label">참가자 수</label>
      <input class="form-input" type="number" id="edit-participants" placeholder="예) 10">
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeEditModal()">취소</button>
      <button class="btn btn-primary" onclick="saveEdit()">저장</button>
    </div>
  </div>
</div>

</body>
</html>
