<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SGP — 멀티 게임 센서 플랫폼</title>
<link rel="stylesheet" href="css/style.css">
<style>
.hero {
  padding: 80px 0 60px;
  text-align: center;
  position: relative;
}
.hero-title {
  font-family: var(--font-display);
  font-size: clamp(48px, 10vw, 100px);
  letter-spacing: 4px; line-height: 1;
  margin-bottom: 16px;
}
.hero-title span { color: var(--red); }
.hero-sub {
  color: var(--text-dim);
  font-size: 18px; margin-bottom: 40px;
  font-family: var(--font-mono);
  letter-spacing: 2px;
}
.hero-badge-row {
  display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
  margin-bottom: 48px;
}

/* 게임 카드 */
.game-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 16px;
}
.game-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px 20px;
  cursor: pointer;
  transition: all .25s;
  text-decoration: none;
  display: block;
  position: relative;
  overflow: hidden;
}
.game-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: var(--accent, var(--red));
  transform: scaleX(0); transform-origin: left;
  transition: transform .25s;
}
.game-card:hover { border-color: var(--accent, var(--red)); transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,0,0,.4); }
.game-card:hover::before { transform: scaleX(1); }
.game-icon { font-size: 36px; margin-bottom: 12px; display: block; }
.game-name {
  font-family: var(--font-display);
  font-size: 20px; letter-spacing: 1px;
  margin-bottom: 6px; color: var(--text);
}
.game-desc { font-size: 13px; color: var(--text-dim); line-height: 1.5; }
.game-tag {
  position: absolute; top: 14px; right: 14px;
  font-family: var(--font-mono);
  font-size: 10px; letter-spacing: 1px;
  padding: 3px 8px; border-radius: 4px;
  background: var(--bg3);
  color: var(--text-dim);
}

/* 최근 행사 */
.recent-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px 24px;
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
  cursor: pointer; transition: border-color .2s;
}
.recent-card:hover { border-color: var(--blue); }

/* 통계 */
.stat-row {
  display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px;
  margin-bottom: 48px;
}
.stat-box {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px;
  text-align: center;
}
.stat-val {
  font-family: var(--font-display);
  font-size: 36px; letter-spacing: 1px;
  color: var(--blue);
}
.stat-label { font-size: 12px; color: var(--text-dim); margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }

@media (max-width: 600px) {
  .stat-row { grid-template-columns: repeat(3, 1fr); }
}
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a class="nav-logo" href="index.html">SGP<span>.</span></a>
    <div class="nav-steps">
      <a class="nav-step active" data-page="home" href="index.html">홈</a>
      <a class="nav-step" data-page="setup" href="setup.html">행사 설정</a>
      <a class="nav-step" data-page="game" href="game.html">게임 진행</a>

      <span class="badge badge-yellow" style="cursor:pointer;" onclick="filterSports('winter')">빙상/설상</span>

  </div>

</div>
</div>

  { id:'archery',     icon:'🏹', name:'양궁',          desc:'라운드별 점수 합산. 실내·실외 지원.', tag:'표적/정확도', cat:'target', accent:'#06d6a0' },
  { id:'darts',       icon:'🎯', name:'다트',          desc:'라운드별 점수 입력.', tag:'표적/정확도', cat:'target', accent:'#06d6a0' },
  { id:'billiards',   icon:'🎱', name:'당구',          desc:'점수·이닝 기록. 3쿠션·포켓볼 지원.', tag:'표적/정확도', cat:'target', accent:'#7b2fff' },
  { id:'iceskating',  icon:'⛸️', name:'빙상',          desc:'타임 기록. 쇼트트랙·스피드스케이팅.', tag:'빙상/설상', cat:'winter', accent:'#4cc9f0' },
  { id:'figureskate', icon:'⛸️', name:'피겨스케이팅',  desc:'심판 채점 입력.', tag:'빙상/설상', cat:'winter', accent:'#4cc9f0' },
  { id:'icehockey',   icon:'🏒', name:'아이스하키',    desc:'피리어드별 득점 기록.', tag:'빙상/설상', cat:'winter', accent:'#4cc9f0' },
  { id:'skiing',      icon:'⛷️', name:'스키',          desc:'타임 기록. 알파인·크로스컨트리 지원.', tag:'빙상/설상', cat:'winter', accent:'#4cc9f0' },
  { id:'biathlon',    icon:'🎿', name:'바이애슬론',    desc:'타임+사격 점수 기록.', tag:'빙상/설상', cat:'winter', accent:'#4cc9f0' },
  { id:'equestrian',  icon:'🏇', name:'승마',          desc:'심판 채점·타임 기록.', tag:'기타', cat:'etc', accent:'#ff6b35' },
  { id:'triathlon',   icon:'🏅', name:'트라이애슬론',  desc:'수영+자전거+달리기 타임 기록.', tag:'기타', cat:'etc', accent:'#06d6a0' },
  { id:'climbing',    icon:'🧗', name:'스포츠클라이밍', desc:'타임·난이도·볼더링 점수.', tag:'기타', cat:'etc', accent:'#ff6b35' },
  { id:'cheerleading',icon:'📣', name:'치어리딩',      desc:'심판 채점 입력.', tag:'기타', cat:'etc', accent:'#e63946' },
  { id:'dancesport',  icon:'💃', name:'댄스스포츠',    desc:'심판 채점 입력. 종목별 지원.', tag:'기타', cat:'etc', accent:'#ff6b35' },
  { id:'esports',     icon:'🎮', name:'e스포츠',       desc:'라운드별 승패 기록. 토너먼트 지원.', tag:'기타', cat:'etc', accent:'#7b2fff' },
];

let currentFilter = 'all';
let currentSportFilter = 'all';
let homeTab = 'sport';

function switchHomeTab(tab) {
  homeTab = tab;
  const s = document.getElementById('home-tab-sensor');
  const sp = document.getElementById('home-tab-sport');
  const fs = document.getElementById('home-filter-sensor');
  const fsp = document.getElementById('home-filter-sport');
  s.style.background  = tab==='sensor' ? 'var(--red)' : 'var(--bg2)';
  s.style.color       = tab==='sensor' ? 'white' : 'var(--text-dim)';
  sp.style.background = tab==='sport'  ? 'var(--red)' : 'var(--bg2)';
  sp.style.color      = tab==='sport'  ? 'white' : 'var(--text-dim)';
  fs.style.display    = tab==='sensor' ? 'block' : 'none';
  fsp.style.display   = tab==='sport'  ? 'flex'  : 'none';
  renderGames();
}

function filterGames(cat) { currentFilter = cat; renderGames(); }
function filterSports(cat) { currentSportFilter = cat; renderGames(); }

function renderGames() {
  const grid = document.getElementById('game-grid');
  let list;
  if (homeTab === 'sensor') {
    list = currentFilter === 'all' ? SENSOR_GAMES : SENSOR_GAMES.filter(g => g.cat === currentFilter);
  } else {
    list = currentSportFilter === 'all' ? SPORT_GAMES : SPORT_GAMES.filter(g => g.cat === currentSportFilter);
  }
  grid.innerHTML = list.map(g => `
    <a class="game-card" href="setup.html?game=${g.id}&tab=${homeTab}" style="--accent:${g.accent}" onclick="selectGame('${g.id}')">
      <span class="game-tag">${g.tag}</span>
      <span class="game-icon">${g.icon}</span>
      <div class="game-name">${g.name}</div>
      <div class="game-desc">${g.desc}</div>
    </a>
  `).join('');
}

function selectGame(id) {
  App.setState({ gameType: id, gameTab: homeTab });
}

function loadLast() {
  const state = App.getState();
  const hasEvent = state.event && state.event.name && state.event.name !== '게임 행사';
  if (hasEvent) {
    window.location.href = 'setup.html';
  } else {
    App.toast('저장된 행사가 없어요. 새 행사를 시작하세요!', 'info');
  }
}

function updateStats() {
  const state = App.getState();
  const history = JSON.parse(localStorage.getItem('sgp_history') || '[]');
  document.getElementById('stat-events').textContent = history.length;
  // 행사명이 있으면 현재 진행중인 행사로 인정
  const hasEvent = state.event && state.event.name && state.event.name !== '게임 행사';
  document.getElementById('stat-participants').textContent = hasEvent ? state.participants.length : 0;
  document.getElementById('stat-records').textContent = hasEvent ? state.records.length : 0;
}

function renderRecent() {
  const history = JSON.parse(localStorage.getItem('sgp_history') || '[]');
  const el = document.getElementById('recent-list');
  if (!history.length) {
    el.innerHTML = '<div class="text-dim text-sm">아직 기록이 없어요.</div>';
    return;
  }
  el.innerHTML = [...history].reverse().map((h, idx) => {
    const realIdx = history.length - 1 - idx;
    const GAME_LABELS = { timelap:'🏁 타임랩', reaction:'⚡ 반응속도', balance:'🎯 균형버티기', jump:'🤸 점프력', distance:'📏 멀리뛰기', weight:'⚖️ 무게', strength:'💪 악력', oddeven:'🎲 홀짝', roulette:'🎰 룰렛', count:'🔢 카운트', sound:'🔊 소리' };
    const MODE_LABELS = { individual:'👤 개인전', team:'👥 팀대결', tournament:'🏆 토너먼트' };
    return `
    <div class="recent-card mt-8" id="hcard-${realIdx}">
      <div style="flex:1;">
        <div id="hname-${realIdx}" style="font-weight:700; font-size:16px;">${h.name}</div>
        <div class="text-dim text-sm">${h.date} · ${GAME_LABELS[h.game]||h.game} · 참가자 ${h.participants}명</div>
      </div>
      <div class="flex gap-8 items-center">
        <span class="badge badge-green">${MODE_LABELS[h.mode]||h.mode}</span>
        <button class="btn btn-outline btn-sm" onclick="editHistory(${realIdx})" title="수정" style="padding:5px 10px;">✏️</button>
        <button class="btn btn-outline btn-sm" onclick="deleteHistory(${realIdx})" title="삭제" style="padding:5px 10px; border-color:#e63946; color:#e63946;">🗑️</button>
      </div>
    </div>`;
  }).join('');
}

function deleteHistory(idx) {
  const history = JSON.parse(localStorage.getItem('sgp_history') || '[]');
  const name = history[idx]?.name || '이 기록';
  if (!confirm(`"${name}" 기록을 삭제할까요?`)) return;
  history.splice(idx, 1);
  localStorage.setItem('sgp_history', JSON.stringify(history));
  updateStats();
  renderRecent();
  App.toast(`"${name}" 삭제됨`, 'info');
}

function editHistory(idx) {
  const history = JSON.parse(localStorage.getItem('sgp_history') || '[]');
  const h = history[idx];
  if (!h) return;
  document.getElementById('edit-idx').value = idx;
  document.getElementById('edit-name').value = h.name;
  document.getElementById('edit-date').value = h.date;
  document.getElementById('edit-participants').value = h.participants;
  document.getElementById('edit-modal').classList.remove('hidden');
}

function saveEdit() {
  const idx = parseInt(document.getElementById('edit-idx').value);
  const history = JSON.parse(localStorage.getItem('sgp_history') || '[]');
  history[idx].name         = document.getElementById('edit-name').value.trim() || history[idx].name;
  history[idx].date         = document.getElementById('edit-date').value.trim() || history[idx].date;
  history[idx].participants = document.getElementById('edit-participants').value || history[idx].participants;
  localStorage.setItem('sgp_history', JSON.stringify(history));
  closeEditModal();
  renderRecent();
  updateStats();
  App.toast('수정됨!', 'success');
}

function closeEditModal() {
  document.getElementById('edit-modal').classList.add('hidden');
}

renderGames();
updateStats();
renderRecent();

function resetCurrentEvent() {
  if (!confirm('현재 행사 참가자와 기록을 초기화할까요?\n(최근 행사 이력은 유지됩니다)')) return;
  App.resetState();
  updateStats();
  App.toast('현재 행사 초기화됨!', 'success');
}

function resetAllHistory() {
  if (!confirm('최근 행사 이력을 전부 삭제할까요?\n이 작업은 되돌릴 수 없어요!')) return;
  localStorage.removeItem('sgp_history');
  App.resetState();
  updateStats();
  renderRecent();
  App.toast('전체 기록 삭제됨!', 'info');
}
</script>

<!-- 수정 모달 -->
<div class="modal-overlay hidden" id="edit-modal">
  <div class="modal">
    <div class="modal-title">✏️ 행사 기록 수정</div>
    <input type="hidden" id="edit-idx">
    <div class="form-group">
      <label class="form-label">행사명</label>
      <input class="form-input" id="edit-name" placeholder="행사명">
    </div>
    <div class="form-group">
      <label class="form-label">날짜</label>
      <input class="form-input" id="edit-date" placeholder="예) 2026. 5. 3.">
    </div>
    <div class="form-group">
      <label class="form-label">참가자 수</label>
      <input class="form-input" type="number" id="edit-participants" placeholder="예) 10">
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeEditModal()">취소</button>
      <button class="btn btn-primary" onclick="saveEdit()">저장</button>
    </div>
  </div>
</div>

</body>
</html>
