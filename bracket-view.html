<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>대진표 보기 — SGP</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08080f;--bg2:#0f0f1a;--card:#13131f;--card2:#1a1a2a;
  --border:#2a2a40;--border2:#3a3a55;
  --red:#e63946;--accent:#4cc9f0;--green:#06d6a0;--yellow:#ffd60a;
  --text:#f0f0f8;--text2:#9090b0;--text3:#5a5a7a;
}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;overflow:hidden;}
button{cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
#wrap{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
#hdr{padding:11px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--bg2);}
.step{display:none;flex-direction:column;flex:1;min-height:0;}
.step.on{display:flex;}
.subhdr{padding:10px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0;background:var(--bg);flex-wrap:wrap;}
/* 스크롤은 이 영역에만 — 창 테두리에 스크롤바 1개만 */
.scroll-area{flex:1;overflow-x:auto;overflow-y:scroll;padding:16px 18px;min-height:0;scrollbar-width:thin;scrollbar-color:var(--border2) var(--bg2);}
.scroll-area::-webkit-scrollbar{width:6px;height:6px;}
.scroll-area::-webkit-scrollbar-track{background:var(--bg2);}
.scroll-area::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
.btn-back{padding:4px 10px;background:transparent;border:1px solid var(--border);color:var(--text3);border-radius:6px;font-size:11px;}
.pts-sort-btn,.pts-mode-btn{padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text3);font-size:11px;transition:all .15s;}
.pt-card{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;}
.order-row{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--card);border:1px solid var(--border);border-radius:7px;cursor:grab;user-select:none;margin-bottom:4px;}
#league-overlay{display:none;position:absolute;inset:0;background:rgba(10,10,15,.88);z-index:10;align-items:center;justify-content:center;flex-direction:column;gap:12px;}
#tc{position:fixed;bottom:16px;right:16px;display:flex;flex-direction:column;gap:6px;z-index:9999;}
.tos{padding:9px 14px;border-radius:8px;font-size:12px;font-weight:600;background:var(--card2);border:1px solid var(--border2);color:var(--text);box-shadow:0 4px 12px rgba(0,0,0,.4);animation:tsin .25s ease;}
.tos.success{border-color:var(--green);color:var(--green);}
.tos.error{border-color:var(--red);color:var(--red);}
.tos.info{border-color:var(--accent);color:var(--accent);}
@keyframes tsin{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
/* 경기 카드 상단 레이블 줄바꿈 방지 */
#bracket-display [style*="color:#555"],
#pdf-preview [style*="color:#555"] { white-space: nowrap !important; }
</style>
</head>

    });

  document.write('<scr'+'ipt src="js/step4.js?v='+Date.now()+'"><\/scr'+'ipt>');

<script>
// generateBracket은 step4.js 원본 그대로 사용
// 대진표 설정 화면에서는 현재 경기 강조 표시 비활성화
function isCurrentMatchIdx(){ return false; }

// ── embed 모드 감지 (?embed=1 → 리스트뷰, 없으면 → 시각적 트리) ──
const _IS_EMBED = new URLSearchParams(location.search).get('embed') === '1';

// ══════════════════════════════════════════════════
// 리스트 뷰 (embed=1 전용): 경기장별/라운드별 경기 카드
// ══════════════════════════════════════════════════

const _bvCurrentMatch = {}; // { [courtNum]: {gi, ri, mi} } — 경기장별 독립 선택

// 경기장+라운드 내 연속 번호 오프셋 계산
function _computeSeqOffsets(){
  const courtRound={};
  (S.groupBrackets||[]).forEach(g=>{
    const c=g.court||1;
    if(!courtRound[c]) courtRound[c]={};
    g._roundOffset={};
    (g.matches||[]).forEach((round,ri)=>{
      if(!courtRound[c][ri]) courtRound[c][ri]=0;
      g._roundOffset[ri]=courtRound[c][ri];
      courtRound[c][ri]+=round.length;
    });
  });
}

// _redrawBracketView — embed=1이면 리스트뷰, 아니면 원래 트리로
function _redrawBracketView(){
  if(!_IS_EMBED){
    _redrawBracketViewTree();
    // 트리뷰 DOM 안정화 후 색상 + 선택 하이라이트 확실히 적용
    requestAnimationFrame(()=>requestAnimationFrame(()=>{ _applyBvColors(); _applyBvSelectionHighlights(); }));
    return;
  }

  const tabs=document.getElementById('pts-bracket-tabs');
  if(tabs) tabs.style.display='none';
  const subhdr=document.querySelector('.subhdr');
  if(subhdr) subhdr.style.display='none';

  const view=document.getElementById('pts-bracket-view');
  if(!view) return;
  view.innerHTML='';
  view.style.cssText='flex:1;min-height:0;overflow:auto;padding:10px 12px;display:block;background:var(--bg);';

  if(!S.groupBrackets||!S.groupBrackets.length){
    view.innerHTML='<div style="color:var(--text3);padding:24px;text-align:center;font-size:13px;">저장된 대진표가 없습니다</div>';
    return;
  }

  _computeSeqOffsets();

  const courts={};
  S.groupBrackets.forEach((g,gi)=>{
    const c=g.court||1;
    if(!courts[c]) courts[c]=[];
    courts[c].push({g,gi});
  });

  const courtNums=Object.keys(courts).map(Number).sort();
  const roundNames=['1라운드','2라운드','3라운드','4라운드','5라운드','준결승','결승'];
  const globalMaxRi=Math.max(...courtNums.map(c=>Math.max(...courts[c].map(({g})=>g.matches.length))));
  const cols=courtNums.length;

  for(let ri=0;ri<globalMaxRi;ri++){
    const hasAny=courtNums.some(c=>courts[c].some(({g})=>g.matches[ri]&&g.matches[ri].length));
    if(!hasAny) continue;

    let rName;
    if(ri===globalMaxRi-1&&globalMaxRi>1) rName='결승';
    else if(ri===globalMaxRi-2&&globalMaxRi>2) rName='준결승';
    else rName=roundNames[ri]||`${ri+1}라운드`;

    const roundSection=document.createElement('div');
    roundSection.style.cssText='margin-bottom:20px;';

    // ── 라운드 + 경기장 헤더 한 줄 ──
    const hdrRow=document.createElement('div');
    hdrRow.style.cssText=`display:grid;grid-template-columns:repeat(${cols},1fr);gap:8px;margin-bottom:5px;padding-bottom:5px;border-bottom:1px solid var(--border);`;

    courtNums.forEach(c=>{
      const ch=document.createElement('div');
      ch.style.cssText='display:flex;align-items:center;gap:8px;';
      ch.innerHTML=`
        <span style="font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--accent);font-weight:700;">경기장 ${c}</span>
        <span style="font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:1px;">${rName.toUpperCase()}</span>
      `;
      hdrRow.appendChild(ch);
    });
    roundSection.appendChild(hdrRow);

    // ── 경기장별 경기 수집 ──
    const courtMatches={};
    courtNums.forEach(c=>{
      courtMatches[c]=[];
      courts[c].forEach(({g,gi})=>{
        if(!g.matches[ri]) return;
        g.matches[ri].forEach((m,mi)=>{
          const seqNum=((g._roundOffset&&g._roundOffset[ri]!=null)?g._roundOffset[ri]:0)+mi+1;
          const label=`${c}-${ri+1}-${seqNum}`;
          const shortLabel=g.label.split('/').map(s=>s.trim()).map((p,pi)=>pi===0?p:p.replace('부','')).join('·');
          courtMatches[c].push({g,gi,m,mi,label,shortLabel});
        });
      });
    });

    // ── 경기장 열을 나란히 ──
    const colsWrap=document.createElement('div');
    colsWrap.style.cssText=`display:grid;grid-template-columns:repeat(${cols},1fr);gap:8px;align-items:start;`;

    courtNums.forEach(c=>{
      const col=document.createElement('div');
      col.style.cssText='display:flex;flex-direction:column;gap:3px;';
      courtMatches[c].forEach(({g,gi,m,mi,label,shortLabel})=>{
        col.appendChild(_bvBuildRow(g,gi,ri,mi,m,label,shortLabel));
      });
      colsWrap.appendChild(col);
    });

    roundSection.appendChild(colsWrap);
    view.appendChild(roundSection);
  }
}

// tbd 슬롯에 대해 이전 라운드 winner를 역추적해서 실제 이름 반환
function _getResolvedName(g,ri,mi,m,slot){
  const p=m[slot];
  if(!p||!p.tbd) return null;
  const fromKey=slot==='p1'?m.fromA:m.fromB;
  if(fromKey){
    const parts=fromKey.split('-');
    if(parts.length>=2){
      const prevRi=parseInt(parts[0]),prevMi=parseInt(parts[1]);
      if(!isNaN(prevRi)&&!isNaN(prevMi)){
        const prev=g.matches[prevRi]?.[prevMi];
        if(prev?.winner) return prev.winner.name;
      }
    }
  }
  // fromA/fromB 없으면 표준 수학 폴백
  if(ri>0){
    const prevRound=g.matches[ri-1];
    if(prevRound){
      if(slot==='p1'&&prevRound[mi*2]?.winner) return prevRound[mi*2].winner.name;
      if(slot==='p2'&&prevRound[mi*2+1]?.winner) return prevRound[mi*2+1].winner.name;
    }
  }
  return null;
}

function _bvBuildRow(g,gi,ri,mi,m,label,shortLabel){
  const courtNum = g.court || 1;
  const _bvCur = _bvCurrentMatch[courtNum];
  const isCur=_bvCur&&_bvCur.gi===gi&&_bvCur.ri===ri&&_bvCur.mi===mi;
  const isDone=!!m.winner;
  const isBye=m.p1&&!m.p2;
  const p1tbd=m.p1?.tbd;
  const p2tbd=m.p2?.tbd;
  // tbd 슬롯은 이전 라운드 winner 이름으로 대체 (데이터가 아직 안 업데이트된 경우 방어)
  const p1resolved=p1tbd?_getResolvedName(g,ri,mi,m,'p1'):null;
  const p2resolved=p2tbd?_getResolvedName(g,ri,mi,m,'p2'):null;
  const p1n=p1resolved||m.p1?.name||'?';
  const p2n=p2resolved||m.p2?.name||'?';
  const winnerN=m.winner?.name;
  // winner가 실제로 없을 때만 pending (이름 resolve됐으면 선택 가능)
  const isPending=!isDone&&((p1tbd&&!p1resolved)||(p2tbd&&!p2resolved));

  let borderColor=isCur?'var(--red)':isDone?'rgba(6,214,160,.5)':isPending?'rgba(70,70,100,.5)':'var(--border)';
  let bgColor=isCur?'rgba(230,57,70,.08)':isDone?'rgba(6,214,160,.04)':isPending?'rgba(20,20,38,.8)':'var(--card)';

  const row=document.createElement('div');
  row.style.cssText=`border:1px solid ${borderColor};background:${bgColor};border-radius:7px;padding:7px 10px;cursor:pointer;transition:background .1s;${isPending?'opacity:.65;':''}${isCur?'box-shadow:0 0 0 1px var(--red);':''}`;
  row.onmouseover=()=>row.style.background=isCur?'rgba(230,57,70,.13)':'var(--card2)';
  row.onmouseout=()=>row.style.background=bgColor;

  // 윗줄: 경기명 / 체급 / 상태뱃지
  const topRow=document.createElement('div');
  topRow.style.cssText='display:flex;align-items:center;gap:6px;margin-bottom:4px;';

  const lbl=document.createElement('span');
  lbl.style.cssText=`font-family:'Share Tech Mono',monospace;font-size:11px;font-weight:700;color:${isCur?'var(--red)':isPending?'var(--text3)':'var(--accent)'};flex-shrink:0;`;
  lbl.textContent=label;
  topRow.appendChild(lbl);

  const sep=document.createElement('span');
  sep.style.cssText='color:var(--border2);font-size:10px;flex-shrink:0;';
  sep.textContent='/';
  topRow.appendChild(sep);

  const cat=document.createElement('span');
  cat.style.cssText='font-size:10px;color:var(--text3);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;';
  cat.textContent=shortLabel;
  topRow.appendChild(cat);

  if(isCur){
    const b=document.createElement('span');
    b.style.cssText='font-size:8px;color:var(--red);border:1px solid var(--red);border-radius:3px;padding:1px 4px;font-family:"Share Tech Mono",monospace;flex-shrink:0;animation:livepulse 1.2s ease-in-out infinite;';
    b.textContent='LIVE';
    topRow.appendChild(b);
  } else if(isDone){
    const b=document.createElement('span');
    b.style.cssText='font-size:10px;color:var(--green);flex-shrink:0;';
    b.textContent='✓';
    topRow.appendChild(b);
  } else if(isPending){
    const b=document.createElement('span');
    b.style.cssText='font-size:8px;color:var(--text3);border:1px solid var(--border2);border-radius:3px;padding:1px 4px;font-family:"Share Tech Mono",monospace;flex-shrink:0;';
    b.textContent='대기';
    topRow.appendChild(b);
  }
  row.appendChild(topRow);

  // 아랫줄: 선수 이름 (클릭하면 복장 색상 순환)
  const nameRow=document.createElement('div');
  nameRow.style.cssText='display:flex;align-items:center;gap:5px;padding-left:2px;';

  const BV_COLORS  =['#d0d0d0','#e63946','#4cc9f0','#ffd60a'];
  const BV_COLOR_BG=['transparent','rgba(230,57,70,.18)','rgba(76,201,240,.18)','rgba(255,214,10,.18)'];

  // 이름 span 생성 (클릭 → 색상 순환)
  const mkNameSpan=(pObj,slot,forceColor,forceWeight,prefix='')=>{
    const span=document.createElement('span');
    const idx=m[slot+'ColorIdx']||0;
    const baseColor=forceColor||(idx>0?BV_COLORS[idx]:'#d0d0d0');
    span.style.cssText=`font-size:12px;font-weight:${forceWeight||'500'};color:${baseColor};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;border-radius:3px;padding:0 3px;transition:background .15s;`;
    if(!forceColor&&idx>0) span.style.background=BV_COLOR_BG[idx];
    const colorDot=idx>0?`<span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${BV_COLORS[idx]};margin-right:3px;vertical-align:middle;"></span>`:'';
    span.innerHTML=`${prefix}${colorDot}${pObj?pObj.name:'?'}`;
    span.title='클릭: 복장 색상 변경';
    span.onclick=(ev)=>{
      ev.stopPropagation();
      m[slot+'ColorIdx']=((m[slot+'ColorIdx']||0)+1)%4;
      _bvSave();
      _redrawBracketView();
    };
    return span;
  };

  if(isBye){
    const sp=mkNameSpan(m.p1,'p1',isDone?'var(--green)':null,isDone?'700':'600');
    nameRow.appendChild(sp);
    const byeBadge=document.createElement('span');
    byeBadge.style.cssText='font-size:9px;color:var(--accent);margin-left:2px;flex-shrink:0;';
    byeBadge.textContent='BYE';
    nameRow.appendChild(byeBadge);
    if(isDone){
      const doneTag=document.createElement('span');
      doneTag.style.cssText='font-size:9px;color:var(--green);margin-left:4px;flex-shrink:0;';
      doneTag.textContent='✓ 진출';
      nameRow.appendChild(doneTag);
    }
  } else {
    const isW1=winnerN&&winnerN===p1n;
    const isW2=winnerN&&winnerN===p2n;
    const c1=winnerN?(isW1?'var(--green)':'#444'):(p1tbd&&!p1resolved?'var(--text3)':null);
    const c2=winnerN?(isW2?'var(--green)':'#444'):(p2tbd&&!p2resolved?'var(--text3)':null);
    const w1=isW1?'700':'500';
    const w2=isW2?'700':'500';
    const sp1=mkNameSpan({name:p1n},'p1',c1,w1,isW1?'🏆 ':'');
    const vsSpan=document.createElement('span');
    vsSpan.style.cssText="font-family:'Bebas Neue',cursive;font-size:11px;color:var(--red);flex-shrink:0;";
    vsSpan.textContent='VS';
    const sp2=mkNameSpan({name:p2n},'p2',c2,w2,isW2?'🏆 ':'');
    nameRow.appendChild(sp1);
    nameRow.appendChild(vsSpan);
    nameRow.appendChild(sp2);
  }
  row.appendChild(nameRow);

  row.onclick=(e)=>_bvShowModal(e,g,gi,ri,mi,m,label,shortLabel);
  return row;
}

function _bvShowModal(e,g,gi,ri,mi,m,label,shortLabel){
  document.getElementById('bv-action-modal')?.remove();
  const modal=document.createElement('div');
  modal.id='bv-action-modal';
  modal.style.cssText=`
    position:fixed;z-index:9999;
    background:var(--card2);border:1px solid var(--border2);
    border-radius:12px;padding:6px;min-width:240px;
    box-shadow:0 8px 32px rgba(0,0,0,.7);animation:tsin .15s ease;
  `;

  const hdr=document.createElement('div');
  hdr.style.cssText='padding:5px 12px 7px;font-size:10px;color:var(--text3);font-family:"Share Tech Mono",monospace;border-bottom:1px solid var(--border);margin-bottom:4px;';
  hdr.textContent=`// ${label} · ${shortLabel}`;
  modal.appendChild(hdr);

  const mkBtn=(icon,text,color,fn,sub='')=>{
    const b=document.createElement('button');
    b.style.cssText=`display:flex;align-items:center;gap:9px;padding:9px 12px;width:100%;border:none;background:transparent;color:${color};font-size:12px;font-weight:600;cursor:pointer;border-radius:8px;font-family:'Noto Sans KR',sans-serif;text-align:left;`;
    b.onmouseover=()=>b.style.background='rgba(255,255,255,.07)';
    b.onmouseout=()=>b.style.background='transparent';
    b.innerHTML=`<span style="font-size:15px;width:20px;text-align:center;flex-shrink:0;">${icon}</span><span>${text}${sub?`<span style="display:block;font-size:9px;color:var(--text3);font-weight:400;">${sub}</span>`:''}</span>`;
    b.onclick=()=>{ modal.remove(); fn(); };
    return b;
  };

  const isDone=!!m.winner;
  const isBye=m.p1&&!m.p2;
  const isPending=!isDone&&(m.p1?.tbd||m.p2?.tbd);
  const courtNum=g.court||1;

  // ── 현재 경기 선택 (항상 표시) ──
  if(!isPending){
    modal.appendChild(mkBtn('▶','현재 경기 선택','var(--accent)',()=>{
      _bvCurrentMatch[courtNum]={gi,ri,mi};
      const p1n=m.p1?.name||'—', p2n=m.p2?.name||'—';
      try{
        const bc=new BroadcastChannel('sgp_cmd');
        bc.postMessage({type:'set_match',p1:p1n,p2:p2n,label:shortLabel,court:courtNum,ri,mi,domId:`m_${gi}_${ri}_${mi}`,groupLabel:g.label});
        bc.close();
      }catch(ex){}
      try{ localStorage.setItem(`sgp_display_vs_court_${courtNum}`,JSON.stringify({p1:p1n,p2:p2n,label:shortLabel,court:courtNum,ri,mi,domId:`m_${gi}_${ri}_${mi}`,groupLabel:g.label})); }catch(ex){}
      _redrawBracketView();
    },'미리보기 · 전광판 하이라이트'));
  }

  // ── BYE 부전승 진출 버튼 ──
  if(isBye&&!isDone){
    const divBye=document.createElement('div');
    divBye.style.cssText='border-top:1px solid var(--border);margin:4px 0;';
    modal.appendChild(divBye);
    modal.innerHTML+=`<div style="padding:4px 12px 2px;font-size:9px;color:var(--text3);font-family:'Share Tech Mono',monospace;letter-spacing:1px;">// 부전승 · 자동 진출</div>`;
    modal.appendChild(mkBtn('⏩',`${m.p1.name} 다음 라운드 진출`,'var(--accent)',()=>_bvAdvanceBye(g,gi,ri,mi),'상대 없음 · 부전승 처리'));
  }

  // ── BYE 진출 취소 ──
  if(isBye&&isDone){
    modal.appendChild(mkBtn('↩','진출 취소','var(--red)',()=>{
      delete g.matches[ri][mi].winner;
      const _crt=g.court||1;
      if(_bvCurrentMatch[_crt]?.gi===gi&&_bvCurrentMatch[_crt]?.ri===ri&&_bvCurrentMatch[_crt]?.mi===mi) delete _bvCurrentMatch[_crt];
      const key=`${ri}-${mi}`, courtN=g.court||1;
      if(g.matches[ri+1]){
        let rev=false;
        g.matches[ri+1].forEach(nm=>{
          if(nm.fromA===key&&nm.p1){ nm.p1.name=`${courtN}-${ri+1}-${mi+1} 승자`; nm.p1.tbd=true; rev=true; }
          if(nm.fromB===key&&nm.p2){ nm.p2.name=`${courtN}-${ri+1}-${mi+1} 승자`; nm.p2.tbd=true; rev=true; }
        });
        if(!rev){ const nm2=g.matches[ri+1][Math.floor(mi/2)]; if(nm2){ if(mi%2===0&&nm2.p1){nm2.p1.name=`${courtN}-${ri+1}-${mi+1} 승자`;nm2.p1.tbd=true;} else if(nm2.p2){nm2.p2.name=`${courtN}-${ri+1}-${mi+1} 승자`;nm2.p2.tbd=true;} } }
      }
      _bvSave(); _redrawBracketView();
    }));
  }

  // ── 승자 선택 (BYE 아니고 미완료, 선수 확정됐을 때) ──
  if(!isBye&&!isDone&&!isPending){
    const divider=document.createElement('div');
    divider.style.cssText='border-top:1px solid var(--border);margin:4px 0;';
    modal.appendChild(divider);
    modal.innerHTML+=`<div style="padding:4px 12px 2px;font-size:9px;color:var(--text3);font-family:'Share Tech Mono',monospace;letter-spacing:1px;">// 경기 끝 · 승자 선택 → 다음 라운드 진출</div>`;
    if(m.p1) modal.appendChild(mkBtn('🏆',`${m.p1.name} 승`,'var(--green)',()=>_bvRecordWinner(g,gi,ri,mi,'p1')));
    if(m.p2) modal.appendChild(mkBtn('🏆',`${m.p2.name} 승`,'var(--yellow)',()=>_bvRecordWinner(g,gi,ri,mi,'p2')));
  }

  // ── 결과 취소 (완료된 경우) ──
  if(isDone){
    modal.appendChild(mkBtn('↩','결과 취소 (재경기)','var(--red)',()=>{
      const winnerName=m.winner?.name;
      delete g.matches[ri][mi].winner;
      // 현재경기 해제
      const _crt = g.court || 1;
      const _bvc = _bvCurrentMatch[_crt];
      if(_bvc && _bvc.gi===gi && _bvc.ri===ri && _bvc.mi===mi){
        delete _bvCurrentMatch[_crt];
      }
      // 다음 라운드 tbd 복원
      const key=`${ri}-${mi}`;
      const courtN=g.court||1;
      if(g.matches[ri+1]){
        let reverted=false;
        g.matches[ri+1].forEach(nm=>{
          if(nm.fromA===key&&nm.p1){ nm.p1.name=`${courtN}-${ri+1}-${mi+1} 승자`; nm.p1.tbd=true; reverted=true; }
          if(nm.fromB===key&&nm.p2){ nm.p2.name=`${courtN}-${ri+1}-${mi+1} 승자`; nm.p2.tbd=true; reverted=true; }
        });
        // fromA/fromB 없으면 표준 수학 폴백
        if(!reverted){
          const nextMi=Math.floor(mi/2);
          const nextMatch=g.matches[ri+1][nextMi];
          if(nextMatch){
            if(mi%2===0&&nextMatch.p1){ nextMatch.p1.name=`${courtN}-${ri+1}-${mi+1} 승자`; nextMatch.p1.tbd=true; }
            else if(mi%2===1&&nextMatch.p2){ nextMatch.p2.name=`${courtN}-${ri+1}-${mi+1} 승자`; nextMatch.p2.tbd=true; }
          }
        }
      }
      _bvSave();
      _redrawBracketView();
    }));
    // 이미 완료됐어도 승자 재선택 가능
    const divider2=document.createElement('div');
    divider2.style.cssText='border-top:1px solid var(--border);margin:4px 0;';
    modal.appendChild(divider2);
    modal.innerHTML+=`<div style="padding:4px 12px 2px;font-size:9px;color:var(--text3);font-family:'Share Tech Mono',monospace;letter-spacing:1px;">// 승자 재선택</div>`;
    if(m.p1) modal.appendChild(mkBtn('🏆',`${m.p1.name} 승`,'var(--green)',()=>_bvRecordWinner(g,gi,ri,mi,'p1')));
    if(m.p2) modal.appendChild(mkBtn('🏆',`${m.p2.name} 승`,'var(--yellow)',()=>_bvRecordWinner(g,gi,ri,mi,'p2')));
  }

  // 대기 중 안내
  if(isPending){
    const info=document.createElement('div');
    info.style.cssText='padding:10px 12px;font-size:11px;color:var(--text3);text-align:center;';
    info.textContent='이전 경기가 끝나면 선수가 확정됩니다';
    modal.appendChild(info);
  }

  document.body.appendChild(modal);

  // 위치 계산
  const rect=e.currentTarget.getBoundingClientRect();
  let top=rect.bottom+4, left=rect.left;
  const mh=modal.offsetHeight||260;
  if(top+mh>window.innerHeight) top=rect.top-mh-4;
  if(left+250>window.innerWidth) left=window.innerWidth-255;
  if(top<4) top=4;
  modal.style.top=top+'px'; modal.style.left=left+'px';

  setTimeout(()=>{
    const close=(ev)=>{ if(!modal.contains(ev.target)){ modal.remove(); document.removeEventListener('click',close,true); }};
    document.addEventListener('click',close,true);
  },100);
}

function _bvRecordWinner(g,gi,ri,mi,which){
  const m=g.matches[ri][mi];
  const winner=which==='p1'?m.p1:m.p2;
  if(!winner) return;
  m.winner=winner;

  // 다음 라운드 선수 이름 업데이트 (fromA/fromB key로 매칭)
  const key=`${ri}-${mi}`;
  if(g.matches[ri+1]){
    let updated=false;
    g.matches[ri+1].forEach(nm=>{
      if(nm.fromA===key&&nm.p1){ nm.p1.name=winner.name; nm.p1.tbd=false; updated=true; }
      if(nm.fromB===key&&nm.p2){ nm.p2.name=winner.name; nm.p2.tbd=false; updated=true; }
    });
    // fromA/fromB 키 매칭 실패 시 표준 토너먼트 수학으로 폴백
    if(!updated){
      const nextMi=Math.floor(mi/2);
      const nextMatch=g.matches[ri+1][nextMi];
      if(nextMatch){
        if(mi%2===0&&nextMatch.p1){ nextMatch.p1.name=winner.name; nextMatch.p1.tbd=false; }
        else if(mi%2===1&&nextMatch.p2){ nextMatch.p2.name=winner.name; nextMatch.p2.tbd=false; }
      }
    }
  }

  // 현재경기 해제
  const _crt2 = g.court || 1;
  const _bvc2 = _bvCurrentMatch[_crt2];
  if(_bvc2 && _bvc2.gi===gi && _bvc2.ri===ri && _bvc2.mi===mi){
    delete _bvCurrentMatch[_crt2];
  }

  _bvSave();
  _redrawBracketView();

  // 전광판에 승자 알림
  try{
    const bc=new BroadcastChannel('sgp_cmd');
    bc.postMessage({type:'winner',name:winner.name});
    bc.close();
  }catch(ex){}
}

// 부전승 진출 처리
function _bvAdvanceBye(g,gi,ri,mi){
  const m=g.matches[ri][mi];
  if(!m.p1) return;
  m.winner=m.p1;

  // 다음 라운드 이름 업데이트 (fromA/fromB 우선, 폴백 수학)
  const key=`${ri}-${mi}`;
  if(g.matches[ri+1]){
    let updated=false;
    g.matches[ri+1].forEach(nm=>{
      if(nm.fromA===key&&nm.p1){ nm.p1.name=m.p1.name; nm.p1.tbd=false; updated=true; }
      if(nm.fromB===key&&nm.p2){ nm.p2.name=m.p1.name; nm.p2.tbd=false; updated=true; }
    });
    if(!updated){
      const nextMi=Math.floor(mi/2);
      const nextMatch=g.matches[ri+1][nextMi];
      if(nextMatch){
        if(mi%2===0&&nextMatch.p1){ nextMatch.p1.name=m.p1.name; nextMatch.p1.tbd=false; }
        else if(nextMatch.p2){ nextMatch.p2.name=m.p1.name; nextMatch.p2.tbd=false; }
      }
    }
  }

  // 현재경기 해제
  const _crt=g.court||1;
  if(_bvCurrentMatch[_crt]?.gi===gi&&_bvCurrentMatch[_crt]?.ri===ri&&_bvCurrentMatch[_crt]?.mi===mi){
    delete _bvCurrentMatch[_crt];
  }

  _bvSave();
  _redrawBracketView();

  // 전광판에 진출 알림
  try{
    const bc=new BroadcastChannel('sgp_cmd');
    bc.postMessage({type:'winner',name:m.p1.name});
    bc.close();
  }catch(ex){}
}

// 트리뷰 색상 적용 (초기 로드 + 실시간 업데이트 공통)
function _applyBvColors(){
  const view=document.getElementById('pts-bracket-view');
  if(!view||!S.groupBrackets) return;
  const _CC=['','#e63946','#4cc9f0','#ffd60a'];
  S.groupBrackets.forEach(g=>{
    const court=g.court||1;
    const shortLabel=g.label.split('/').map((s,i)=>i===0?s.trim():s.trim().replace('부','')).join('·');
    // 경기장+그룹 래퍼 찾기 (data-court + data-group-label 조합)
    const wraps=view.querySelectorAll(`[data-court="${court}"]`);
    let wrap=null;
    wraps.forEach(w=>{ if(w.dataset.groupLabel===shortLabel) wrap=w; });

    (g.matches||[]).forEach((round,ri)=>{
      round.forEach((m,mi)=>{
        const p1ci=m.p1ColorIdx||0, p2ci=m.p2ColorIdx||0;
        if(!p1ci&&!p2ci) return;
        const box=wrap
          ? wrap.querySelector(`[data-ri="${ri}"][data-mi="${mi}"]`)
          : view.querySelectorAll(`[data-ri="${ri}"][data-mi="${mi}"]`)[court-1]; // fallback
        if(!box) return;
        const p1n=m.p1?(typeof m.p1==='object'?m.p1.name:m.p1):'';
        const p2n=m.p2?(typeof m.p2==='object'?m.p2.name:m.p2):'';
        box.querySelectorAll('span').forEach(span=>{
          if(span.classList.contains('bv-win-badge')||span.classList.contains('bv-cdot')) return;
          const txt=(span.textContent||'').replace('🏆','').trim();
          let ci=0;
          if(p1n&&txt===p1n) ci=p1ci;
          else if(p2n&&txt===p2n) ci=p2ci;
          if(!ci) return;
          if(!m.winner) span.style.color=_CC[ci];
          if(!span.querySelector('.bv-cdot')){
            const dot=document.createElement('span');
            dot.className='bv-cdot';
            dot.style.cssText=`display:inline-block;width:7px;height:7px;border-radius:2px;background:${_CC[ci]};margin-left:3px;vertical-align:middle;`;
            span.appendChild(dot);
          }
        });
      });
    });
  });
}

// 트리뷰 선택경기 하이라이트 직접 적용 (isCurrentMatchIdx 우회)
function _applyBvSelectionHighlights(){
  const view=document.getElementById('pts-bracket-view');
  if(!view) return;
  const arr=_getBvSelectedArr();
  if(!arr.length) return;
  arr.forEach(sel=>{
    const wraps=view.querySelectorAll(`[data-court="${sel.courtNum}"]`);
    wraps.forEach(wrap=>{
      if(sel.groupLabel&&wrap.dataset.groupLabel&&wrap.dataset.groupLabel!==sel.groupLabel) return;
      const box=wrap.querySelector(`[data-ri="${sel.ri}"][data-mi="${sel.mi}"]`);
      if(box){
        box.style.outline='2px solid var(--red)';
        box.style.boxShadow='0 0 12px rgba(230,57,70,.5)';
      }
    });
  });
}

function _bvSave(){
  // ── bracket-view는 읽기 전용 ──
  // sgp_groupBrackets / sgp_bracket_temp는 3번탭(_t3Save)만 씀
  // bracket-view가 덮어쓰면 3번탭이 stale 데이터를 로드하게 되므로 금지
  // (match 링크 정보 등 bracket-view 자체 변경은 별도 키에 저장)
  try{
    const clean=S.groupBrackets.map(g=>({
      ...g,
      matches:g.matches.map(round=>round.map(m=>{
        const {_groupObj,...rest}=m; return rest;
      }))
    }));
    // 공유 키 대신 bracket-view 전용 키에만 저장
    localStorage.setItem('sgp_bv_local',JSON.stringify({groupBrackets:clean,savedAt:new Date().toLocaleTimeString()}));
  }catch(ex){}
}

// renderBracketTabs: embed=1이면 불필요(빈 함수), 새창이면 원래 함수 사용

function _maybeStubRenderBracketTabs(){

    renderBracketTabs=function(){};
  }
}
_maybeStubRenderBracketTabs();

// localStorage 변경 감지 → 다른 창에서 데이터 바뀌면 자동 새로고침
window.addEventListener('storage',e=>{
  if(e.key==='sgp_groupBrackets'){
    try{
      const gb=JSON.parse(e.newValue||'[]');
      if(gb.length){
        S.groupBrackets=gb;
        _bvLoadSelectedFromStorage();
        _setBvIsCurrentMatchIdx();
        _redrawBracketView();
        requestAnimationFrame(()=>requestAnimationFrame(()=>{
          _applyBvColors();
          _applyBvSelectionHighlights();
        }));
      }
    }catch(ex){}
    return;
  }

  // ── 3번탭에서 현재경기 선택 시 하이라이트 동기화 ──
  if(e.key && e.key.startsWith('sgp_display_vs_court_')){
    try{
      const courtNum = parseInt(e.key.replace('sgp_display_vs_court_',''));
      const vs = JSON.parse(e.newValue||'{}');
      if(vs.ri==null || vs.mi==null) return;

      if(_IS_EMBED){
        // 리스트뷰: groupLabel로 gi 찾아 _bvCurrentMatch 업데이트 후 리렌더
        const gb = S.groupBrackets || [];
        let gi = -1;
        if(vs.groupLabel){
          gi = gb.findIndex(g => {
            const sl = g.label.split('/').map(s=>s.trim()).map((p,pi)=>pi===0?p:p.replace('부','')).join('·');
            return sl === vs.groupLabel || g.label === vs.groupLabel;
          });
        }
        if(gi < 0) gi = gb.findIndex(g => (g.court||1) === courtNum);
        _bvCurrentMatch[courtNum] = { gi: gi >= 0 ? gi : 0, ri: vs.ri, mi: vs.mi };
        _redrawBracketView();
      } else {
        // 트리뷰: 박스 하이라이트만
        _applyMatchHighlight(vs.ri, vs.mi, courtNum, vs.domId, vs.groupLabel);
      }
    }catch(ex){}
  }
});


// ── _renderBracketHTML 오버라이드 ──
// ① SVG 연결선: 순수 수학 계산으로 재작성 (iframe 좌표 문제 방지)
// ② 박스 DOM:  winner 강조 시각화 (승자 행 녹색 배경+배지, 패자 흐리게, 승자→다음칸 연결선 녹색)
(function(){
  const _orig = _renderBracketHTML;
  _renderBracketHTML = function(wrap, rounds, direction, reversed){
    // 1) 원본으로 박스 DOM 먼저 렌더
    _orig(wrap, rounds, direction, reversed);

    // 2) rAF에서 SVG 선 재계산 + winner 박스 강화
    requestAnimationFrame(()=>{
      // 원본 SVG 제거
      wrap.querySelectorAll('svg[data-bv-lines]').forEach(s=>s.remove());
      const outerWrap=wrap.querySelector('[style*="position:relative"]');
      if(!outerWrap) return;
      const container=outerWrap.querySelector('[style*="position:relative"]') || outerWrap.firstElementChild;
      if(!container) return;
      container.querySelectorAll('svg').forEach(s=>s.remove());
      outerWrap.querySelectorAll(':scope>svg').forEach(s=>s.remove());

      // ── ② winner 박스 시각 강화 ──
      rounds.forEach((matches, ri)=>{
        matches.forEach((m, mi)=>{
          if(!m.winner) return;
          // 박스 요소 찾기 (data-ri, data-mi)
          const box = container.querySelector(`[data-ri="${ri}"][data-mi="${mi}"]`);
          if(!box) return;

          // 박스 테두리 녹색 강화
          box.style.borderColor='#06d6a0';
          box.style.borderWidth='2px';
          box.style.boxShadow='0 0 10px rgba(6,214,160,.35)';

          // 내부 이름 행 찾아서 승자/패자 구분 강화
          const nameRow = box.querySelector('[style*="align-items:center"][style*="padding"]');
          if(nameRow){
            // 행 전체 순회하며 span 텍스트 비교
            const spans = nameRow.querySelectorAll('span');
            spans.forEach(span=>{
              const txt=(span.textContent||'').trim();
              if(!txt) return;
              if(txt===m.winner.name){
                // 승자: 밝게 + 굵게 + 녹색
                span.style.color='#06d6a0';
                span.style.fontWeight='700';
                // 🏆 배지 추가 (중복 방지)
                if(!span.querySelector('.bv-win-badge')){
                  const badge=document.createElement('span');
                  badge.className='bv-win-badge';
                  badge.style.cssText='font-size:9px;margin-left:4px;vertical-align:middle;';
                  badge.textContent='🏆';
                  span.appendChild(badge);
                }
              } else if(txt!=='VS'&&txt!=='BYE'){
                // 패자: 흐리게
                span.style.color='#444';
                span.style.fontWeight='400';
              }
            });
          }
        });
      });

      // ── ① SVG 연결선 재계산 ──
      const T=rounds.length;
      if(T<2) return;
      const SLOT_H=90, BOX_W=180, GAP=40, PAD=8, LABEL_H=24;
      const r0len=rounds[0].length;
      const totalSlotH=r0len*SLOT_H;

      const colLeft =(ri)=>reversed ? PAD+(T-1-ri)*(BOX_W+GAP) : PAD+ri*(BOX_W+GAP);
      const colRight=(ri)=>colLeft(ri)+BOX_W;
      const W=PAD*2+T*(BOX_W+GAP)-GAP;
      const H=r0len*SLOT_H+LABEL_H+PAD+40;

      const dirOff=(ri)=>{
        const usedH=rounds[ri].length*SLOT_H;
        if(direction==='bottom') return totalSlotH-usedH;
        if(direction==='center') return (totalSlotH-usedH)/2;
        return 0;
      };
      const getBoxCy=(ri,mi)=>{
        if(ri===0) return LABEL_H+PAD+dirOff(0)+mi*SLOT_H+SLOT_H/2;
        const m=rounds[ri][mi];
        let srcA,srcB;
        if(m&&m.fromA){ const [fr,fm]=m.fromA.split('-').map(Number); srcA=fr===ri-1?fm:mi*2; }
        else { srcA=mi*2; }
        if(m&&m.fromB){ const [fr,fm]=m.fromB.split('-').map(Number); srcB=fr===ri-1?fm:mi*2+1; }
        else { srcB=null; }
        const cyA=getBoxCy(ri-1,srcA);
        if(srcB===null) return cyA;
        const cyB=srcB<rounds[ri-1].length?getBoxCy(ri-1,srcB):cyA;
        return(cyA+cyB)/2;
      };
      const getBox=(ri,mi)=>({left:colLeft(ri),right:colRight(ri),cy:getBoxCy(ri,mi)});

      const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
      svg.setAttribute('data-bv-lines','1');
      svg.style.cssText='position:absolute;top:0;left:0;pointer-events:none;overflow:visible;';
      svg.setAttribute('width',W); svg.setAttribute('height',H);

      // 승자 진출 경로 추적 — 어느 라인이 승자 진출선인지
      // rounds[ri+1][nmi] 의 fromA/fromB가 srcA/srcB를 가리키고
      // rounds[ri][srcA].winner가 있으면 → 그 선은 "진출선"
      const isWinnerLine=(ri, srcIdx, nm)=>{
        const srcM=rounds[ri]?.[srcIdx];
        if(!srcM||!srcM.winner) return false;
        // nm(다음 라운드 경기)의 p1.name이 srcM.winner.name과 같으면 진출
        return (nm.p1&&nm.p1.name===srcM.winner.name)||(nm.p2&&nm.p2.name===srcM.winner.name);
      };

      const PATH=(d, color='#3a3a55', width=1.5)=>{
        const p=document.createElementNS('http://www.w3.org/2000/svg','path');
        p.setAttribute('d',d);
        p.setAttribute('stroke',color);
        p.setAttribute('stroke-width',String(width));
        p.setAttribute('fill','none');
        p.setAttribute('stroke-linecap','square');
        svg.appendChild(p);
      };

      rounds.forEach((matches,ri)=>{
        if(ri>=T-1) return;
        rounds[ri+1].forEach((nm,nmi)=>{
          let srcA,srcB;
          if(nm.fromA){ const [fr,fm]=nm.fromA.split('-').map(Number); srcA=fr===ri?fm:nmi*2; }
          else { srcA=nmi*2; }
          if(nm.fromB){ const [fr,fm]=nm.fromB.split('-').map(Number); srcB=fr===ri?fm:nmi*2+1; }
          else { srcB=nmi*2+1; }
          const hasB=nm.fromB!=null&&srcB<matches.length;
          const a=getBox(ri,srcA), b=hasB?getBox(ri,srcB):null, t=getBox(ri+1,nmi);

          // 승자 진출선 여부
          const aIsWin=isWinnerLine(ri, srcA, nm);
          const bIsWin=hasB&&isWinnerLine(ri, srcB, nm);
          const colorA=aIsWin?'#06d6a0':'#3a3a55';
          const colorB=bIsWin?'#06d6a0':'#3a3a55';
          const widthA=aIsWin?2:1.2;
          const widthB=bIsWin?2:1.2;
          // 다음 칸으로 가는 중간선: 승자가 확정됐으면 녹색
          const colorMid=(aIsWin||bIsWin)?'#06d6a0':'#3a3a55';
          const widthMid=(aIsWin||bIsWin)?2:1.2;

          if(reversed){
            const ax=a.left,bx=b?b.left:a.left,tx=t.right,ay=a.cy,midX=(ax+tx)/2;
            if(b){
              const by=b.cy;
              PATH(`M${ax},${ay} H${midX}`,colorA,widthA);
              PATH(`M${bx},${by} H${midX}`,colorB,widthB);
              PATH(`M${midX},${ay} V${by}`,colorMid,widthMid);
              PATH(`M${midX},${(ay+by)/2} H${tx}`,colorMid,widthMid);
            } else {
              Math.abs(ay-t.cy)<1
                ?PATH(`M${ax},${ay} H${tx}`,colorA,widthA)
                :PATH(`M${ax},${ay} H${midX} V${t.cy} H${tx}`,colorA,widthA);
            }
          } else {
            const ax=a.right,bx=b?b.right:a.right,tx=t.left,ay=a.cy,midX=(ax+tx)/2;
            if(b){
              const by=b.cy;
              PATH(`M${ax},${ay} H${midX}`,colorA,widthA);
              PATH(`M${bx},${by} H${midX}`,colorB,widthB);
              PATH(`M${midX},${ay} V${by}`,colorMid,widthMid);
              PATH(`M${midX},${(ay+by)/2} H${tx}`,colorMid,widthMid);
            } else {
              Math.abs(ay-t.cy)<1
                ?PATH(`M${ax},${ay} H${tx}`,colorA,widthA)
                :PATH(`M${ax},${ay} H${midX} V${t.cy} H${tx}`,colorA,widthA);
            }
          }
        });
      });

      container.style.position='relative';
      container.appendChild(svg);
    });
  };
})();

// ── 이름 보존 브라켓 생성 (slots의 player.name을 번호+이름으로 표시) ──
function _generateBracketKeepNames(players){
  const n=players.length;
  if(!n)return[[]];
  const round1=[];
  const isOdd=n%2===1;
  let slotNum=1;
  if(isOdd){
    const p=players[0];
    round1.push({p1:{name:`${slotNum++}번${p?` (${p.name})`:''}`,id:slotNum-1},p2:null,bye:true});
  }
  const rest=isOdd?players.slice(1):players;
  for(let i=0;i<rest.length;i+=2){
    const pa=rest[i], pb=rest[i+1];
    round1.push({
      p1:{name:`${slotNum++}번${pa?` (${pa.name})`:''}`,id:slotNum-1},
      p2:{name:`${slotNum++}번${pb?` (${pb.name})`:''}`,id:slotNum-1},
      bye:false
    });
  }
  return[round1];
}

// renderBracketD/E 오버라이드 — 내부 overflow 제거, 외부 하나만 스크롤
function _stripInnerScroll(div){
  div.querySelectorAll('*').forEach(el=>{
    if(el.style.overflow==='auto'||el.style.overflowX==='auto'||el.style.overflowY==='auto'){
      el.style.overflow='visible';
    }
  });
}

renderBracketD = function(wrap){
  if(!S.matches||!S.matches.length)return;
  const leftRounds=[], rightRounds=[];
  S.matches.forEach(round=>{
    const h=Math.ceil(round.length/2);
    leftRounds.push(round.slice(0,h));
    rightRounds.push(round.slice(h));
  });
  const outerWrap=document.createElement('div');
  outerWrap.style.cssText='display:flex;flex-direction:row;align-items:flex-start;overflow:auto;padding-bottom:8px;';
  const lDiv=document.createElement('div');
  const rDiv=document.createElement('div');
  _renderBracketHTML(lDiv,leftRounds,'top',false);
  _renderBracketHTML(rDiv,[...rightRounds].reverse(),'top',true);
  _stripInnerScroll(lDiv);
  _stripInnerScroll(rDiv);
  outerWrap.appendChild(lDiv);
  outerWrap.appendChild(rDiv);
  wrap.appendChild(outerWrap);
};

renderBracketE = function(wrap){
  if(!S.matches||!S.matches.length)return;
  const topRounds=[], botRounds=[];
  S.matches.forEach(round=>{
    const h=Math.ceil(round.length/2);
    topRounds.push(round.slice(0,h));
    botRounds.push(round.slice(h));
  });
  const outerWrap=document.createElement('div');
  outerWrap.style.cssText='display:flex;flex-direction:column;overflow:auto;padding-bottom:8px;';
  const tDiv=document.createElement('div');
  const bDiv=document.createElement('div');
  _renderBracketHTML(tDiv,topRounds,'top-down');
  _renderBracketHTML(bDiv,[...botRounds].reverse(),'bottom-up');
  _stripInnerScroll(tDiv);
  _stripInnerScroll(bDiv);
  outerWrap.appendChild(tDiv);
  outerWrap.appendChild(bDiv);
  wrap.appendChild(outerWrap);
};

function autoDetectSortKeys(){

  if(S.pts.some(p=>p.division&&p.division.trim())) _sortKeys.push('division');
  if(S.pts.some(p=>p.weight&&p.weight.trim())) _sortKeys.push('weight');
  if(S.pts.some(p=>p.team&&p.team.trim()) && !_sortKeys.length) _sortKeys.push('team');

function setCompType(type){

  document.querySelectorAll('.comp-type-btn').forEach(b=>{
    const active=b.dataset.type===type;
    b.style.borderColor=active?'var(--accent)':'var(--border)';

}

function setCourtCount(n){
  _courtCount=n;
  try{ localStorage.setItem('sgp_courtCount', String(n)); }catch(e){}
  document.querySelectorAll('.court-btn').forEach(b=>{
    const active=Number(b.dataset.count)===n;
    b.style.borderColor=active?'var(--red)':'var(--border)';

function setLayoutAndHighlight(l){
  _bracketLayout=l;
  ['A','B','C','D','E'].forEach(x=>{
    const btn=document.getElementById('setup-lay-'+x);
    if(!btn) return;
    const active=x===l;
    btn.style.borderColor=active?'var(--red)':'var(--border2)';

    tipD.textContent=`경기장 ${_courtCount}개 → ${_courtCount}곳에서 출발해 가운데 결승`;

function updateBracketPreview(){
  const panel=document.getElementById('bracket-preview-panel');
  const svgWrap=document.getElementById('bracket-preview-svg');
  const label=document.getElementById('preview-label');
  const desc=document.getElementById('preview-desc');
  const stats=document.getElementById('preview-stats');
  const n=_courtCount||1, ly=_bracketLayout||'A';
  if(!ly){panel.style.display='none';return;}
  panel.style.display='block';

  const layoutNames={A:'A형 (좌→우)',B:'B형 (아래→위)',C:'C형 (위→아래)',D:'D형 (양방향→중앙)',E:'E형 (상하→중앙)'};
  const layoutDescs={A:'경기장 1개 적합',B:'경기장 1개 적합',C:'경기장 1개 적합',D:`경기장 ${n}개 — 좌우 분산 후 가운데 결승`,E:`경기장 ${n}개 — 상하 분산 후 가운데 결승`};
  label.textContent=layoutNames[ly]||ly+'형';
  desc.textContent=layoutDescs[ly]||'';

  const _ec=(ly==='D'||ly==='E')?Math.max(2,n):1;
  const _erMap={A:4,B:4,C:4,D:4,E:3};
  const _er=_erMap[ly]||4;

}

function renderPtsOverview(){
  const panel=document.getElementById('pts-overview');
  const body=document.getElementById('pts-overview-body');
  if(!panel||!body) return;

  // _groups에서 전체 참가자 수집
  const allPts=Object.values(_groups).flat();
  if(!allPts.length){panel.style.display='none';return;}

  const hasGender=allPts.some(p=>p.gender&&p.gender.trim());
  const hasDiv=allPts.some(p=>p.division&&p.division.trim());
  const hasWeight=allPts.some(p=>p.weight&&p.weight.trim());
  if(!hasGender&&!hasDiv&&!hasWeight){panel.style.display='none';return;}
  panel.style.display='block';
  body.innerHTML='';

  // 성별 기준으로 최상위 그룹
  const topGroups={};
  allPts.forEach(p=>{
    const gk=hasGender?(p.gender||'미분류'):'전체';
    if(!topGroups[gk]) topGroups[gk]=[];
    topGroups[gk].push(p);
  });

  Object.entries(topGroups).sort((a,b)=>a[0].localeCompare(b[0],'ko')).forEach(([gname,gpts])=>{
    const genderColor=gname==='남'?'rgba(76,201,240,0.15)':gname==='여'?'rgba(255,100,150,0.15)':'rgba(255,255,255,0.05)';
    const genderBorder=gname==='남'?'rgba(76,201,240,0.4)':gname==='여'?'rgba(255,100,150,0.4)':'var(--border)';
    const genderText=gname==='남'?'#4cc9f0':gname==='여'?'#ff6496':'var(--text2)';

    const box=document.createElement('div');
    box.style.cssText=`background:${genderColor};border:1px solid ${genderBorder};border-radius:10px;padding:10px 14px;flex:1;min-width:0;`;

    let html=`<div style="display:flex;align-items:center;gap:6px;margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid ${genderBorder};">
      <span style="font-size:13px;font-weight:700;color:${genderText};">${gname}</span>
      <span style="font-size:10px;color:var(--text3);">${gpts.length}명</span>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;">`;

    if(hasDiv){
      const divGroups={};
      gpts.forEach(p=>{const dk=p.division||'미분류';if(!divGroups[dk])divGroups[dk]=[];divGroups[dk].push(p);});
      Object.entries(divGroups).sort((a,b)=>a[0].localeCompare(b[0],'ko')).forEach(([dname,dpts])=>{
        html+=`<div style="background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:7px;padding:6px 10px;">
          <div style="display:flex;align-items:center;gap:5px;margin-bottom:5px;">
            <span style="font-size:11px;font-weight:700;color:var(--text2);">${dname}</span>
            <span style="font-size:10px;color:var(--text3);">${dpts.length}명</span>
          </div>
          <div style="display:flex;flex-wrap:wrap;gap:4px;">`;
        if(hasWeight){
          const wtGroups={};
          dpts.forEach(p=>{const wk=p.weight||'미분류';if(!wtGroups[wk])wtGroups[wk]=[];wtGroups[wk].push(p);});
          Object.entries(wtGroups).sort((a,b)=>a[0].localeCompare(b[0],'ko')).forEach(([wname,wpts])=>{
            html+=`<span style="font-size:10px;background:rgba(255,255,255,0.07);border:1px solid var(--border);border-radius:5px;padding:2px 7px;color:var(--text3);">${wname} <b style="color:var(--text2);font-weight:700;">${wpts.length}</b></span>`;
          });
        }
        html+=`</div></div>`;
      });
    } else if(hasWeight){
      const wtGroups={};
      gpts.forEach(p=>{const wk=p.weight||'미분류';if(!wtGroups[wk])wtGroups[wk]=[];wtGroups[wk].push(p);});
      Object.entries(wtGroups).sort((a,b)=>a[0].localeCompare(b[0],'ko')).forEach(([wname,wpts])=>{
        html+=`<span style="font-size:10px;background:rgba(255,255,255,0.07);border:1px solid var(--border);border-radius:5px;padding:2px 7px;color:var(--text3);">${wname} <b style="color:var(--text2);font-weight:700;">${wpts.length}</b></span>`;
      });
    }

    html+=`</div>`;
    box.innerHTML=html;
    body.appendChild(box);
  });
}

  const btn=document.getElementById('btn-analyze');
  const result=document.getElementById('analysis-result');

  const allPts=Object.values(_groups).flat();
  if(!allPts.length){ toast('참가자 데이터가 없어요','error'); return; }

  btn.disabled=true; btn.textContent='분석 중...'; btn.style.opacity='0.6';
  result.style.display='block'; body.innerHTML=''; status.textContent='';

  const entries=Object.entries(_groups).sort((a,b)=>a[0].localeCompare(b[0],'ko'));
  const totalGroups=entries.length;
  const courts=_courtCount||1;

  // ── 그룹별 분석 ──
  let totalMatches=0;
  const groupStats=entries.map(([gname,members])=>{
    const n=members.length;
    const rounds=Math.ceil(Math.log2(n));
    const matches=n-1; // 토너먼트 총 경기수 = 참가자-1
    const hasBye=n&(n-1); // 2의 거듭제곱이 아니면 부전승 있음
    totalMatches+=matches;
    return {gname,n,rounds,matches,hasBye:!!hasBye};
  });

  // ── 레이아웃 추천 (A~E형 모두 고려) ──
  let layoutRec, layoutReason;
  if(courts===1){
    if(totalGroups<=4 && maxInGroup<=8){
      layoutRec='B형 (아래→위)'; layoutReason='소규모 단일 경기장은 아래→위 흐름이 시각적으로 깔끔합니다.';
    } else if(totalGroups<=4){
      layoutRec='C형 (위→아래)'; layoutReason='단일 경기장에서 인원이 많을 때 위→아래 흐름이 보기 편합니다.';
    } else {
      layoutRec='A형 (좌→우)'; layoutReason='그룹이 많은 단일 경기장은 좌→우 단방향이 진행 흐름 파악에 가장 유리합니다.';
    }
  } else if(courts===2){
    layoutRec='D형 (양방향→중앙)'; layoutReason='경기장 2개는 좌우로 나눠 진행하고 가운데서 결승하는 D형이 최적입니다.';
  } else if(courts>=3 && courts%2===0){
    layoutRec='D형 (양방향→중앙)'; layoutReason=`경기장 ${courts}개(짝수)는 좌우 균등 분배 D형을 권장합니다.`;
  } else {
    layoutRec='E형 (상하→중앙)'; layoutReason=`경기장 ${courts}개(홀수)는 위아래로 나눠 가운데 결승하는 E형을 권장합니다.`;
  }

  // ── 경기 배정 추천: 그룹을 경기장에 나눠 배치 ──
  // 인원 많은 그룹 → 여러 경기장에 분산, 적은 그룹 → 한 경기장에 집중
  const sortedBig=[...groupStats].sort((a,b)=>b.n-a.n);
  const courtAssign=Array.from({length:courts},(_,i)=>({court:i+1,groups:[],matches:0}));
  sortedBig.forEach(g=>{
    // 현재 경기 수가 가장 적은 경기장에 배정
    courtAssign.sort((a,b)=>a.matches-b.matches);
    courtAssign[0].groups.push(g.gname);
    courtAssign[0].matches+=g.matches;
  });
  courtAssign.sort((a,b)=>a.court-b.court);

  // ── 부전승 필요 그룹 ──
  const byeGroups=groupStats.filter(g=>g.hasBye);

  // ── HTML 결과 렌더링 ──
  let html='';

  // 요약 카드
  html+=`<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;">
    <div style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 14px;text-align:center;">
      <div style="font-size:20px;font-weight:700;color:var(--accent);">${allPts.length}<span style="font-size:11px;color:var(--text3);margin-left:2px;">명</span></div>
      <div style="font-size:10px;color:var(--text3);margin-top:2px;">전체 참가자</div>
    </div>
    <div style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 14px;text-align:center;">
      <div style="font-size:20px;font-weight:700;color:var(--accent);">${totalGroups}<span style="font-size:11px;color:var(--text3);margin-left:2px;">그룹</span></div>
      <div style="font-size:10px;color:var(--text3);margin-top:2px;">체급/부문 수</div>
    </div>
    <div style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 14px;text-align:center;">
      <div style="font-size:20px;font-weight:700;color:var(--yellow);">${totalMatches}<span style="font-size:11px;color:var(--text3);margin-left:2px;">경기</span></div>
      <div style="font-size:10px;color:var(--text3);margin-top:2px;">총 경기 수</div>
    </div>
  </div>`;

  // 레이아웃 추천
  const layoutCode=layoutRec.charAt(0); // 'A','D','E' 등 첫 글자
  html+=`<div style="margin-bottom:12px;padding:10px 14px;background:rgba(76,201,240,0.07);border:1px solid rgba(76,201,240,0.25);border-radius:8px;">
    <div style="font-size:10px;color:var(--accent);font-family:'Share Tech Mono',monospace;margin-bottom:5px;">// 레이아웃 추천</div>
    <span style="font-size:13px;font-weight:700;color:var(--text);">${layoutRec}</span>
    <span style="font-size:11px;color:var(--text3);margin-left:8px;">${layoutReason}</span>
  </div>`;

  // 경기장별 배정
  html+=`<div style="margin-bottom:12px;">
    <div style="font-size:10px;color:var(--accent);font-family:'Share Tech Mono',monospace;margin-bottom:7px;">// 경기장별 그룹 배정 추천</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;">`;
  courtAssign.forEach(c=>{
    html+=`<div style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 12px;min-width:120px;">
      <div style="font-size:10px;font-weight:700;color:var(--red);margin-bottom:5px;">경기장 ${c.court} <span style="color:var(--text3);font-weight:400;">(${c.matches}경기)</span></div>
      ${c.groups.map(g=>`<div style="font-size:11px;color:var(--text2);padding:1px 0;">${g}</div>`).join('')}
    </div>`;
  });
  html+=`</div></div>`;

  // 부전승
  if(byeGroups.length){
    html+=`<div style="margin-bottom:12px;padding:10px 14px;background:rgba(255,214,10,0.07);border:1px solid rgba(255,214,10,0.3);border-radius:8px;">
      <div style="font-size:10px;color:var(--yellow);font-family:'Share Tech Mono',monospace;margin-bottom:5px;">// 부전승 필요 그룹</div>
      <div style="font-size:11px;color:var(--text2);">${byeGroups.map(g=>`<b>${g.gname}</b> (${g.n}명)`).join(' · ')}은 홀수 인원이므로 1라운드에서 부전승 1명을 지정해야 합니다.</div>
    </div>`;
  }

  // 그룹별 세부 라운드 수
  html+=`<div>
    <div style="font-size:10px;color:var(--accent);font-family:'Share Tech Mono',monospace;margin-bottom:7px;">// 그룹별 라운드 구성</div>
    <div style="display:flex;gap:5px;flex-wrap:wrap;">
    ${groupStats.map(g=>`<div style="background:var(--card);border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:11px;">
      <span style="color:var(--text2);">${g.gname}</span>
      <span style="color:var(--text3);margin-left:6px;">${g.n}명 / ${g.rounds}라운드 / ${g.matches}경기</span>
    </div>`).join('')}
    </div>
  </div>`;

  status.textContent='분석 완료';
  status.style.color='var(--green)';

  // 추천 적용 버튼 (레이아웃 저장만, 대진표 생성은 사용자가 직접)
  html+=`<div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:flex-end;gap:10px;">
    <span style="font-size:11px;color:var(--text3);">추천 레이아웃 <b style="color:var(--text2);">${layoutRec}</b></span>
    <button onclick="applyAnalysisLayout('${layoutCode}')" style="padding:6px 16px;background:rgba(76,201,240,.15);border:1px solid var(--accent);color:var(--accent);border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;">✔ 추천 레이아웃 적용</button>
  </div>`;

  body.innerHTML=html;
  btn.disabled=false; btn.textContent='🔍 대진표 분석'; btn.style.opacity='1';
}

function renderOrderArea(){
  const area=document.getElementById('pts-order-area'); if(!area) return; area.innerHTML='';
  Object.entries(_groups).sort((a,b)=>a[0].localeCompare(b[0],'ko')).forEach(([gname,members])=>{
    const sec=document.createElement('div'); sec.style.marginBottom='20px';
    sec.innerHTML=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border);">
      <span style="font-size:12px;font-weight:700;">${gname}</span>
      <span style="font-size:10px;color:var(--text3);background:var(--card2);padding:1px 8px;border-radius:10px;">${members.length}명</span>
      <span style="font-size:10px;color:var(--text3);margin-left:4px;">이름 클릭→번호지정 · 드래그→순서변경</span></div>`;
    const grid=document.createElement('div'); grid.dataset.group=gname;
    members.forEach((p,i)=>grid.appendChild(buildOrderRow(p,i,gname,members)));
    initDragSort(grid,gname); sec.appendChild(grid); area.appendChild(sec);
  });
}

function buildOrderRow(p,i,gname,members){
  const row=document.createElement('div'); row.className='order-row'; row.draggable=true; row.dataset.pid=p.id;
  row.innerHTML=`<span class="onum" style="font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--red);width:20px;font-weight:700;flex-shrink:0;">${i+1}</span>
    <div style="width:6px;height:6px;border-radius:50%;background:${p.color||'var(--text3)'};flex-shrink:0;"></div>
    <span style="flex:1;font-size:13px;font-weight:600;">${p.name}</span>
    ${p.weight||p.division?`<span style="font-size:10px;color:var(--text3);">${[p.division,p.weight].filter(Boolean).join(' / ')}</span>`:''}
    <span style="font-size:10px;color:var(--text3);opacity:.5;">≡</span>`;
  row.onclick=e=>{
    if(e.target.tagName==='INPUT') return;
    const cur=parseInt(row.querySelector('.onum').textContent);
    const inp=document.createElement('input');
    inp.type='number'; inp.min=1; inp.max=members.length; inp.value=cur;
    inp.style.cssText='width:40px;font-size:12px;background:var(--bg);border:1px solid var(--accent);border-radius:4px;color:var(--text);text-align:center;padding:2px;';
    row.querySelector('.onum').replaceWith(inp); inp.focus(); inp.select();
    const apply=()=>{
      const nv=Math.max(1,Math.min(members.length,parseInt(inp.value)||cur));
      const g=_groups[gname]; const fi=g.findIndex(x=>x.id===p.id);
      g.splice(nv-1,0,g.splice(fi,1)[0]); renderOrderArea();
    };
    inp.onblur=apply;
    inp.onkeydown=e2=>{if(e2.key==='Enter')apply();if(e2.key==='Escape')renderOrderArea();};
    e.stopPropagation();
  };
  return row;
}

function initDragSort(grid,gname){
  let dragEl=null;
  grid.addEventListener('dragstart',e=>{dragEl=e.target.closest('[data-pid]');if(dragEl)setTimeout(()=>dragEl.style.opacity='.4',0);});
  grid.addEventListener('dragend',()=>{if(dragEl){dragEl.style.opacity='1';dragEl=null;}});
  grid.addEventListener('dragover',e=>{
    e.preventDefault();
    const over=e.target.closest('[data-pid]'); if(!over||over===dragEl) return;
    const rows=[...grid.querySelectorAll('[data-pid]')];
    const fi=rows.indexOf(dragEl),ti=rows.indexOf(over); if(fi<0||ti<0) return;
    const g=_groups[gname]; g.splice(ti,0,g.splice(fi,1)[0]);
    g.forEach((p,idx)=>{const r=grid.querySelector(`[data-pid="${p.id}"]`);if(r){r.querySelector('.onum').textContent=idx+1;grid.appendChild(r);}});
  });
}

function shuffleAllGroups(){
  Object.keys(_groups).forEach(k=>{_groups[k]=[..._groups[k]].sort(()=>Math.random()-.5);});
  renderOrderArea(); toast('무작위로 섞었어요','success');
}

function generateBracketWithNames(pts){
  const players=[...pts];
  const n=players.length;
  if(!n)return[[]];
  const round1=[];
  const isOdd=n%2===1;
  let slotNum=1;
  if(isOdd){
    const p=players[0];
    round1.push({p1:{name:`${slotNum++}번${p?` (${p.name})`:''}`,id:slotNum-1},p2:null,bye:true});
  }
  const rest=isOdd?players.slice(1):players;
  for(let i=0;i<rest.length;i+=2){
    const pa=rest[i], pb=rest[i+1];
    round1.push({
      p1:{name:`${slotNum++}번${pa?` (${pa.name})`:''}`,id:slotNum-1},
      p2:{name:`${slotNum++}번${pb?` (${pb.name})`:''}`,id:slotNum-1},
      bye:false
    });
  }
  return[round1];
}

function generateAllBrackets(){
  // 경기장 수에 따라 레이아웃 자동 설정
  const courts=_courtCount||1;
  _bracketLayout = courts >= 2 ? 'D' : 'A';

  const entries=Object.entries(_groups).sort((a,b)=>a[0].localeCompare(b[0],'ko'));

  // 경기장별 그룹 배정 (분석과 동일 로직 — 경기 수 균등 분배)
  const courtSlots=Array.from({length:courts},(_,i)=>({court:i+1,groups:[],matchCount:0}));
  [...entries].sort((a,b)=>b[1].length-a[1].length).forEach(([gname,members])=>{
    courtSlots.sort((a,b)=>a.matchCount-b.matchCount);
    courtSlots[0].groups.push(gname);
    courtSlots[0].matchCount+=members.length-1;
  });
  courtSlots.sort((a,b)=>a.court-b.court);

  // groupBrackets 생성 (탭용 — 빈 matches)
  S.groupBrackets=entries.map(([gname,members])=>({
    label:gname,
    matches:generateBracketWithNames([...members]),
    slots:members.map((p,i)=>({num:i+1,player:p})),
    court:courtSlots.findIndex(c=>c.groups.includes(gname))+1
  }));

  S.activeGroup=0; _assignMode=false; _linkSel=null;
  try{
    localStorage.setItem('sgp_step','3');
    localStorage.setItem('sgp_courtCount', String(_courtCount||1));
    localStorage.setItem('sgp_layout', _bracketLayout||'A');
    
  }catch(e){}
  // 중간저장 데이터가 있으면 matches만 복원
  try{
    const saved=JSON.parse(localStorage.getItem('sgp_bracket_temp'));
    if(saved&&saved.groupBrackets){
      // label 기준으로 매칭해서 matches만 복원
      saved.groupBrackets.forEach(savedG=>{
        const target=S.groupBrackets.find(g=>g.label===savedG.label);
        if(target&&savedG.matches) target.matches=savedG.matches;
      });
      toast(`중간저장 불러옴 (${saved.savedAt})`,'success');
    }
  } catch(e){}

  show('pts-step3');
  renderBracketTabs();
  _redrawBracketView();
}

// 원래 시각적 트리 렌더 (새창 전용, embed=0)
function _redrawBracketViewTree(){
  _linkSel=null;
  const courts=_courtCount||1;
  const view=document.getElementById('pts-bracket-view');
  if(!view||!S.groupBrackets?.length) return;
  // 스크롤 위치 저장 (내부 스크롤 컨테이너)
  const prevScrollEl=view.querySelector('[style*="overflow"]');
  const savedScrollTop=prevScrollEl?prevScrollEl.scrollTop:0;
  const savedScrollLeft=prevScrollEl?prevScrollEl.scrollLeft:0;
  view.innerHTML='';

  const noByeMatches=matches=>(matches||[]).filter(m=>!m.bye);
  const saved=S.matches;

  // view 스타일 초기화
  view.style.overflow='';
  view.style.padding='';
  view.style.display='flex';
  view.style.flexDirection='column';

  if(_bracketLayout==='D' && courts>=2){
    view.style.overflow='auto';
    view.style.padding='12px';

    const outerWrap=document.createElement('div');
    outerWrap.style.cssText='display:flex;flex-direction:column;gap:0;min-width:100%;';

    // ── 행(row) 단위 렌더링 ──
    // 경기장1 그룹 / 경기장2 그룹을 각각 순서대로 가져와서
    // 한 번에 하나씩 "행"으로 묶어 렌더링.
    // 한 행 = [왼쪽 섹션 | 가운데 spacer | 오른쪽 섹션]
    // → 행의 height가 CSS align-items:stretch 로 자동으로 같아짐.
    // 한쪽이 체급이 더 많으면 나머지는 빈 셀로 처리.

    const lGroups=(S.groupBrackets||[]).filter(g=>g.court===1);
    const rGroups=(S.groupBrackets||[]).filter(g=>g.court===2);
    const rowCount=Math.max(lGroups.length, rGroups.length);

    // 헤더 행 (경기장1 / 경기장2 레이블)
    const hdrRow=document.createElement('div');
    hdrRow.style.cssText='display:flex;flex-direction:row;gap:0;margin-bottom:6px;';
    const mkLabel=(txt,align='left')=>{
      const d=document.createElement('div');
      d.style.cssText=`font-size:10px;color:var(--accent);font-family:"Share Tech Mono",monospace;letter-spacing:2px;text-align:${align};`;
      d.textContent=txt;
      return d;
    };
    const hdrL=document.createElement('div');
    hdrL.style.cssText='padding-right:24px;flex-shrink:0;';
    hdrL.appendChild(mkLabel('// 경기장 1','left'));
    const hdrSp=document.createElement('div');
    hdrSp.style.cssText='flex:1;min-width:40px;';
    const hdrR=document.createElement('div');
    hdrR.style.cssText='padding-left:24px;flex-shrink:0;display:flex;justify-content:flex-end;';
    /* 경기장 2에 배정된 그룹이 있을 때만 헤더 표시 */
    if(rGroups.length) hdrR.appendChild(mkLabel('// 경기장 2','right'));
    hdrRow.appendChild(hdrL); hdrRow.appendChild(hdrSp); hdrRow.appendChild(hdrR);
    outerWrap.appendChild(hdrRow);

    const mkSection=(g, reversed)=>{
      const labelParts=g.label.split('/').map(s=>s.trim());
      const shortLabel=labelParts.map((p,pi)=>pi===0?p:p.replace('부','')).join('·');
      window._bvCurrentGroupLabel=shortLabel;  // isCurrentMatchIdx 비교용
      const sec=document.createElement('div');
      sec.style.cssText='display:flex;flex-direction:column;flex-shrink:0;min-width:max-content;';
      const hdr=document.createElement('div');
      hdr.style.cssText='font-size:9px;color:#555;font-family:"Share Tech Mono",monospace;letter-spacing:1px;margin-bottom:4px;margin-top:8px;flex-shrink:0;white-space:nowrap;';
      hdr.textContent=shortLabel;
      sec.appendChild(hdr);
      const groupWrap=document.createElement('div');
      groupWrap.style.cssText='min-width:max-content;';
      groupWrap.dataset.court=String(g.court||1);
      groupWrap.dataset.groupLabel=shortLabel;
      const taggedMatches=g.matches.map((round,ri)=>
        round.map((m,mi)=>({...m,_groupObj:g,_origMi:mi,_origRi:ri,_groupLabel:shortLabel}))
      );
      S.matches=taggedMatches;
      _renderBracketHTML(groupWrap, taggedMatches, 'top', reversed);
      _stripInnerScroll(groupWrap);
      sec.appendChild(groupWrap);
      return sec;
    };

    for(let i=0;i<rowCount;i++){
      const row=document.createElement('div');
      // stretch: 왼쪽/오른쪽 셀이 같은 height로 늘어남
      row.style.cssText='display:flex;flex-direction:row;align-items:stretch;gap:0;margin-bottom:20px;';

      // 왼쪽 셀
      const cellL=document.createElement('div');
      cellL.style.cssText='padding-right:24px;flex-shrink:0;min-width:max-content;';
      if(lGroups[i]) cellL.appendChild(mkSection(lGroups[i], false));
      row.appendChild(cellL);

      // 가운데 spacer
      const sp=document.createElement('div');
      sp.style.cssText='flex:1;min-width:40px;';
      row.appendChild(sp);

      // 오른쪽 셀
      const cellR=document.createElement('div');
      cellR.style.cssText='padding-left:24px;flex-shrink:0;min-width:max-content;display:flex;flex-direction:column;align-items:flex-end;';
      if(rGroups[i]) cellR.appendChild(mkSection(rGroups[i], true));
      row.appendChild(cellR);

      outerWrap.appendChild(row);
    }

    view.appendChild(outerWrap);
  } else {
    // A/B/C/E형 — 그룹별로 태깅해서 렌더링 (D형과 동일하게 _groupObj/_origRi/_origMi 보존)
    view.style.overflow='auto';
    const outerWrap=document.createElement('div');
    outerWrap.style.cssText='padding:8px;min-width:max-content;';

    S.groupBrackets.forEach(g=>{
      const labelParts=g.label.split('/').map(s=>s.trim());
      const shortLabel=labelParts.map((p,pi)=>pi===0?p:p.replace('부','')).join('·');

      const hdr=document.createElement('div');
      hdr.style.cssText='font-size:9px;color:#555;font-family:"Share Tech Mono",monospace;letter-spacing:1px;margin-bottom:4px;margin-top:8px;';
      hdr.textContent=shortLabel;
      outerWrap.appendChild(hdr);

      const groupWrap=document.createElement('div');
      groupWrap.style.cssText='margin-bottom:16px;position:relative;';
      groupWrap.dataset.court=String(g.court||1);
      groupWrap.dataset.groupLabel=shortLabel;

      const taggedMatches=g.matches.map((round,ri)=>
        round.map((m,mi)=>({...m,_groupObj:g,_origMi:mi,_origRi:ri,_groupLabel:shortLabel}))
      );

      S.matches=taggedMatches;
      const fns={A:renderBracketA,B:renderBracketB,C:renderBracketC,E:renderBracketE};
      const fn=fns[_bracketLayout]||renderBracketA;
      fn(groupWrap);
      _stripInnerScroll(groupWrap);
      outerWrap.appendChild(groupWrap);
    });

    view.appendChild(outerWrap);
  }
  S.matches=saved;
  // 탭 체크 상태 갱신
  renderBracketTabs();
  // 스크롤 위치 복원 (새로 생성된 내부 스크롤 컨테이너에 적용)
  if(savedScrollTop||savedScrollLeft){
    requestAnimationFrame(()=>{
      const newScrollEl=view.querySelector('[style*="overflow"]');
      if(newScrollEl){
        newScrollEl.scrollTop=savedScrollTop;
        newScrollEl.scrollLeft=savedScrollLeft;
      }
    });
  }
}

// 부전승 배정 선택 팝업
// 특정 라운드에서 아직 연결되지 않은 경기 목록 반환
function _getUnlinkedMatches(g, ri){
  const curRound=g.matches[ri];
  const nextRound=g.matches[ri+1]||[];
  return curRound.map((m,mi)=>{
    const key=`${ri}-${mi}`;
    const linked=nextRound.find(nm=>nm.fromA===key||nm.fromB===key);
    return linked?null:{ri,mi,m};
  }).filter(Boolean);
}

// 수동 연결 후 홀수 체크 → 모든 경기 연결 완료 + 다음 라운드 진출자 홀수면 바로 팝업
function _checkAndHandleOddAfterLink(g, ri){
  const curRound=g.matches[ri];
  const nextRound=g.matches[ri+1]||[];

  // 현재 라운드 전체 경기 수 (BYE 포함)
  const totalMatches=curRound.length;

  // 다음 라운드에 연결된 경기 수
  const linkedCount=nextRound.length;

  // 진출자 수 = 현재 라운드 경기 수 (각 경기에서 1명 진출)
  const advancers=totalMatches;

  // 아직 다 연결 안 됐으면 패스
  // 짝수면 BYE 필요 없으니 패스
  // 이미 BYE가 배정돼 있으면 패스
  const alreadyHasBye=nextRound.some(m=>m.bye);
  if(alreadyHasBye) return;
  if(advancers%2===0) return;

  // 홀수 진출자 확정: 다음 라운드에서 짝 못 맞추는 1명이 생김
  // → 현재까지 연결된 경기 + 아직 미연결 경기 합쳐서 전체 진출자 목록으로 팝업
  const allCandidates=curRound.map((m,mi)=>({
    id:`bye_${ri}_${mi}`,
    name:`${ri+1}-${mi+1} 승자`,
    color:'var(--accent)',
    _ri:ri, _mi:mi
  }));

  showByeSelector(
    allCandidates,
    `${ri+1}라운드 진출자 ${advancers}명 — 부전승 배정`,
    (sel)=>{
      if(!g.matches[ri+1]) g.matches.push([]);
      const key=`${sel._ri}-${sel._mi}`;
      if(g.matches[ri+1].find(nm=>nm.fromA===key||nm.fromB===key)){
        toast('이미 연결된 경기입니다','error');
        _redrawBracketView(); return;
      }
      g.matches[ri+1].push({p1:{name:sel.name,tbd:true},p2:null,fromA:key,fromB:null,bye:true});
      _redrawBracketView();
      toast(sel.name+' 부전승 배정!','success');
    },
    ()=>{
      // 랜덤: 전체 진출자 중 랜덤
      const pick=allCandidates[Math.floor(Math.random()*allCandidates.length)];
      if(!g.matches[ri+1]) g.matches.push([]);
      const key=`${pick._ri}-${pick._mi}`;
      if(g.matches[ri+1].find(nm=>nm.fromA===key||nm.fromB===key)){
        _redrawBracketView(); return;
      }
      g.matches[ri+1].push({p1:{name:pick.name,tbd:true},p2:null,fromA:key,fromB:null,bye:true});
      _redrawBracketView();
      showByeResult(pick.name);
    }
  );
}

function renderBracketTabs(){
  const tabs=document.getElementById('pts-bracket-tabs');
  const groups=S.groupBrackets||[];
  tabs.innerHTML='';
  if(groups.length<1){tabs.style.display='none';return;}
  tabs.style.display='block';

  // 경기장별로 그룹 분류
  const courts={};
  groups.forEach((g,i)=>{
    const c=g.court||1;
    if(!courts[c]) courts[c]=[];
    courts[c].push({g,i});
  });

  const courtNums=Object.keys(courts).map(Number).sort((a,b)=>a-b);

  // 좌우 분리 컨테이너
  const row=document.createElement('div');
  row.style.cssText='display:flex;gap:0;width:100%;';

  courtNums.forEach((courtNum, ci)=>{
    const col=document.createElement('div');
    col.style.cssText=`flex:1;padding:8px 14px;${ci>0?'border-left:1px solid var(--border)':''}`;

    // 경기장 헤더
    const hdr=document.createElement('div');
    hdr.style.cssText='font-size:9px;color:var(--accent);font-family:"Share Tech Mono",monospace;letter-spacing:2px;margin-bottom:6px;';
    hdr.textContent=`// 경기장 ${courtNum}`;
    col.appendChild(hdr);

    // 그룹 목록
    const list=document.createElement('div');
    list.style.cssText='display:flex;flex-wrap:wrap;gap:4px;';

    courts[courtNum].forEach(({g,i})=>{
      // 현재 그려진 non-bye 경기 박스 수
      // 총 목표 박스 수 계산 (BYE 포함, 참가자 수 기준)
      const calcTotalBoxes=(n)=>{ let t=0,c=n; while(c>1){t+=Math.ceil(c/2);c=Math.ceil(c/2);} return t; };
      const totalBoxes=calcTotalBoxes(g.slots.length);
      // 현재 그려진 박스 수 (BYE 포함)
      const drawnBoxes=g.matches.reduce((acc,round)=>acc+round.length, 0);
      const allDone=drawnBoxes>=totalBoxes;

      const checkboxes=Array.from({length:totalBoxes},(_,ci)=>
        `<span style="font-size:11px;color:${ci<drawnBoxes?'var(--green)':'var(--border2)'};">${ci<drawnBoxes?'☑':'☐'}</span>`
      ).join('');

      const btn=document.createElement('button');
      const active=i===S.activeGroup;

      const labelParts=g.label.split('/').map(s=>s.trim());
      const shortLabel=labelParts.map((p,pi)=>pi===0?p:p.replace('부','')).join('·');

      btn.style.cssText=`
        display:inline-flex;align-items:center;gap:5px;
        padding:3px 8px;border-radius:5px;
        border:1px solid ${allDone?'var(--green)':active?'var(--red)':'var(--border)'};
        background:${allDone?'rgba(6,214,160,.1)':active?'rgba(230,57,70,.15)':'transparent'};
        color:${allDone?'var(--green)':active?'var(--red)':'var(--text3)'};
        font-size:10px;cursor:pointer;font-weight:${active?'700':'400'};
        white-space:nowrap;
      `;

      btn.innerHTML=`
        <span style="font-size:10px;">${shortLabel}</span>
        <span style="font-size:9px;color:var(--text3);">(${g.slots.length}명)</span>
        <span style="display:inline-flex;gap:1px;align-items:center;">${checkboxes}</span>
      `;
      btn.onclick=()=>{ S.activeGroup=i; renderBracketTabs(); _redrawBracketView(); };
      list.appendChild(btn);
    });

    col.appendChild(list);
    row.appendChild(col);
  });

  tabs.appendChild(row);
}

function assignPlayerToSlot(targetNum,fromIdx){
  const g=S.groupBrackets[S.activeGroup];
  const ti=g.slots.findIndex(s=>s.num===targetNum); if(ti<0) return;
  const tmp=g.slots[ti].player; g.slots[ti].player=g.slots[fromIdx].player; g.slots[fromIdx].player=tmp;
  g.matches=generateBracket(g.slots.map(s=>s.player));

function shuffleGroupBracket(){
  const g=S.groupBrackets[S.activeGroup];
  // 이름 배정 여부 확인 (괄호 있으면 명단 설정된 상태)
  const hasNames=g.matches[0]&&g.matches[0].some(m=>{
    const n1=(m.p1&&m.p1.name)||''; const n2=(m.p2&&m.p2.name)||'';
    return /\(.+\)/.test(n1)||/\(.+\)/.test(n2);
  });
  // 슬롯 순서 섞기
  g.slots=[...g.slots].sort(()=>Math.random()-.5).map((s,i)=>({...s,num:i+1}));
  if(hasNames){
    // 이름이 있으면 이름도 함께 섞어서 재배정
    g.matches=_generateBracketKeepNames(g.slots.map(s=>s.player));
  } else {
    g.matches=generateBracket(g.slots.map(s=>s.player));
  }
  _redrawBracketView(); toast(g.label+' 무작위로 섞었어요','success');
}

/* ── 완성 버튼 — 전광판에서 불러올 수 있도록 전체 데이터 저장 ── */
function finalizeBracket(){
  try{
    // 1) groupBrackets 정제 (순환참조 제거)
    const clean=S.groupBrackets.map(g=>({
      ...g,
      matches:g.matches.map(round=>round.map(m=>{
        const {_groupObj,...rest}=m; return rest;
      }))
    }));

    // 2) display config (행사명·일시·장소 등)
    const dispCfg=(()=>{ try{ return JSON.parse(localStorage.getItem('sgp_display_config')||'{}'); }catch(e){ return {}; } })();

    // 3) 완성 데이터 패키지
    const finalData={
      version:2,
      finalizedAt: new Date().toISOString(),
      groupBrackets: clean,
      courtCount: _courtCount||1,
      layout: _bracketLayout||'A',
      settings: S.settings||{},
      displayConfig: dispCfg,
      totalGroups: clean.length,
      totalParticipants: clean.reduce((sum,g)=>sum+(g.slots?g.slots.length:0),0),
    };

    // 4) 전광판용 키에 저장 (sgp_bracket_final)
    localStorage.setItem('sgp_bracket_final', JSON.stringify(finalData));
    // 기존 키들도 동기화
    
    localStorage.setItem('sgp_courtCount', String(finalData.courtCount));
    localStorage.setItem('sgp_layout', finalData.layout);
    

    // 5) 부모창에도 알림
    if(window.opener){
      window.opener.postMessage({type:'sgp_bracket_finalized', finalData},'*');
    }

    // 6) 버튼 상태 변경
    const btn=document.getElementById('btn-finalize');
    if(btn){
      btn.textContent='✅ 완성됨';
      btn.style.background='linear-gradient(135deg,#00b97a,#008f5e)';
      btn.style.boxShadow='0 0 18px rgba(6,214,160,0.55)';
      setTimeout(()=>{
        btn.textContent='✅ 완성';
        btn.style.background='linear-gradient(135deg,#06d6a0,#00b97a)';
        btn.style.boxShadow='0 0 12px rgba(6,214,160,0.35)';
      },2500);
    }

    const g=clean.length, p=finalData.totalParticipants;
    toast('완성! '+g+'개 체급 · '+p+'명 저장됨 — 전광판에서 불러올 수 있어요','success');
  } catch(e){
    console.error(e);
    toast('완성 저장 실패: '+e.message,'error');
  }
}

// ── 체급 선택 체크박스 렌더 ──
function _renderPdfCheckboxes(){
  const wrap=document.getElementById('pdf-group-checkboxes');
  if(!wrap) return;
  wrap.innerHTML='';

  const groups=S.groupBrackets||[];

  // sortKeys 기반으로 각 파트 추출
  const allLabels=groups.map(g=>g.label);
  const parts0=[...new Set(allLabels.map(l=>l.split('/')[0]?.trim()).filter(Boolean))]; // 성별
  const parts1=[...new Set(allLabels.map(l=>l.split('/')[1]?.trim()).filter(Boolean))]; // 부문
  const parts2=[...new Set(allLabels.map(l=>l.split('/')[2]?.trim()).filter(Boolean))]; // 체급

  const sep=()=>{
    const s=document.createElement('span');
    s.style.cssText='width:1px;height:16px;background:var(--border);display:inline-block;margin:0 6px;vertical-align:middle;';
    wrap.appendChild(s);
  };

  const mkLabel=(txt)=>{
    const l=document.createElement('span');
    l.style.cssText='font-size:9px;color:var(--text3);letter-spacing:1px;margin-right:2px;vertical-align:middle;';
    l.textContent=txt;
    wrap.appendChild(l);
  };

  const mkFilterBtn=(label, matchFn)=>{
    const btn=document.createElement('button');
    btn.style.cssText='padding:3px 10px;border-radius:5px;border:1px solid var(--border2);background:rgba(255,255,255,.06);color:var(--text2);font-size:10px;cursor:pointer;margin-right:2px;transition:all .15s;';
    btn.textContent=label;
    btn.onclick=()=>{
      // 같은 그룹 버튼들 비활성화, 자신만 활성화
      wrap.querySelectorAll('.filter-btn').forEach(b=>{
        b.style.borderColor='var(--border2)';
        b.style.background='rgba(255,255,255,.06)';
        b.style.color='var(--text2)';
      });
      btn.style.borderColor='var(--accent)';
      btn.style.background='rgba(76,201,240,.15)';
      btn.style.color='var(--accent)';
      wrap.querySelectorAll('.pdf-chk').forEach(b=>{
        b.dataset.checked=matchFn(groups[parseInt(b.dataset.idx)])?'1':'0';
      });
      _syncCheckStyles();
      _renderPdfPreview(_getSelectedGroups());
    };
    btn.className='filter-btn';
    wrap.appendChild(btn);
  };

  // 전체 선택/해제
  mkFilterBtn('전체 선택', ()=>true);
  mkFilterBtn('전체 해제', ()=>false);

  // 성별 (파트0)
  if(parts0.length>1){ sep(); mkLabel('성별:'); parts0.forEach(v=>mkFilterBtn(v, g=>g.label.split('/')[0]?.trim()===v)); }

  // 부문 (파트1)
  if(parts1.length>0){ sep(); mkLabel('부문:'); parts1.forEach(v=>mkFilterBtn(v, g=>g.label.split('/')[1]?.trim()===v)); }

  // 체급 (파트2)
  if(parts2.length>0){
    const br2=document.createElement('div');
    br2.style.cssText='width:100%;height:0;margin:2px 0;';
    wrap.appendChild(br2);
    mkLabel('체급:'); parts2.forEach(v=>mkFilterBtn(v, g=>g.label.split('/')[2]?.trim()===v));
  }

  // 구분선
  const br=document.createElement('div');
  br.style.cssText='width:100%;height:1px;background:var(--border);margin:8px 0;';
  wrap.appendChild(br);

  // 개별 체급 버튼
  groups.forEach((g,i)=>{
    const shortLabel=g.label.split('/').map(s=>s.trim()).join(' · ');
    const btn=document.createElement('button');
    btn.className='pdf-chk';
    btn.dataset.idx=i;
    btn.dataset.checked='0';
    btn.onclick=()=>{
      btn.dataset.checked=btn.dataset.checked==='1'?'0':'1';
      _syncCheckStyles();
      _renderPdfPreview(_getSelectedGroups());
    };
    btn.style.cssText='padding:3px 10px;border-radius:5px;border:1px solid var(--border2);background:transparent;color:var(--text3);font-size:10px;cursor:pointer;margin-right:2px;margin-bottom:2px;';
    btn.textContent=shortLabel+` (${g.slots.length}명)`;
    wrap.appendChild(btn);
  });
}

function _syncCheckStyles(){
  const wrap=document.getElementById('pdf-group-checkboxes');
  if(!wrap) return;
  wrap.querySelectorAll('.pdf-chk').forEach(b=>{
    const on=b.dataset.checked==='1';
    b.style.borderColor=on?'var(--green)':'var(--border2)';
    b.style.background=on?'rgba(6,214,160,.1)':'transparent';
    b.style.color=on?'var(--green)':'var(--text3)';
  });
}

function _getSelectedGroups(){
  const sel=[];
  document.querySelectorAll('.pdf-chk').forEach(b=>{
    if(b.dataset.checked==='1') sel.push(S.groupBrackets[parseInt(b.dataset.idx)]);
  });
  return sel;
}
