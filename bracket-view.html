// в”Җв”Җ лһңлҚӨ мһҗлҸҷл°°м • лӘЁлӢ¬ в”Җв”Җ
function _openRandomRosterModal(overlay){
  const modal=document.createElement('div');
  modal.style.cssText='background:var(--bg2);border:1px solid var(--border2);border-radius:14px;width:420px;max-width:95vw;padding:24px 28px;display:flex;flex-direction:column;gap:14px;';

  const groupItems=S.groupBrackets.map((g,i)=>{
    const lbl=g.label.split('/').map(s=>s.trim()).join(' В· ');
    return `<label style="display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;border:1px solid var(--border);background:var(--card);cursor:pointer;">
      <input type="checkbox" data-idx="${i}" checked style="accent-color:var(--yellow);width:14px;height:14px;">
      <span style="font-size:12px;">${lbl}</span>
      <span style="font-size:10px;color:var(--text3);margin-left:auto;">${g.slots.length}лӘ…</span>
    </label>`;
  }).join('');

  modal.innerHTML=`
    <div style="font-size:14px;font-weight:700;">рҹҺІ лһңлҚӨ мһҗлҸҷл°°м •</div>
    <div style="font-size:11px;color:var(--text3);line-height:1.7;">л°°м •н•  мІҙкёүмқ„ м„ нғқн•ҳм„ёмҡ”. м°ёк°ҖмһҗлҘј л¬ҙмһ‘мң„лЎң м„һм–ҙ 1лқјмҡҙл“ң мҠ¬лЎҜм—җ мһҗлҸҷ л°°м •н•©лӢҲлӢӨ.</div>
    <div style="display:flex;gap:6px;margin-bottom:2px;">
      <button onclick="this.closest('div').parentElement.querySelectorAll('input[type=checkbox]').forEach(c=>c.checked=true)" style="padding:3px 10px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--text3);font-size:10px;cursor:pointer;">м „мІҙ м„ нғқ</button>
      <button onclick="this.closest('div').parentElement.querySelectorAll('input[type=checkbox]').forEach(c=>c.checked=false)" style="padding:3px 10px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--text3);font-size:10px;cursor:pointer;">м „мІҙ н•ҙм ң</button>
    </div>
    <div id="rm-group-list" style="display:flex;flex-direction:column;gap:5px;max-height:260px;overflow-y:auto;">${groupItems}</div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:4px;">
      <button onclick="document.getElementById('roster-modal').remove()" style="padding:6px 14px;background:transparent;border:1px solid var(--border);color:var(--text3);border-radius:7px;font-size:12px;cursor:pointer;">м·ЁмҶҢ</button>
      <button id="rm-random-apply" style="padding:6px 20px;background:var(--yellow);border:none;color:#111;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;">рҹҺІ л°°м • мӢӨн–ү</button>
    </div>
  `;
  overlay.appendChild(modal);

  document.getElementById('rm-random-apply').onclick=()=>{
    const checked=[...modal.querySelectorAll('input[type=checkbox]')].filter(c=>c.checked).map(c=>parseInt(c.dataset.idx));
    if(!checked.length){ toast('мІҙкёүмқ„ н•ҳлӮҳ мқҙмғҒ м„ нғқн•ҙмЈјм„ёмҡ”','error'); return; }
    checked.forEach(gi=>{
      const g=S.groupBrackets[gi];
      if(!g||!g.matches[0]) return;
      // н•ҙлӢ№ к·ёлЈ№ м°ёк°Җмһҗ мқҙлҰ„ лӘ©лЎқ
      const names=g.slots.map(s=>s.player?.name||'').filter(Boolean);
      // Fisher-Yates м…”н”Ң
      for(let i=names.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [names[i],names[j]]=[names[j],names[i]];
      }
      // matches[0] мҠ¬лЎҜм—җ мҲңм„ңлҢҖлЎң л°°м •
      let idx=0;
      g.matches[0].forEach(m=>{
        if(m.p1){ const sm=m.p1.name.match(/^(\d+лІҲ)/); const sn=sm?sm[1]:m.p1.name; const n=names[idx++]||''; m.p1.name=n?`${sn} (${n})`:sn; }
        if(m.p2&&!m.bye){ const sm=m.p2.name.match(/^(\d+лІҲ)/); const sn=sm?sm[1]:m.p2.name; const n=names[idx++]||''; m.p2.name=n?`${sn} (${n})`:sn; }
      });
    });
    document.getElementById('roster-modal').remove();
    _applyRoster();
    toast(`${checked.length}к°ң мІҙкёү лһңлҚӨ л°°м • мҷ„лЈҢ!`,'success');
  };
}

// в”Җв”Җ к°ңлі„ м§Җм • лӘЁлӢ¬ в”Җв”Җ
function _openManualRosterModal(overlay){
  const modal=document.createElement('div');
  modal.style.cssText='background:var(--bg2);border:1px solid var(--border2);border-radius:12px;width:700px;max-width:95vw;max-height:85vh;display:flex;flex-direction:column;overflow:hidden;';

  // н—ӨлҚ”
  const hdr=document.createElement('div');
  hdr.style.cssText='padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;';
  hdr.innerHTML=`
    <span style="font-size:13px;font-weight:700;">вңҸпёҸ лӘ…лӢЁ м„Өм • вҖ” к°ңлі„ м§Җм •</span>
    <button onclick="document.getElementById('roster-modal').remove()" style="background:transparent;border:none;color:var(--text3);font-size:18px;cursor:pointer;">вң•</button>
  `;
  modal.appendChild(hdr);

  // мІҙкёү нғӯ
  const tabRow=document.createElement('div');
  tabRow.style.cssText='display:flex;flex-wrap:wrap;gap:4px;padding:10px 18px;border-bottom:1px solid var(--border);flex-shrink:0;';
  const body=document.createElement('div');
  body.style.cssText='flex:1;overflow:auto;padding:16px 18px;';

  const renderRosterBody=(gIdx)=>{
    body.innerHTML='';
    const g=S.groupBrackets[gIdx];
    if(!g||!g.matches[0]) return;

    g.matches[0].forEach((m,mi)=>{
      const row=document.createElement('div');
      row.style.cssText='display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);';

      const label=document.createElement('div');
      label.style.cssText='font-size:12px;color:var(--text3);font-family:"Share Tech Mono",monospace;width:60px;flex-shrink:0;';
      label.textContent=`${mi+1}кІҪкё°`;
      row.appendChild(label);

      [0,1].forEach(pi=>{
        if(pi===1&&m.bye) return;
        const pObj=pi===0?m.p1:m.p2;
        if(!pObj) return;

        // мҠ¬лЎҜлІҲнҳё м¶”м¶ң (мҳҲ: "1лІҲ (нҷҚкёёлҸҷ)" вҶ’ "1лІҲ")
        const slotMatch=pObj.name.match(/^(\d+лІҲ)/);
        const slotNum=slotMatch?slotMatch[1]:pObj.name;

        const cell=document.createElement('div');
        cell.style.cssText='display:flex;align-items:center;gap:6px;flex:1;';

        const numLabel=document.createElement('span');
        numLabel.style.cssText='font-size:12px;font-weight:700;color:var(--accent);min-width:36px;';
        numLabel.textContent=slotNum;
        cell.appendChild(numLabel);

        // нҳ„мһ¬ мқҙлҰ„м—җм„ң кҙ„нҳё м•Ҳ мқҙлҰ„ м¶”м¶ң
        const nameMatch=pObj.name.match(/\((.+)\)/);
        const curName=nameMatch?nameMatch[1]:'';

        const inp=document.createElement('input');
        inp.type='text';
        inp.value=curName;
        inp.placeholder='мқҙлҰ„ мһ…л Ҙ';
        inp.style.cssText='flex:1;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:5px 8px;font-size:12px;font-family:"Noto Sans KR",sans-serif;';
        inp.oninput=()=>{
          const newName=inp.value.trim();
          const slotNumOnly=slotNum; // "NлІҲ"
          pObj.name=newName?`${slotNumOnly} (${newName})`:slotNumOnly;
        };
        cell.appendChild(inp);

        if(pi===0&&!m.bye){
          const vs=document.createElement('span');
          vs.style.cssText='font-size:11px;color:var(--red);font-family:"Bebas Neue",cursive;padding:0 4px;';
          vs.textContent='VS';
          row.appendChild(cell);
          row.appendChild(vs);
        } else {
          row.appendChild(cell);
        }
      });

      if(m.bye){
        const byeBadge=document.createElement('span');
        byeBadge.style.cssText='font-size:10px;color:var(--accent);';
        byeBadge.textContent='BYE';
        row.appendChild(byeBadge);
      }
      body.appendChild(row);
    });
  };

  // нғӯ лІ„нҠј мғқм„ұ
  let activeGIdx=0;
  S.groupBrackets.forEach((g,i)=>{
    const shortLabel=g.label.split('/').map(s=>s.trim()).join(' В· ');
    const tab=document.createElement('button');
    tab.style.cssText=`padding:3px 10px;border-radius:5px;border:1px solid ${i===0?'var(--accent)':'var(--border2)'};background:${i===0?'rgba(76,201,240,.15)':'transparent'};color:${i===0?'var(--accent)':'var(--text3)'};font-size:10px;cursor:pointer;`;
    tab.textContent=shortLabel;
    tab.onclick=()=>{
      tabRow.querySelectorAll('button').forEach(b=>{ b.style.borderColor='var(--border2)'; b.style.background='transparent'; b.style.color='var(--text3)'; });
      tab.style.borderColor='var(--accent)'; tab.style.background='rgba(76,201,240,.15)'; tab.style.color='var(--accent)';
      activeGIdx=i;
      renderRosterBody(i);
    };
    tabRow.appendChild(tab);
  });

  modal.appendChild(tabRow);
  modal.appendChild(body);

  // н•ҳлӢЁ лІ„нҠј
  const footer=document.createElement('div');
  footer.style.cssText='padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0;';
  footer.innerHTML=`
    <button onclick="document.getElementById('roster-modal').remove()" style="padding:6px 16px;background:var(--card);border:1px solid var(--border);color:var(--text2);border-radius:7px;font-size:12px;cursor:pointer;">м·ЁмҶҢ</button>
    <button onclick="_applyRoster()" style="padding:6px 18px;background:var(--red);border:none;color:#fff;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;">вң… м Ғмҡ©</button>
  `;
  modal.appendChild(footer);

  overlay.appendChild(modal);
  renderRosterBody(0);
}

function _applyRoster(){
  const modal=document.getElementById('roster-modal');
  if(modal) modal.remove();
  _renderPdfPreview(_getSelectedGroups());
  toast('лӘ…лӢЁмқҙ м Ғмҡ©лҗҗм–ҙмҡ”!','success');
}

// в”Җв”Җ кіөнҶө к·ёлЈ№ м„ нғқ лӘЁлӢ¬ (мқҙлҰ„мӮӯм ң / лһңлҚӨм„һкё° кіөмҡ©) в”Җв”Җ
function _openGroupSelectModal(title, actionLabel, onExec){
  const overlay=document.createElement('div');
  overlay.id='group-action-modal';
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:9000;';

  const modal=document.createElement('div');
  modal.style.cssText='background:var(--bg2);border:1px solid var(--border2);border-radius:14px;width:400px;max-width:95vw;padding:24px 24px 20px;display:flex;flex-direction:column;gap:14px;';

  // н—ӨлҚ”
  const hdr=document.createElement('div');
  hdr.style.cssText='font-size:14px;font-weight:700;';
  hdr.textContent=title;
  modal.appendChild(hdr);

  // м „мІҙ / к·ёлЈ№лі„ м„ нғқ лІ„нҠј
  let mode='all'; // 'all' | 'group'
  const modeRow=document.createElement('div');
  modeRow.style.cssText='display:flex;gap:8px;';

  const mkModeBtn=(label, val)=>{
    const btn=document.createElement('button');
    btn.textContent=label;
    btn.style.cssText=`flex:1;padding:10px 0;border-radius:8px;border:1px solid ${val==='all'?'var(--accent)':'var(--border2)'};background:${val==='all'?'rgba(76,201,240,.12)':'transparent'};color:${val==='all'?'var(--accent)':'var(--text3)'};font-size:12px;font-weight:700;cursor:pointer;`;
    btn.onclick=()=>{
      mode=val;
      modeRow.querySelectorAll('button').forEach(b=>{b.style.borderColor='var(--border2)';b.style.background='transparent';b.style.color='var(--text3)';});
      btn.style.borderColor='var(--accent)';btn.style.background='rgba(76,201,240,.12)';btn.style.color='var(--accent)';
      groupList.style.display=val==='group'?'flex':'none';
    };
    return btn;
  };
  const btnAll=mkModeBtn('м „мІҙ',   'all');
  const btnGrp=mkModeBtn('к·ёлЈ№лі„ м„ нғқ','group');
  btnAll.style.borderColor='var(--accent)';btnAll.style.background='rgba(76,201,240,.12)';btnAll.style.color='var(--accent)';
  modeRow.appendChild(btnAll);
  modeRow.appendChild(btnGrp);
  modal.appendChild(modeRow);

  // к·ёлЈ№ мІҙнҒ¬л°•мҠӨ лӘ©лЎқ (кё°ліё мҲЁк№Җ)
  const groupList=document.createElement('div');
  groupList.style.cssText='display:none;flex-direction:column;gap:5px;max-height:240px;overflow-y:auto;';
  S.groupBrackets.forEach((g,i)=>{
    const lbl=document.createElement('label');
    lbl.style.cssText='display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;border:1px solid var(--border);background:var(--card);cursor:pointer;';
    const chk=document.createElement('input');
    chk.type='checkbox'; chk.dataset.idx=i; chk.checked=true;
    chk.style.cssText='accent-color:var(--accent);width:14px;height:14px;';
    const span=document.createElement('span');
    span.style.cssText='font-size:12px;';
    span.textContent=g.label.split('/').map(s=>s.trim()).join(' В· ');
    const cnt=document.createElement('span');
    cnt.style.cssText='font-size:10px;color:var(--text3);margin-left:auto;';
    cnt.textContent=g.slots.length+'лӘ…';
    lbl.appendChild(chk); lbl.appendChild(span); lbl.appendChild(cnt);
    groupList.appendChild(lbl);
  });
  modal.appendChild(groupList);

  // н•ҳлӢЁ лІ„нҠј
  const footer=document.createElement('div');
  footer.style.cssText='display:flex;gap:8px;justify-content:flex-end;';
  const cancelBtn=document.createElement('button');
  cancelBtn.textContent='м·ЁмҶҢ';
  cancelBtn.style.cssText='padding:6px 16px;background:var(--card);border:1px solid var(--border);color:var(--text2);border-radius:7px;font-size:12px;cursor:pointer;';
  cancelBtn.onclick=()=>overlay.remove();
  const execBtn=document.createElement('button');
  execBtn.textContent=actionLabel;
  execBtn.style.cssText='padding:6px 20px;background:var(--red);border:none;color:#fff;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;';
  execBtn.onclick=()=>{
    let idxs;
    if(mode==='all'){
      idxs=S.groupBrackets.map((_,i)=>i);
    } else {
      idxs=[...groupList.querySelectorAll('input[type=checkbox]')].filter(c=>c.checked).map(c=>parseInt(c.dataset.idx));
      if(!idxs.length){ toast('к·ёлЈ№мқ„ н•ҳлӮҳ мқҙмғҒ м„ нғқн•ҙмЈјм„ёмҡ”','error'); return; }
    }
    overlay.remove();
    onExec(idxs);
  };
  footer.appendChild(cancelBtn);
  footer.appendChild(execBtn);
  modal.appendChild(footer);

  overlay.appendChild(modal);
  document.body.appendChild(overlay);
}

// в”Җв”Җ мқҙлҰ„ мӮӯм ң в”Җв”Җ
function openDeleteNamesModal(){
  _openGroupSelectModal('рҹ—‘ мқҙлҰ„ мӮӯм ң', 'мӮӯм ң мӢӨн–ү', (idxs)=>{
    idxs.forEach(gi=>{
      const g=S.groupBrackets[gi];
      if(!g) return;
      g.matches.forEach(round=>round.forEach(m=>{
        if(m.p1) m.p1.name=m.p1.name.replace(/\s*\(.+\)/,'');
        if(m.p2) m.p2.name=m.p2.name.replace(/\s*\(.+\)/,'');
      }));
    });
    _renderPdfPreview(_getSelectedGroups());
    toast('мқҙлҰ„мқ„ мӮӯм ңн–Ҳм–ҙмҡ”','success');
  });
}

// в”Җв”Җ лһңлҚӨ м„һкё° в”Җв”Җ
function openShuffleNamesModal(){
  // 1лӢЁкі„: м• лӢҲл©”мқҙм…ҳ мҠӨнғҖмқј м„ нғқ
  const overlay=document.createElement('div');

    <div style="font-size:11px;color:var(--text3);text-align:center;">м• лӢҲл©”мқҙм…ҳ мҠӨнғҖмқјмқ„ м„ нғқн•ҙмЈјм„ёмҡ”</div>
    <div style="display:flex;gap:12px;justify-content:center;">
      <button id="anim-lotto" style="display:flex;flex-direction:column;align-items:center;gap:8px;padding:20px 24px;border-radius:12px;border:1px solid var(--border2);background:var(--card);color:var(--text);cursor:pointer;transition:all .15s;font-family:'Noto Sans KR',sans-serif;"
        onmouseover="this.style.borderColor='var(--accent)';this.style.background='rgba(76,201,240,.08)'"
        onmouseout="this.style.borderColor='var(--border2)';this.style.background='var(--card)'">
        <span style="font-size:36px;">рҹҺұ</span>
        <span style="font-size:12px;font-weight:700;">лЎңлҳҗ кё°кі„</span>
        <span style="font-size:10px;color:var(--text3);">кіөмқҙ м„һмқҙлҠ” лӘЁмҠө</span>
      </button>
      <button id="anim-dart" style="display:flex;flex-direction:column;align-items:center;gap:8px;padding:20px 24px;border-radius:12px;border:1px solid var(--border2);background:var(--card);color:var(--text);cursor:pointer;transition:all .15s;font-family:'Noto Sans KR',sans-serif;"
        onmouseover="this.style.borderColor='var(--yellow)';this.style.background='rgba(255,214,10,.08)'"
        onmouseout="this.style.borderColor='var(--border2)';this.style.background='var(--card)'">
        <span style="font-size:36px;">рҹҺҜ</span>
        <span style="font-size:12px;font-weight:700;">лӢӨнҠёнҢҗ</span>
        <span style="font-size:10px;color:var(--text3);">лЈ°л ӣмқҙ лҸҢм•„к°ҖлҠ” лӘЁмҠө</span>
      </button>
    </div>
    <button onclick="this.closest('div').parentElement.remove()" style="align-self:center;padding:5px 18px;background:transparent;border:1px solid var(--border);color:var(--text3);border-radius:7px;font-size:11px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;">м·ЁмҶҢ</button>
  `;

  overlay.appendChild(modal);
  document.body.appendChild(overlay);

  const goNext=(animType)=>{
    overlay.remove();
    // 2лӢЁкі„: к·ёлЈ№ м„ нғқ
    _openGroupSelectModal('рҹ”Җ лһңлҚӨ м„һкё° вҖ” лІ”мң„ м„ нғқ', 'м„һкё° мӢӨн–ү', (idxs)=>{
      // 3лӢЁкі„: мқҙлҰ„ м¶”м¶ң & м…”н”Ң
      const allNames=[];
      idxs.forEach(gi=>{
        const g=S.groupBrackets[gi];
        if(!g||!g.matches[0]) return;
        g.matches[0].forEach(m=>{
          if(m.p1){ const nm=m.p1.name.match(/\((.+)\)/); if(nm) allNames.push(nm[1]); }
          if(m.p2&&!m.bye){ const nm=m.p2.name.match(/\((.+)\)/); if(nm) allNames.push(nm[1]); }
        });
      });
      if(!allNames.length){ toast('л°°м •лҗң мқҙлҰ„мқҙ м—Ҷм–ҙмҡ”','info'); return; }

      // 4лӢЁкі„: м• лӢҲл©”мқҙм…ҳ вҶ’ мҷ„лЈҢ нӣ„ мӢӨм ң м„һкё° м Ғмҡ©
      _showShuffleAnimation(animType, allNames, ()=>{
        idxs.forEach(gi=>{
          const g=S.groupBrackets[gi];
          if(!g||!g.matches[0]) return;
          const names=[];
          g.matches[0].forEach(m=>{
            if(m.p1){ const nm=m.p1.name.match(/\((.+)\)/); if(nm) names.push(nm[1]); }
            if(m.p2&&!m.bye){ const nm=m.p2.name.match(/\((.+)\)/); if(nm) names.push(nm[1]); }
          });
          for(let i=names.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [names[i],names[j]]=[names[j],names[i]]; }
          let idx=0;
          g.matches[0].forEach(m=>{
            if(m.p1){ const sn=m.p1.name.replace(/\s*\(.+\)/,''); const n=names[idx++]||''; m.p1.name=n?`${sn} (${n})`:sn; }
            if(m.p2&&!m.bye){ const sn=m.p2.name.replace(/\s*\(.+\)/,''); const n=names[idx++]||''; m.p2.name=n?`${sn} (${n})`:sn; }
          });
        });
        _renderPdfPreview(_getSelectedGroups());
        toast('лһңлҚӨмңјлЎң м„һм—Ҳм–ҙмҡ” рҹҺү','success');
      });
    });
  };

  document.getElementById('anim-lotto').onclick=()=>goNext('lotto');
  document.getElementById('anim-dart').onclick=()=>goNext('dart');
}

// в”Җв”Җ м…”н”Ң м• лӢҲл©”мқҙм…ҳ в”Җв”Җ
function _showShuffleAnimation(type, names, onDone){
  const ov=document.createElement('div');
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;z-index:9500;flex-direction:column;gap:0;';
  document.body.appendChild(ov);

  if(type==='lotto'){
    // лЎңлҳҗ кё°кі„ вҖ” мә”лІ„мҠӨм—җм„ң кіөл“Өмқҙ нҠҖм–ҙлӢӨлӢҲлӢӨк°Җ л©Ҳм¶Ө
    ov.innerHTML=`
      <div style="font-size:13px;color:var(--accent);font-family:'Share Tech Mono',monospace;letter-spacing:2px;margin-bottom:16px;">// SHUFFLING...</div>
      <div style="position:relative;width:320px;height:280px;border-radius:50% 50% 40% 40%;border:3px solid var(--accent);background:radial-gradient(ellipse at 50% 30%,#0d1a2a,#050a10);overflow:hidden;box-shadow:0 0 40px rgba(76,201,240,.3),inset 0 0 60px rgba(0,0,0,.8);">
        <canvas id="lotto-canvas" width="320" height="280" style="position:absolute;inset:0;"></canvas>
        <div style="position:absolute;bottom:0;left:0;right:0;height:60px;background:linear-gradient(to top,#050a10,transparent);"></div>
      </div>
      <div id="shuffle-done-msg" style="margin-top:20px;font-size:0px;color:var(--green);font-weight:700;font-family:'Bebas Neue',cursive;letter-spacing:4px;transition:font-size .4s ease;"></div>
    `;
    document.body.appendChild(ov);

    const canvas=document.getElementById('lotto-canvas');
    const ctx=canvas.getContext('2d');
    const W=320, H=280;
    const colors=['#e63946','#4cc9f0','#ffd60a','#06d6a0','#ff6b6b','#a855f7','#f97316','#22d3ee'];
    const balls=names.slice(0,Math.min(names.length,12)).map((name,i)=>({
      x:60+Math.random()*200, y:60+Math.random()*160,
      vx:(Math.random()-0.5)*6, vy:(Math.random()-0.5)*6,
      r:22, color:colors[i%colors.length], name:name.slice(0,4),
    }));

    let frame=0; let animId;
    ov.addEventListener('click',()=>{ cancelAnimationFrame(animId); ov.remove(); },{ once:true });
    const animate=()=>{
      ctx.clearRect(0,0,W,H);
      balls.forEach(b=>{
        b.x+=b.vx; b.y+=b.vy;
        // нғҖмӣҗнҳ• кІҪкі„ л°ҳмӮ¬
        const cx=W/2, cy=H/2, rx=W/2-b.r-4, ry=H/2-b.r-8;
        const dx=(b.x-cx)/rx, dy=(b.y-cy)/ry;
        if(dx*dx+dy*dy>1){
          b.vx*=-0.95; b.vy*=-0.95;
          b.x=cx+Math.cos(Math.atan2(b.y-cy,b.x-cx))*rx;
          b.y=cy+Math.sin(Math.atan2(b.y-cy,b.x-cx))*ry;
        }
        // кіөлҒјлҰ¬ м¶©лҸҢ
        balls.forEach(b2=>{
          if(b===b2) return;
          const ddx=b.x-b2.x, ddy=b.y-b2.y, dist=Math.sqrt(ddx*ddx+ddy*ddy);
          if(dist<b.r+b2.r&&dist>0){
            const nx=ddx/dist, ny=ddy/dist;
            b.vx+=nx*0.5; b.vy+=ny*0.5; b2.vx-=nx*0.5; b2.vy-=ny*0.5;
          }
        });
        // мҶҚлҸ„ м ңн•ң
        const spd=Math.sqrt(b.vx*b.vx+b.vy*b.vy);
        if(spd>7){b.vx=b.vx/spd*7;b.vy=b.vy/spd*7;}
        // к·ёлҰ¬кё°
        const grad=ctx.createRadialGradient(b.x-6,b.y-6,2,b.x,b.y,b.r);
        grad.addColorStop(0,'rgba(255,255,255,.35)');
        grad.addColorStop(1,b.color);
        ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
        ctx.fillStyle=grad; ctx.fill();
        ctx.strokeStyle='rgba(255,255,255,.15)'; ctx.lineWidth=1.5; ctx.stroke();
        ctx.fillStyle='#fff'; ctx.font='bold 9px "Noto Sans KR"';
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(b.name,b.x,b.y);
      });
      frame++;
      if(frame<150) animId=requestAnimationFrame(animate);
      else{
        // л©Ҳм¶”кі  мҷ„лЈҢ н‘ңмӢң
        const msg=document.getElementById('shuffle-done-msg');
        if(msg){ msg.textContent='мҷ„лЈҢ!'; msg.style.fontSize='48px'; }
        setTimeout(()=>{ ov.remove(); onDone(); }, 900);
      }
    };
    animate();

  } else {
    // лӢӨнҠёнҢҗ лЈ°л ӣ
    ov.innerHTML=`
      <div style="font-size:13px;color:var(--yellow);font-family:'Share Tech Mono',monospace;letter-spacing:2px;margin-bottom:16px;">// SPINNING...</div>
      <div style="position:relative;width:300px;height:300px;">
        <canvas id="dart-canvas" width="300" height="300"></canvas>
        <div id="dart-arrow" style="position:absolute;top:-12px;left:50%;transform:translateX(-50%);font-size:28px;filter:drop-shadow(0 2px 6px rgba(0,0,0,.8));">в–ј</div>
      </div>
      <div id="shuffle-done-msg" style="margin-top:20px;font-size:0px;color:var(--green);font-weight:700;font-family:'Bebas Neue',cursive;letter-spacing:4px;transition:font-size .5s ease;"></div>
    `;
    document.body.appendChild(ov);

    const canvas=document.getElementById('dart-canvas');
    const ctx=canvas.getContext('2d');
    const cx=150, cy=150, r=138;
    const slices=Math.min(names.length,16);
    const colors2=['#e63946','#4cc9f0','#ffd60a','#06d6a0','#ff6b6b','#a855f7','#f97316','#22d3ee',
                   '#e63946','#4cc9f0','#ffd60a','#06d6a0','#ff6b6b','#a855f7','#f97316','#22d3ee'];
    const sliceAngle=(Math.PI*2)/slices;

    let angle=0;
    // л№ лҘҙкІҢ мӢңмһ‘н•ҙм„ң м җм җ лҠҗл Өм§ҖлҠ” мҶҚлҸ„
    let speed=0.35;
    const totalRot=Math.PI*2*6+Math.random()*Math.PI*2; // 6л°”нҖҙ+лһңлҚӨ
    let rotated=0; let animId2;
    ov.addEventListener('click',()=>{ cancelAnimationFrame(animId2); ov.remove(); },{ once:true });

    const drawWheel=(ang)=>{
      ctx.clearRect(0,0,300,300);
      for(let i=0;i<slices;i++){
        const start=ang+i*sliceAngle, end=start+sliceAngle;
        ctx.beginPath(); ctx.moveTo(cx,cy);
        ctx.arc(cx,cy,r,start,end);
        ctx.fillStyle=colors2[i%colors2.length]; ctx.fill();
        ctx.strokeStyle='rgba(0,0,0,.4)'; ctx.lineWidth=1.5; ctx.stroke();
        // мқҙлҰ„
        ctx.save();
        ctx.translate(cx,cy);
        ctx.rotate(ang+i*sliceAngle+sliceAngle/2);
        ctx.textAlign='right'; ctx.fillStyle='#fff';
        ctx.font='bold 11px "Noto Sans KR"';
        ctx.shadowColor='rgba(0,0,0,.8)'; ctx.shadowBlur=3;
        ctx.fillText(names[i%names.length].slice(0,5), r-8, 4);
        ctx.restore();
      }
      // мӨ‘м•ҷ мӣҗ
      ctx.beginPath(); ctx.arc(cx,cy,18,0,Math.PI*2);
      ctx.fillStyle='#0d0d1a'; ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,.2)'; ctx.lineWidth=2; ctx.stroke();
    };

    const spin=()=>{
      const decel=rotated/totalRot;
      speed=Math.max(0.008, 0.35*(1-decel*decel));
      angle+=speed; rotated+=speed;
      drawWheel(angle);
      if(rotated<totalRot) animId2=requestAnimationFrame(spin);
      else{
        drawWheel(angle);
        const msg=document.getElementById('shuffle-done-msg');
        if(msg){ msg.textContent='мҷ„лЈҢ!'; msg.style.fontSize='48px'; }
        setTimeout(()=>{ ov.remove(); onDone(); }, 900);
      }
    };
    drawWheel(0);
    spin();
  }
}


function _renderPdfPreview(groups){
  const preview=document.getElementById('pdf-preview');
  if(!preview) return;
  preview.innerHTML='';
  if(!groups||!groups.length){
    preview.innerHTML='<div style="text-align:center;padding:48px 0;color:var(--text3);font-size:13px;">мң„м—җм„ң м¶ңл Ҙн•  мІҙкёүмқ„ м„ нғқн•ҳл©ҙ лҜёлҰ¬ліҙкё°к°Җ н‘ңмӢңлҗ©лӢҲлӢӨ</div>';
    return;
  }

  const saved=S.matches;
  const _applyOverflow=(el)=>{
    el.querySelectorAll('*').forEach(child=>{
      child.style.overflow='visible';
      child.style.overflowX='visible';
      child.style.overflowY='visible';
    });
    el.querySelectorAll('svg').forEach(s=>{
      s.setAttribute('overflow','visible');
      s.style.overflow='visible';
    });
  };

  if(_bracketLayout==='D' && (_courtCount||1)>=2){
    // Dнҳ•: н–ү(row) лӢЁмң„ л ҢлҚ”л§Ғ вҖ” мІҙкёү мҲңм„ңлҢҖлЎң мҷјмӘҪ/мҳӨлҘёмӘҪмқ„ к°ҷмқҖ н–үм—җ л°°м№ҳ
    const outerWrap=document.createElement('div');
    outerWrap.style.cssText='display:flex;flex-direction:column;gap:0;overflow:visible;';

    const mkLabel=(txt,align)=>{
      const d=document.createElement('div');
      d.style.cssText=`font-size:10px;color:var(--accent);font-family:"Share Tech Mono",monospace;letter-spacing:2px;margin-bottom:10px;text-align:${align};`;
      d.textContent=txt; return d;
    };

    // н—ӨлҚ” н–ү
    const hdrRow=document.createElement('div');
    hdrRow.style.cssText='display:flex;flex-direction:row;gap:0;margin-bottom:6px;overflow:visible;';
    const hdrL=document.createElement('div');
    hdrL.style.cssText='padding-right:24px;flex-shrink:0;';
    hdrL.appendChild(mkLabel('// кІҪкё°мһҘ 1','left'));
    const hdrSp=document.createElement('div');
    hdrSp.style.cssText='flex:1;min-width:24px;';
    const hdrR=document.createElement('div');
    hdrR.style.cssText='padding-left:24px;flex-shrink:0;display:flex;justify-content:flex-end;';

    const lGroups=groups.filter(g=>g.court===1);
    const rGroups=groups.filter(g=>g.court===2);

    /* кІҪкё°мһҘ 2м—җ л°°м •лҗң к·ёлЈ№мқҙ мһҲмқ„ л•Ңл§Ң н—ӨлҚ” н‘ңмӢң */
    if(rGroups.length) hdrR.appendChild(mkLabel('// кІҪкё°мһҘ 2','right'));
    hdrRow.appendChild(hdrL); hdrRow.appendChild(hdrSp); hdrRow.appendChild(hdrR);
    outerWrap.appendChild(hdrRow);

    const rowCount=Math.max(lGroups.length, rGroups.length);

    const mkPdfSection=(g, reversed)=>{
      const shortLabel=g.label.split('/').map(s=>s.trim()).join(' В· ');
      const sec=document.createElement('div');
      sec.style.cssText='display:flex;flex-direction:column;flex-shrink:0;min-width:max-content;overflow:visible;';
      const hdr=document.createElement('div');
      hdr.style.cssText='font-size:9px;color:#555;font-family:"Share Tech Mono",monospace;letter-spacing:1px;margin-bottom:4px;margin-top:8px;flex-shrink:0;white-space:nowrap;';
      hdr.textContent=shortLabel;
      sec.appendChild(hdr);
      const gWrap=document.createElement('div');
      gWrap.style.cssText='min-width:max-content;overflow:visible;';
      const taggedMatches=g.matches.map((round,ri)=>round.map((m,mi)=>({...m,_groupObj:g,_origMi:mi,_origRi:ri,_groupLabel:shortLabel})));
      S.matches=taggedMatches;
      _renderBracketHTML(gWrap, taggedMatches, 'top', reversed);
      _applyOverflow(gWrap);
      sec.appendChild(gWrap);
      return sec;
    };

    for(let i=0;i<rowCount;i++){
      const row=document.createElement('div');
      row.style.cssText='display:flex;flex-direction:row;align-items:stretch;gap:0;margin-bottom:20px;overflow:visible;';

      const cellL=document.createElement('div');
      cellL.style.cssText='padding-right:24px;flex-shrink:0;min-width:max-content;overflow:visible;';
      if(lGroups[i]) cellL.appendChild(mkPdfSection(lGroups[i], false));
      row.appendChild(cellL);

      const sp=document.createElement('div');
      sp.style.cssText='flex:1;min-width:24px;';
      row.appendChild(sp);

      const cellR=document.createElement('div');
      cellR.style.cssText='padding-left:24px;flex-shrink:0;min-width:max-content;overflow:visible;display:flex;flex-direction:column;align-items:flex-end;';
      if(rGroups[i]) cellR.appendChild(mkPdfSection(rGroups[i], true));
      row.appendChild(cellR);

      outerWrap.appendChild(row);
    }

    preview.appendChild(outerWrap);
  } else {
    // A/B/C/Eнҳ•: к·ёлЈ№лі„ м„ёлЎң л°°м№ҳ
    const outerWrap=document.createElement('div');
    outerWrap.style.cssText='overflow:visible;';
    groups.forEach((g,gi)=>{
      const shortLabel=g.label.split('/').map(s=>s.trim()).join(' В· ');
      const section=document.createElement('div');
      section.style.cssText=`margin-bottom:24px;padding-bottom:24px;overflow:visible;${gi<groups.length-1?'border-bottom:1px solid var(--border);':''}`;
      const title=document.createElement('div');
      title.style.cssText='font-size:10px;color:#555;font-family:"Share Tech Mono",monospace;letter-spacing:1px;margin-bottom:6px;';
      title.textContent=shortLabel;
      section.appendChild(title);
      const bracketWrap=document.createElement('div');
      bracketWrap.style.cssText='overflow:visible;';
      const taggedMatches=g.matches.map((round,ri)=>round.map((m,mi)=>({...m,_groupObj:g,_origMi:mi,_origRi:ri,_groupLabel:shortLabel})));
      S.matches=taggedMatches;
      const fns={A:renderBracketA,B:renderBracketB,C:renderBracketC,E:renderBracketE};
      (fns[_bracketLayout]||renderBracketA)(bracketWrap);
      _applyOverflow(bracketWrap);
      section.appendChild(bracketWrap);
      outerWrap.appendChild(section);
    });
    preview.appendChild(outerWrap);
  }
  S.matches=saved;
}

// в”Җв”Җ м „мІҙ PDF: лҜёлҰ¬ліҙкё° м°Ҫ м§Ғм ‘ м—ҙкё° (step3 нҷ”л©ҙкіј лҸҷмқј) в”Җв”Җ

// в”Җв”Җ м„ нғқ PDF в”Җв”Җ
function printSelected(){
  const sel=_getSelectedGroups();
  if(!sel.length){ toast('мІҙкёүмқ„ н•ҳлӮҳ мқҙмғҒ м„ нғқн•ҙмЈјм„ёмҡ”','error'); return; }
  if(!S.groupBrackets?.length){ toast('лҢҖм§„н‘ңлҘј лЁјм Җ л§Ңл“Өм–ҙмЈјм„ёмҡ”','error'); return; }

  const win=window.open('','_blank','width=1200,height=900');
  if(!win){ toast('нҢқм—…мқҙ м°ЁлӢЁлҗҳм—ҲмҠөлӢҲлӢӨ. нҢқм—… н—Ҳмҡ© нӣ„ лӢӨмӢң мӢңлҸ„н•ҙмЈјм„ёмҡ”','error'); return; }

  /* нҢқм—…мқҳ toggleNamesк°Җ м „мІҙ к·ёлЈ№ лҢҖмӢ  м„ нғқ к·ёлЈ№л§Ң мһ¬л ҢлҚ”н•ҳлҸ„лЎқ м ҖмһҘ */
  window._popupSelectedGroups = sel;

  /* _renderPdfPreviewлҠ” #pdf-previewм—җл§Ң л ҢлҚ”н•ҳлҜҖлЎң,
     мһ„мӢң мҡ”мҶҢм—җ pdf-preview IDлҘј лӢ¬м•„ м„ нғқ к·ёлЈ№л§Ң л ҢлҚ”л§Ғ нӣ„ мӣҗмғҒліөкө¬ */
  const realPreview=document.getElementById('pdf-preview');
  const tempPreview=document.createElement('div');
  tempPreview.id='pdf-preview';
  tempPreview.style.cssText='position:fixed;left:-9999px;top:0;visibility:hidden;width:1200px;';
  document.body.appendChild(tempPreview);
  if(realPreview) realPreview.id='pdf-preview-bak';

  _renderPdfPreview(sel);  /* tempPreviewм—җ м„ нғқ к·ёлЈ№л§Ң л ҢлҚ” (кІҪкё°мһҘ л Ҳмқҙм•„мӣғ нҸ¬н•Ё) */

  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    tempPreview.querySelectorAll('*').forEach(el=>{
      el.style.overflow='visible';el.style.overflowX='visible';el.style.overflowY='visible';
    });
    tempPreview.querySelectorAll('svg').forEach(s=>{
      s.setAttribute('overflow','visible');s.style.overflow='visible';
    });
    const rawHTML=tempPreview.innerHTML;

    /* ID ліөмӣҗ */
    tempPreview.remove();
    if(realPreview) realPreview.id='pdf-preview';

    _writeFullPreviewWin(win, rawHTML, 'м„ нғқ лҢҖм§„н‘ң лҜёлҰ¬ліҙкё°');
    win.addEventListener('beforeunload', ()=>{ window._popupSelectedGroups=null; });
  }));
}

// в”Җв”Җ м „мІҙ PDF лҜёлҰ¬ліҙкё° м°Ҫ в”Җв”Җ
// step4 м „мІҙліҙкё°(pdf-preview, лӘЁл“  к·ёлЈ№)мҷҖ лҸҷмқјн•ҳкІҢ ліҙм—¬мӨҢ
function _openFullPreviewWindow(){
  if(!S.groupBrackets?.length){
    toast('лҢҖм§„н‘ңлҘј лЁјм Җ л§Ңл“Өм–ҙмЈјм„ёмҡ”','error'); return;
  }

  // мқҙлҰ„ нҸ¬н•Ё мғҒнғңлЎң м „мІҙ л ҢлҚ”
  const savedHide=window._hideNames;
  window._hideNames=false;
  _renderPdfPreview(S.groupBrackets);
  window._hideNames=savedHide;

  // pdf-preview ліөмӮ¬ + overflow к°•м ң(м—°кІ°м„  н‘ңмӢңмҡ©)
  // requestAnimationFrame 2нҡҢ лҢҖкё° вҶ’ м—°кІ°м„  SVG л ҢлҚ” мҷ„лЈҢ нӣ„ ліөмӮ¬
  const win=window.open('','_blank','width=1200,height=900');
  if(!win){ toast('нҢқм—…мқҙ м°ЁлӢЁлҗҳм—ҲмҠөлӢҲлӢӨ. нҢқм—… н—Ҳмҡ© нӣ„ лӢӨмӢң мӢңлҸ„н•ҙмЈјм„ёмҡ”','error'); return; }

  // м—°кІ°м„  SVGлҠ” rAF 2нҡҢ нӣ„ мғқм„ұлҗҳлҜҖлЎң лҢҖкё°
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    const previewEl=document.getElementById('pdf-preview');
    if(!previewEl){ toast('лҜёлҰ¬ліҙкё° мғқм„ұ мӢӨнҢЁ','error'); win.close(); return; }
    const clone=previewEl.cloneNode(true);
    clone.querySelectorAll('*').forEach(el=>{
      el.style.overflow='visible';
      el.style.overflowX='visible';
      el.style.overflowY='visible';
    });
    clone.querySelectorAll('svg').forEach(s=>{
      s.setAttribute('overflow','visible');
      s.style.overflow='visible';
    });
    const rawHTML=clone.innerHTML;
    _writeFullPreviewWin(win, rawHTML);
  }));
}

    <b style="color:#4cc9f0;">мҡ©м§Җ л°©н–Ҙ</b> вҖ” м„ёлЎң/к°ҖлЎң м„ нғқ<br>
    <b style="color:#4cc9f0;">к°ҖлЎң NмһҘ Г— м„ёлЎң NмһҘ</b> вҖ” м¶ңл Ҙн•  мҡ©м§Җ мҲҳ м„Өм •<br>
    <b style="color:#4cc9f0;">мўҢмҡ°л§һм¶”кё°</b> вҖ” л№„мңЁ мң м§Җн•ҳл©ҙм„ң м„Өм •н•ң к°ҖлЎң мҡ©м§Җ мҙқ л„Ҳл№„м—җ л§һкІҢ лҢҖм§„н‘ңлҘј м¶•мҶҢ/нҷ•лҢҖ. лӮЁкұ°лӮҳ л„ҳм№ҳлҠ” м„ёлЎңлҘј ліҙкі  м„ёлЎң мһҘ мҲҳлҘј мЎ°м Ҳн•ҳм„ёмҡ”.<br>
    <b style="color:#4cc9f0;">мң„м•„лһҳл§һм¶”кё°</b> вҖ” л№„мңЁ мң м§Җн•ҳл©ҙм„ң м„Өм •н•ң м„ёлЎң мҡ©м§Җ мҙқ лҶ’мқҙм—җ л§һкІҢ м¶•мҶҢ/нҷ•лҢҖ. лӮЁкұ°лӮҳ л„ҳм№ҳлҠ” к°ҖлЎңлҘј ліҙкі  к°ҖлЎң мһҘ мҲҳлҘј мЎ°м Ҳн•ҳм„ёмҡ”.<br>

    <b style="color:#4cc9f0;">л‘ҳ лӢӨ мІҙнҒ¬</b> вҖ” к°ҖлЎң/м„ёлЎң лӘЁл‘җ л”ұ л§һкІҢ (л№„мңЁ ліҖкІҪлҗ  мҲҳ мһҲмқҢ)<br>

</div>
<script>
function toggleNames(){
  const btn=document.getElementById('btn-hide-names');
  const hiding=btn.textContent.indexOf('к°ҖлҰ¬кё°')!==-1;
  btn.textContent=hiding?'рҹ‘Ғ мқҙлҰ„ ліҙмқҙкё°':'рҹ‘Ғ мқҙлҰ„ к°ҖлҰ¬кё°';
  btn.classList.toggle('active',hiding);
  const p=window.opener;
  const savedHide=p.window._hideNames;
  p.window._hideNames=hiding;
  /* м„ нғқ PDF нҢқм—…мқҙл©ҙ м„ нғқлҗң к·ёлЈ№л§Ң, м „мІҙмқҙл©ҙ м „мІҙ к·ёлЈ№ мһ¬л ҢлҚ” */
  const groups=p.window._popupSelectedGroups || p.S.groupBrackets;
  p._renderPdfPreview(groups);
  p.requestAnimationFrame(()=>p.requestAnimationFrame(()=>{
    const src=p.document.getElementById('pdf-preview');
    const dst=document.getElementById('bracket-display');
    if(src&&dst){
      const clone=src.cloneNode(true);
      clone.querySelectorAll('*').forEach(el=>{el.style.overflow='visible';el.style.overflowX='visible';el.style.overflowY='visible';});
      clone.querySelectorAll('svg').forEach(s=>{s.setAttribute('overflow','visible');s.style.overflow='visible';});
      dst.innerHTML=clone.innerHTML;
      if(typeof _renderInfoHeader==='function') _renderInfoHeader();
    }
    p.window._hideNames=savedHide;
    p._renderPdfPreview(p.window._popupSelectedGroups || p.S.groupBrackets);
  }));
}

function toggleWhite(on){
  // лқјл””мҳӨ лІ„нҠјмқҙлҜҖлЎң лі„лҸ„ лқјлІЁ м—…лҚ°мқҙнҠё л¶Ҳн•„мҡ”
  document.body.classList.toggle('white-mode',on);
  if(typeof _renderInfoHeader==='function') _renderInfoHeader();
}

/* в”Җв”Җ @page мһҗлҸҷ л°©н–Ҙ м Ғмҡ© в”Җв”Җ */
function _applyPageCSS(){
  var existing=document.getElementById('_page_rule_style');
  if(existing) existing.remove();
  var st=document.createElement('style');
  st.id='_page_rule_style';
  /* м •нҷ•н•ң mm мҲҳм№ҳлЎң м§Җм • вҖ” лёҢлқјмҡ°м Җлі„ мҡ©м§ҖлӘ… н•ҙм„қ м°Ёмқҙ л°©м§Җ */
  var paper=_getPaperSize();
  var wMM=(paper.w/(96/25.4)).toFixed(2);
  var hMM=(paper.h/(96/25.4)).toFixed(2);
  st.textContent='@page{size:'+wMM+'mm '+hMM+'mm;margin:0;}';
  document.head.appendChild(st);
}

/* в”Җв”Җ A4 нҺҳмқҙм§Җ лӮҳлҲ„кё° к°Җмқҙл“ң в”Җв”Җ */
// A4 = 297mm Г— 210mm. м„ёлЎң м¶ңл Ҙ кё°мӨҖ мқёмҮ„ к°ҖлҠҘ лҶ’мқҙ вү’ 277mm (м—¬л°ұ 20mm)
// CSS 1px = 1/96 мқём№ҳ = 25.4/96 mm вҶ’ 1mm = 96/25.4 px вүҲ 3.7795px
var _guideOn=false;
function togglePageGuide(on){
  _guideOn=on;
  document.querySelectorAll('.page-guide-line').forEach(el=>el.classList.toggle('visible',on));
  if(on && document.querySelectorAll('.page-guide-line').length===0) buildPageGuides();
}

function buildPageGuides(){
  const wrap=document.getElementById('preview-wrap');
  const display=document.getElementById('bracket-display');
  const totalH=display.scrollHeight;
  const PX_PER_MM=96/25.4;
  const A4_H_MM=277; // мқёмҮ„ к°ҖлҠҘ лҶ’мқҙ (м—¬л°ұ м ңмҷё)
  const A4_H_PX=A4_H_MM*PX_PER_MM;
  const pages=Math.ceil(totalH/A4_H_PX);
  // кё°мЎҙ к°Җмқҙл“ң м ңкұ°
  wrap.querySelectorAll('.page-guide-line').forEach(e=>e.remove());
  for(let i=1;i<pages;i++){
    const guide=document.createElement('div');
    guide.className='page-guide-line'+((_guideOn)?' visible':'');
    // preview-wrapмқҳ padding-top(165px) нҸ¬н•Ё
    guide.style.top=(165+i*A4_H_PX)+'px';
    guide.dataset.label='P'+i+' вҶ“  P'+(i+1)+' вҶ‘';
    wrap.appendChild(guide);
  }
  // нҺҳмқҙм§Җ мҲҳ н‘ңмӢң
  const cnt=document.createElement('div');
  cnt.style.cssText='position:fixed;bottom:10px;right:14px;font-size:10px;color:#4cc9f0;font-family:Share Tech Mono,monospace;background:rgba(8,8,15,.8);padding:3px 8px;border-radius:4px;z-index:999;';
  cnt.id='page-count-badge';
  cnt.textContent='мҙқ '+pages+'нҺҳмқҙм§Җ';
  document.body.appendChild(cnt);
}

window.addEventListener('load',function(){
  // PDF/A4 кҙҖл Ё кё°лҠҘмқҖ bracket-viewм—җм„ң мӮ¬мҡ© м•Ҳ н•Ё
});

/* в”Җв”Җ A4 мҡ©м§Җ л°°м№ҳ кІ©мһҗ в”Җв”Җ */
var _a4On=false,_a4Orient='portrait',_a4C=1,_a4R=1,_a4Scale=1,_a4W=0,_a4H=0;
var _zoomLevel=1;

/* мҡ©м§Җ нҒ¬кё° н…Ңмқҙлё” (мқёмҮ„ к°ҖлҠҘ мҳҒм—ӯ, mm кё°мӨҖ вҶ’ px ліҖнҷҳ: 96dpi) */
const _MM=96/25.4;
const _PAPER_SIZES={
  /* A мӢңлҰ¬мҰҲ */
  A0:{w:Math.round(841*_MM),  h:Math.round(1189*_MM)},
  A1:{w:Math.round(594*_MM),  h:Math.round(841*_MM)},
  A2:{w:Math.round(420*_MM),  h:Math.round(594*_MM)},
  A3:{w:Math.round(297*_MM),  h:Math.round(420*_MM)},
  A4:{w:Math.round(210*_MM),  h:Math.round(297*_MM)},
  A5:{w:Math.round(148*_MM),  h:Math.round(210*_MM)},
  /* B мӢңлҰ¬мҰҲ */
  B0:{w:Math.round(1000*_MM), h:Math.round(1414*_MM)},
  B1:{w:Math.round(707*_MM),  h:Math.round(1000*_MM)},
  B2:{w:Math.round(500*_MM),  h:Math.round(707*_MM)},
  B3:{w:Math.round(353*_MM),  h:Math.round(500*_MM)},
  B4:{w:Math.round(250*_MM),  h:Math.round(353*_MM)},
  B5:{w:Math.round(176*_MM),  h:Math.round(250*_MM)},
  /* кё°нғҖ */
  Letter: {w:Math.round(216*_MM), h:Math.round(279*_MM)},
  Legal:  {w:Math.round(216*_MM), h:Math.round(356*_MM)},
  Tabloid:{w:Math.round(279*_MM), h:Math.round(432*_MM)},
  /* нҳ„мҲҳл§ү */
  banner_3x1:{w:Math.round(3000*_MM), h:Math.round(1000*_MM)},
  banner_6x1:{w:Math.round(6000*_MM), h:Math.round(1000*_MM)},
  banner_9x1:{w:Math.round(9000*_MM), h:Math.round(1000*_MM)},
};
var _paperKey='A4'; /* нҳ„мһ¬ м„ нғқлҗң мҡ©м§Җ */

/* нҳ„мһ¬ мҡ©м§Җмқҳ к°ҖлЎң/м„ёлЎң(л°©н–Ҙ м Ғмҡ©) л°ҳнҷҳ */
function _getPaperSize(){
  let s=_PAPER_SIZES[_paperKey];
  if(!s){ /* мӮ¬мҡ©мһҗ м§Җм • */
    const cw=parseFloat(document.getElementById('a4-cw').value)||210;
    const ch=parseFloat(document.getElementById('a4-ch').value)||297;
    s={w:Math.round(cw*_MM), h:Math.round(ch*_MM)};
  }
  return _a4Orient==='portrait'
    ? {w:Math.min(s.w,s.h), h:Math.max(s.w,s.h)}
    : {w:Math.max(s.w,s.h), h:Math.min(s.w,s.h)};
}

/* мҳҲм „ _A4 м°ёмЎ° нҳёнҷҳ (portrait/landscape л°©н–Ҙ м§Ғм ‘ м ‘к·јн•ҳлҠ” кіі лҢҖл№„) */
const _A4={
  get portrait(){ return _getPaperSize(); },
  get landscape(){ return _getPaperSize(); }
};

function _a4PaperChange(){
  const sel=document.getElementById('a4-paper');
  _paperKey=sel?sel.value:'A4';
  const customArea=document.getElementById('a4-custom-area');
  if(customArea) customArea.style.display=(_paperKey==='custom')?'flex':'none';
  if(_a4On) _a4Draw();
}

function _a4Init(){
  document.getElementById('chk-a4').addEventListener('change',function(){ _a4Toggle(this.checked); });
  document.getElementById('a4-cm').addEventListener('click',function(){ if(!_a4On)return; _a4C=Math.max(1,_a4C-1); _a4SyncD(); _a4Draw(); });
  document.getElementById('a4-cp').addEventListener('click',function(){ if(!_a4On)return; _a4C=Math.min(20,_a4C+1); _a4SyncD(); _a4Draw(); });
  document.getElementById('a4-rm').addEventListener('click',function(){ if(!_a4On)return; _a4R=Math.max(1,_a4R-1); _a4SyncD(); _a4Draw(); });
  document.getElementById('a4-rp').addEventListener('click',function(){ if(!_a4On)return; _a4R=Math.min(50,_a4R+1); _a4SyncD(); _a4Draw(); });
  /* м§Ғм ‘ мһ…л Ҙ мқҙлІӨнҠё */
  (function(){
    var colsEl=document.getElementById('a4-cols');
    var rowsEl=document.getElementById('a4-rows');
    function applyColInput(){
      var v=parseInt(colsEl.value,10);
      if(isNaN(v)||v<1) v=1;
      if(v>20) v=20;
      _a4C=v; colsEl.value=v;
      if(_a4On){ _a4SyncD(); _a4Draw(); }
    }
    function applyRowInput(){
      var v=parseInt(rowsEl.value,10);
      if(isNaN(v)||v<1) v=1;
      if(v>50) v=50;
      _a4R=v; rowsEl.value=v;
      if(_a4On){ _a4SyncD(); _a4Draw(); }
    }
    colsEl.addEventListener('change', applyColInput);
    colsEl.addEventListener('keydown', function(e){ if(e.key==='Enter'){ applyColInput(); this.blur(); } });
    colsEl.addEventListener('blur', applyColInput);
    rowsEl.addEventListener('change', applyRowInput);
    rowsEl.addEventListener('keydown', function(e){ if(e.key==='Enter'){ applyRowInput(); this.blur(); } });
    rowsEl.addEventListener('blur', applyRowInput);
    /* мҠӨн•Җ лІ„нҠј(нҷ”мӮҙн‘ң нӮӨ) мҲЁкё°кё° CSS */
    var sty=document.createElement('style');
    sty.textContent='#a4-cols::-webkit-inner-spin-button,#a4-cols::-webkit-outer-spin-button,#a4-rows::-webkit-inner-spin-button,#a4-rows::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}';
    document.head.appendChild(sty);
  })();
  document.getElementById('a4-portrait').addEventListener('change',function(){ if(this.checked&&_a4On){_a4Orient='portrait';_applyPageCSS();_a4AutoFit();_a4Draw();} });
  document.getElementById('a4-landscape').addEventListener('change',function(){ if(this.checked&&_a4On){_a4Orient='landscape';_applyPageCSS();_a4AutoFit();_a4Draw();} });
  document.getElementById('a4-fit-w').addEventListener('change',function(){ if(_a4On) _a4Draw(); });
  document.getElementById('a4-fit-h').addEventListener('change',function(){ if(_a4On) _a4Draw(); });
  document.getElementById('a4-fit-cx').addEventListener('change',function(){ if(_a4On) _a4Draw(); });
  document.getElementById('a4-help').addEventListener('click',function(){
    const box=document.getElementById('a4-help-box');
    box.style.display=box.style.display==='none'?'block':'none';
  });
}

function _a4Toggle(on){
  _a4On=on;
  document.getElementById('a4-ctrl').style.display=on?'flex':'none';
  if(on){ _a4Measure(); _a4AutoFit(); _a4Draw(); }
  else  { _a4Clear(); }
  /* мӨҢ мғҒнғңлҠ” zoom-wrapмқҙ мң м§Җн•ҳлҜҖлЎң лі„лҸ„ ліөмӣҗ л¶Ҳн•„мҡ” */
}

function _a4Measure(){
  const d=document.getElementById('bracket-display');
  const rect=d.getBoundingClientRect();
  _a4W=Math.max(d.scrollWidth, rect.width) || 800;
  _a4H=Math.max(d.scrollHeight, rect.height) || 600;
}

function _a4AutoFit(){
  _a4C=1;
  _a4R=1;
  _a4SyncD();
}

function _a4SyncD(){
  document.getElementById('a4-cols').value=_a4C;
  document.getElementById('a4-rows').value=_a4R;
}

function _a4Draw(){
  const stage=document.getElementById('a4-stage');
  const paper=_getPaperSize();
  const pw=paper.w, ph=paper.h;
  const fitW=document.getElementById('a4-fit-w').checked;
  const fitH=document.getElementById('a4-fit-h').checked;
  const fitCX=document.getElementById('a4-fit-cx').checked;
  const sx=(_a4C*pw)/_a4W;
  const sy=(_a4R*ph)/_a4H;
  if(fitW&&fitH){ _a4Scale=Math.min(sx,sy); }
  else if(fitW){ _a4Scale=sx; }
  else if(fitH){ _a4Scale=sy; }
  else { _a4Scale=1; }
  _a4Scale=Math.max(0.01,Math.min(_a4Scale,10));

  const gridW=_a4C*pw, gridH=_a4R*ph;
  const sw=document.getElementById('a4-scale-wrap');

  /* мӢӨм ң м Ғмҡ©н•  scale кІ°м • */
  let applyScale = _a4Scale;
  let offsetX = 0;

  if(fitW||fitH){
    const scaledW=_a4W*_a4Scale;
    offsetX=(fitCX && scaledW<gridW) ? Math.round((gridW-scaledW)/2) : 0;
  } else {
    /* л§һм¶”кё° лҜёмІҙнҒ¬: scale м—Ҷмқҙ мӣҗліё нҒ¬кё° */
    applyScale = 1;
  }

  if(sw){
    sw.style.transform=applyScale===1?'':'scale('+applyScale+')';
    sw.style.transformOrigin='top left';
    sw.style.marginLeft=offsetX+'px';
  }

  const PAD=0, PADL=0;
  const scaledContentW = _a4W * applyScale;
  const scaledContentH = _a4H * applyScale;
  const stageW = Math.max(gridW, scaledContentW, offsetX + scaledContentW);
  const stageH = Math.max(gridH, scaledContentH);

  stage.style.position='relative';
  stage.style.width = stageW + 'px';
  stage.style.minHeight = stageH + 'px';
  stage.querySelectorAll('.a4g').forEach(e=>e.remove());

  const isW=document.body.classList.contains('white-mode');
  const lc=isW?'rgba(0,100,220,0.55)':'rgba(76,201,240,0.65)';
  const sc=isW?'rgba(0,100,220,0.4)':'rgba(76,201,240,0.45)';
  const bc=isW?'rgba(0,80,200,0.28)':'rgba(76,201,240,0.28)';
  for(let r=0;r<_a4R;r++){
    for(let c=0;c<_a4C;c++){
      const el=document.createElement('div');el.className='a4g';
      el.style.cssText='position:absolute;pointer-events:none;z-index:1;box-sizing:border-box;left:'+(PADL+c*pw)+'px;top:'+(PAD+r*ph)+'px;width:'+pw+'px;height:'+ph+'px;background:transparent;';
      stage.appendChild(el);
    }
  }
  for(let r=0;r<=_a4R;r++){
    const el=document.createElement('div');el.className='a4g';
    el.style.cssText='position:absolute;pointer-events:none;z-index:52;height:0;left:'+PADL+'px;width:'+gridW+'px;top:'+(PAD+r*ph)+'px;border-top:'+(r===0||r===_a4R?'2px solid '+sc:'2px dashed '+lc)+';';
    stage.appendChild(el);
  }
  for(let c=0;c<=_a4C;c++){
    const el=document.createElement('div');el.className='a4g';
    el.style.cssText='position:absolute;pointer-events:none;z-index:52;width:0;top:'+PAD+'px;left:'+(PADL+c*pw)+'px;height:'+gridH+'px;border-left:'+(c===0||c===_a4C?'2px solid '+sc:'2px dashed '+lc)+';';
    stage.appendChild(el);
  }
  let pn=1;
  for(let r=0;r<_a4R;r++){
    for(let c=0;c<_a4C;c++){
      const el=document.createElement('div');el.className='a4g';
      el.style.cssText='position:absolute;pointer-events:none;z-index:60;font-size:9px;font-family:"Share Tech Mono",monospace;letter-spacing:1px;color:'+bc+';left:'+(PADL+c*pw+5)+'px;top:'+(PAD+r*ph+5)+'px;';
      el.textContent='P'+(pn++);
      stage.appendChild(el);
    }
  }
  const pct=Math.round(applyScale*100);
  document.getElementById('a4-pct').textContent='('+pct+'%)';
  let badge=document.getElementById('a4-badge');
  if(!badge){ badge=document.createElement('div');badge.id='a4-badge';badge.style.cssText='position:fixed;bottom:10px;right:14px;font-size:11px;line-height:1.7;font-family:"Share Tech Mono",monospace;padding:6px 14px;border-radius:7px;z-index:9999;';document.body.appendChild(badge); }
  const paperName=(_paperKey==='custom')?'мӮ¬мҡ©мһҗм§Җм •':_paperKey;
  const ol=_a4Orient==='portrait'?'м„ёлЎң':'к°ҖлЎң';
  badge.style.background=isW?'rgba(240,243,255,.96)':'rgba(8,8,15,.92)';
  badge.style.border=isW?'1px solid #b0c0e0':'1px solid #2a2a50';
  badge.innerHTML='<span style="color:'+(isW?'#0050c0':'#4cc9f0')+';">'+paperName+' '+ol+' '+_a4C+'Г—'+_a4R+'мһҘ</span><br>м¶ңл Ҙл№„мңЁ: <b style="color:'+(pct>=80?(isW?'#006600':'#06d6a0'):pct>=40?(isW?'#885500':'#ffd60a'):'#e63946')+';">'+pct+'%</b>';
  badge.style.display='';
}
function _a4Clear(){
  const sw=document.getElementById('a4-scale-wrap');
  if(sw){ sw.style.transform=''; sw.style.marginLeft=''; }
  const stage=document.getElementById('a4-stage');
  stage.style.minHeight='';
  stage.style.width='';

/* в”Җв”Җ м •ліҙн‘ңмӢң н—ӨлҚ” в”Җв”Җ */
const _INFO_ITEMS=[
  {k:'eventname',l:'н–үмӮ¬лӘ…'},
  {k:'subtitle', l:'л¶Җм ңлӘ©'},
  {k:'gamename', l:'мў…лӘ©лӘ…'},
  {k:'date',     l:'мқјмӢң'},
  {k:'place',    l:'мһҘмҶҢ'},
  {k:'sponsor',  l:'нӣ„мӣҗ'},
  {k:'slogan1',  l:'мҠ¬лЎңкұҙ1'},
  {k:'slogan2',  l:'мҠ¬лЎңкұҙ2'},
];
function _loadDispCfg(){
  try{ return JSON.parse(localStorage.getItem('sgp_display_config')||'{}'); }catch(e){ return {}; }
}
function _initInfoChips(){
  const cfg=_loadDispCfg();
  const di=cfg.displayItems||{eventname:true};
  const wrap=document.getElementById('info-hdr-chips');
  if(!wrap) return;
  wrap.innerHTML='';
  _INFO_ITEMS.forEach(function(item){
    const on=!!di[item.k];

    chip.className='info-chip'+(on?' on':'');

    chk.style.cssText='accent-color:#e63946;width:11px;height:11px;cursor:pointer;';
    chk.addEventListener('change',function(){
      chip.classList.toggle('on', this.checked);
      _renderInfoHeader();
    });
    chip.appendChild(chk);
    chip.appendChild(document.createTextNode(item.l));
    wrap.appendChild(chip);
  });
  _renderInfoHeader();
}
function _getInfoChecked(){
  const wrap=document.getElementById('info-hdr-chips');
  if(!wrap) return {};
  const result={};
  wrap.querySelectorAll('label').forEach(function(chip,i){

  });
  return result;
}

/* в”Җв”Җ мӨҢ лІ„нҠј: zoom-wrap м „мІҙ(кІ©мһҗ+мҪҳн…җмё )лҘј нҷ”л©ҙ л°°мңЁлЎң мЎ°м • в”Җв”Җ */
function _zoomSet(ratio){
  const zw=document.getElementById('zoom-wrap');
  if(!zw) return;
  var isFit=(ratio===null);

  /* л§һм¶Ө(null): нҳ„мһ¬ zoom-wrap мӣҗліё л„Ҳл№„ кё°мӨҖмңјлЎң м°Ҫм—җ л§һлҠ” л№„мңЁ кі„мӮ° */
  if(isFit){
    /* мқјмӢңм ҒмңјлЎң scale м ңкұ°н•ҙ мӢӨм ң л„Ҳл№„ мёЎм • */
    zw.style.transform='';
    const naturalW=zw.scrollWidth||zw.offsetWidth||800;
    const wrapW=window.innerWidth-48;
    ratio=Math.max(0.1, Math.min(wrapW/naturalW, 4));
  }
  _zoomLevel=ratio;

  zw.style.transformOrigin='top left';
  zw.style.transform=ratio===1?'':'scale('+ratio+')';
  /* scaleмқҖ л Ҳмқҙм•„мӣғ кіөк°„мқ„ м°Ём§Җ м•Ҳ н•ҳлҜҖлЎң preview-wrap лҶ’мқҙ ліҙм • */
  const stage=document.getElementById('a4-stage');
  if(stage){
    const h=stage.offsetHeight||600;
    zw.style.marginBottom=(h*ratio - h)+'px';
  }

  /* нҚјм„јнҠё н‘ңмӢң м—…лҚ°мқҙнҠё */
  const disp=document.getElementById('zoom-pct-display');
  if(disp) disp.textContent=Math.round(ratio*100)+'%';

  /* н”„лҰ¬м…Ӣ лІ„нҠј нҷңм„ұнҷ” н‘ңмӢң */
  document.querySelectorAll('.zoom-btn').forEach(function(btn){
    const bz=parseFloat(btn.dataset.zoom);
    const active=!isFit&&!isNaN(bz)&&Math.abs(bz-ratio)<0.01;
    btn.style.background=active?'rgba(76,201,240,.15)':'transparent';
    btn.style.color=active?'#4cc9f0':'var(--text3)';
    btn.style.borderColor=active?'#4cc9f0':'var(--border2)';
  });

  /* л§һм¶Ө лІ„нҠј нҷңм„ұнҷ” н‘ңмӢң */
  var fitBtn=document.getElementById('zoom-fit-btn');
  if(fitBtn){
    fitBtn.style.background=isFit?'rgba(76,201,240,.15)':'transparent';
    fitBtn.style.color=isFit?'#4cc9f0':'var(--text3)';
    fitBtn.style.borderColor=isFit?'#4cc9f0':'var(--border2)';
  }
}

/* в”Җв”Җ мӨҢ -/+ лҜём„ё мЎ°м • (5% лӢЁмң„) в”Җв”Җ */
function _zoomStep(delta){
  var next=Math.round((_zoomLevel+delta)*100)/100;
  next=Math.max(0.1,Math.min(next,5));
  _zoomSet(next);
}


/* в”Җв”Җ кІ©мһҗ кё°л°ҳ мқёмҮ„: A4 м„Өм • к·ёлҢҖлЎң лёҢлқјмҡ°м Җ мқёмҮ„ в”Җв”Җ */
async function _printFromGrid(){
  /* A4 кІ©мһҗк°Җ кәјм ё мһҲмңјл©ҙ мқјл°ҳ мқёмҮ„лЎң */
  if(!_a4On || typeof _a4Scale==='undefined' || _a4Scale<=0){
    window.print(); return;
  }
  var btn=document.getElementById('btn-print-main');
  if(btn){btn.disabled=true;btn.textContent='мІҳлҰ¬мӨ‘...';}
  try{
    /* html-to-image: html2canvasліҙлӢӨ н’Ҳм§Ҳмқҙ мўӢкі  нҸ°нҠё/SVGлҘј м •нҷ•нһҲ л ҢлҚ”л§Ғ */
    if(!window.htmlToImage){
      await new Promise(function(res,rej){
        var s=document.createElement('script');
        s.src='https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js';
        s.onload=res; s.onerror=function(){
          /* fallback: html2canvas */
          rej(new Error('html-to-image load failed'));
        };
        document.head.appendChild(s);
      });
    }
    /* м •ліҙ н—ӨлҚ” к°•м ң л ҢлҚ” */
    if(typeof _renderInfoHeader==='function') _renderInfoHeader();
    var paper=_getPaperSize();
    var lsc=_a4Orient==='landscape';
    var cols=_a4C, rows=_a4R;
    var cellW=lsc?Math.max(paper.w,paper.h):Math.min(paper.w,paper.h);
    var cellH=lsc?Math.min(paper.w,paper.h):Math.max(paper.w,paper.h);
    var cellWmm=cellW/(96/25.4), cellHmm=cellH/(96/25.4);
    /* кІ©мһҗ мҲЁк№Җ (нҲҙл°”лҠ” #bracket-display л°–мқҙлҜҖлЎң мҲЁкёё н•„мҡ” м—ҶмқҢ) */
    var stage=document.getElementById('a4-stage');
    var grids=stage?Array.from(stage.querySelectorAll('.a4g')):[];
    grids.forEach(function(el){el.style.display='none';});
    /* мәЎмІҳ лҢҖмғҒ */
    var target=document.getElementById('bracket-display');
    var prevOvf=target.style.overflow;
    target.style.overflow='visible';
    target.style.overflowX='visible';
    target.style.overflowY='visible';
    var ovfTargets=[document.getElementById('a4-scale-wrap'),document.getElementById('zoom-wrap'),document.getElementById('preview-wrap')].filter(Boolean);
    var ovfPrev=ovfTargets.map(function(el){return{el:el,ov:el.style.overflow,ox:el.style.overflowX,oy:el.style.overflowY};});
    ovfTargets.forEach(function(el){el.style.overflow='visible';el.style.overflowX='visible';el.style.overflowY='visible';});
    /* a4-scale-wrap transform мқјмӢң м ңкұ° */
    var sw=document.getElementById('a4-scale-wrap');
    var prevSwTransform=sw?sw.style.transform:'';
    var prevSwMarginLeft=sw?sw.style.marginLeft:'';
    if(sw){sw.style.transform='';sw.style.marginLeft='0px';}
    var isW=document.body.classList.contains('white-mode');
    var SCALE=2; /* мәЎмІҳ н•ҙмғҒлҸ„ л°°мңЁ */

    /* в”Җв”Җ мҠ¬лқјмқҙмҠӨ нҒ¬кё°лҘј лҜёлҰ¬ліҙкё° кІ©мһҗм„ кіј м •нҷ•нһҲ мқјм№ҳмӢңнӮӨкё° в”Җв”Җ
       лҜёлҰ¬ліҙкё° кІ©мһҗм„ мқҖ "мҡ©м§Җ 1мһҘ(px) лӢЁмң„"лЎң к·ёл Өм§Җкі ,
       мҪҳн…җмё м—җлҠ” actualScale л°°мңЁмқҙ м Ғмҡ©лҸј мһҲлӢӨ.
       вҶ’ мһҗм—° нҒ¬кё° мәЎмІҳ нӣ„ мҠ¬лқјмқҙмҠӨ кІҪкі„ = cellW / actualScale (px)
       к· л“ұ л¶„н• (fcW/cols)мқҖ fitW мІҙнҒ¬ мӢңм—җл§Ң мҡ°м—°нһҲ л§һкі , лӮҳлЁём§ҖлҠ” м–ҙкёӢлӮЁ */
    var fitWchk=(document.getElementById('a4-fit-w')||{}).checked;
    var fitHchk=(document.getElementById('a4-fit-h')||{}).checked;
    var actualScale=(fitWchk||fitHchk)?_a4Scale:1;
    var cellNatW=cellW/actualScale;   /* мҡ©м§Җ 1мһҘ к°ҖлЎң = мһҗм—° нҒ¬кё°(px) */
    var cellNatH=cellH/actualScale;   /* мҡ©м§Җ 1мһҘ м„ёлЎң = мһҗм—° нҒ¬кё°(px) */
    /* мәЎмІҳ мә”лІ„мҠӨлҠ” м „мІҙ кІ©мһҗлҘј лӢҙмқ„ мҲҳ мһҲм–ҙм•ј н•Ё */
    var captureW=Math.max(target.scrollWidth, Math.ceil(cols*cellNatW));
    var captureH=Math.max(target.scrollHeight, Math.ceil(rows*cellNatH));

    await new Promise(function(r){setTimeout(r,150);});

    /* мәЎмІҳ м „ м№ҙл“ң н—ӨлҚ” мӨ„л°”кҝҲ л°©м§Җ + letter-spacing м ңкұ°
       мӣҗмқё: м№ҙл“ң н—ӨлҚ”(font-size:9px, letter-spacing:1px)лҠ” м№ҙл“ң лӮҙл¶ҖнҸӯкіј л№Ўл№Ўн•ҳкІҢ л§һмқҢ.
             skipFonts:true мӢң нҸҙл°ұ нҸ°нҠёк°Җ ~10px лҚ” л„“м–ҙ 20px мҙҲкіј вҶ’ мӨ„л°”кҝҲ л°ңмғқ.
             letter-spacing:1px Г— 18мһҗ = 18px вҶ’ 0мңјлЎң мӨ„мқҙл©ҙ м—¬мң  нҷ•ліҙ.
       л°©лІ•: <style> нғңк·ё мЈјмһ… (getComputedStyle л°©мӢқмқҖ мғүмғҒ м •к·ңнҷ”лЎң л¶Ҳм•Ҳм •) */
    var _capFixStyle=document.createElement('style');
    _capFixStyle.id='_cap_fix_style';
    _capFixStyle.textContent=
      '#bracket-display [style*="font-size:9px"],'+ /* м№ҙл“ң н—ӨлҚ” */
      '#bracket-display [style*="font-size: 9px"]{'+
        'white-space:nowrap !important;'+
        'letter-spacing:0 !important;'+
      '}';
    document.head.appendChild(_capFixStyle);

    /* html-to-imageлЎң кі н’Ҳм§Ҳ мәЎмІҳ
       skipFonts:true вҖ” мҷёл¶Җ нҸ°нҠё(Google Fonts л“ұ) CSS мқёлқјмқё мӢңлҸ„лҘј кұҙл„ҲлңҖ
       вҶ’ CORS SecurityError л°©м§Җ. нҸ°нҠёлҠ” мқҙлҜё лёҢлқјмҡ°м Җм—җ лЎңл“ңлҗң мғҒнғңлқј м¶ңл Ҙ н’Ҳм§Ҳ л¬ҙкҙҖ */
    var dataUrl=await window.htmlToImage.toJpeg(target,{
      quality:0.97,
      pixelRatio:SCALE,
      backgroundColor:isW?'#ffffff':'#08080f',
      width:captureW,
      height:captureH,
      skipFonts:true,
      style:{overflow:'visible',overflowX:'visible',overflowY:'visible'}
    });

    /* ліөмӣҗ */
    if(sw){sw.style.transform=prevSwTransform;sw.style.marginLeft=prevSwMarginLeft;}
    target.style.overflow=prevOvf;
    ovfPrev.forEach(function(s){s.el.style.overflow=s.ov;s.el.style.overflowX=s.ox;s.el.style.overflowY=s.oy;});
    grids.forEach(function(el){el.style.display='';});
    /* мәЎмІҳ н”ҪмҠӨ мҠӨнғҖмқј м ңкұ° */
    var _cfs=document.getElementById('_cap_fix_style'); if(_cfs)_cfs.remove();
    var fullImg=new Image();
    await new Promise(function(r){fullImg.onload=r;fullImg.src=dataUrl;});
    var fcW=fullImg.naturalWidth, fcH=fullImg.naturalHeight;

    /* мҠ¬лқјмқҙмҠӨ нҒ¬кё°: кІ©мһҗм„ кіј лҸҷмқјн•ң кё°мӨҖ (мҡ©м§Җ 1мһҘ = cellNatWГ—cellNatH мһҗм—°px) */
    var sliceW=Math.round(cellNatW*SCALE);
    var sliceH=Math.round(cellNatH*SCALE);

    /* @page нҒ¬кё°: м •нҷ•н•ң mm мҲҳм№ҳлЎң м§Җм • */
    var existing=document.getElementById('_page_rule_style');
    if(existing)existing.remove();
    var st=document.createElement('style');
    st.id='_page_rule_style';
    st.textContent='@page{size:'+cellWmm+'mm '+cellHmm+'mm;margin:0;}';
    document.head.appendChild(st);

    /* нҺҳмқҙм§Җ div мғқм„ұ */
    var wrap=document.createElement('div');
    wrap.id='_grid_print_wrap';
    wrap.style.cssText='display:none;';
    for(var r=0;r<rows;r++){
      for(var c=0;c<cols;c++){
        var oc=document.createElement('canvas');
        /* к°Ғ мҠ¬лқјмқҙмҠӨ мӢңмһ‘м җ: лҲ„м Ғ мҳӨм°Ё л°©м§ҖлҘј мң„н•ҙ л§ӨлІҲ м •мҲҳ кі„мӮ° */
        var sx=Math.round(c*cellNatW*SCALE), sy=Math.round(r*cellNatH*SCALE);
        var sw2=Math.min(sliceW,Math.max(0,fcW-sx));
        var sh2=Math.min(sliceH,Math.max(0,fcH-sy));
        oc.width=sliceW; oc.height=sliceH;
        var octx=oc.getContext('2d');
        octx.fillStyle=isW?'#ffffff':'#08080f';
        octx.fillRect(0,0,oc.width,oc.height);
        if(sw2>0&&sh2>0) octx.drawImage(fullImg,sx,sy,sw2,sh2,0,0,sw2,sh2);
        var pd=document.createElement('div');
        pd.style.cssText=
          'display:block;'+
          'width:'+cellWmm+'mm;'+
          'height:'+cellHmm+'mm;'+
          'overflow:hidden;'+
          'margin:0;padding:0;'+
          'box-sizing:border-box;'+
          'background:white;'+
          'page-break-after:always;'+
          'break-after:page;'+
          'page-break-inside:avoid;'+
          'break-inside:avoid;';
        var img=document.createElement('img');
        img.src=oc.toDataURL('image/jpeg',0.97);
        img.style.cssText='width:100%;height:100%;display:block;';
        pd.appendChild(img); wrap.appendChild(pd);
      }
    }
    document.body.appendChild(wrap);
    document.body.classList.add('_grid_printing');
    await new Promise(function(r){setTimeout(r,200);});
    window.print();
    function _cleanup(){
      document.body.classList.remove('_grid_printing');
      var el=document.getElementById('_grid_print_wrap');
      if(el)el.remove();
      if(btn){btn.disabled=false;btn.textContent='рҹ–ЁпёҸ мқёмҮ„';}
    }
    window.addEventListener('afterprint',_cleanup,{once:true});
    setTimeout(_cleanup,8000);
  }catch(err){
    console.error(err);
    alert('мқёмҮ„ мӨҖл№„ мӢӨнҢЁ: '+err.message);
    document.body.classList.remove('_grid_printing');
    var el=document.getElementById('_grid_print_wrap');
    if(el)el.remove();
    if(btn){btn.disabled=false;btn.textContent='рҹ–ЁпёҸ мқёмҮ„';}
  }
}

/* PDF save - grid based, no gridlines */
async function savePDF(){
  var btn=document.getElementById('btn-pdf-save');
  var status=document.getElementById('pdf-save-status');
  if(btn){btn.disabled=true;btn.textContent='...';}
  if(status){status.textContent='Loading...';status.style.display='inline';}

function _doPrint(groups, hideNamesInitial){
  const win=window.open('','_blank','width=1000,height=850');
  if(!win){ toast('нҢқм—…мқҙ м°ЁлӢЁлҗҳм—ҲмҠөлӢҲлӢӨ. нҢқм—… н—Ҳмҡ© нӣ„ лӢӨмӢң мӢңлҸ„н•ҙмЈјм„ёмҡ”','error'); return; }

  // к°Ғ к·ёлЈ№ лҢҖм§„н‘ңлҘј мҲЁкІЁм§„ divм—җ л ҢлҚ” нӣ„ rAF 2нҡҢ лҢҖкё°(м—°кІ°м„  SVG мҷ„м„ұ нӣ„ ліөмӮ¬)
  const saved=S.matches;
  const hiddenContainer=document.createElement('div');
  hiddenContainer.style.cssText='position:fixed;left:-9999px;top:0;visibility:hidden;';
  document.body.appendChild(hiddenContainer);

  const groupDivs=groups.map(g=>{
    const shortLabel=g.label.split('/').map(s=>s.trim()).join(' В· ');
    const wrapper=document.createElement('div');
    wrapper.style.cssText='margin-bottom:32px;';
    const taggedMatches=g.matches.map((round,ri)=>

    );
    S.matches=taggedMatches;
    _renderBracketHTML(wrapper, taggedMatches, 'top', false);
    hiddenContainer.appendChild(wrapper);
    return {label:shortLabel, slots:g.slots.length, wrapper};
  });
  S.matches=saved;

  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    const pagesHTML=groupDivs.map(({label,slots,wrapper})=>{
      wrapper.querySelectorAll('*').forEach(el=>{
        el.style.overflow='visible'; el.style.overflowX='visible'; el.style.overflowY='visible';

      wrapper.querySelectorAll('svg').forEach(s=>{
        s.setAttribute('overflow','visible'); s.style.overflow='visible';
      });

        <div class="group-title">${label} (${slots}лӘ…)</div>
        <div class="bracket-wrap">${wrapper.innerHTML}</div>
      </div>`;
    }).join('');

function _ldScr(src){ return new Promise(function(res,rej){ var s=document.createElement('script'); s.src=src; s.onload=res; s.onerror=rej; document.head.appendChild(s); }); }
async function savePDF(){
  const btn=document.getElementById('btn-pdf-save'), status=document.getElementById('pdf-status');
  if(btn){btn.disabled=true;btn.textContent='...';}

    const fixSt=document.createElement('style'); fixSt.id='_cap_fix_sel';

    document.head.appendChild(fixSt);

    await new Promise(r=>setTimeout(r,200));
    let pi=0;
    for(const pageEl of pages){
      const dataUrl=await window.htmlToImage.toJpeg(pageEl,{
        quality:0.97,pixelRatio:SCALE,backgroundColor:'#ffffff',skipFonts:true,
        style:{overflow:'visible',overflowX:'visible',overflowY:'visible'}
      });
      if(pi>0) pdf.addPage([A4W,A4H],'portrait');
      pdf.addImage(dataUrl,'JPEG',0,0,A4W,A4H);

      await new Promise(r=>setTimeout(r,0));
    }
    const fs=document.getElementById('_cap_fix_sel'); if(fs)fs.remove();
    const now=new Date();
    const ds=now.getFullYear()+String(now.getMonth()+1).padStart(2,'0')+String(now.getDate()).padStart(2,'0');
    pdf.save('bracket_selected_'+ds+'.pdf');
    if(status){status.textContent='Done! ('+pi+'p)';setTimeout(()=>status.style.display='none',4000);}

  if(btn){btn.disabled=false;btn.textContent='рҹ’ҫ PDF м ҖмһҘ';}
}

function triggerByeSelector(){
  const g=S.groupBrackets[S.activeGroup];
  const ri=g.matches.findIndex((round,ri)=>
    round.length>=2 && round.length%2===1 && !(g.matches[ri+1]||[]).some(m=>m.bye)
  );
  if(ri>=0) _showByeForRound(g, ri);
}

function _showByeForRound(g, ri){
  const existing=document.getElementById('bye-selector-overlay');
  if(existing) existing.remove();

  const round=g.matches[ri];
  if(!round || round.length%2===0) return;
  const candidates=round.map((m,mi)=>({
    id:`bye_${ri}_${mi}`,
    name:`${ri+1}-${mi+1} мҠ№мһҗ`,
    color:'var(--accent)',
    _ri:ri, _mi:mi
  }));
  showByeSelector(
    candidates,
    `${round.length}кІҪкё° мӨ‘ л¶Җм „мҠ№ л°°м •`,
    (sel)=>{
      _byeAssigned={ri:sel._ri, mi:sel._mi};

}

function _doLink(ri, mi, grpObj, origMi, origRi){
  const a = _linkSel;
  const b = {ri, mi, grpObj, origMi, origRi};
  _linkSel = null;

  if(a.origRi===origRi && a.origMi===origMi && a.grpObj===grpObj){
    _redrawBracketView(); return; // к°ҷмқҖ кІҪкё° мһ¬нҒҙлҰӯ вҶ’ м·ЁмҶҢ
  }

  const grpA = a.grpObj || S.groupBrackets[S.activeGroup];
  const grpB = b.grpObj || S.groupBrackets[S.activeGroup];
  if(grpA !== grpB){ toast('к°ҷмқҖ мІҙкёү кІҪкё°лҒјлҰ¬л§Ң м—°кІ°н•  мҲҳ мһҲм–ҙмҡ”','error'); _redrawBracketView(); return; }
  if(a.origRi !== b.origRi){ toast('лқјмҡҙл“ңк°Җ л§һм§Җ м•ҠмҠөлӢҲлӢӨ','error'); _redrawBracketView(); return; }

  const grp = grpA;
  const targetRi = Math.max(a.origRi, b.origRi) + 1;
  while(grp.matches.length <= targetRi) grp.matches.push([]);
  const nextRound = grp.matches[targetRi];

  const aKey=`${a.origRi}-${a.origMi}`, bKey=`${b.origRi}-${b.origMi}`;
  const aLinked=nextRound.find(m=>m.fromA===aKey||m.fromB===aKey);
  const bLinked=nextRound.find(m=>m.fromA===bKey||m.fromB===bKey);
  if(aLinked||bLinked){ toast('мқҙлҜё м—°кІ°лҗң кІҪкё°мһ…лӢҲлӢӨ','error'); _redrawBracketView(); return; }

  nextRound.push({p1:{name:`${a.origRi+1}-${a.origMi+1} мҠ№мһҗ`,tbd:true},p2:{name:`${b.origRi+1}-${b.origMi+1} мҠ№мһҗ`,tbd:true},fromA:aKey,fromB:bKey,bye:false});
  _redrawBracketView();
  toast(`${grp.label} ${a.origRi+1}-${a.origMi+1} vs ${b.origRi+1}-${b.origMi+1} м—°кІ°лҗЁ!`,'success');
}

function _doAdvance(origRi, origMi, grpObj){
  const g = grpObj || S.groupBrackets[S.activeGroup];
  while(g.matches.length <= origRi+1) g.matches.push([]);
  const nextRound = g.matches[origRi+1];
  const aKey = `${origRi}-${origMi}`;
  if(nextRound.find(m=>m.fromA===aKey||m.fromB===aKey)){ toast('мқҙлҜё м—°кІ°лҗң кІҪкё°мһ…лӢҲлӢӨ','error'); _redrawBracketView(); return; }
  nextRound.push({p1:{name:`${origRi+1}-${origMi+1} мҠ№мһҗ`,tbd:true},p2:null,fromA:aKey,fromB:null,bye:true});
  _redrawBracketView();
  toast(`${origRi+1}-${origMi+1} мҠ№мһҗ лӢӨмқҢ лқјмҡҙл“ң м§Ғн–ү!`,'success');
}

function _doRemoveRound(origRi, origMi, grpObj){
  // grpObjк°Җ nullмқҙл©ҙ origRi, origMiлЎң н•ҙлӢ№ л§Өм№ҳлҘј к°Җм§„ к·ёлЈ№мқ„ м „мІҙм—җм„ң м°ҫмқҢ
  let g = grpObj;
  if(!g){
    g = S.groupBrackets.find(gb =>
      gb.matches[origRi] && gb.matches[origRi][origMi]
    );
  }
  if(!g){ toast('мӮӯм ңн•  м—°кІ°мқҙ м—Ҷм–ҙмҡ”','info'); return; }
  if(!g.matches[origRi]){ toast('мӮӯм ңн•  м—°кІ°мқҙ м—Ҷм–ҙмҡ”','info'); return; }

  const match = g.matches[origRi][origMi];
  if(!match){ toast('мӮӯм ңн•  м—°кІ°мқҙ м—Ҷм–ҙмҡ”','info'); return; }

  // 1лқјмҡҙл“ң мһҗлҸҷ мғқм„ұ кІҪкё°(fromA/fromB м—ҶмқҢ)лҠ” мӮӯм ң л¶Ҳк°Җ
  if(origRi === 0 && !match.fromA && !match.fromB){
    toast('1лқјмҡҙл“ң кІҪкё°лҠ” мӮӯм ңн•  мҲҳ м—Ҷм–ҙмҡ”','info'); return;
  }

  g.matches[origRi].splice(origMi, 1);
  if(g.matches[origRi].length === 0) g.matches.splice(origRi);

  _redrawBracketView();
  toast(`${g.label} ${origRi+1}-${origMi+1} кІҪкё°лҘј мӮӯм ңн–Ҳм–ҙмҡ”`,'success');
}

let _selectedMatchByCourt = {};

function onMatchClick(ri, mi, matchObj, event){
  const grpObj  = matchObj?._groupObj || null;
  const origMi  = matchObj?._origMi  ?? mi;
  const origRi  = matchObj?._origRi  ?? ri;
  const cleanName = n => n ? n.replace(/^\d+лІҲ\s*/, '').replace(/[()[\]]/g, '').trim() || n : 'вҖ”';
  const p1 = cleanName(matchObj?.p1?.name || (matchObj?.p1 ? String(matchObj.p1) : ''));
  const p2 = cleanName(matchObj?.p2?.name || (matchObj?.p2 ? String(matchObj.p2) : ''));
  const grpLbl  = matchObj?._groupLabel || grpObj?.label || '';
  const label   = `${grpLbl} ${origRi+1}лқјмҡҙл“ң ${origMi+1}кІҪкё°`.trim();

  // court м •ліҙ м¶”м¶ң
  const court = grpObj?.court || (matchObj?._groupObj?.court) || 1;

  // н•ҙлӢ№ кІҪкё°мһҘмқҳ мқҙм „ м„ нғқ к°•мЎ° м ңкұ°
  const prevId = _selectedMatchByCourt[court];
  if(prevId){
    const prev = document.querySelector(`[data-match-id="${prevId}"]`);
    if(prev){ prev.style.outline=''; prev.style.boxShadow=''; }
  }
  // мғҲ м„ нғқ к°•мЎ°
  if(matchObj?._domId){
    _selectedMatchByCourt[court] = matchObj._domId;
    const el = document.querySelector(`[data-match-id="${matchObj._domId}"]`);
    if(el){ el.style.outline='2px solid var(--red)'; el.style.boxShadow='0 0 12px rgba(230,57,70,.5)'; }
  }

  // м „м—ӯ + кІҪкё°мһҘлі„ localStorage м ҖмһҘ (ri/mi/groupLabel нҸ¬н•Ён•ҙм„ң мғҒлҢҖл°©мқҙ м •нҷ•нһҲ н•ҳмқҙлқјмқҙнҠё)
  const vsData = { p1, p2, label, court, ri:origRi, mi:origMi, domId: matchObj?._domId, groupLabel: grpLbl };
  try{ localStorage.setItem('sgp_display_vs', JSON.stringify(vsData)); }catch(e){}
  try{ localStorage.setItem(`sgp_display_vs_court_${court}`, JSON.stringify(vsData)); }catch(e){}

  // BroadcastChannel + storage cmd вҶ’ display.html + мғҒлҢҖл°© bracket-view мҰүмӢң л°ҳмҳҒ
  const cmd = { type:'set_match', p1, p2, label, court, ri:origRi, mi:origMi, domId: matchObj?._domId, groupLabel: grpLbl, ts:Date.now() };
  try{ localStorage.setItem('sgp_display_cmd', JSON.stringify(cmd)); }catch(e){}
  try{
    if(!window._bvBc) window._bvBc = new BroadcastChannel('sgp_cmd');
    window._bvBc.postMessage(cmd);
  }catch(e){}

  toast(`${label} (кІҪкё°мһҘ ${court}) м„ нғқлҗЁ`, 'info');
}
