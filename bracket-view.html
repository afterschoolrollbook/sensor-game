function _zoomSet(ratio){
  const zw=document.getElementById('zoom-wrap');
  if(!zw) return;

  if(ratio===null){
    zw.style.transform='';
    const naturalW=zw.scrollWidth||zw.offsetWidth||800;
    const wrapW=window.innerWidth-48;
    ratio=Math.max(0.1,Math.min(wrapW/naturalW,4));
  }
  _zoomLevel=ratio;

  zw.style.transformOrigin='top left';
  zw.style.transform=ratio===1?'':'scale('+ratio+')';
  const stage=document.getElementById('a4-stage');
  if(stage){
    const h=stage.offsetHeight||600;
    zw.style.marginBottom=(h*ratio - h)+'px';
  }

  document.querySelectorAll('.zoom-btn').forEach(function(btn){
    const bz=parseFloat(btn.dataset.zoom);
    const active=!isNaN(bz)&&Math.abs(bz-ratio)<0.01;
    btn.style.background=active?'rgba(76,201,240,.15)':'transparent';
    btn.style.color=active?'#4cc9f0':'var(--text3)';
    btn.style.borderColor=active?'#4cc9f0':'var(--border2)';
  });
}

/* в”Җв”Җ кё°ліём •ліҙ н—ӨлҚ” мІҙнҒ¬л°•мҠӨ в”Җв”Җ */
const _INFO_ITEMS=[
  {k:'eventname',l:'н–үмӮ¬лӘ…'},
  {k:'subtitle', l:'л¶Җм ңлӘ©'},
  {k:'gamename', l:'мў…лӘ©лӘ…'},
  {k:'date',     l:'мқјмӢң'},
  {k:'place',    l:'мһҘмҶҢ'},
  {k:'sponsor',  l:'нӣ„мӣҗ'},
  {k:'slogan1',  l:'мҠ¬лЎңкұҙ1'},
  {k:'slogan2',  l:'мҠ¬лЎңкұҙ2'},
];
function _loadDispCfg(){
  try{ return JSON.parse(localStorage.getItem('sgp_display_config')||'{}'); }catch(e){ return {}; }
}
function _initInfoChips(){
  const cfg=_loadDispCfg();
  const di=cfg.displayItems||{eventname:true};
  const wrap=document.getElementById('info-hdr-chips');
  if(!wrap) return;
  wrap.innerHTML='';
  _INFO_ITEMS.forEach(function(item){
    const on=!!di[item.k];
    const chip=document.createElement('label');
    chip.className='info-chip'+(on?' on':'');
    const chk=document.createElement('input');
    chk.type='checkbox'; chk.checked=on;
    chk.style.cssText='accent-color:#e63946;width:11px;height:11px;cursor:pointer;';
    chk.addEventListener('change',function(){
      chip.classList.toggle('on', this.checked);
      _renderInfoHeader();
    });
    chip.appendChild(chk);
    chip.appendChild(document.createTextNode(item.l));
    wrap.appendChild(chip);
  });
  _renderInfoHeader();
}
function _getInfoChecked(){
  const wrap=document.getElementById('info-hdr-chips');
  if(!wrap) return {};
  const result={};
  wrap.querySelectorAll('label').forEach(function(chip,i){
    result[_INFO_ITEMS[i].k]=chip.querySelector('input').checked;
  });
  return result;
}
function _renderInfoHeader(){
  const cfg=_loadDispCfg();
  try{
    const bt=JSON.parse(localStorage.getItem('sgp_bracket_temp')||'{}');
    if(bt.settings){
      if(!cfg.date&&bt.settings.dt) cfg.date=bt.settings.dt;
      if(!cfg.place&&bt.settings.pl) cfg.place=bt.settings.pl;
    }
  }catch(e){}
  const valMap={
    eventname:cfg.eventName||'', subtitle:cfg.subtitle||'',
    gamename:cfg.gameLabel||'',  date:cfg.date||'',
    place:cfg.place||'',         sponsor:cfg.sponsor||'',
    slogan1:cfg.slogan1||'',     slogan2:cfg.slogan2||'',
  };
  const checked=_getInfoChecked();
  const existing=document.getElementById('pdf-info-header');
  if(existing) existing.remove();
  /* мІҙнҒ¬лҗң н•ӯлӘ©мқҙ н•ҳлӮҳлқјлҸ„ мһҲмңјл©ҙ н—ӨлҚ”лҘј н‘ңмӢң (к°’мқҙ л№„м–ҙмһҲм–ҙлҸ„) */
  const anyChecked=_INFO_ITEMS.some(function(item){ return checked[item.k]; });
  if(!anyChecked) return;
  const isW=document.body.classList.contains('white-mode');
  const hdrBg=isW?'#ffffff':'#0f0f1a';
  const titleColor=isW?'#111111':'#f0f0f8';
  const metaColor=isW?'#333333':'#9090b0';
  const emptyColor=isW?'#bbbbbb':'#3a3a55'; /* л№Ҳ к°’ н‘ңмӢңмҡ© мғүмғҒ */
  const sloganColor=isW?'#666666':'#5a5a7a';
  const ls='font-size:9px;font-weight:700;letter-spacing:1px;color:#e63946;font-family:"Share Tech Mono",monospace;margin-right:3px;';
  /* мІҙнҒ¬лҗҗмңјл©ҙ к°’ мӮ¬мҡ©, к°’мқҙ м—Ҷмңјл©ҙ 'вҖ”' н‘ңмӢң */
  const en =checked.eventname ? (valMap.eventname||null)  : null;
  const sub=checked.subtitle  ? (valMap.subtitle ||null)  : null;
  const gl =checked.gamename  ? (valMap.gamename ||'вҖ”')   : null;
  const dt =checked.date      ? (valMap.date     ||'вҖ”')   : null;
  const pl =checked.place     ? (valMap.place    ||'вҖ”')   : null;
  const sp =checked.sponsor   ? (valMap.sponsor  ||'вҖ”')   : null;
  const s1 =checked.slogan1   ? (valMap.slogan1  ||'вҖ”')   : null;
  const s2 =checked.slogan2   ? (valMap.slogan2  ||'вҖ”')   : null;
  const hdr=document.createElement('div');
  hdr.id='pdf-info-header';
  hdr.style.cssText='min-width:max-content;width:100%;padding:16px 24px 13px;margin-bottom:8px;border-bottom:2px solid #e63946 !important;font-family:"Noto Sans KR",sans-serif !important;background:'+hdrBg+' !important;box-sizing:border-box;color:unset !important;';
  let inner='';
  if(en!==null)  inner+='<div style="font-size:20px;font-weight:700;color:'+(en?titleColor:emptyColor)+';letter-spacing:.3px;margin-bottom:3px;">'+(en||'вҖ”')+'</div>';
  if(sub!==null) inner+='<div style="font-size:12px;color:'+(sub?metaColor:emptyColor)+';margin-bottom:5px;">'+(sub||'вҖ”')+'</div>';
  const meta=[];
  if(gl!==null) meta.push('<span style="display:inline-flex;align-items:center;margin-right:14px;"><span style="'+ls+'">мў…лӘ©</span><span style="font-size:12px;color:'+(gl!=='вҖ”'?metaColor:emptyColor)+';">'+gl+'</span></span>');
  if(dt!==null) meta.push('<span style="display:inline-flex;align-items:center;margin-right:14px;"><span style="'+ls+'">мқјмӢң</span><span style="font-size:12px;color:'+(dt!=='вҖ”'?metaColor:emptyColor)+';">'+dt+'</span></span>');
  if(pl!==null) meta.push('<span style="display:inline-flex;align-items:center;margin-right:14px;"><span style="'+ls+'">мһҘмҶҢ</span><span style="font-size:12px;color:'+(pl!=='вҖ”'?metaColor:emptyColor)+';">'+pl+'</span></span>');
  if(sp!==null) meta.push('<span style="display:inline-flex;align-items:center;margin-right:14px;"><span style="'+ls+'">нӣ„мӣҗ</span><span style="font-size:12px;color:'+(sp!=='вҖ”'?metaColor:emptyColor)+';">'+sp+'</span></span>');
  if(meta.length) inner+='<div style="display:flex;flex-wrap:wrap;margin-bottom:'+((s1!==null||s2!==null)?'5':'0')+'px;">'+meta.join('')+'</div>';
  const slogans=[];
  if(s1!==null) slogans.push('<span style="color:'+(s1!=='вҖ”'?sloganColor:emptyColor)+';">'+s1+'</span>');
  if(s2!==null) slogans.push('<span style="color:'+(s2!=='вҖ”'?sloganColor:emptyColor)+';">'+s2+'</span>');
  if(slogans.length) inner+='<div style="font-size:11px;font-style:italic;">'+slogans.join('  В·  ')+'</div>';
  hdr.innerHTML=inner;
  /* bracket-display м•Ҳ мІ« мһҗмӢқмңјлЎң вҶ’ лҢҖм§„н‘ңмҷҖ л„Ҳл№„ м»Ён…ҚмҠӨнҠё кіөмң  */
  const bd=document.getElementById('bracket-display');
  if(bd) bd.insertBefore(hdr, bd.firstChild);
}
window.addEventListener('load',function(){ _initInfoChips(); });


// в”Җв”Җ BRACKET VIEW: мһҗлҸҷ лЎңл“ң в”Җв”Җ
function _showLoadError(msg){
  const view=document.getElementById('pts-bracket-view');
  if(view) view.innerHTML='<div style="color:#e63946;font-size:13px;padding:24px;font-family:monospace;white-space:pre-wrap;">'+msg+'</div>';
  toast(msg.split('\n')[0],'error');
  console.error('[bracket-view]',msg);
}
window.addEventListener('load', ()=>{
  try{
    const savedLayout = localStorage.getItem('sgp_layout');
    if(savedLayout) _bracketLayout = savedLayout;

    let gb = null;
    // 1мҲңмң„: sgp_bracket_temp
    try{
      const temp = JSON.parse(localStorage.getItem('sgp_bracket_temp') || '{}');
      if(temp && temp.groupBrackets && temp.groupBrackets.length) gb = temp.groupBrackets;
    }catch(e){}
    // 2мҲңмң„: sgp_groupBrackets
    if(!gb || !gb.length){
      try{
        const raw = localStorage.getItem('sgp_groupBrackets');
        if(raw) gb = JSON.parse(raw);
      }catch(e){ _showLoadError('sgp_groupBrackets нҢҢмӢұ мҳӨлҘҳ: '+e.message); return; }
    }
    // 3мҲңмң„: sgp_bracket_final
    if(!gb || !gb.length){
      try{
        const fin = JSON.parse(localStorage.getItem('sgp_bracket_final') || '{}');
        if(fin && fin.groupBrackets && fin.groupBrackets.length) gb = fin.groupBrackets;
      }catch(e){}
    }

    if(!gb || !gb.length){
      const raw = localStorage.getItem('sgp_groupBrackets');
      _showLoadError('м ҖмһҘлҗң лҢҖм§„н‘ңк°Җ м—ҶмҠөлӢҲлӢӨ.\nsgp_groupBrackets = '+(raw||'(null)').slice(0,120));
      return;
    }

    S.groupBrackets = gb;
    S.activeGroup = 0;
    _courtCount = Math.max(...gb.map(g => g.court || 1));

    try{
      const cfg = JSON.parse(localStorage.getItem('sgp_display_config') || '{}');
      const st = JSON.parse(localStorage.getItem('sgp_state') || '{}');
      const name = (cfg.eventName || st.event?.name || '').trim();
      if(name) document.getElementById('win-title').textContent = 'лҢҖм§„н‘ң вҖ” ' + name;
    }catch(e){}

    show('pts-step3');
    renderBracketTabs();
    _redrawBracketView();
  }catch(e){
    _showLoadError('л ҢлҚ”л§Ғ мҳӨлҘҳ: '+e.message+'\n'+e.stack);
  }
});
</script>
<script>
window.addEventListener('pagehide',()=>{ try{window._bvBc&&window._bvBc.close();}catch(e){} });

// кІҪкё°мһҘлі„ м„ нғқкІҪкё° вҖ” нҠёлҰ¬л·°/лҰ¬мҠӨнҠёл·° кіөнҶө (н•ҳмқҙлқјмқҙнҠё мң м§Җмҡ©)
const _bvSelectedMatches = {}; // { [courtNum]: {ri, mi, groupLabel} }

// нҠёлҰ¬л·°мҡ© нҳ„мһ¬ к·ёлЈ№ label м„ёнҢ… (mkSection м•Ҳм—җм„ң көҗмІҙ)
window._bvCurrentGroupLabel = '';

// selectedMatches л°°м—ҙ л°ҳнҷҳ н—¬нҚј
function _getBvSelectedArr(){
  return Object.values(_bvSelectedMatches);
}

// isCurrentMatchIdx мҳӨлІ„лқјмқҙл“ң вҖ” нҠёлҰ¬л·°м—җм„ң нҳём¶ңлҗЁ
function _setBvIsCurrentMatchIdx(){
  window.isCurrentMatchIdx = function(ri, mi){
    const arr = _getBvSelectedArr();
    if(!arr.length) return false;
    return arr.some(s => s.ri===ri && s.mi===mi && s.groupLabel===window._bvCurrentGroupLabel);
  };
}

// storageм—җм„ң selectedMatches мһ¬кө¬м„ұ
function _bvLoadSelectedFromStorage(){
  const gb = S.groupBrackets || [];
  for(let c=1; c<=Math.max(_courtCount||1, 2); c++){
    const courtStr = localStorage.getItem(`sgp_display_vs_court_${c}`);
    if(!courtStr) continue;
    try{
      const mv = JSON.parse(courtStr);
      if(mv.ri!=null && mv.mi!=null && mv.groupLabel){
        const sl = mv.groupLabel.split('/').map((p,pi)=>pi===0?p.trim():p.trim().replace('л¶Җ','')).join('В·');
        _bvSelectedMatches[c] = { ri:mv.ri, mi:mv.mi, groupLabel:sl, courtNum:c };
        // _bvCurrentMatchлҸ„ лҸҷкё°нҷ” (лҰ¬мҠӨнҠёл·°мҡ©)
        const gi = gb.findIndex(g=>{
          const gsl=g.label.split('/').map((p,pi)=>pi===0?p.trim():p.trim().replace('л¶Җ','')).join('В·');
          return gsl===sl||g.label===mv.groupLabel;
        });
        if(gi>=0) _bvCurrentMatch[c] = { gi, ri:mv.ri, mi:mv.mi };
      }
    }catch(e){}
  }
}

// мғҲм°Ҫ/iframe м–‘л°©н–Ҙ н•ҳмқҙлқјмқҙнҠё м—°лҸҷ
// кіөнҶө н•ҳмқҙлқјмқҙнҠё н•ЁмҲҳ: ri/miлЎң л°•мҠӨ м°ҫкё° (н…ҚмҠӨнҠё кІҖмғүліҙлӢӨ м •нҷ•)
function _applyMatchHighlight(ri, mi, court, domId, groupLabel){
  try{
    const courtStr = String(court || 1);
    const prev = _selectedMatchByCourt[courtStr];

    // мқҙм „ н•ҳмқҙлқјмқҙнҠё м ңкұ°
    if(prev && prev !== domId){
      const el=document.querySelector('[data-match-id="'+prev+'"]');
      if(el){el.style.outline='';el.style.boxShadow='';}
    }

    // мҡ”мҶҢ м°ҫкё°
    let box = domId ? document.querySelector('[data-match-id="'+domId+'"]') : null;
    if(!box){
      const courtWraps = document.querySelectorAll('[data-court="'+courtStr+'"]');
      courtWraps.forEach(wrap=>{
        if(box) return;
        if(groupLabel && wrap.dataset.groupLabel && wrap.dataset.groupLabel !== groupLabel) return;
        const found = wrap.querySelector('[data-ri="'+ri+'"][data-mi="'+mi+'"]');
        if(found) box = found;
      });
    }

    if(box){
      _selectedMatchByCourt[courtStr] = box.dataset.matchId;
      box.style.outline='2px solid var(--red)';
      box.style.boxShadow='0 0 12px rgba(230,57,70,.5)';
    }
  }catch(e){}
}

// кІҪкё° м„ нғқ мҲҳмӢ  вҶ’ selectedMatches м—…лҚ°мқҙнҠё нӣ„ лҰ¬л ҢлҚ”
function _bvApplySelection(courtNum, ri, mi, groupLabel, domId){
  const gb = S.groupBrackets || [];
  // shortLabel м •к·ңнҷ”
  const sl = (groupLabel||'').split('/').map((p,pi)=>pi===0?p.trim():p.trim().replace('л¶Җ','')).join('В·');
  const labelToUse = sl || groupLabel || '';

  // _bvSelectedMatches м—…лҚ°мқҙнҠё
  _bvSelectedMatches[courtNum] = { ri, mi, groupLabel: labelToUse, courtNum };

  if(_IS_EMBED){
    // лҰ¬мҠӨнҠёл·°: _bvCurrentMatchлҸ„ м—…лҚ°мқҙнҠё нӣ„ лҰ¬л ҢлҚ”
    const gi = gb.findIndex(g=>{
      const gsl=g.label.split('/').map((p,pi)=>pi===0?p.trim():p.trim().replace('л¶Җ','')).join('В·');
      return gsl===labelToUse || g.label===groupLabel;
    });
    _bvCurrentMatch[courtNum] = { gi: gi>=0 ? gi : 0, ri, mi };
    _redrawBracketView();
  } else {
    // нҠёлҰ¬л·°: isCurrentMatchIdx мҳӨлІ„лқјмқҙл“ң нӣ„ м „мІҙ лҰ¬л ҢлҚ”
    _setBvIsCurrentMatchIdx();
    _redrawBracketViewTree();
  }
}

// BroadcastChannel: 3лІҲнғӯ кІҪкё° м„ нғқ мӢӨмӢңк°„ мҲҳмӢ 
(function(){
  try{
    const bc = new BroadcastChannel('sgp_cmd');
    bc.onmessage = function(e){
      const cmd = e.data;
      if(!cmd || cmd.type !== 'set_match') return;
      const courtNum = cmd.court || 1;
      if(cmd.ri!=null && cmd.mi!=null){
        _bvApplySelection(courtNum, cmd.ri, cmd.mi, cmd.groupLabel||cmd.label||'', cmd.domId);
      }
    };
  }catch(e){}
})();

// storage мқҙлІӨнҠё: sgp_display_vs_court_N ліҖкІҪ мӢң н•ҳмқҙлқјмқҙнҠё лҸҷкё°нҷ”
window.addEventListener('storage', function(e){
  if(!e.key || !e.key.startsWith('sgp_display_vs_court_')) return;
  try{
    const courtNum = parseInt(e.key.replace('sgp_display_vs_court_',''));
    const mv = JSON.parse(e.newValue||'{}');
    if(mv.ri!=null && mv.mi!=null){
      _bvApplySelection(courtNum, mv.ri, mv.mi, mv.groupLabel||mv.label||'', mv.domId);
    }
  }catch(err){}
});
</script>
