<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>SGP — 전광판</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@600;700&family=Share+Tech+Mono&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#040408;
  --red:#e63946;--accent:#4cc9f0;--green:#06d6a0;--yellow:#ffd60a;
  --text:#f0f0f8;--text2:#9090b0;--text3:#5a5a7a;
  --border:#2a2a40;
  --timer-color:#4cc9f0; /* 포인트 색상 - 타이머 텍스트 */
}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;overflow:hidden;user-select:none;}

/* 각 화면: contain:layout paint 로 변경 (strict는 오히려 레이어 복잡도 증가) */
#screen-1,#screen-2,#screen-3{position:fixed;inset:0;contain:layout paint;}
#screen-2,#screen-3{display:none;}

/* ══ 1번 전광판 ══ */
#disp1{
  width:100%;height:100%;
  display:grid;grid-template-rows:auto 1fr auto auto;
  padding:28px;gap:16px;position:relative;background:var(--bg);
}
/* radial-gradient 배경 제거 - 전체화면 크기라 비용 큼 */

/* 헤더 */
#d1-hdr{display:flex;align-items:center;gap:14px;border-bottom:2px solid var(--red);padding-bottom:12px;position:relative;z-index:2;}
#d1-ename{font-family:'Bebas Neue',cursive;font-size:clamp(32px,5vw,64px);letter-spacing:3px;line-height:1;flex:1;}
#d1-sub{font-size:14px;color:var(--text2);margin-top:3px;}
/* LIVE: 기본 정지, JS로 활성화 */
#d1-live{font-family:'Share Tech Mono',monospace;font-size:13px;letter-spacing:3px;color:var(--red);border:1px solid var(--red);padding:4px 11px;border-radius:3px;flex-shrink:0;animation:lp 2s infinite;animation-play-state:paused;transform:translateZ(0);}
#d1-live.active{animation-play-state:running;}
@keyframes lp{0%,100%{opacity:1}50%{opacity:.35}}

/* 메인 */
#d1-main{display:flex;gap:14px;align-items:stretch;overflow:hidden;min-height:0;position:relative;z-index:2;}

/* 타이머 */
#d1-timer{flex:1.3;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(255,255,255,.018);border:1px solid rgba(76,201,240,.12);border-radius:9px;padding:18px;position:relative;overflow:hidden;contain:layout;}
.tvlbl{font-family:'Share Tech Mono',monospace;font-size:clamp(10px,1.2vw,13px);letter-spacing:3px;color:var(--text3);margin-bottom:5px;text-transform:uppercase;}
#d1-chal{font-family:'Bebas Neue',cursive;font-size:clamp(28px,4vw,52px);letter-spacing:2px;color:var(--text);margin-bottom:7px;min-height:.8em;position:relative;z-index:1;}
/* text-shadow 제거 - tick마다 repaint 유발 */
#d1-time{font-family:'Share Tech Mono',monospace;font-size:clamp(60px,12vw,160px);line-height:1;letter-spacing:-1px;color:var(--timer-color);transition:color .3s;position:relative;z-index:1;contain:layout style;}
#d1-time.running{color:var(--timer-color);}
#d1-time.stopped{color:var(--red);}
#d1-lap{font-family:'Share Tech Mono',monospace;font-size:clamp(10px,1.4vw,18px);color:var(--text3);margin-top:5px;letter-spacing:2px;position:relative;z-index:1;}

/* 우측 패널 */
#d1-right{flex:1;display:flex;flex-direction:column;gap:8px;min-height:0;}

/* VS */
#d1-vs{display:flex;align-items:center;justify-content:center;gap:clamp(8px,2vw,20px);background:rgba(230,57,70,.04);border:1px solid rgba(230,57,70,.15);border-radius:9px;padding:clamp(8px,1.5vw,16px);flex-shrink:0;position:relative;z-index:2;}
.d1vs-pl{flex:1;text-align:center;}
.d1vs-nm{font-family:'Bebas Neue',cursive;font-size:clamp(18px,3vw,48px);letter-spacing:2px;line-height:1.1;}
.d1vs-sub{font-size:clamp(8px,.8vw,11px);color:var(--text3);font-family:'Share Tech Mono',monospace;letter-spacing:2px;margin-top:2px;}
.d1vs-vs{font-family:'Bebas Neue',cursive;font-size:clamp(18px,3.5vw,52px);color:var(--red);letter-spacing:3px;flex-shrink:0;}

/* 순위 */
#d1-rank{flex:1;display:flex;flex-direction:column;gap:5px;min-height:0;overflow:hidden;position:relative;z-index:2;}
.rrow{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.018);border-radius:6px;padding:clamp(5px,.8vw,10px) clamp(8px,1vw,14px);border:1px solid rgba(255,255,255,.035);}
.rrow.r1{border-color:rgba(255,214,10,.2);background:rgba(255,214,10,.04);}
.rrow.r2{border-color:rgba(192,192,192,.2);background:rgba(192,192,192,.04);}
.rrow.r3{border-color:rgba(205,127,50,.2);background:rgba(205,127,50,.04);}
.rno{font-family:'Bebas Neue',cursive;font-size:clamp(18px,2.5vw,32px);color:var(--text3);width:32px;text-align:center;flex-shrink:0;}
.rrow.r1 .rno{color:var(--yellow);}
.rrow.r2 .rno{color:#c0c0c0;}
.rrow.r3 .rno{color:#cd7f32;}
.rdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.rnm{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:clamp(14px,2vw,24px);flex:1;letter-spacing:.5px;}
.rtm{font-family:'Share Tech Mono',monospace;font-size:clamp(11px,1.5vw,18px);color:var(--accent);}
.rrow.empty .rnm{color:var(--text3);font-weight:400;}
.rrow.empty .rtm{color:var(--text3);}

/* 푸터 */
#d1-ftr{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);padding-top:8px;position:relative;z-index:2;}
#d1-gname{font-family:'Share Tech Mono',monospace;font-size:clamp(10px,1.2vw,14px);letter-spacing:3px;color:var(--text3);}
#d1-clk{font-family:'Share Tech Mono',monospace;font-size:clamp(11px,1.4vw,16px);color:var(--text2);}

/* 티커: 기본 정지, 1번 화면 표시 중일 때만 실행 */
#d1-tk{overflow:hidden;border-top:1px solid rgba(255,255,255,.035);padding-top:5px;position:relative;z-index:2;}
#d1-tki{display:inline-block;white-space:nowrap;font-family:'Share Tech Mono',monospace;font-size:clamp(10px,1.2vw,13px);letter-spacing:2px;color:var(--text3);animation:ticker 22s linear infinite;animation-play-state:paused;transform:translateZ(0);}
#screen-1.visible #d1-tki{animation-play-state:running;}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* vs-off / rank-off */
#d1-main.vs-off   #d1-vs{display:none;}
#d1-main.rank-off #d1-rank{display:none;}
#d1-main.rank-off.vs-off #d1-right{display:none;}
#d1-main.rank-off.vs-off #d1-timer{flex:1;}
#d1-main.rank-off:not(.vs-off) #d1-vs{flex:1;flex-direction:column;justify-content:center;gap:16px;}
#d1-main.rank-off:not(.vs-off) .d1vs-nm{font-size:clamp(28px,5vw,72px);}
#d1-main.rank-off:not(.vs-off) .d1vs-vs{font-size:clamp(30px,5.5vw,80px);}

/* ══ 2번 화면 ══ */
#disp2{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(16px,3vh,40px);background:var(--bg);position:relative;}
#d2-lbl{font-family:'Share Tech Mono',monospace;font-size:clamp(14px,2vw,22px);letter-spacing:4px;color:var(--text3);z-index:2;}
#d2-row{display:flex;align-items:center;gap:clamp(30px,6vw,100px);z-index:2;width:80%;}
.d2-pl{flex:1;text-align:center;}
.d2-nm{font-family:'Bebas Neue',cursive;font-size:clamp(40px,9vw,120px);letter-spacing:3px;line-height:1;white-space:nowrap;overflow:hidden;}
.d2-sub{font-size:clamp(12px,1.5vw,20px);color:var(--text3);margin-top:8px;font-family:'Share Tech Mono',monospace;letter-spacing:3px;}
#d2-vs{font-family:'Bebas Neue',cursive;font-size:clamp(50px,10vw,120px);color:var(--red);letter-spacing:5px;flex-shrink:0;}
#d2-info{font-family:'Share Tech Mono',monospace;font-size:clamp(12px,1.5vw,18px);color:var(--text3);letter-spacing:3px;z-index:2;}
#d2-court{font-family:'Share Tech Mono',monospace;font-size:clamp(11px,1.5vw,16px);letter-spacing:4px;color:var(--accent,#4cc9f0);z-index:2;min-height:1.2em;}

/* ══ 3번 화면 — 탭3 스타일 경기 카드 ══ */
#disp3{width:100%;height:100%;display:flex;flex-direction:column;background:var(--bg);position:relative;overflow:hidden;}
#d3-toolbar{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg2);flex-wrap:wrap;}
#d3-list{flex:1;overflow:auto;padding:12px 14px;scrollbar-width:thin;scrollbar-color:var(--border) var(--bg2);}
/* 탭3 카드 재사용 스타일 */
.d3-card{padding:6px 8px;border-radius:7px;margin-bottom:3px;cursor:default;transition:background .1s;}
.d3-card.live{border:1px solid var(--red);background:rgba(230,57,70,.1);box-shadow:0 0 0 1px var(--red);}
.d3-card.done{border:1px solid rgba(6,214,160,.35);background:rgba(6,214,160,.04);}
.d3-card.wait{border:1px solid var(--border);background:var(--card);opacity:.55;}
.d3-card.normal{border:1px solid var(--border);background:var(--card);}
.d3-row1{display:flex;align-items:center;gap:5px;margin-bottom:3px;}
.d3-row2{display:flex;align-items:center;gap:4px;padding-left:2px;}
.d3-badge{font-size:8px;border:1px solid;border-radius:3px;padding:1px 4px;font-family:'Share Tech Mono',monospace;flex-shrink:0;}
.d3-badge.live{color:var(--red);border-color:var(--red);}
.d3-badge.done{font-size:10px;color:var(--green);border:none;font-weight:700;}
.d3-badge.wait{color:var(--text3);border-color:var(--border);}
#pts-bracket-view{flex:1;min-height:0;overflow:auto;display:block;}

/* 오버레이 */
#countdown-overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.9);display:none;flex-direction:column;align-items:center;justify-content:center;}
#countdown-overlay.show{display:flex;}
#countdown-num{font-family:'Bebas Neue',cursive;font-size:30vw;color:var(--red);line-height:1;transform:translateZ(0);}
@keyframes cntPulse{0%{transform:scale(1.3);opacity:0}60%{transform:scale(1);opacity:1}100%{transform:scale(.92);opacity:.7}}
#countdown-go{font-family:'Bebas Neue',cursive;font-size:20vw;color:var(--green);line-height:1;display:none;}

#winner-overlay{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.85);
  z-index:500;
  background:rgba(4,4,14,.95);
  border:2px solid var(--yellow);
  border-radius:20px;
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:36px 56px;
  box-shadow:0 0 80px rgba(255,214,10,.35),0 0 0 1px rgba(255,214,10,.15);
  min-width:min(520px,90vw);
  opacity:0;
  transition:opacity .35s ease, transform .35s ease;
  pointer-events:none;
}
#winner-overlay.show{display:flex;opacity:1;transform:translate(-50%,-50%) scale(1);pointer-events:auto;}
.w-trophy{font-size:clamp(48px,8vw,96px);transform:translateZ(0);}
#winner-overlay.show .w-trophy{animation:tb .9s ease infinite alternate;}
@keyframes tb{from{transform:translateY(0) rotate(-6deg)}to{transform:translateY(-14px) rotate(6deg)}}
.w-badge{
  font-family:'Bebas Neue',cursive;
  font-size:clamp(28px,5vw,56px);
  color:var(--yellow);
  letter-spacing:6px;
  margin:8px 0 4px;
  text-shadow:0 0 30px rgba(255,214,10,.6);
}
.w-matchinfo{
  font-family:'Share Tech Mono',monospace;
  font-size:clamp(13px,1.8vw,22px);
  color:var(--accent);
  letter-spacing:2px;
  margin-bottom:4px;
}
.w-name{font-family:'Bebas Neue',cursive;font-size:clamp(42px,9vw,110px);letter-spacing:4px;color:var(--text);line-height:1.05;}
.w-catinfo{
  font-family:'Share Tech Mono',monospace;
  font-size:clamp(12px,1.6vw,20px);
  color:var(--text2,#9090b0);
  letter-spacing:2px;
  margin-top:6px;
}
.w-time{font-family:'Share Tech Mono',monospace;font-size:clamp(14px,2vw,28px);color:var(--accent);margin-top:8px;}

/* 다음경기 준비중 하단 바 */
#waiting-next{
  position:fixed;bottom:0;left:0;right:0;
  z-index:490;
  background:rgba(4,4,14,.92);
  border-top:1px solid rgba(76,201,240,.35);
  display:none;
  align-items:center;
  justify-content:center;
  padding:14px 24px;
  gap:10px;
}
#waiting-next.show{display:flex;}
@keyframes wdot{0%,100%{opacity:.3}50%{opacity:1}}
.w-wait-dot{font-size:10px;color:var(--accent);animation:wdot 1.4s ease infinite;}

@keyframes livepulse{0%,100%{opacity:1}50%{opacity:.35}}

/* 화면 전환 버튼 — backdrop-filter 제거 */
#screen-btns{position:fixed;bottom:20px;right:20px;z-index:900;display:flex;gap:6px;}
.scr-btn{background:rgba(4,4,8,.92);border:1px solid var(--border);color:var(--text3);font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:1px;padding:9px 14px;border-radius:7px;cursor:pointer;transition:border-color .15s,color .15s;}
.scr-btn:hover{border-color:var(--accent);color:var(--accent);}
.scr-btn.active{border-color:var(--red);color:var(--red);background:rgba(230,57,70,.1);}
</style>
</head>
<body>

<!-- 캐시 무효화: 매 로드마다 새 버전 타임스탬프로 JS 로드 -->
<script>
  // 혹시 등록된 Service Worker 있으면 전부 해제
  if('serviceWorker' in navigator){
    navigator.serviceWorker.getRegistrations().then(function(regs){
      regs.forEach(function(r){ r.unregister(); });
    });
  }
  var _SGP_V = Date.now();
  document.write('<scr'+'ipt src="js/step4.js?v='+_SGP_V+'"><\/scr'+'ipt>');
  document.write('<scr'+'ipt src="js/app.js?v='+_SGP_V+'"><\/scr'+'ipt>');
</script>
<script>
let _raf=false;
/* ── 2번 화면 경기장 모드 ── */
let _d2Mode='court_1'; // 기본: 경기장 1
let _d2RandomIv=null;
let _d2RandomCourt=1;
let _d2CourtList=[];

function _d2ApplyMode(mode){
  _d2Mode=mode;
  if(_d2RandomIv){ clearInterval(_d2RandomIv); _d2RandomIv=null; }
  if(mode==='random'){
    // 경기장을 순서대로 돌아가며 표시
    _d2RandomCourt=1;
    _d2SwitchRandomCourt();
    const iv=parseInt(localStorage.getItem('sgp_d2_random_interval')||'60')*1000;
    _d2RandomIv=setInterval(_d2SwitchRandomCourt, iv);
  } else if(mode.startsWith('court_')){
    const c=parseInt(mode.replace('court_',''));
    _d2ShowCourt(c);
  } else {
    // single: 마지막 선택 경기 그대로
    refresh2();
  }
}

function _d2SwitchRandomCourt(){
  const courtCount=parseInt(localStorage.getItem('sgp_courtCount')||'1');
  if(courtCount<2){ refresh2(); return; }
  _d2ShowCourt(_d2RandomCourt);
  _d2RandomCourt=(_d2RandomCourt%courtCount)+1;
}

function _d2ShowCourt(courtNum){
  // 상단 경기장 레이블 — 항상 표시
  const courtEl=document.getElementById('d2-court');
  if(courtEl){ courtEl.textContent=`// 경기장 ${courtNum}`; courtEl.style.display=''; }

  // 1) 수동으로 선택된 경기 확인
  try{
    const manualStr=localStorage.getItem(`sgp_display_vs_court_${courtNum}`);
    if(manualStr){
      const mv=JSON.parse(manualStr);
      if(mv&&mv.p1&&mv.p2){
        _set('d2-p1',cleanName(mv.p1)); _set('d2-p2',cleanName(mv.p2));
        {
          const _seq = mv.matchLabel ? mv.matchLabel.split('-').pop() : '';
          const _hasSeq = mv.label && mv.label.includes('경기');
          _set('d2-info', (_seq && !_hasSeq) ? `${mv.label||''} · ${_seq}경기` : (mv.label||''));
        }
        _updateMatchNum(courtNum, mv.ri, mv.mi, mv.seqMi);
        return;
      }
    }
  }catch(e){}

  // 2) 진행 중인 첫 경기 자동 탐색
  try{
    const groups=JSON.parse(localStorage.getItem('sgp_groupBrackets')||'[]');
    const courtGroups=groups.filter(g=>(g.court||1)===courtNum);
    let found=null;
    outer: for(const g of courtGroups){
      if(!g.matches) continue;
      for(let ri=0;ri<g.matches.length;ri++){
        const round=g.matches[ri];
        for(let mi=0;mi<round.length;mi++){
          const m=round[mi];
          if(!m.winner&&m.p1&&m.p2&&!m.bye){
            const p1n=typeof m.p1==='object'?m.p1.name:m.p1;
            const p2n=typeof m.p2==='object'?m.p2.name:m.p2;
            found={p1:p1n,p2:p2n,label:g.label,ri,mi,seqMi:m._seqMi};
            break outer;
          }
        }
      }
    }
    if(found){
      _set('d2-p1',cleanName(found.p1)); _set('d2-p2',cleanName(found.p2));
      _set('d2-info',found.label);
      _updateMatchNum(courtNum, found.ri, found.mi, found.seqMi);
    } else {
      _set('d2-p1','—'); _set('d2-p2','—');
      _set('d2-info','');
      _updateMatchNum(courtNum, null, null, null);
    }
  }catch(e){ refresh2(); }

  // 내용 세팅 후 시각 설정(크기/표시여부/폰트/색상) 적용
  _applyD2VisualSettings();
}

function _applyD2VisualSettings(){
  const cfg = getCfg();
  const courtShow    = localStorage.getItem('sgp_d2_court_show')    !== 'false';
  const courtSize    = parseInt(localStorage.getItem('sgp_d2_court_size')    || '0');
  const infoShow     = localStorage.getItem('sgp_d2_info_show')     !== 'false';
  const infoSize     = parseInt(localStorage.getItem('sgp_d2_info_size')     || '0');
  const nameShow     = localStorage.getItem('sgp_d2_name_show')     !== 'false';
  const nameSize     = parseInt(localStorage.getItem('sgp_d2_name_size')     || '0');
  const matchNumShow = localStorage.getItem('sgp_d2_matchnum_show') === 'true';
  const matchNumSize = parseInt(localStorage.getItem('sgp_d2_matchnum_size') || '0');
  const vsColor      = localStorage.getItem('sgp_d2_vs_color');

  const ct = document.getElementById('d2-court');
  if(ct){ ct.style.display=courtShow?'':'none'; if(courtSize) ct.style.fontSize=courtSize+'px'; }

  const infoEl = document.getElementById('d2-info');
  if(infoEl){ infoEl.style.display=infoShow?'':'none'; if(infoSize) infoEl.style.fontSize=infoSize+'px'; }

  document.querySelectorAll('#d2-row .d2-pl').forEach(pl=>{ pl.style.display=nameShow?'':'none'; });
  if(nameSize) document.querySelectorAll('#d2-row .d2-nm').forEach(nm=>{ nm.style.fontSize=nameSize+'px'; });

  const mnEl = document.getElementById('d2-matchnum');
  if(mnEl){ mnEl.style.display=matchNumShow?'':'none'; if(matchNumSize) mnEl.style.fontSize=matchNumSize+'px'; }

  const vsEl = document.getElementById('d2-vs');
  if(vsEl && vsColor) vsEl.style.color=vsColor;

  // 폰트
  const fontMap={'bebas':"'Bebas Neue',cursive",'rajdhani':"'Rajdhani',sans-serif",'mono':"'Share Tech Mono',monospace",'noto':"'Noto Sans KR',sans-serif",'serif':'Georgia,serif'};
  const ff = fontMap[cfg.vs2Font||cfg.titleFont]||fontMap.bebas;
  ['d2-p1','d2-p2','d2-vs'].forEach(id=>{ const el=document.getElementById(id); if(el) el.style.fontFamily=ff; });

  // 배경
  const disp2 = document.getElementById('disp2');
  if(disp2){
    const BG={dark:'var(--bg)',gradient:'linear-gradient(135deg,#0a0a1a 0%,#1a0a2e 100%)',blur:'rgba(10,10,20,0.95)',solid:'#0d1b2a'};
    disp2.style.background=BG[cfg.vs2Bg||'dark']||BG.dark;
  }
}

function _updateMatchNum(courtNum, ri, mi, seqMi){

// ── 3번: bracket-view embed 스타일 리스트뷰 ──
const _d3CurrentMatch = {};

function refresh3(){
  const view = document.getElementById('pts-bracket-view');
  if(!view) return;
  let groups = [];
  try{ groups = JSON.parse(localStorage.getItem('sgp_groupBrackets')||'[]'); }catch(e){}
  if(!groups.length){
    view.innerHTML = '<div style="color:var(--text3);font-family:\'Share Tech Mono\',monospace;font-size:13px;padding:30px;text-align:center;">저장된 대진표가 없습니다</div>';
    return;
  }

  // 경기장별 현재 선택경기 → _d3CurrentMatch 갱신
  const courtCount = parseInt(localStorage.getItem('sgp_courtCount')||'1');
  for(let c=1; c<=Math.max(courtCount,8); c++){
    const stored = localStorage.getItem(`sgp_display_vs_court_${c}`);
    if(!stored){ delete _d3CurrentMatch[c]; continue; }
    try{
      const mv = JSON.parse(stored);
      if(mv.ri!=null && mv.mi!=null && mv.groupLabel){
        const slTarget = mv.groupLabel.split('/').map((p,pi)=>pi===0?p.trim():p.trim().replace('부','')).join('·');
        const gi = groups.findIndex(g=>{
          const sl = g.label.split('/').map((p,pi)=>pi===0?p.trim():p.trim().replace('부','')).join('·');
          return sl===slTarget || g.label===mv.groupLabel;
        });
        if(gi>=0) _d3CurrentMatch[c] = {gi, ri:mv.ri, mi:mv.mi};
        else delete _d3CurrentMatch[c];
      }
    }catch(e){ delete _d3CurrentMatch[c]; }
  }

  _d3RenderListView(view, groups);
}


// ── bracket-view embed 스타일 리스트뷰 렌더 ──
function _d3ComputeOffsets(groups){
  const courtRound={};
  groups.forEach(g=>{
    const c=g.court||1;
    if(!courtRound[c]) courtRound[c]={};
    g._roundOffset={};
    (g.matches||[]).forEach((round,ri)=>{
      if(!courtRound[c][ri]) courtRound[c][ri]=0;
      g._roundOffset[ri]=courtRound[c][ri];
      courtRound[c][ri]+=round.length;
    });
  });
}

function _d3RenderListView(view, groups){
  view.innerHTML='';
  view.style.cssText='flex:1;min-height:0;overflow:auto;padding:10px 12px;display:block;background:var(--bg);';

  _d3ComputeOffsets(groups);

  const courts={};
  groups.forEach((g,gi)=>{
    const c=g.court||1;
    if(!courts[c]) courts[c]=[];
    courts[c].push({g,gi});
  });

  const courtNums=Object.keys(courts).map(Number).sort();
  const roundNames=['1라운드','2라운드','3라운드','4라운드','5라운드','준결승','결승'];
  const globalMaxRi=Math.max(...courtNums.map(c=>Math.max(...courts[c].map(({g})=>g.matches.length))));
  const cols=courtNums.length;

  for(let ri=0; ri<globalMaxRi; ri++){
    const hasAny=courtNums.some(c=>courts[c].some(({g})=>g.matches[ri]&&g.matches[ri].length));
    if(!hasAny) continue;

    let rName;
    if(ri===globalMaxRi-1&&globalMaxRi>1) rName='결승';
    else if(ri===globalMaxRi-2&&globalMaxRi>2) rName='준결승';
    else rName=roundNames[ri]||`${ri+1}라운드`;

    const roundSection=document.createElement('div');
    roundSection.style.cssText='margin-bottom:20px;';

    const hdrRow=document.createElement('div');
    hdrRow.style.cssText=`display:grid;grid-template-columns:repeat(${cols},1fr);gap:8px;margin-bottom:5px;padding-bottom:5px;border-bottom:1px solid var(--border);`;
    courtNums.forEach(c=>{
      const ch=document.createElement('div');
      ch.style.cssText='display:flex;align-items:center;gap:8px;';
      ch.innerHTML=`<span style="font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--accent);font-weight:700;">경기장 ${c}</span><span style="font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:1px;">${rName.toUpperCase()}</span>`;
      hdrRow.appendChild(ch);
    });
    roundSection.appendChild(hdrRow);

    const courtMatches={};
    courtNums.forEach(c=>{
      courtMatches[c]=[];
      courts[c].forEach(({g,gi})=>{
        if(!g.matches[ri]) return;
        g.matches[ri].forEach((m,mi)=>{
          const seqNum=((g._roundOffset&&g._roundOffset[ri]!=null)?g._roundOffset[ri]:0)+mi+1;
          const label=`${c}-${ri+1}-${seqNum}`;
          const shortLabel=g.label.split('/').map(s=>s.trim()).map((p,pi)=>pi===0?p:p.replace('부','')).join('·');
          courtMatches[c].push({g,gi,m,mi,label,shortLabel});
        });
      });
    });

    const colsWrap=document.createElement('div');
    colsWrap.style.cssText=`display:grid;grid-template-columns:repeat(${cols},1fr);gap:8px;align-items:start;`;
    courtNums.forEach(c=>{
      const col=document.createElement('div');
      col.style.cssText='display:flex;flex-direction:column;gap:3px;';
      courtMatches[c].forEach(({g,gi,m,mi,label,shortLabel})=>{
        col.appendChild(_d3BuildRow(g,gi,ri,mi,m,label,shortLabel));
      });
      colsWrap.appendChild(col);
    });

    roundSection.appendChild(colsWrap);
    view.appendChild(roundSection);
  }
}

// ── 경기 카드 (bracket-view _bvBuildRow 동일 방식) ──
function _d3BuildRow(g,gi,ri,mi,m,label,shortLabel){
  const courtNum=g.court||1;
  const cur=_d3CurrentMatch[courtNum];
  const isCur=cur&&cur.gi===gi&&cur.ri===ri&&cur.mi===mi;
  const isDone=!!m.winner;
  const isBye=m.p1&&!m.p2;
  const p1tbd=m.p1&&m.p1.tbd;
  const p2tbd=m.p2&&m.p2.tbd;

  const _resolve=(slot)=>{
    const p=m[slot]; if(!p||!p.tbd) return null;
    const fromKey=slot==='p1'?m.fromA:m.fromB;
    if(fromKey){
      const parts=fromKey.split('-');
      if(parts.length>=2){
        const pRi=parseInt(parts[0]),pMi=parseInt(parts[1]);
        if(!isNaN(pRi)&&!isNaN(pMi)){
          const prev=g.matches[pRi]&&g.matches[pRi][pMi];
          if(prev&&prev.winner) return prev.winner.name;
        }
      }
    }
    if(ri>0){
      const prevRound=g.matches[ri-1];
      if(prevRound){
        if(slot==='p1'&&prevRound[mi*2]&&prevRound[mi*2].winner) return prevRound[mi*2].winner.name;
        if(slot==='p2'&&prevRound[mi*2+1]&&prevRound[mi*2+1].winner) return prevRound[mi*2+1].winner.name;
      }
    }
    return null;
  };
  const p1resolved=_resolve('p1');
  const p2resolved=_resolve('p2');
  const p1n=p1resolved||(m.p1&&m.p1.name)||'?';
  const p2n=p2resolved||(m.p2&&m.p2.name)||'?';
  const winnerN=m.winner&&m.winner.name;
  const isPending=!isDone&&((p1tbd&&!p1resolved)||(p2tbd&&!p2resolved));

  const borderColor=isCur?'var(--red)':isDone?'rgba(6,214,160,.5)':isPending?'rgba(70,70,100,.5)':'var(--border)';
  const bgColor=isCur?'rgba(230,57,70,.08)':isDone?'rgba(6,214,160,.04)':isPending?'rgba(20,20,38,.8)':'var(--card)';

  const row=document.createElement('div');
  row.style.cssText=`border:1px solid ${borderColor};background:${bgColor};border-radius:7px;padding:7px 10px;transition:background .1s;${isPending?'opacity:.65;':''  }${isCur?'box-shadow:0 0 0 1px var(--red);':''  }`;

  // 윗줄: 경기번호 / 체급 / 상태뱃지
  const topRow=document.createElement('div');
  topRow.style.cssText='display:flex;align-items:center;gap:6px;margin-bottom:4px;';

  const lbl=document.createElement('span');
  lbl.style.cssText=`font-family:'Share Tech Mono',monospace;font-size:11px;font-weight:700;color:${isCur?'var(--red)':isPending?'var(--text3)':'var(--accent)'};flex-shrink:0;`;
  lbl.textContent=label;
  topRow.appendChild(lbl);

  const sep=document.createElement('span');
  sep.style.cssText='color:var(--border2);font-size:10px;flex-shrink:0;';
  sep.textContent='/';
  topRow.appendChild(sep);

  const cat=document.createElement('span');
  cat.style.cssText='font-size:10px;color:var(--text3);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;';
  cat.textContent=shortLabel;
  topRow.appendChild(cat);

  if(isCur){
    const b=document.createElement('span');
    b.style.cssText='font-size:8px;color:var(--red);border:1px solid var(--red);border-radius:3px;padding:1px 4px;font-family:"Share Tech Mono",monospace;flex-shrink:0;animation:livepulse 1.2s ease-in-out infinite;';
    b.textContent='LIVE';
    topRow.appendChild(b);
  } else if(isDone){
    const b=document.createElement('span');
    b.style.cssText='font-size:10px;color:var(--green);flex-shrink:0;font-weight:700;';
    b.textContent='✓';
    topRow.appendChild(b);
  } else if(isPending){
    const b=document.createElement('span');
    b.style.cssText='font-size:8px;color:var(--text3);border:1px solid var(--border2);border-radius:3px;padding:1px 4px;font-family:"Share Tech Mono",monospace;flex-shrink:0;';
    b.textContent='대기';
    topRow.appendChild(b);
  }
  row.appendChild(topRow);

  // 아랫줄: 선수 이름 + 복장 색상 dot
  const nameRow=document.createElement('div');
  nameRow.style.cssText='display:flex;align-items:center;gap:5px;padding-left:2px;';

  const D3C=['#d0d0d0','#e63946','#4cc9f0','#ffd60a'];
  const D3B=['transparent','rgba(230,57,70,.18)','rgba(76,201,240,.18)','rgba(255,214,10,.18)'];

  const mkSpan=(pName,slot,forceColor,forceWeight,prefix)=>{
    prefix=prefix||'';
    const span=document.createElement('span');
    const idx=m[slot+'ColorIdx']||0;
    const base=forceColor||(idx>0?D3C[idx]:'#d0d0d0');
    span.style.cssText=`font-size:12px;font-weight:${forceWeight||'500'};color:${base};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-radius:3px;padding:0 3px;`;
    if(!forceColor&&idx>0) span.style.background=D3B[idx];
    const dot=idx>0?`<span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${D3C[idx]};margin-right:3px;vertical-align:middle;"></span>`:'';
    span.innerHTML=prefix+dot+pName;
    return span;
  };

  if(isBye){
    nameRow.appendChild(mkSpan(p1n,'p1',isDone?'var(--green)':null,isDone?'700':'600'));
    const byeBadge=document.createElement('span');
    byeBadge.style.cssText='font-size:9px;color:var(--accent);margin-left:2px;flex-shrink:0;';
    byeBadge.textContent='BYE';
    nameRow.appendChild(byeBadge);
    if(isDone){
      const doneTag=document.createElement('span');
      doneTag.style.cssText='font-size:9px;color:var(--green);margin-left:4px;flex-shrink:0;';
      doneTag.textContent='✓ 진출';
      nameRow.appendChild(doneTag);
    }
  } else {
    const isW1=winnerN&&winnerN===p1n;
    const isW2=winnerN&&winnerN===p2n;
    const c1=winnerN?(isW1?'var(--green)':'#444'):(p1tbd&&!p1resolved?'var(--text3)':null);
    const c2=winnerN?(isW2?'var(--green)':'#444'):(p2tbd&&!p2resolved?'var(--text3)':null);
    const sp1=mkSpan(p1n,'p1',c1,isW1?'700':'500',isW1?'🏆 ':'');
    const vsSpan=document.createElement('span');
    vsSpan.style.cssText="font-family:'Bebas Neue',cursive;font-size:11px;color:var(--red);flex-shrink:0;";
    vsSpan.textContent='VS';
    const sp2=mkSpan(p2n,'p2',c2,isW2?'700':'500',isW2?'🏆 ':'');
    nameRow.appendChild(sp1);
    nameRow.appendChild(vsSpan);
    nameRow.appendChild(sp2);
  }
  row.appendChild(nameRow);
  return row;
}

function renderRank(state,cfg){
  const el=document.getElementById('d1-rank');
  const ranking=App.getRanking(), max=cfg.rankCount||6;
  const medals=['🥇','🥈','🥉'];
  let html='';
  for(let i=0;i<max;i++){
    const item=ranking[i], p=item?.participant;
    const cls=i===0?'r1':i===1?'r2':i===2?'r3':'';
    const empty=!p||!item?.best;
    html+=`<div class="rrow ${cls}${empty?' empty':''}"><div class="rno">${medals[i]||(i+1)}</div><div class="rdot" style="background:${p?.color||'var(--border)'}"></div><div class="rnm">${p?.name||'—'}</div><div class="rtm">${item?.best?App.formatTime(item.best.time):'——'}</div></div>`;
  }
  if(el.innerHTML!==html) el.innerHTML=html;
}

function updateTicker(cfg,di,ss){
  const el=document.getElementById('d1-tki'); if(!el)return;
  const p=[];
  if(di.eventname&&(cfg.eventName||ss.en)) p.push('★ '+(cfg.eventName||ss.en));
  if(di.slogan1  &&(cfg.slogan1  ||ss.s1)) p.push('▶ '+(cfg.slogan1  ||ss.s1));
  if(di.slogan2  &&(cfg.slogan2  ||ss.s2)) p.push('▶ '+(cfg.slogan2  ||ss.s2));
  if(di.date     &&(cfg.dt       ||ss.dt)) p.push('📅 '+(cfg.dt       ||ss.dt));
  if(di.place    &&(cfg.pl       ||ss.pl)) p.push('📍 '+(cfg.pl       ||ss.pl));
  if(di.sponsor  &&(cfg.sponsor  ||ss.sp)) p.push('🤝 '+(cfg.sponsor  ||ss.sp));
  if(!p.length) p.push('SGP PLATFORM','⚡ SENSOR GAME PLATFORM','★ READY');

  if(el.textContent!==full) el.textContent=full;
}

function getVs(state){
  const pts=state.participants||[];
  const resolveName=v=>{
    if(!v) return '—';
    if(typeof v==='object') return cleanName(v.name||'?');
    const found=pts.find(p=>p.id===v||p.name===v);
    return cleanName(found?found.name:v);
  };
  const rounds=state.tournament?.rounds||state.matches||[];
  for(const round of rounds)
    for(const m of (Array.isArray(round)?round:[]))
      if(m.p1&&m.p2&&!m.winner)
        return{p1:resolveName(m.p1), p2:resolveName(m.p2)};
  return{p1:'—',p2:'—'};
}

let _winnerTimer=null;
function showWinner(name,time,court,matchLabel,shortLabel,seqNum){
  // ── 폴백 1: 메모리 변수 (_d3LastMatch) ──
  if(!court || !matchLabel){
    const fallbackCourt = court || window._d3LastMatchCourt;
    const last = fallbackCourt && window._d3LastMatch ? window._d3LastMatch[fallbackCourt] : null;
    if(last){
      court      = court      || last.court;
      matchLabel = matchLabel || last.matchLabel;
      shortLabel = shortLabel || last.shortLabel;
      seqNum     = seqNum     || last.seqNum;
    }
  }

  // ── 폴백 2: localStorage 직접 조회 ──
  // 우선순위: 가장 최근 선택된 경기장(_d3LastMatchCourt) → 이름 매칭 순으로 탐색
  if(!court || !matchLabel){
    const _cln=n=>(n||'').replace(/^\d+-\d+\s*/,'').replace(/^\d+번\s*/,'').replace(/[()[\]]/g,'').trim().toLowerCase();
    const winClean=_cln(name);
    // 최근 선택 경기장 우선 확인
    const courtOrder=[];
    if(window._d3LastMatchCourt) courtOrder.push(window._d3LastMatchCourt);
    for(let c=1;c<=8;c++){ if(c!==window._d3LastMatchCourt) courtOrder.push(c); }

    for(const c of courtOrder){
      try{
        const stored=localStorage.getItem(`sgp_display_vs_court_${c}`);
        if(!stored) continue;
        const mv=JSON.parse(stored);
        if(!mv.court) continue;
        const p1c=_cln(mv.p1||''), p2c=_cln(mv.p2||'');
        // 이름이 정확히 매칭될 때만 선택 (빈 이름으로 매칭 금지)
        if(winClean && (p1c===winClean || p2c===winClean)){
          court      = court      || mv.court;
          matchLabel = matchLabel || mv.matchLabel || '';
          const gl   = mv.groupLabel || '';
          shortLabel = shortLabel || gl.split('/').map((s,i)=>i===0?s.trim():s.trim().replace('부','')).join('·');
          seqNum     = seqNum     || (matchLabel ? matchLabel.split('-').pop() : '');
          break;
        }
      }catch(e){}
    }
  }

  // ── 폴백 3: 마지막 수단 — 경기장 번호라도 표시 ──
  if(!court && window._d3LastMatchCourt){
    court = window._d3LastMatchCourt;
  }

  // 이름 정리: 번호 접두사(1-2, 3번 등)·괄호 제거
  const _cleanWinName=n=>{
    if(!n||n==='—') return n||'—';
    return n.replace(/^\d+-\d+\s*/,'').replace(/^\d+번\s*/,'').replace(/[()[\]]/g,'').trim()||n;
  };
  _set('w-name', _cleanWinName(name)||'—');

  // 경기장 / 경기번호 줄: "경기장1 / 1-1-2 경기"
  const matchInfoEl = document.getElementById('w-matchinfo');
  if(matchInfoEl){
    const courtTxt = court ? `경기장${court}` : '';
    const matchTxt = matchLabel ? `${matchLabel} 경기` : '';
    matchInfoEl.textContent = [courtTxt, matchTxt].filter(Boolean).join('  /  ');
  }

  // 체급·경기 줄: "남·고등·65kg · 2경기"
  const catInfoEl = document.getElementById('w-catinfo');
  if(catInfoEl){
    const seqTxt = seqNum ? `${seqNum}경기` : '';
    catInfoEl.textContent = [shortLabel, seqTxt].filter(Boolean).join(' · ');
  }

  const ov=document.getElementById('winner-overlay');
  const wb=document.getElementById('waiting-next');
  // 이전 타이머 취소
  if(_winnerTimer){clearTimeout(_winnerTimer);_winnerTimer=null;}
  // 준비중 배너 숨기고 승리 배너 표시
  if(wb) wb.classList.remove('show');
  if(ov) ov.classList.add('show');
  // 10초 후 승리 배너 숨기고 준비중 배너 표시
  _winnerTimer=setTimeout(()=>{
    if(ov) ov.classList.remove('show');
    if(wb){
      const courtTxt = court ? `${court}경기장` : '';
      const waitTxtEl = document.getElementById('waiting-next-txt');
      if(waitTxtEl) waitTxtEl.textContent = courtTxt ? `${courtTxt} 다음경기 준비중 입니다~` : '다음경기 준비중...';
      wb.classList.add('show');
    }
    _winnerTimer=null;
  },10000);
}

let currentScreen=1;
function switchScreen(n){
  currentScreen=n;
  document.getElementById('screen-1').style.display=n===1?'block':'none';
  document.getElementById('screen-2').style.display=n===2?'block':'none';
  document.getElementById('screen-3').style.display=n===3?'block':'none';
  // 1번 화면일 때만 티커 애니메이션 실행
  document.getElementById('screen-1').classList.toggle('visible', n===1);
  [1,2,3].forEach(i=>{
    const b=document.getElementById('scr-btn-'+i);
    if(b) b.classList.toggle('active',i===n);
  });
  try{localStorage.setItem('sgp_screen',String(n));}catch(e){}
  const syncBtn=document.getElementById('scr-btn-sync');
  if(syncBtn) syncBtn.style.display=n===3?'':'none';
  if(n===2) refresh2();
  if(n===3) refresh3();
}

const cleanName=n=>{
  if(!n) return '—';
  const nameOnly=_getD2Cfg().nameOnly;
  if(nameOnly) return n.replace(/^\d+번\s*/,'').replace(/^\d+-\d+\s*/,'').replace(/[()[\]]/g,'').trim()||n;
  return n.replace(/[()[\]]/g,'').trim()||n;
};

// ── 3번탭 동기화: sgp_groupBrackets 강제 로드 ──
function _syncFromTab3(){
  try{
    const gb = JSON.parse(localStorage.getItem('sgp_groupBrackets') || '[]');
    if(gb && gb.length && currentScreen===3){
      refresh3();
    }
  }catch(e){}
}

function handleCmd(cmd){
  if(!cmd)return;
  if(cmd.type==='set_match'){
    // 다음경기 선택되면 준비중 배너 + 승리 배너 즉시 제거
    const _wb=document.getElementById('waiting-next');
    const _ov=document.getElementById('winner-overlay');
    if(_wb) _wb.classList.remove('show');
    if(_ov) _ov.classList.remove('show');
    if(_winnerTimer){clearTimeout(_winnerTimer);_winnerTimer=null;}

    // ── winner 표시용 폴백: 경기 정보 저장 ──
    if(cmd.court){
      window._d3LastMatch = window._d3LastMatch || {};
      const _gl = cmd.groupLabel || cmd.label || '';
      const _sl = _gl.split('/').map((s,i)=>i===0?s.trim():s.trim().replace('부','')).join('·');
      const _ml = cmd.matchLabel || '';
      window._d3LastMatch[cmd.court] = {
        court: cmd.court,
        matchLabel: _ml,
        shortLabel: _sl,
        seqNum: _ml ? _ml.split('-').pop() : ''
      };
      window._d3LastMatchCourt = cmd.court;
    }

    const p1=cleanName(cmd.p1||'—'), p2=cleanName(cmd.p2||'—');

    // 경기장별 localStorage 저장 (수동 선택 기록) — ri/mi/groupLabel 포함
    if(cmd.court){
      try{ localStorage.setItem(`sgp_display_vs_court_${cmd.court}`, JSON.stringify({p1:cmd.p1||'—',p2:cmd.p2||'—',label:cmd.label||'',matchLabel:cmd.matchLabel||'',court:cmd.court,ri:cmd.ri,mi:cmd.mi,groupLabel:cmd.groupLabel||cmd.label||''})); }catch(e){}
    }

    // 3번 화면이면 대진표 즉시 갱신
    if(currentScreen===3) refresh3();

    // court_N 모드이면 해당 경기장만 갱신
    if(_d2Mode===`court_${cmd.court}`){
      _d2ShowCourt(cmd.court);
    } else if(_d2Mode==='single' || !_d2Mode || _d2Mode===''){
      // single 모드: 들어오는 모든 경기 표시
      _set('d1-vs-p1', p1); _set('d1-vs-p2', p2);
      _set('d2-p1',    p1); _set('d2-p2',    p2);
      _set('d2-info',  cmd.label||'');
      const courtCount=parseInt(localStorage.getItem('sgp_courtCount')||'1');
      const courtEl=document.getElementById('d2-court');
      if(courtEl){
        if(cmd.court>0 && courtCount>1){
          courtEl.textContent=`// 경기장 ${cmd.court}`;
          courtEl.style.display='';
        } else {
          courtEl.textContent='';
          courtEl.style.display='none';
        }
      }
    }
    // random 모드: 타이머가 자동 처리
  }
  if(cmd.type==='countdown')   triggerCountdown();
  if(cmd.type==='winner')      showWinner(cmd.name,cmd.time,cmd.court,cmd.matchLabel,cmd.shortLabel,cmd.seqNum);
  if(cmd.type==='clear_match'){
    // 해당 경기장 하이라이트 제거 후 대진표 갱신
    if(cmd.court){
      try{ localStorage.removeItem(`sgp_display_vs_court_${cmd.court}`); }catch(e){}
    }
    if(currentScreen===3) refresh3();
  }
  // 3번탭 데이터 저장 시 즉시 대진표 갱신 (3번 화면만)
  if(cmd.type==='brackets_update'){
    if(currentScreen===3) refresh3();
  }
  if(cmd.type==='timer_start'){
    document.getElementById('d1-time').className='running';
    document.getElementById('d1-live').classList.add('active');
    if(cmd.duration) _startCountdownTimer(cmd.duration);
  }
  if(cmd.type==='timer_stop'){
    document.getElementById('d1-time').className='stopped';
    document.getElementById('d1-live').classList.remove('active');
    _stopCountdownTimer();
  }
  if(cmd.type==='timer_reset'){
    _stopCountdownTimer();
    _set('d1-time','00:00.000');
    document.getElementById('d1-time').className='';
    document.getElementById('d1-live').classList.remove('active');
  }
  if(cmd.type==='timer_set'){
    _stopCountdownTimer();
    _set('d1-time', cmd.formatted||'00:00.000');
    document.getElementById('d1-time').className='';
  }
  if(cmd.type==='clear_rank')  scheduleRefresh();
  if(cmd.type==='screen_1')    switchScreen(1);
  if(cmd.type==='screen_2')    switchScreen(2);
  if(cmd.type==='screen_3')    switchScreen(3);
  if(cmd.type==='sgp_d2_mode') _d2ApplyMode(cmd.mode);
  if(cmd.type==='sgp_d2_random_start'){ _d2ApplyMode('random'); }
  if(cmd.type==='sgp_d2_random_stop'){ if(_d2RandomIv){clearInterval(_d2RandomIv);_d2RandomIv=null;} }
  if(cmd.type==='refresh_2')   refresh2();
  if(cmd.type==='d2_cfg')      _applyD2Cfg(cmd);
}

window.addEventListener('storage',e=>{
  if(e.key==='sgp_display_cmd'){
    try{handleCmd(JSON.parse(e.newValue||'{}'));}catch(err){}
  }
  if(e.key==='sgp_display_time')   _set('d1-time', e.newValue||'00:00.000');
  if(e.key==='sgp_display_player') _set('d1-chal', e.newValue||'—');
  if(e.key==='sgp_display_lap')    _set('d1-lap',  e.newValue||'');
  if(e.key==='sgp_display_vs'){
    try{
      const vs=JSON.parse(e.newValue||'{}');
      const p1=cleanName(vs.p1||'—'), p2=cleanName(vs.p2||'—');
      _set('d1-vs-p1', p1); _set('d1-vs-p2', p2);
      _set('d2-p1',    p1); _set('d2-p2',    p2);
      _set('d2-info',  vs.label||'진행 중');
      const courtCount2=parseInt(localStorage.getItem('sgp_courtCount')||'1');
      const courtEl2=document.getElementById('d2-court');
      if(courtEl2){
        if(vs.court>0 && courtCount2>1){ courtEl2.textContent=`// 경기장 ${vs.court}`; courtEl2.style.display=''; }
        else { courtEl2.textContent=''; courtEl2.style.display='none'; }
      }
    }catch(err){}
  }
  if(e.key==='sgp_state'||e.key==='sgp_display_config') scheduleRefresh();
  if(e.key==='sgp_groupBrackets') refresh3();
  if(e.key==='sgp_display_vs'&&currentScreen===3) refresh3();
  if(e.key&&e.key.startsWith('sgp_display_vs_court_')&&currentScreen===3) refresh3();
  if(e.key==='sgp_d2_mode'){ _d2ApplyMode(e.newValue||'single'); }
});

document.addEventListener('keydown',e=>{
  if(e.key==='F1'){e.preventDefault();switchScreen(1);}
  if(e.key==='F2'){e.preventDefault();switchScreen(2);}
  if(e.key==='F3'){e.preventDefault();switchScreen(3);}
  if(e.key==='Tab'){e.preventDefault();switchScreen();}
});

refreshVisible();
startClock();
// 초기: 1번 화면 티커 활성화
document.getElementById('screen-1').classList.add('visible');
// 저장된 2번 모드 복원
try{ const m=localStorage.getItem('sgp_d2_mode'); _d2ApplyMode(m&&m!=='single'?m:'court_1'); }catch(e){}

// ── 페이지 로드 시 localStorage → _d3LastMatch 복원 ──
// (새로고침/재시작 후에도 경기 정보 유지)
(function(){
  window._d3LastMatch = window._d3LastMatch || {};
  for(let c=1;c<=8;c++){
    try{
      const stored=localStorage.getItem(`sgp_display_vs_court_${c}`);
      if(!stored) continue;
      const mv=JSON.parse(stored);
      if(!mv.court) continue;
      const gl=mv.groupLabel||'';
      const sl=gl.split('/').map((s,i)=>i===0?s.trim():s.trim().replace('부','')).join('·');
      const ml=mv.matchLabel||'';
      window._d3LastMatch[mv.court]={
        court:mv.court,
        matchLabel:ml,
        shortLabel:sl,
        seqNum:ml?ml.split('-').pop():''
      };
      window._d3LastMatchCourt=mv.court;
    }catch(e){}
  }
})();
</script>
</body>
</html>
