<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SGP — 전광판</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@600;700&family=Share+Tech+Mono&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#040408;
  --red:#e63946;--accent:#4cc9f0;--green:#06d6a0;--yellow:#ffd60a;
  --text:#f0f0f8;--text2:#9090b0;--text3:#5a5a7a;
  --border:#2a2a40;
  --timer-color:#4cc9f0; /* 포인트 색상 - 타이머 텍스트 */
}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;overflow:hidden;user-select:none;}

/* 각 화면: contain:layout paint 로 변경 (strict는 오히려 레이어 복잡도 증가) */
#screen-1,#screen-2,#screen-3{position:fixed;inset:0;contain:layout paint;}
#screen-2,#screen-3{display:none;}

/* ══ 1번 전광판 ══ */
#disp1{
  width:100%;height:100%;
  display:grid;grid-template-rows:auto 1fr auto auto;
  padding:28px;gap:16px;position:relative;background:var(--bg);
}
/* radial-gradient 배경 제거 - 전체화면 크기라 비용 큼 */

/* 헤더 */
#d1-hdr{display:flex;align-items:center;gap:14px;border-bottom:2px solid var(--red);padding-bottom:12px;position:relative;z-index:2;}
#d1-ename{font-family:'Bebas Neue',cursive;font-size:clamp(32px,5vw,64px);letter-spacing:3px;line-height:1;flex:1;}
#d1-sub{font-size:14px;color:var(--text2);margin-top:3px;}
/* LIVE: 기본 정지, JS로 활성화 */
#d1-live{font-family:'Share Tech Mono',monospace;font-size:13px;letter-spacing:3px;color:var(--red);border:1px solid var(--red);padding:4px 11px;border-radius:3px;flex-shrink:0;animation:lp 2s infinite;animation-play-state:paused;transform:translateZ(0);}
#d1-live.active{animation-play-state:running;}
@keyframes lp{0%,100%{opacity:1}50%{opacity:.35}}

/* 메인 */
#d1-main{display:flex;gap:14px;align-items:stretch;overflow:hidden;min-height:0;position:relative;z-index:2;}

/* 타이머 */
#d1-timer{flex:1.3;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(255,255,255,.018);border:1px solid rgba(76,201,240,.12);border-radius:9px;padding:18px;position:relative;overflow:hidden;contain:layout;}
.tvlbl{font-family:'Share Tech Mono',monospace;font-size:clamp(10px,1.2vw,13px);letter-spacing:3px;color:var(--text3);margin-bottom:5px;text-transform:uppercase;}
#d1-chal{font-family:'Bebas Neue',cursive;font-size:clamp(28px,4vw,52px);letter-spacing:2px;color:var(--text);margin-bottom:7px;min-height:.8em;position:relative;z-index:1;}
/* text-shadow 제거 - tick마다 repaint 유발 */
#d1-time{font-family:'Share Tech Mono',monospace;font-size:clamp(60px,12vw,160px);line-height:1;letter-spacing:-1px;color:var(--timer-color);transition:color .3s;position:relative;z-index:1;contain:layout style;}
#d1-time.running{color:var(--timer-color);}
#d1-time.stopped{color:var(--red);}
#d1-lap{font-family:'Share Tech Mono',monospace;font-size:clamp(10px,1.4vw,18px);color:var(--text3);margin-top:5px;letter-spacing:2px;position:relative;z-index:1;}

/* 우측 패널 */
#d1-right{flex:1;display:flex;flex-direction:column;gap:8px;min-height:0;}

/* VS */
#d1-vs{display:flex;align-items:center;justify-content:center;gap:clamp(8px,2vw,20px);background:rgba(230,57,70,.04);border:1px solid rgba(230,57,70,.15);border-radius:9px;padding:clamp(8px,1.5vw,16px);flex-shrink:0;position:relative;z-index:2;}
.d1vs-pl{flex:1;text-align:center;}
.d1vs-nm{font-family:'Bebas Neue',cursive;font-size:clamp(18px,3vw,48px);letter-spacing:2px;line-height:1.1;}
.d1vs-sub{font-size:clamp(8px,.8vw,11px);color:var(--text3);font-family:'Share Tech Mono',monospace;letter-spacing:2px;margin-top:2px;}
.d1vs-vs{font-family:'Bebas Neue',cursive;font-size:clamp(18px,3.5vw,52px);color:var(--red);letter-spacing:3px;flex-shrink:0;}

/* 순위 */
#d1-rank{flex:1;display:flex;flex-direction:column;gap:5px;min-height:0;overflow:hidden;position:relative;z-index:2;}
.rrow{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.018);border-radius:6px;padding:clamp(5px,.8vw,10px) clamp(8px,1vw,14px);border:1px solid rgba(255,255,255,.035);}
.rrow.r1{border-color:rgba(255,214,10,.2);background:rgba(255,214,10,.04);}
.rrow.r2{border-color:rgba(192,192,192,.2);background:rgba(192,192,192,.04);}
.rrow.r3{border-color:rgba(205,127,50,.2);background:rgba(205,127,50,.04);}
.rno{font-family:'Bebas Neue',cursive;font-size:clamp(18px,2.5vw,32px);color:var(--text3);width:32px;text-align:center;flex-shrink:0;}
.rrow.r1 .rno{color:var(--yellow);}
.rrow.r2 .rno{color:#c0c0c0;}
.rrow.r3 .rno{color:#cd7f32;}
.rdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.rnm{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:clamp(14px,2vw,24px);flex:1;letter-spacing:.5px;}
.rtm{font-family:'Share Tech Mono',monospace;font-size:clamp(11px,1.5vw,18px);color:var(--accent);}
.rrow.empty .rnm{color:var(--text3);font-weight:400;}
.rrow.empty .rtm{color:var(--text3);}

/* 푸터 */
#d1-ftr{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);padding-top:8px;position:relative;z-index:2;}
#d1-gname{font-family:'Share Tech Mono',monospace;font-size:clamp(10px,1.2vw,14px);letter-spacing:3px;color:var(--text3);}
#d1-clk{font-family:'Share Tech Mono',monospace;font-size:clamp(11px,1.4vw,16px);color:var(--text2);}

/* 티커: 기본 정지, 1번 화면 표시 중일 때만 실행 */
#d1-tk{overflow:hidden;border-top:1px solid rgba(255,255,255,.035);padding-top:5px;position:relative;z-index:2;}
#d1-tki{display:inline-block;white-space:nowrap;font-family:'Share Tech Mono',monospace;font-size:clamp(10px,1.2vw,13px);letter-spacing:2px;color:var(--text3);animation:ticker 22s linear infinite;animation-play-state:paused;transform:translateZ(0);}
#screen-1.visible #d1-tki{animation-play-state:running;}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* vs-off / rank-off */
#d1-main.vs-off   #d1-vs{display:none;}
#d1-main.rank-off #d1-rank{display:none;}
#d1-main.rank-off.vs-off #d1-right{display:none;}
#d1-main.rank-off.vs-off #d1-timer{flex:1;}
#d1-main.rank-off:not(.vs-off) #d1-vs{flex:1;flex-direction:column;justify-content:center;gap:16px;}
#d1-main.rank-off:not(.vs-off) .d1vs-nm{font-size:clamp(28px,5vw,72px);}
#d1-main.rank-off:not(.vs-off) .d1vs-vs{font-size:clamp(30px,5.5vw,80px);}

/* ══ 2번 화면 ══ */
#disp2{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(16px,3vh,40px);background:var(--bg);position:relative;}
#d2-lbl{font-family:'Share Tech Mono',monospace;font-size:clamp(14px,2vw,22px);letter-spacing:4px;color:var(--text3);z-index:2;}
#d2-row{display:flex;align-items:center;gap:clamp(30px,6vw,100px);z-index:2;width:80%;}
.d2-pl{flex:1;text-align:center;}
.d2-nm{font-family:'Bebas Neue',cursive;font-size:clamp(40px,9vw,120px);letter-spacing:3px;line-height:1;white-space:nowrap;overflow:hidden;}
.d2-sub{font-size:clamp(12px,1.5vw,20px);color:var(--text3);margin-top:8px;font-family:'Share Tech Mono',monospace;letter-spacing:3px;}
#d2-vs{font-family:'Bebas Neue',cursive;font-size:clamp(50px,10vw,120px);color:var(--red);letter-spacing:5px;flex-shrink:0;}
#d2-info{font-family:'Share Tech Mono',monospace;font-size:clamp(12px,1.5vw,18px);color:var(--text3);letter-spacing:3px;z-index:2;}
#d2-court{font-family:'Share Tech Mono',monospace;font-size:clamp(11px,1.5vw,16px);letter-spacing:4px;color:var(--accent,#4cc9f0);z-index:2;min-height:1.2em;}

/* ══ 3번 화면 ══ */
#disp3{width:100%;height:100%;display:flex;flex-direction:column;background:var(--bg);position:relative;overflow:hidden;}
#pts-bracket-view{flex:1;min-height:0;padding:16px 18px;overflow:auto;display:flex;flex-direction:column;}

/* 오버레이 */
#countdown-overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.9);display:none;flex-direction:column;align-items:center;justify-content:center;}
#countdown-overlay.show{display:flex;}
#countdown-num{font-family:'Bebas Neue',cursive;font-size:30vw;color:var(--red);line-height:1;transform:translateZ(0);}
@keyframes cntPulse{0%{transform:scale(1.3);opacity:0}60%{transform:scale(1);opacity:1}100%{transform:scale(.92);opacity:.7}}
#countdown-go{font-family:'Bebas Neue',cursive;font-size:20vw;color:var(--green);line-height:1;display:none;}

#winner-overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.85);display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
#winner-overlay.show{display:flex;}
/* 트로피: 우승자 오버레이 표시될 때만 애니메이션 실행됨 */
.w-trophy{font-size:15vw;transform:translateZ(0);}
#winner-overlay.show .w-trophy{animation:tb 1s ease infinite alternate;}
@keyframes tb{from{transform:translateY(0) rotate(-5deg)}to{transform:translateY(-20px) rotate(5deg)}}
.w-label{font-family:'Share Tech Mono',monospace;font-size:clamp(14px,2vw,22px);letter-spacing:6px;color:var(--yellow);margin:16px 0 8px;}
.w-name{font-family:'Bebas Neue',cursive;font-size:clamp(48px,12vw,130px);letter-spacing:4px;}
.w-time{font-family:'Share Tech Mono',monospace;font-size:clamp(20px,4vw,52px);color:var(--accent);margin-top:8px;}

/* 화면 전환 버튼 — backdrop-filter 제거 */
#screen-btns{position:fixed;bottom:20px;right:20px;z-index:900;display:flex;gap:6px;}
.scr-btn{background:rgba(4,4,8,.92);border:1px solid var(--border);color:var(--text3);font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:1px;padding:9px 14px;border-radius:7px;cursor:pointer;transition:border-color .15s,color .15s;}
.scr-btn:hover{border-color:var(--accent);color:var(--accent);}
.scr-btn.active{border-color:var(--red);color:var(--red);background:rgba(230,57,70,.1);}
</style>
</head>
<body>

<div id="screen-btns">
  <button class="scr-btn active" id="scr-btn-1" onclick="switchScreen(1)">📺 1번</button>
  <button class="scr-btn" id="scr-btn-2" onclick="switchScreen(2)">⚔️ 2번</button>
  <button class="scr-btn" id="scr-btn-3" onclick="switchScreen(3)">🏆 3번</button>
</div>

<div id="countdown-overlay">
  <div id="countdown-num">3</div>
  <div id="countdown-go">GO!</div>
</div>
<div id="winner-overlay">
  <div class="w-trophy">🏆</div>
  <div class="w-label">// CHAMPION</div>
  <div class="w-name" id="w-name">—</div>
  <div class="w-time" id="w-time"></div>
</div>

<!-- 1번 전광판 -->
<div id="screen-1">
<div id="disp1">
  <div id="d1-hdr">
    <div style="flex:1;min-width:0;">
      <div id="d1-ename">SGP 행사</div>
      <div id="d1-sub"></div>
      <div id="d1-meta" style="display:none;flex-wrap:wrap;gap:16px;margin-top:4px;"></div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
      <div id="d1-live">● LIVE</div>
      <div id="d1-slogan" style="font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:2px;color:var(--text3);text-align:right;"></div>
    </div>
  </div>

  <div id="d1-main">
    <div id="d1-timer">
      <div class="tvlbl">// CHALLENGER</div>
      <div id="d1-chal">—</div>
      <div id="d1-time">00:00.000</div>

    </div>
    <div id="d1-right">
      <div id="d1-vs">
        <div class="d1vs-pl"><div class="d1vs-nm" id="d1-vs-p1">—</div><div class="d1vs-sub">선수 1</div></div>
        <div class="d1vs-vs">VS</div>
        <div class="d1vs-pl"><div class="d1vs-nm" id="d1-vs-p2">—</div><div class="d1vs-sub">선수 2</div></div>
      </div>
      <div id="d1-rank"></div>
    </div>
  </div>

  <div id="d1-ftr">
    <div id="d1-gname">// SGP PLATFORM</div>
    <div id="d1-clk">--:--:--</div>
  </div>

  <div id="d1-tk">
    <span id="d1-tki">SGP PLATFORM          ⚡ SENSOR GAME PLATFORM          ★ READY          SGP PLATFORM          ⚡ SENSOR GAME PLATFORM          ★ READY</span>
  </div>
</div>
</div>

<!-- 2번 화면 -->
<div id="screen-2">
<div id="disp2">
  <div id="d2-court"><!-- 경기장 표시 --></div>
  <div id="d2-lbl">// 현재 경기</div>
  <div id="d2-row">
    <div class="d2-pl"><div class="d2-nm" id="d2-p1">—</div><div class="d2-sub">선수 1</div></div>
    <div id="d2-vs">VS</div>
    <div class="d2-pl"><div class="d2-nm" id="d2-p2">—</div><div class="d2-sub">선수 2</div></div>
  </div>
  <div id="d2-info">참가자를 등록해주세요</div>
</div>
</div>

<!-- 3번 화면 -->
<div id="screen-3">
<div id="disp3">
  <div id="pts-bracket-view">
    <div style="color:var(--text3);font-family:'Share Tech Mono',monospace;font-size:16px;">대진표 없음</div>
  </div>
</div>
</div>

<script src="js/step4.js"></script>
<script src="js/app.js"></script>
<script>
let _raf=false;
/* ── 2번 화면 경기장 모드 ── */
let _d2Mode='single'; // 'single' | 'random' | 'court_N'
let _d2RandomIv=null;
let _d2RandomCourt=1;
let _d2CourtList=[];

function _d2ApplyMode(mode){
  _d2Mode=mode;
  if(_d2RandomIv){ clearInterval(_d2RandomIv); _d2RandomIv=null; }
  if(mode==='random'){
    // 경기장을 순서대로 돌아가며 표시
    _d2RandomCourt=1;
    _d2SwitchRandomCourt();
    const iv=parseInt(localStorage.getItem('sgp_d2_random_interval')||'60')*1000;
    _d2RandomIv=setInterval(_d2SwitchRandomCourt, iv);
  } else if(mode.startsWith('court_')){
    const c=parseInt(mode.replace('court_',''));
    _d2ShowCourt(c);
  } else {
    // single: 마지막 선택 경기 그대로
    refresh2();
  }
}

function _d2SwitchRandomCourt(){
  const courtCount=parseInt(localStorage.getItem('sgp_courtCount')||'1');
  if(courtCount<2){ refresh2(); return; }
  _d2ShowCourt(_d2RandomCourt);
  _d2RandomCourt=(_d2RandomCourt%courtCount)+1;
}

function _d2ShowCourt(courtNum){
  // 1) 수동으로 선택된 경기 확인 (bracket-view에서 클릭한 경기)
  try{
    const manualStr = localStorage.getItem(`sgp_display_vs_court_${courtNum}`);
    if(manualStr){
      const mv = JSON.parse(manualStr);
      if(mv && mv.p1 && mv.p2){
        _set('d2-p1', mv.p1); _set('d2-p2', mv.p2); _set('d2-info', mv.label||'');
        const courtEl=document.getElementById('d2-court');
        if(courtEl){ courtEl.textContent=`// 경기장 ${courtNum}`; courtEl.style.display=''; }
        return;
      }
    }
  }catch(e){}

  // 2) 수동 선택 없으면 진행 중인 첫 경기 자동 탐색
  try{
    const groups=JSON.parse(localStorage.getItem('sgp_groupBrackets')||'[]');
    const courtGroups=groups.filter(g=>(g.court||1)===courtNum);
    let found=null;
    outer: for(const g of courtGroups){
      if(!g.matches) continue;
      for(const round of g.matches){
        for(const m of round){
          if(!m.winner && m.p1 && m.p2 && !m.bye){
            const p1n=typeof m.p1==='object'?m.p1.name:m.p1;
            const p2n=typeof m.p2==='object'?m.p2.name:m.p2;
            found={p1:p1n,p2:p2n,label:g.label,court:courtNum};
            break outer;
          }
        }
      }
    }
    if(found){
      _set('d2-p1',found.p1); _set('d2-p2',found.p2); _set('d2-info',found.label);
      const courtEl=document.getElementById('d2-court');
      if(courtEl){ courtEl.textContent=`// 경기장 ${courtNum}`; courtEl.style.display=''; }
    } else {
      _set('d2-p1','—'); _set('d2-p2','—'); _set('d2-info',`경기장 ${courtNum} 대기 중`);
      const courtEl=document.getElementById('d2-court');
      if(courtEl){ courtEl.textContent=`// 경기장 ${courtNum}`; courtEl.style.display=''; }
    }
  }catch(e){ refresh2(); }
}

window.addEventListener('message', e=>{
  if(e.data&&e.data.type==='sgp_d2_mode'){ _d2ApplyMode(e.data.mode); }
  if(e.data&&e.data.type==='sgp_d2_refresh_random' && _d2Mode==='random'){
    if(_d2RandomIv){ clearInterval(_d2RandomIv); _d2RandomIv=null; }
    const iv=parseInt(localStorage.getItem('sgp_d2_random_interval')||'60')*1000;
    _d2RandomIv=setInterval(_d2SwitchRandomCourt, iv);
  }
});

/* ── BroadcastChannel 수신 ── */
let _dispBc=null;
try{
  _dispBc=new BroadcastChannel('sgp_cmd');
  _dispBc.onmessage=e=>{handleCmd(e.data);};
}catch(e){}
window.addEventListener('pagehide',()=>{ try{_dispBc&&_dispBc.close();}catch(e){} });

// d2 설정 즉시 적용
function _applyD2Cfg(cfg){
  const BG={dark:'var(--bg)',gradient:'linear-gradient(135deg,#0a0a1a 0%,#1a0a2e 100%)',blur:'rgba(10,10,20,0.95)',solid:'#0d1b2a'};
  if(cfg.vs_bg!==undefined){
    const disp2=document.getElementById('disp2');
    if(disp2) disp2.style.background=BG[cfg.vs_bg]||BG.dark;
    try{ localStorage.setItem('sgp_d2_vs_bg_override',cfg.vs_bg); }catch(e){}
  }
  if(cfg.vs_color!==undefined){
    const vsEl=document.getElementById('d2-vs');
    if(vsEl) vsEl.style.color=cfg.vs_color;
    try{ localStorage.setItem('sgp_d2_vs_color',cfg.vs_color); }catch(e){}
  }
  const lblEls=[document.getElementById('d2-court'),document.getElementById('d2-lbl')];
  if(cfg.courtShow!==undefined){
    lblEls.forEach(el=>{if(el) el.style.setProperty('--d2-court-hidden', cfg.courtShow?'':'1');});
    // d2-lbl 은 항상 토글
    const lb=document.getElementById('d2-lbl');
    if(lb) lb.style.display=cfg.courtShow?'':'none';
    // d2-court 는 기존 court 로직 유지하되 숨김이면 무조건 hide
    if(!cfg.courtShow){
      const ct=document.getElementById('d2-court');
      if(ct) ct.style.display='none';
    }
    try{ localStorage.setItem('sgp_d2_court_show',String(cfg.courtShow)); }catch(e){}
  }
  if(cfg.courtSize!==undefined){
    lblEls.forEach(el=>{ if(el) el.style.fontSize=cfg.courtSize+'px'; });
    try{ localStorage.setItem('sgp_d2_court_size',String(cfg.courtSize)); }catch(e){}
  }
  if(cfg.infoShow!==undefined){
    const infoEl=document.getElementById('d2-info');
    if(infoEl) infoEl.style.display=cfg.infoShow?'':'none';
    try{ localStorage.setItem('sgp_d2_info_show',String(cfg.infoShow)); }catch(e){}
  }
  if(cfg.infoSize!==undefined){
    const infoEl=document.getElementById('d2-info');
    if(infoEl) infoEl.style.fontSize=cfg.infoSize+'px';
    try{ localStorage.setItem('sgp_d2_info_size',String(cfg.infoSize)); }catch(e){}
  }
}

function scheduleRefresh(){
  if(_raf)return; _raf=true;
  requestAnimationFrame(()=>{ _raf=false; refreshVisible(); });
}

/* 현재 보이는 화면만 갱신 */
function refreshVisible(){
  refresh1();
  if(currentScreen===2) refresh2();
  if(currentScreen===3) refresh3();
}

function getCfg(){try{return JSON.parse(localStorage.getItem('sgp_display_config')||'{}');}catch{return {};}}

function refreshAll(){ refresh1(); refresh2(); refresh3(); }

// ── 1번 ──
function refresh1(){
  const state=App.getState(), cfg=getCfg();
  const di=cfg.displayItems||{}, blk=cfg.blk||{}, ss=state.settings||{}, ev=state.event||{};

  _vis('d1-hdr',   blk.header!==false);
  _vis('d1-timer', blk.timer !==false);
  _vis('d1-right', blk.rank!==false||blk.vs!==false);
  _vis('d1-ftr',   blk.footer!==false);
  _vis('d1-tk',    blk.ticker!==false);
  const chalLblEl=document.querySelector('#d1-timer .tvlbl');
  const chalNameEl=document.getElementById('d1-chal');
  if(chalLblEl) chalLblEl.style.display=blk.challenger!==false?'':'none';
  if(chalNameEl) chalNameEl.style.display=blk.challenger!==false?'':'none';

  const main=document.getElementById('d1-main');
  main.classList.toggle('vs-off',   blk.vs  ===false);
  main.classList.toggle('rank-off', blk.rank===false);

  // 행사명 + 폰트
  const fontMap={'bebas':"'Bebas Neue',cursive",'rajdhani':"'Rajdhani',sans-serif",'mono':"'Share Tech Mono',monospace",'noto':"'Noto Sans KR',sans-serif",'serif':'Georgia,serif'};
  const enEl=document.getElementById('d1-ename');
  _set(enEl, di.eventname!==false?(cfg.eventName||ev.name||'SGP 행사'):'');
  enEl.style.fontFamily=fontMap[cfg.titleFont]||fontMap.bebas;

  _set('d1-sub', di.subtitle?(cfg.subtitle||ss.sub||''):'');

  // 메타
  const mi=[];
  if(di.gamename&&(cfg.gameLabel||ss.gl)) mi.push('🏅 '+(cfg.gameLabel||ss.gl));
  if(di.date    &&(cfg.dt||ss.dt))        mi.push('📅 '+(cfg.dt||ss.dt));
  if(di.place   &&(cfg.pl||ss.pl))        mi.push('📍 '+(cfg.pl||ss.pl));
  if(di.sponsor &&(cfg.sponsor||ss.sp))   mi.push('🤝 '+(cfg.sponsor||ss.sp));
  const metaEl=document.getElementById('d1-meta');
  const newMeta=mi.map(v=>`<span style="font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--text3);letter-spacing:2px;">${v}</span>`).join('');
  if(metaEl.innerHTML!==newMeta){metaEl.innerHTML=newMeta;metaEl.style.display=mi.length?'flex':'none';}

  // 슬로건
  const sl=[];
  if(di.slogan1&&(cfg.slogan1||ss.s1)) sl.push(cfg.slogan1||ss.s1);
  if(di.slogan2&&(cfg.slogan2||ss.s2)) sl.push(cfg.slogan2||ss.s2);
  _set('d1-slogan', sl.join(' · '));

  // 도전자
  _set('d1-chal', state.participants?.[0]?.name||'—');

  // VS
  const vs=getVs(state);
  _set('d1-vs-p1', vs.p1);
  _set('d1-vs-p2', vs.p2);

  // 순위
  renderRank(state, cfg);

  // 게임명
  const gn=(di.gamename&&(cfg.gameLabel||ss.gl))?(cfg.gameLabel||ss.gl):(state.gameType||'SGP').toUpperCase();
  _set('d1-gname', '// '+gn);

  // ── 색상 적용 ──
  // 테마 → 라인/헤더 색상(--red)만 변경
  // 포인트 색상 → 타이머 텍스트 색(--timer-color) 별도 변수
  const THEME_MAP={
    'dark-racing':  '#e63946',
    'neon-blue':    '#4361ee',
    'gold-black':   '#ffd60a',
    'green-dark':   '#06d6a0',
    'purple-dark':  '#7b2fff',
    'fire-red':     '#ff6b35',
  };

// ── 3번 ──
function refresh3(){
  const view=document.getElementById('pts-bracket-view');
  if(!view) return;
  let groups=[];
  try{ groups=JSON.parse(localStorage.getItem('sgp_groupBrackets')||'[]'); }catch(e){}
  if(!groups.length){
    view.innerHTML='<div style="color:var(--text3);font-family:\'Share Tech Mono\',monospace;font-size:16px;padding:20px;">대진표 없음</div>';
    return;
  }
  const layout=localStorage.getItem('sgp_layout')||'A';
  const courtCount=parseInt(localStorage.getItem('sgp_courtCount')||'1');
  window._bracketLayout=layout;
  if(!window.S) window.S={matches:[],groupBrackets:groups,laps:1};
  else window.S.groupBrackets=groups;

  // 진행중 경기: 그룹레이블+ri+mi로 특정
  let curGroupLabel='', curRi=-1, curMi=-1;
  try{
    const mv=JSON.parse(localStorage.getItem('sgp_display_vs')||'{}');
    const curP1=mv.p1||'', curP2=mv.p2||'';
    const _cn=n=>n?n.replace(/^\d+번\s*/,'').replace(/[()[\]]/g,'').trim()||n:'';
    if(curP1&&curP2){
      outer: for(const g of groups){
        const sl=g.label.split('/').map((p,pi)=>pi===0?p.trim():p.trim().replace('부','')).join('·');
        for(let ri=0;ri<g.matches.length;ri++){
          for(let mi=0;mi<g.matches[ri].length;mi++){
            const m=g.matches[ri][mi];
            const p1n=m.p1?(typeof m.p1==='object'?m.p1.name:m.p1):'';
            const p2n=m.p2?(typeof m.p2==='object'?m.p2.name:m.p2):'';
            if(_cn(p1n)===curP1&&_cn(p2n)===curP2){curGroupLabel=sl;curRi=ri;curMi=mi;break outer;}
          }
        }
      }
    }
  }catch(e){}

  _d3DrawBracket(view, groups, layout, courtCount, curGroupLabel, curRi, curMi);
}


function _d3DrawBracket(view, groups, layout, courtCount, curGroupLabel, curRi, curMi){
  function stripScroll(div){
    div.querySelectorAll('*').forEach(el=>{
      if(el.style.overflow==='auto'||el.style.overflowX==='auto') el.style.overflow='visible';
    });
  }
  window.isCurrentMatchIdx=function(ri,mi){
    if(curRi<0||curMi<0) return false;
    const curGrp=window.S.matches?.[0]?.[0]?._groupLabel||'';
    return ri===curRi&&mi===curMi&&curGrp===curGroupLabel;
  };
  const saved=window.S.matches;
  view.innerHTML='';
  view.style.overflow='auto';
  if(layout==='D'&&courtCount>=2){
    const lGroups=groups.filter(g=>g.court===1);
    const rGroups=groups.filter(g=>g.court===2);
    const rowCount=Math.max(lGroups.length,rGroups.length);
    const outerWrap=document.createElement('div');
    outerWrap.style.cssText='display:flex;flex-direction:column;gap:0;min-width:100%;padding:12px;';
    const hdrRow=document.createElement('div');hdrRow.style.cssText='display:flex;flex-direction:row;gap:0;margin-bottom:6px;';
    const mkLbl=(txt,align)=>{const d=document.createElement('div');d.style.cssText=`font-size:10px;color:var(--accent);font-family:"Share Tech Mono",monospace;letter-spacing:2px;text-align:${align};`;d.textContent=txt;return d;};
    const hL=document.createElement('div');hL.style.cssText='padding-right:24px;flex-shrink:0;';hL.appendChild(mkLbl('// 경기장 1','left'));
    const hSp=document.createElement('div');hSp.style.cssText='flex:1;min-width:40px;';
    const hR=document.createElement('div');hR.style.cssText='padding-left:24px;flex-shrink:0;display:flex;justify-content:flex-end;';
    if(rGroups.length) hR.appendChild(mkLbl('// 경기장 2','right'));
    hdrRow.appendChild(hL);hdrRow.appendChild(hSp);hdrRow.appendChild(hR);
    outerWrap.appendChild(hdrRow);
    const mkSection=(g,reversed)=>{
      const shortLabel=g.label.split('/').map((p,pi)=>pi===0?p.trim():p.trim().replace('부','')).join('·');
      const sec=document.createElement('div');sec.style.cssText='display:flex;flex-direction:column;flex-shrink:0;min-width:max-content;';
      const hdr=document.createElement('div');hdr.style.cssText='font-size:9px;color:#555;font-family:"Share Tech Mono",monospace;letter-spacing:1px;margin-bottom:4px;margin-top:8px;flex-shrink:0;white-space:nowrap;';
      hdr.textContent=shortLabel;sec.appendChild(hdr);
      const groupWrap=document.createElement('div');groupWrap.style.cssText='min-width:max-content;';
      const taggedMatches=g.matches.map((round,ri)=>round.map((m,mi)=>({...m,_groupObj:g,_origMi:mi,_origRi:ri,_groupLabel:shortLabel})));
      window.S.matches=taggedMatches;
      try{_renderBracketHTML(groupWrap,taggedMatches,'top',reversed);stripScroll(groupWrap);}catch(e){}
      sec.appendChild(groupWrap);return sec;
    };
    for(let i=0;i<rowCount;i++){
      const row=document.createElement('div');row.style.cssText='display:flex;flex-direction:row;align-items:stretch;gap:0;margin-bottom:20px;';
      const cL=document.createElement('div');cL.style.cssText='padding-right:24px;flex-shrink:0;min-width:max-content;';
      if(lGroups[i]) cL.appendChild(mkSection(lGroups[i],false));
      const sp=document.createElement('div');sp.style.cssText='flex:1;min-width:40px;';
      const cR=document.createElement('div');cR.style.cssText='padding-left:24px;flex-shrink:0;min-width:max-content;display:flex;flex-direction:column;align-items:flex-end;';
      if(rGroups[i]) cR.appendChild(mkSection(rGroups[i],true));
      row.appendChild(cL);row.appendChild(sp);row.appendChild(cR);
      outerWrap.appendChild(row);
    }
    view.appendChild(outerWrap);
  } else {
    const outerWrap=document.createElement('div');outerWrap.style.cssText='padding:8px;min-width:max-content;';
    groups.forEach(g=>{
      const shortLabel=g.label.split('/').map((p,pi)=>pi===0?p.trim():p.trim().replace('부','')).join('·');
      const hdr=document.createElement('div');hdr.style.cssText='font-size:9px;color:#555;font-family:"Share Tech Mono",monospace;letter-spacing:1px;margin-bottom:4px;margin-top:8px;';
      hdr.textContent=shortLabel;outerWrap.appendChild(hdr);
      const groupWrap=document.createElement('div');groupWrap.style.cssText='margin-bottom:16px;position:relative;';
      const taggedMatches=g.matches.map((round,ri)=>round.map((m,mi)=>({...m,_groupObj:g,_origMi:mi,_origRi:ri,_groupLabel:shortLabel})));
      window.S.matches=taggedMatches;
      try{
        const fns={A:renderBracketA,B:renderBracketB,C:renderBracketC,E:renderBracketE};
        (fns[layout]||renderBracketA)(groupWrap);
        stripScroll(groupWrap);
      }catch(e){groupWrap.innerHTML='<div style="color:red;font-size:11px;">오류:'+e.message+'</div>';}
      outerWrap.appendChild(groupWrap);
    });
    view.appendChild(outerWrap);
  }
  window.S.matches=saved;
}

function renderRank(state,cfg){
  const el=document.getElementById('d1-rank');
  const ranking=App.getRanking(), max=cfg.rankCount||6;
  const medals=['🥇','🥈','🥉'];
  let html='';
  for(let i=0;i<max;i++){
    const item=ranking[i], p=item?.participant;
    const cls=i===0?'r1':i===1?'r2':i===2?'r3':'';
    const empty=!p||!item?.best;
    html+=`<div class="rrow ${cls}${empty?' empty':''}"><div class="rno">${medals[i]||(i+1)}</div><div class="rdot" style="background:${p?.color||'var(--border)'}"></div><div class="rnm">${p?.name||'—'}</div><div class="rtm">${item?.best?App.formatTime(item.best.time):'——'}</div></div>`;
  }
  if(el.innerHTML!==html) el.innerHTML=html;
}

function updateTicker(cfg,di,ss){
  const el=document.getElementById('d1-tki'); if(!el)return;
  const p=[];
  if(di.eventname&&(cfg.eventName||ss.en)) p.push('★ '+(cfg.eventName||ss.en));
  if(di.slogan1  &&(cfg.slogan1  ||ss.s1)) p.push('▶ '+(cfg.slogan1  ||ss.s1));
  if(di.slogan2  &&(cfg.slogan2  ||ss.s2)) p.push('▶ '+(cfg.slogan2  ||ss.s2));
  if(di.date     &&(cfg.dt       ||ss.dt)) p.push('📅 '+(cfg.dt       ||ss.dt));
  if(di.place    &&(cfg.pl       ||ss.pl)) p.push('📍 '+(cfg.pl       ||ss.pl));
  if(di.sponsor  &&(cfg.sponsor  ||ss.sp)) p.push('🤝 '+(cfg.sponsor  ||ss.sp));
  if(!p.length) p.push('SGP PLATFORM','⚡ SENSOR GAME PLATFORM','★ READY');
  const base=p.join('          ');
  const full=base+'          '+base;
  if(el.textContent!==full) el.textContent=full;
}

function getVs(state){
  const pts=state.participants||[];
  const resolveName=v=>{
    if(!v) return '—';
    if(typeof v==='object') return cleanName(v.name||'?');
    const found=pts.find(p=>p.id===v||p.name===v);
    return cleanName(found?found.name:v);
  };
  const rounds=state.tournament?.rounds||state.matches||[];
  for(const round of rounds)
    for(const m of (Array.isArray(round)?round:[]))
      if(m.p1&&m.p2&&!m.winner)
        return{p1:resolveName(m.p1), p2:resolveName(m.p2)};
  return{p1:'—',p2:'—'};
}

function _vis(id,show){const el=document.getElementById(id);if(el)el.style.display=show?'':'none';}
function _set(idOrEl,val){const el=typeof idOrEl==='string'?document.getElementById(idOrEl):idOrEl;if(el&&el.textContent!==val)el.textContent=val;}

let _clockIv=null;
function startClock(){
  if(_clockIv) return; // 중복 실행 방지
  const t=()=>{const n=new Date();_set('d1-clk',`${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}:${String(n.getSeconds()).padStart(2,'0')}`);};
  t();_clockIv=setInterval(t,1000);
}

function triggerCountdown(){
  const ov=document.getElementById('countdown-overlay'),nEl=document.getElementById('countdown-num'),gEl=document.getElementById('countdown-go');
  ov.classList.add('show');let n=3;nEl.style.display='block';gEl.style.display='none';nEl.textContent=n;
  const iv=setInterval(()=>{n--;if(n<=0){clearInterval(iv);nEl.style.display='none';gEl.style.display='block';setTimeout(()=>ov.classList.remove('show'),800);}else{nEl.textContent=n;nEl.style.animation='none';nEl.offsetHeight;nEl.style.animation='cntPulse .9s ease both';}},1000);
}

function showWinner(name,time){
  _set('w-name',name||'—');_set('w-time',time||'');
  document.getElementById('winner-overlay').classList.add('show');
  setTimeout(()=>document.getElementById('winner-overlay').classList.remove('show'),6000);
}

let currentScreen=1;
function switchScreen(n){
  currentScreen=n;
  document.getElementById('screen-1').style.display=n===1?'block':'none';
  document.getElementById('screen-2').style.display=n===2?'block':'none';
  document.getElementById('screen-3').style.display=n===3?'block':'none';
  // 1번 화면일 때만 티커 애니메이션 실행
  document.getElementById('screen-1').classList.toggle('visible', n===1);
  [1,2,3].forEach(i=>{
    const b=document.getElementById('scr-btn-'+i);
    if(b) b.classList.toggle('active',i===n);
  });
  try{localStorage.setItem('sgp_screen',String(n));}catch(e){}
  if(n===2) refresh2();
  if(n===3) refresh3();
}

const cleanName=n=>n?n.replace(/^\d+번\s*/,'').replace(/[()[\]]/g,'').trim()||n:'—';

function handleCmd(cmd){
  if(!cmd)return;
  if(cmd.type==='set_match'){
    const p1=cleanName(cmd.p1||'—'), p2=cleanName(cmd.p2||'—');

    // 경기장별 localStorage 저장 (수동 선택 기록)
    if(cmd.court){
      try{ localStorage.setItem(`sgp_display_vs_court_${cmd.court}`, JSON.stringify({p1:cmd.p1||'—',p2:cmd.p2||'—',label:cmd.label||'',court:cmd.court})); }catch(e){}
    }

    // court_N 모드이면 해당 경기장만 갱신
    if(_d2Mode===`court_${cmd.court}`){
      _d2ShowCourt(cmd.court);
    } else if(_d2Mode==='single' || !_d2Mode || _d2Mode===''){
      // single 모드: 들어오는 모든 경기 표시
      _set('d1-vs-p1', p1); _set('d1-vs-p2', p2);
      _set('d2-p1',    p1); _set('d2-p2',    p2);
      _set('d2-info',  cmd.label||'진행 중');
      const courtCount=parseInt(localStorage.getItem('sgp_courtCount')||'1');
      const courtEl=document.getElementById('d2-court');
      if(courtEl){
        if(cmd.court>0 && courtCount>1){
          courtEl.textContent=`// 경기장 ${cmd.court}`;
          courtEl.style.display='';
        } else {
          courtEl.textContent='';
          courtEl.style.display='none';
        }
      }
    }
    // random 모드이면 현재 순환에서 갱신 안 함 (자동 타이머가 처리)
  }
  if(cmd.type==='countdown')   triggerCountdown();
  if(cmd.type==='winner')      showWinner(cmd.name,cmd.time);
  if(cmd.type==='timer_start'){
    document.getElementById('d1-time').className='running';
    document.getElementById('d1-live').classList.add('active');
    if(cmd.duration) _startCountdownTimer(cmd.duration);
  }
  if(cmd.type==='timer_stop'){
    document.getElementById('d1-time').className='stopped';
    document.getElementById('d1-live').classList.remove('active');
    _stopCountdownTimer();
  }
  if(cmd.type==='timer_reset'){
    _stopCountdownTimer();
    _set('d1-time','00:00.000');
    document.getElementById('d1-time').className='';
    document.getElementById('d1-live').classList.remove('active');
  }
  if(cmd.type==='timer_set'){
    _stopCountdownTimer();
    _set('d1-time', cmd.formatted||'00:00.000');
    document.getElementById('d1-time').className='';
  }
  if(cmd.type==='clear_rank')  scheduleRefresh();
  if(cmd.type==='screen_1')    switchScreen(1);
  if(cmd.type==='screen_2')    switchScreen(2);
  if(cmd.type==='screen_3')    switchScreen(3);
  if(cmd.type==='sgp_d2_mode') _d2ApplyMode(cmd.mode);
  if(cmd.type==='refresh_2')   refresh2();
  if(cmd.type==='d2_cfg')      _applyD2Cfg(cmd);
}

window.addEventListener('storage',e=>{
  if(e.key==='sgp_display_cmd'){
    try{handleCmd(JSON.parse(e.newValue||'{}'));}catch(err){}
  }
  if(e.key==='sgp_display_time')   _set('d1-time', e.newValue||'00:00.000');
  if(e.key==='sgp_display_player') _set('d1-chal', e.newValue||'—');
  if(e.key==='sgp_display_lap')    _set('d1-lap',  e.newValue||'');
  if(e.key==='sgp_display_vs'){
    try{
      const vs=JSON.parse(e.newValue||'{}');
      const p1=cleanName(vs.p1||'—'), p2=cleanName(vs.p2||'—');
      _set('d1-vs-p1', p1); _set('d1-vs-p2', p2);
      _set('d2-p1',    p1); _set('d2-p2',    p2);
      _set('d2-info',  vs.label||'진행 중');
      const courtCount2=parseInt(localStorage.getItem('sgp_courtCount')||'1');
      const courtEl2=document.getElementById('d2-court');
      if(courtEl2){
        if(vs.court>0 && courtCount2>1){ courtEl2.textContent=`// 경기장 ${vs.court}`; courtEl2.style.display=''; }
        else { courtEl2.textContent=''; courtEl2.style.display='none'; }
      }
    }catch(err){}
  }
  if(e.key==='sgp_state'||e.key==='sgp_display_config') scheduleRefresh();
  if(e.key==='sgp_groupBrackets') refresh3();
  if(e.key==='sgp_display_vs'&&currentScreen===3) refresh3();
  if(e.key==='sgp_d2_mode'){ _d2ApplyMode(e.newValue||'single'); }
});

document.addEventListener('keydown',e=>{
  if(e.key==='F1'){e.preventDefault();switchScreen(1);}
  if(e.key==='F2'){e.preventDefault();switchScreen(2);}
  if(e.key==='F3'){e.preventDefault();switchScreen(3);}
  if(e.key==='Tab'){e.preventDefault();switchScreen();}
});

refreshVisible();
startClock();
// 초기: 1번 화면 티커 활성화
document.getElementById('screen-1').classList.add('visible');
// 저장된 2번 모드 복원
try{ const m=localStorage.getItem('sgp_d2_mode'); if(m&&m!=='single') _d2ApplyMode(m); }catch(e){}
</script>
</body>
</html>
