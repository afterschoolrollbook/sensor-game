<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SGP — 참가자 설정</title>
<link rel="stylesheet" href="css/style.css">
<style>
.mode-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 32px; }
.mode-card {
  background: var(--card); border: 2px solid var(--border);
  border-radius: var(--radius); padding: 24px 20px;
  cursor: pointer; transition: all .2s; text-align: center;
}
.mode-card:hover { border-color: var(--blue); }
.mode-card.selected { border-color: var(--red); background: rgba(230,57,70,.08); }
.mode-card .mode-icon { font-size: 32px; margin-bottom: 10px; }
.mode-card .mode-name { font-family: var(--font-display); font-size: 18px; letter-spacing: 1px; margin-bottom: 6px; }
.mode-card .mode-desc { font-size: 12px; color: var(--text-dim); }

.participant-list { display: flex; flex-direction: column; gap: 8px; }
.participant-item {
  display: flex; align-items: center; gap: 12px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px 16px;
}
.p-color-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
.p-name { flex: 1; font-weight: 600; }
.p-team { font-size: 13px; color: var(--text-dim); }
.p-remove {
  background: none; border: none; color: var(--text-dim);
  cursor: pointer; font-size: 18px; line-height: 1;
  transition: color .2s;
}
.p-remove:hover { color: var(--red); }

.team-list { display: flex; flex-direction: column; gap: 8px; }
.team-item {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px 16px;
}
.team-header { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
.team-members { display: flex; flex-wrap: wrap; gap: 6px; padding-left: 26px; }
.team-member-tag {
  font-size: 12px; padding: 3px 10px; border-radius: 12px;
  background: var(--bg2); border: 1px solid var(--border);
}

.add-row { display: flex; gap: 8px; margin-top: 12px; }
.add-row .form-input { flex: 1; }

.laps-control { display: flex; align-items: center; gap: 16px; }
.laps-btn {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--text); font-size: 20px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s;
}
.laps-btn:hover { border-color: var(--red); color: var(--red); }
.laps-val {
  font-family: var(--font-display);
  font-size: 36px; min-width: 60px; text-align: center;
}

.section { margin-bottom: 36px; }
.section-title {
  font-family: var(--font-display);
  font-size: 22px; letter-spacing: 2px;
  margin-bottom: 16px; padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.section-title .step-num {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--red); color: white;
  font-size: 14px; display: flex; align-items: center; justify-content: center;
}

@media (max-width: 600px) {
  .mode-cards { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a class="nav-logo" href="index.html">SGP<span>.</span></a>
    <div class="nav-steps">
      <a class="nav-step" data-page="home" href="index.html">홈</a>
      <a class="nav-step active" data-page="setup" href="setup.html">참가자 설정</a>
      <a class="nav-step" data-page="customize" href="customize.html">커스터마이징</a>
      <a class="nav-step" data-page="game" href="game.html">게임 진행</a>
      <a class="nav-step" data-page="result" href="result.html">결과</a>
    </div>
  </div>
</nav>

<div class="page">
<div class="container">

  <div class="page-header anim-fade-in">
    <div class="label">// STEP 01</div>
    <h1>참가자 설정</h1>
    <p>행사명, 진행 방식, 참가자를 설정하세요.</p>
  </div>

  <!-- 행사 기본 정보 -->
  <div class="section anim-fade-in">
    <div class="section-title"><span class="step-num">1</span> 행사 기본 정보</div>
    <div class="grid-2">
      <div class="form-group">
        <label class="form-label">행사명</label>
        <input class="form-input" id="event-name" placeholder="예) 2026 봄맞이 달리기 대회">
      </div>
      <div class="form-group">
        <label class="form-label">부제목 (선택)</label>
        <input class="form-input" id="event-subtitle" placeholder="예) 전국 아마추어 경주 대회">
      </div>
    </div>
  </div>

  <!-- 게임 선택 -->
  <div class="section anim-fade-in">
    <div class="section-title"><span class="step-num">2</span> 게임 모드</div>
    <div class="form-group">
      <label class="form-label">게임 종류</label>
      <select class="form-select" id="game-type">
        <option value="timelap">🏁 타임랩</option>
        <option value="reaction">⚡ 반응속도</option>
        <option value="balance">🎯 균형 버티기</option>
        <option value="jump">🤸 점프력</option>
        <option value="distance">📏 멀리뛰기</option>
        <option value="weight">⚖️ 무게 맞추기</option>
        <option value="strength">💪 악력/힘 측정</option>
        <option value="oddeven">🎲 홀짝 게임</option>
        <option value="roulette">🎰 랜덤 룰렛</option>
        <option value="count">🔢 카운트 대결</option>
        <option value="sound">🔊 소리 크기</option>
      </select>
    </div>

    <!-- 바퀴 수 (타임랩 전용) -->
    <div id="laps-section">
      <label class="form-label">바퀴 수</label>
      <div class="laps-control">
        <button class="laps-btn" onclick="changeLaps(-1)">−</button>
        <div class="laps-val" id="laps-val">1</div>
        <button class="laps-btn" onclick="changeLaps(1)">+</button>
        <span class="text-dim text-sm">바퀴</span>
      </div>
    </div>
  </div>

  <!-- 진행 방식 -->
  <div class="section anim-fade-in">
    <div class="section-title"><span class="step-num">3</span> 진행 방식</div>
    <div class="mode-cards">
      <div class="mode-card selected" onclick="selectMode('individual')" data-mode="individual">
        <div class="mode-icon">👤</div>
        <div class="mode-name">개인전</div>
        <div class="mode-desc">개인 기록으로 순위 결정</div>
      </div>
      <div class="mode-card" onclick="selectMode('team')" data-mode="team">
        <div class="mode-icon">👥</div>
        <div class="mode-name">팀 대결</div>
        <div class="mode-desc">팀 합산/평균 기록으로 순위</div>
      </div>
      <div class="mode-card" onclick="selectMode('tournament')" data-mode="tournament">
        <div class="mode-icon">🏆</div>
        <div class="mode-name">토너먼트</div>
        <div class="mode-desc">1:1 대진표로 최강자 결정</div>
      </div>
    </div>
  </div>

  <!-- 팀 설정 (팀 모드) -->
  <div class="section anim-fade-in" id="team-section" style="display:none;">
    <div class="section-title"><span class="step-num">4</span> 팀 구성</div>
    <div class="team-list" id="team-list"></div>
    <div class="add-row mt-16">
      <input class="form-input" id="team-name-input" placeholder="팀 이름 입력">
      <button class="btn btn-secondary" onclick="addTeam()">팀 추가</button>
    </div>
  </div>

  <!-- 참가자 등록 -->
  <div class="section anim-fade-in">
    <div class="section-title"><span class="step-num" id="participant-step-num">4</span> 참가자 등록</div>
    <div id="team-assign-row" style="display:none;" class="form-group">
      <label class="form-label">소속 팀</label>
      <select class="form-select" id="assign-team">
        <option value="">팀 없음</option>
      </select>
    </div>
    <div class="add-row">
      <input class="form-input" id="p-name-input" placeholder="참가자 이름 (예: 홍길동)" onkeydown="if(event.key==='Enter') addParticipant()">
      <button class="btn btn-secondary" onclick="addParticipant()">추가</button>
      <button class="btn btn-outline" onclick="addBulk()">여러명 추가</button>
    </div>
    <div class="participant-list mt-16" id="participant-list">
      <div class="text-dim text-sm">참가자를 추가하세요.</div>
    </div>
  </div>

  <!-- 하단 버튼 -->
  <div style="margin-top:32px;">

    <!-- 엑셀 저장/불러오기 바 -->
    <div style="display:flex; gap:10px; align-items:center; margin-bottom:16px;
      padding:16px 20px; background:var(--bg3);
      border:1px solid var(--border); border-radius:var(--radius);">
      <span style="font-size:13px; color:var(--text-dim); font-weight:600;
        letter-spacing:1px; text-transform:uppercase; flex:1;">
        📊 엑셀 설정 파일
      </span>
      <button class="btn btn-secondary btn-sm" onclick="ExcelIO.importExcel(onExcelLoad)"
        style="display:flex;align-items:center;gap:6px;">
        📂 <span>엑셀 불러오기</span>
      </button>
      <button class="btn btn-secondary btn-sm" onclick="ExcelIO.exportResultExcel()"
        style="display:flex;align-items:center;gap:6px;">
        📊 <span>결과 엑셀 저장</span>
      </button>
      <a href="/SGP_행사설정_템플릿.xlsx" download class="btn btn-secondary btn-sm"
        style="display:flex;align-items:center;gap:6px;">
        ⬇️ <span>템플릿 다운로드</span>
      </a>
    </div>

    <div class="flex justify-between items-center">
      <button class="btn btn-outline" onclick="clearAll()">초기화</button>
      <div class="flex gap-16">
        <a href="customize.html" class="btn btn-secondary">커스터마이징 →</a>
        <a href="game.html" class="btn btn-primary" onclick="saveAndGo(event)">게임 시작 →</a>
      </div>
    </div>
  </div>

</div>
</div>

<!-- 여러명 추가 모달 -->
<div class="modal-overlay hidden" id="bulk-modal">
  <div class="modal">
    <div class="modal-title">여러 명 한번에 추가</div>
    <div class="form-group">
      <label class="form-label">이름 목록 (줄바꿈으로 구분)</label>
      <textarea class="form-input" id="bulk-input" rows="8"
        placeholder="홍길동&#10;김철수&#10;이영희&#10;박민준"
        style="resize: vertical;"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeBulk()">취소</button>
      <button class="btn btn-primary" onclick="confirmBulk()">추가</button>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script src="js/export.js"></script>
<script>
let laps = 1;
let currentMode = 'individual';

// 초기값 로드
(function init() {
  const state = App.getState();
  document.getElementById('event-name').value = state.event.name !== '게임 행사' ? state.event.name : '';
  document.getElementById('event-subtitle').value = state.event.subtitle || '';
  if (state.gameType) document.getElementById('game-type').value = state.gameType;
  laps = state.settings.laps || 1;
  document.getElementById('laps-val').textContent = laps;
  currentMode = state.mode || 'individual';
  selectMode(currentMode);
  renderParticipants();
  renderTeams();
  updateTeamDropdown();
  document.getElementById('game-type').addEventListener('change', onGameTypeChange);
  onGameTypeChange();
})();

function onGameTypeChange() {
  const v = document.getElementById('game-type').value;
  document.getElementById('laps-section').style.display = v === 'timelap' ? 'block' : 'none';
}

function changeLaps(d) {
  laps = Math.max(1, Math.min(20, laps + d));
  document.getElementById('laps-val').textContent = laps;
}

function selectMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-card').forEach(c => c.classList.toggle('selected', c.dataset.mode === mode));
  document.getElementById('team-section').style.display = mode === 'team' ? 'block' : 'none';
  document.getElementById('team-assign-row').style.display = mode === 'team' ? 'block' : 'none';
  document.getElementById('participant-step-num').textContent = mode === 'team' ? '5' : '4';
}

function addParticipant() {
  const input = document.getElementById('p-name-input');
  const name = input.value.trim();
  if (!name) { App.toast('이름을 입력하세요', 'error'); return; }
  const teamSel = document.getElementById('assign-team');
  const teamId = teamSel.value || null;
  App.addParticipant(name, teamId);
  input.value = '';
  renderParticipants();
  updateTeamRoster();
  App.toast(`${name} 추가됨!`, 'success');
}

function addBulk() { document.getElementById('bulk-modal').classList.remove('hidden'); }
function closeBulk() { document.getElementById('bulk-modal').classList.add('hidden'); }
function confirmBulk() {
  const lines = document.getElementById('bulk-input').value.split('\n').map(s => s.trim()).filter(Boolean);
  lines.forEach(name => App.addParticipant(name, null));
  closeBulk();
  document.getElementById('bulk-input').value = '';
  renderParticipants();
  App.toast(`${lines.length}명 추가됨!`, 'success');
}

function addTeam() {
  const input = document.getElementById('team-name-input');
  const name = input.value.trim();
  if (!name) { App.toast('팀 이름을 입력하세요', 'error'); return; }
  App.addTeam(name);
  input.value = '';
  renderTeams();
  updateTeamDropdown();
}

function renderParticipants() {
  const state = App.getState();
  const el = document.getElementById('participant-list');
  if (!state.participants.length) {
    el.innerHTML = '<div class="text-dim text-sm">참가자를 추가하세요.</div>';
    return;
  }
  el.innerHTML = state.participants.map(p => {
    const team = p.teamId ? App.getTeam(p.teamId) : null;
    return `
      <div class="participant-item">
        <div class="p-color-dot" style="background:${p.color}"></div>
        <div class="p-name">${p.name}</div>
        ${team ? `<div class="p-team">${team.name}</div>` : ''}
        <button class="p-remove" onclick="removeP('${p.id}')">×</button>
      </div>`;
  }).join('');
}

function removeP(id) {
  const p = App.getParticipant(id);
  App.removeParticipant(id);
  renderParticipants();
  updateTeamRoster();
  App.toast(`${p?.name} 삭제됨`, 'info');
}

function renderTeams() {
  const state = App.getState();
  const el = document.getElementById('team-list');
  if (!state.teams.length) {
    el.innerHTML = '<div class="text-dim text-sm">팀을 추가하세요.</div>';
    return;
  }
  el.innerHTML = state.teams.map(t => {
    const members = state.participants.filter(p => p.teamId === t.id);
    return `
      <div class="team-item">
        <div class="team-header">
          <div class="team-dot" style="background:${t.color}; width:16px; height:16px; border-radius:50%;"></div>
          <div style="font-weight:700; flex:1;">${t.name}</div>
          <span class="badge badge-blue">${members.length}명</span>
          <button class="p-remove" onclick="removeTeam('${t.id}')">×</button>
        </div>
        ${members.length ? `<div class="team-members">${members.map(m=>`<span class="team-member-tag">${m.name}</span>`).join('')}</div>` : '<div class="text-dim text-sm" style="padding-left:28px;">팀원 없음</div>'}
      </div>`;
  }).join('');
}

function removeTeam(id) {
  App.removeTeam(id);
  renderTeams();
  updateTeamDropdown();
}

function updateTeamDropdown() {
  const state = App.getState();
  const sel = document.getElementById('assign-team');
  sel.innerHTML = '<option value="">팀 없음</option>' +
    state.teams.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
}

function updateTeamRoster() { renderTeams(); }

function saveAndGo(e) {
  const name = document.getElementById('event-name').value.trim() || '행사';
  const state = App.getState();
  if (!state.participants.length) {
    e.preventDefault();
    App.toast('참가자를 한 명 이상 추가하세요!', 'error');
    return;
  }
  App.setState({
    mode: currentMode,
    gameType: document.getElementById('game-type').value,
    event: { ...state.event, name, subtitle: document.getElementById('event-subtitle').value.trim() },
    settings: { ...state.settings, laps },
  });
  // 히스토리 저장
  const history = JSON.parse(localStorage.getItem('sgp_history') || '[]');
  history.push({ name, date: new Date().toLocaleDateString('ko-KR'), game: document.getElementById('game-type').value, participants: state.participants.length, mode: currentMode });
  localStorage.setItem('sgp_history', JSON.stringify(history.slice(-20)));
}

function onExcelLoad(data) {
  // 불러온 후 화면 전체 갱신
  document.getElementById('event-name').value    = data.event?.name     || '';
  document.getElementById('event-subtitle').value= data.event?.subtitle || '';
  if (data.gameType) document.getElementById('game-type').value = data.gameType;
  laps = data.settings?.laps || 1;
  document.getElementById('laps-val').textContent = laps;
  currentMode = data.mode || 'individual';
  selectMode(currentMode);
  renderParticipants();
  renderTeams();
  updateTeamDropdown();
  onGameTypeChange();
  App.toast('엑셀 설정 적용 완료!', 'success');
}

function clearAll() {
  if (!confirm('모든 참가자와 기록을 초기화할까요?')) return;
  App.resetState();
  location.reload();
}
</script>
</body>
</html>
