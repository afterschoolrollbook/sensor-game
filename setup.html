<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SGP — 행사 설정</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08080f;--bg2:#0f0f1a;--card:#13131f;--card2:#1a1a2a;
  --border:#2a2a40;--border2:#3a3a55;
  --red:#e63946;--accent:#4cc9f0;--green:#06d6a0;--yellow:#ffd60a;--purple:#7b2fff;
  --text:#f0f0f8;--text2:#9090b0;--text3:#5a5a7a;
  --radius:10px;--left-w:500px;--nav-h:56px;
}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;overflow:hidden}

/* NAV */
#nav{
  position:fixed;top:0;left:0;right:0;height:var(--nav-h);z-index:100;
  background:rgba(8,8,15,.96);border-bottom:1px solid var(--border);
  display:flex;align-items:center;backdrop-filter:blur(12px);
}
.nav-logo{
  width:var(--left-w);flex-shrink:0;height:100%;
  display:flex;align-items:center;gap:10px;padding:0 24px;
  border-right:1px solid var(--border);
}
.nav-logo-dot{width:7px;height:7px;border-radius:50%;background:var(--red);box-shadow:0 0 10px var(--red)}
.nav-logo-txt{font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:3px}
.nav-steps{flex:1;display:flex;align-items:center;justify-content:center;gap:2px;padding:0 20px}
.nsi{
  display:flex;align-items:center;gap:7px;padding:6px 14px;
  cursor:pointer;border-radius:7px;transition:all .2s;
}
.nsi:hover .nsi-label{color:var(--text)}
.nsi-num{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text3);transition:color .2s}
.nsi-label{font-size:12px;font-weight:500;color:var(--text3);transition:color .2s}
.nsi.active .nsi-num{color:var(--red)}
.nsi.active .nsi-label{color:var(--text)}
.nsi.done .nsi-num{color:var(--green)}
.nsi.done .nsi-label{color:var(--text2)}
.nsi-sep{color:var(--border2);font-size:12px}
.nav-links{display:flex;align-items:center;gap:2px;padding:0 16px;flex-shrink:0}
.nl{font-size:11px;color:var(--text3);text-decoration:none;padding:5px 9px;border-radius:6px;transition:all .2s}
.nl:hover{color:var(--text);background:rgba(255,255,255,.05)}
.nl.cur{color:var(--red);font-weight:700}

/* SPLIT */
#split{display:flex;height:100vh;padding-top:var(--nav-h)}

/* LEFT PANEL */
#left{
  width:var(--left-w);flex-shrink:0;
  background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
#sw{
  flex:1;overflow-y:auto;padding:28px 22px;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent;
}
#sw::-webkit-scrollbar{width:3px}
#sw::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.sp{display:none;animation:fu .3s ease}
.sp.active{display:block}
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.sh{margin-bottom:22px}
.sno{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--red);letter-spacing:3px;margin-bottom:5px}
.stitle{font-size:21px;font-weight:700;letter-spacing:-.5px}

/* FORM */
.fg{margin-bottom:13px}
.fl{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--text3);text-transform:uppercase;margin-bottom:5px}
.fi{
  width:100%;background:var(--card);border:1px solid var(--border);
  color:var(--text);border-radius:8px;padding:10px 13px;
  font-family:'Noto Sans KR',sans-serif;font-size:14px;
  transition:border-color .2s;outline:none;
}
.fi:focus{border-color:var(--red)}
.fi::placeholder{color:var(--text3)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:11px}

/* DISPLAY CHIPS */
.dt-wrap{margin-top:18px}
.dt-title{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--text3);text-transform:uppercase;margin-bottom:9px}
.dt-chips{display:flex;flex-wrap:wrap;gap:7px}
.dtc{
  display:flex;align-items:center;gap:5px;padding:5px 11px;
  border-radius:20px;cursor:pointer;user-select:none;
  border:1px solid var(--border);background:var(--card);
  font-size:11px;font-weight:500;color:var(--text2);transition:all .2s;
}
.dtc.on{border-color:var(--red);background:rgba(230,57,70,.1);color:var(--text)}
.dtc-dot{width:5px;height:5px;border-radius:50%;background:var(--border2);flex-shrink:0;transition:background .2s}
.dtc.on .dtc-dot{background:var(--red)}

/* GAME GRID */
.gtabs{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:14px}
.gtab{
  flex:1;padding:8px 0;text-align:center;font-size:13px;font-weight:500;
  cursor:pointer;color:var(--text3);transition:all .2s;background:transparent;border:none;
}
.gtab.active{background:var(--red);color:#fff}
.gfilters{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.gfb{
  padding:4px 11px;border-radius:20px;font-size:11px;cursor:pointer;
  border:1px solid var(--border);color:var(--text3);background:transparent;transition:all .2s;
}
.gfb.active{border-color:var(--accent);color:var(--accent);background:rgba(76,201,240,.08)}
.ggrid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.gc{
  background:var(--card);border:2px solid var(--border);border-radius:9px;
  padding:13px 11px;cursor:pointer;transition:all .2s;position:relative;
}
.gc:hover{border-color:var(--border2);transform:translateY(-2px)}
.gc.sel{border-color:var(--red);background:rgba(230,57,70,.06)}
.gc-icon{font-size:22px;margin-bottom:5px}
.gc-name{font-size:13px;font-weight:700;margin-bottom:2px}
.gc-desc{font-size:10px;color:var(--text3);line-height:1.4}
.gc-tag{position:absolute;top:7px;right:7px;font-size:9px;padding:2px 6px;border-radius:8px;background:rgba(255,255,255,.05);color:var(--text3)}

.laps-row{display:flex;align-items:center;gap:12px;margin-top:14px;background:var(--card);border-radius:9px;padding:12px 14px;border:1px solid var(--border)}
.laps-lbl{font-size:13px;color:var(--text2);flex:1}
.lb{width:32px;height:32px;border-radius:7px;background:var(--bg2);border:1px solid var(--border);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.lb:hover{border-color:var(--red);color:var(--red)}
.lv{font-family:'Share Tech Mono',monospace;font-size:20px;min-width:28px;text-align:center}

/* MODE GRID */
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:18px}
.mc{
  background:var(--card);border:2px solid var(--border);border-radius:9px;
  padding:13px 11px;cursor:pointer;transition:all .2s;text-align:center;
}
.mc:hover{border-color:var(--border2)}
.mc.sel{border-color:var(--accent);background:rgba(76,201,240,.06)}
.mc-icon{font-size:20px;margin-bottom:5px}
.mc-name{font-size:12px;font-weight:700}
.mc-sub{font-size:10px;color:var(--text3);margin-top:2px}

/* PARTICIPANTS */
.pa{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:14px}
.par{display:flex;gap:8px;margin-bottom:11px}
.par .fi{flex:1}
.badd{padding:10px 14px;background:var(--red);color:#fff;border:none;border-radius:7px;cursor:pointer;font-size:13px;font-weight:700;transition:all .2s;white-space:nowrap}
.badd:hover{background:#c62835}
.plist{display:flex;flex-direction:column;gap:5px;max-height:150px;overflow-y:auto}
.ptag{display:flex;align-items:center;gap:7px;background:var(--card2);border-radius:6px;padding:7px 9px}
.pt-clr{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.pt-nm{font-size:13px;flex:1}
.pt-x{color:var(--text3);cursor:pointer;font-size:15px;line-height:1;transition:color .2s}
.pt-x:hover{color:var(--red)}
.bxls{width:100%;margin-top:9px;padding:9px;background:transparent;border:1px dashed var(--border2);color:var(--text3);border-radius:7px;cursor:pointer;font-size:12px;transition:all .2s}
.bxls:hover{border-color:var(--green);color:var(--green)}

/* PROC */
.plist2{display:flex;flex-direction:column;gap:9px}
.pcard{
  background:var(--card);border:2px solid var(--border);border-radius:9px;
  padding:13px 14px;cursor:pointer;transition:all .2s;
  display:flex;align-items:center;gap:12px;
}
.pcard:hover{border-color:var(--border2)}
.pcard.sel{border-color:var(--yellow);background:rgba(255,214,10,.04)}
.pci{font-size:20px;flex-shrink:0}
.pc-name{font-size:14px;font-weight:700;margin-bottom:2px}
.pc-desc{font-size:11px;color:var(--text3);line-height:1.4}

/* CONFIRM */
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:18px}
.cbox{background:var(--card);border-radius:9px;padding:13px;border:1px solid var(--border)}
.ck{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--text3);text-transform:uppercase;margin-bottom:3px}
.cv{font-size:15px;font-weight:700}
.cv.empty{color:var(--text3);font-weight:400;font-size:13px}
.pt-badges{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px}
.ptbadge{display:flex;align-items:center;gap:5px;background:var(--card);border-radius:6px;padding:5px 9px;font-size:12px;border:1px solid var(--border)}

/* STEP NAV */
#snav{padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:9px;background:var(--bg2);flex-shrink:0}
.bprev{padding:10px 18px;background:transparent;border:1px solid var(--border);color:var(--text2);border-radius:7px;cursor:pointer;font-size:13px;font-weight:600;transition:all .2s}
.bprev:hover{border-color:var(--border2);color:var(--text)}
.bnext{flex:1;padding:11px;background:var(--red);color:#fff;border:none;border-radius:7px;cursor:pointer;font-size:14px;font-weight:700;letter-spacing:.5px;transition:all .2s}
.bnext:hover{background:#c62835;transform:translateY(-1px)}
.bstart{
  flex:1;padding:12px;background:linear-gradient(135deg,var(--red),#b22232);
  color:#fff;border:none;border-radius:7px;cursor:pointer;font-size:14px;
  font-weight:700;letter-spacing:2px;transition:all .2s;
  text-decoration:none;display:flex;align-items:center;justify-content:center;gap:8px;
}
.bstart:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(230,57,70,.3)}

/* RIGHT PANEL */
#right{
  flex:1;display:flex;flex-direction:column;
  background:var(--bg);overflow:hidden;
}
#pvhdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 20px;border-bottom:1px solid var(--border);flex-shrink:0;
}
.pvtitle{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:3px;color:var(--text3);text-transform:uppercase}
.pvbadge{font-size:9px;letter-spacing:2px;color:var(--red);border:1px solid var(--red);padding:3px 8px;border-radius:3px;animation:lp 2s infinite}
@keyframes lp{0%,100%{opacity:1}50%{opacity:.35}}
.pvacts{display:flex;gap:7px}
.pvbtn{padding:5px 11px;background:transparent;border:1px solid var(--border);color:var(--text3);border-radius:6px;cursor:pointer;font-size:11px;transition:all .2s}
.pvbtn:hover{border-color:var(--accent);color:var(--accent)}
.pvbtn.p{background:var(--red);border-color:var(--red);color:#fff}
.pvbtn.p:hover{background:#c62835}

#pvcw{
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:20px;overflow:hidden;
}
#pvc{
  width:100%;max-width:940px;aspect-ratio:16/9;
  background:#040408;border-radius:12px;
  display:grid;grid-template-rows:auto 1fr auto auto;
  padding:22px;gap:14px;position:relative;overflow:hidden;
  box-shadow:0 0 80px rgba(0,0,0,.7),0 0 0 1px var(--border);
}
#pvc::after{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.05) 2px,rgba(0,0,0,.05) 4px);
  pointer-events:none;border-radius:12px;z-index:1;
}
#pvc::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 0%,rgba(230,57,70,.05) 0%,transparent 55%);
  pointer-events:none;
}

/* PV HEADER */
#pvh{
  display:flex;align-items:center;gap:14px;
  border-bottom:2px solid var(--red);padding-bottom:12px;
  transition:opacity .3s;position:relative;z-index:2;
}
#pv-ename{
  font-family:'Bebas Neue',cursive;
  font-size:clamp(16px,3.8vw,46px);
  letter-spacing:3px;line-height:1;flex:1;
  text-shadow:0 0 30px rgba(230,57,70,.25);
}
#pv-sub{font-size:clamp(8px,1vw,13px);color:var(--text2);margin-top:3px}
#pv-live{
  font-family:'Share Tech Mono',monospace;
  font-size:clamp(8px,1vw,11px);letter-spacing:3px;
  color:var(--red);border:1px solid var(--red);
  padding:3px 9px;border-radius:3px;animation:lp 2s infinite;flex-shrink:0;
}

/* PV MAIN */
#pvm{
  display:flex;gap:14px;align-items:stretch;overflow:hidden;
  min-height:0;position:relative;z-index:2;
}

/* TIMER */
#pvt{
  flex:1.3;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:rgba(255,255,255,.018);
  border:1px solid rgba(76,201,240,.12);border-radius:9px;
  padding:18px;position:relative;overflow:hidden;
}
#pvt::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 50%,rgba(76,201,240,.04) 0%,transparent 70%);
}
.tvlbl{font-family:'Share Tech Mono',monospace;font-size:clamp(7px,.8vw,10px);letter-spacing:3px;color:var(--text3);margin-bottom:5px;text-transform:uppercase}
#pv-chal{font-family:'Bebas Neue',cursive;font-size:clamp(13px,2.5vw,32px);letter-spacing:2px;color:var(--text);margin-bottom:7px;min-height:.8em;position:relative;z-index:1}
#pv-time{
  font-family:'Share Tech Mono',monospace;
  font-size:clamp(26px,8vw,100px);
  line-height:1;letter-spacing:-1px;
  color:var(--accent);text-shadow:0 0 40px rgba(76,201,240,.4);
  position:relative;z-index:1;
}
#pv-lap{font-family:'Share Tech Mono',monospace;font-size:clamp(7px,.7vw,10px);color:var(--text3);margin-top:5px;letter-spacing:2px;position:relative;z-index:1}

/* RANKS */
#pvr{
  flex:1;display:flex;flex-direction:column;gap:5px;
  justify-content:center;position:relative;z-index:2;
}
.rrow{
  display:flex;align-items:center;gap:7px;
  background:rgba(255,255,255,.018);border-radius:6px;
  padding:5px 8px;border:1px solid rgba(255,255,255,.035);transition:all .3s;
}
.rrow.r1{border-color:rgba(255,214,10,.2);background:rgba(255,214,10,.04)}
.rno{font-family:'Bebas Neue',cursive;font-size:clamp(11px,1.8vw,22px);color:var(--text3);width:clamp(14px,1.8vw,22px);text-align:center;flex-shrink:0}
.rrow.r1 .rno{color:var(--yellow)}
.rdot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.rnm{font-family:'Rajdhani',sans-serif;font-weight:600;font-size:clamp(10px,1.4vw,18px);flex:1;letter-spacing:.5px}
.rtm{font-family:'Share Tech Mono',monospace;font-size:clamp(8px,1.1vw,13px);color:var(--accent)}
.rrow.empty .rnm{color:var(--text3);font-weight:400}
.rrow.empty .rtm{color:var(--text3)}

/* PV FOOTER */
#pvf{
  display:flex;align-items:center;justify-content:space-between;
  border-top:1px solid var(--border);padding-top:8px;
  transition:opacity .3s;position:relative;z-index:2;
}
#pv-gname{font-family:'Share Tech Mono',monospace;font-size:clamp(7px,.9vw,11px);letter-spacing:3px;color:var(--text3)}
#pv-clk{font-family:'Share Tech Mono',monospace;font-size:clamp(8px,1.1vw,13px);color:var(--text2)}

/* TICKER */
#pvtk{
  overflow:hidden;border-top:1px solid rgba(255,255,255,.035);
  padding-top:5px;transition:opacity .3s;position:relative;z-index:2;
}
#pvtki{
  display:flex;gap:50px;white-space:nowrap;
  font-family:'Share Tech Mono',monospace;
  font-size:clamp(8px,.9vw,11px);letter-spacing:2px;color:var(--text3);
  animation:ticker 22s linear infinite;
}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}

.pv-hidden{opacity:.15;transition:opacity .3s}

/* PV CONTROLS */
#pvctrls{
  padding:9px 20px;border-top:1px solid var(--border);
  display:flex;align-items:center;gap:7px;flex-wrap:wrap;flex-shrink:0;
  background:rgba(8,8,15,.85);
}
.pvcl{font-size:9px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-right:3px}
.pvct{
  display:flex;align-items:center;gap:4px;padding:4px 9px;
  border-radius:20px;cursor:pointer;border:1px solid var(--border);
  font-size:10px;color:var(--text3);transition:all .2s;user-select:none;
}
.pvct.on{border-color:var(--accent);color:var(--accent);background:rgba(76,201,240,.06)}
.pvcd{width:5px;height:5px;border-radius:50%;background:currentColor;opacity:.6}

/* TOAST */
#tc{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:7px;pointer-events:none}
.tos{padding:9px 16px;border-radius:7px;font-size:12px;font-weight:500;background:var(--card2);border:1px solid var(--border2);color:var(--text);animation:ti .3s ease;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.tos.success{border-color:var(--green);color:var(--green)}
.tos.error{border-color:var(--red);color:var(--red)}
@keyframes ti{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* MOBILE */
#fab{display:none;position:fixed;bottom:70px;right:18px;z-index:200;width:50px;height:50px;border-radius:50%;background:var(--red);border:none;color:#fff;font-size:18px;cursor:pointer;box-shadow:0 4px 18px rgba(230,57,70,.4);align-items:center;justify-content:center}
@media(max-width:860px){
  :root{--left-w:100%}
  #right{display:none}
  #left{width:100%}
  #fab{display:flex}
  .nsi-label{display:none}
  .nav-links{display:none}
  .frow{grid-template-columns:1fr}
  .ggrid,.mgrid{grid-template-columns:1fr 1fr}
  .cgrid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<nav id="nav">
  <div class="nav-logo">
    <div class="nav-logo-dot"></div>
    <span class="nav-logo-txt">SGP.</span>
  </div>
  <div class="nav-steps" id="navsteps"></div>
  <div class="nav-links">
    <a class="nl" href="index.html">홈</a>
    <a class="nl cur" href="setup.html">행사설정</a>
    <a class="nl" href="customize.html">커스터마이징</a>
    <a class="nl" href="display-settings.html">전광판설정</a>
    <a class="nl" href="game.html">게임진행</a>
    <a class="nl" href="result.html">결과</a>
  </div>
</nav>

<div id="split">

  <!-- ══ LEFT PANEL ══ -->
  <div id="left">
    <div id="sw">

      <!-- STEP 1 -->
      <div class="sp active" id="s1">
        <div class="sh"><div class="sno">// STEP 01</div><div class="stitle">기본 정보</div></div>
        <div class="fg"><div class="fl">행사명</div><input class="fi" id="f-en" placeholder="예) 2026년 한마음 체육대회" oninput="fc()"></div>
        <div class="fg"><div class="fl">부제목</div><input class="fi" id="f-sub" placeholder="예) 4학년 체육대회" oninput="fc()"></div>
        <div class="fg"><div class="fl">종목명</div><input class="fi" id="f-gl" placeholder="예) 이어달리기" oninput="fc()"></div>
        <div class="frow">
          <div class="fg"><div class="fl">일시</div><input class="fi" id="f-dt" placeholder="예) 2026.05.10" oninput="fc()"></div>
          <div class="fg"><div class="fl">장소</div><input class="fi" id="f-pl" placeholder="예) 000 체육관" oninput="fc()"></div>
        </div>
        <div class="fg"><div class="fl">후원 / 주관</div><input class="fi" id="f-sp" placeholder="예) 000시청, 000체육회" oninput="fc()"></div>
        <div class="fg"><div class="fl">슬로건 1</div><input class="fi" id="f-s1" placeholder="예) 함께하는 스포츠, 하나되는 우리" oninput="fc()"></div>
        <div class="fg"><div class="fl">슬로건 2</div><input class="fi" id="f-s2" placeholder="예) 도전! 열정! 승리!" oninput="fc()"></div>
        <div class="dt-wrap">
          <div class="dt-title">전광판 표시 항목</div>
          <div class="dt-chips" id="dtchips"></div>
        </div>
      </div>

      <!-- STEP 2 -->
      <div class="sp" id="s2">
        <div class="sh"><div class="sno">// STEP 02</div><div class="stitle">게임 모드</div></div>
        <div class="gtabs">
          <button class="gtab active" id="tab-s" onclick="switchTab('sensor')">⚡ 센서 게임</button>
          <button class="gtab" id="tab-p" onclick="switchTab('sport')">🏅 종목 선택</button>
        </div>
        <div class="gfilters" id="gfilters"></div>
        <div class="ggrid" id="ggrid"></div>
        <div class="laps-row">
          <div class="laps-lbl">바퀴 수 / 라운드</div>
          <button class="lb" onclick="chLaps(-1)">−</button>
          <div class="lv" id="lapv">1</div>
          <button class="lb" onclick="chLaps(1)">+</button>
        </div>
      </div>

      <!-- STEP 3 -->
      <div class="sp" id="s3">
        <div class="sh"><div class="sno">// STEP 03</div><div class="stitle">참가자 등록</div></div>
        <div class="mgrid" id="mgrid"></div>
        <div id="ptarea"></div>
      </div>

      <!-- STEP 4 -->
      <div class="sp" id="s4">
        <div class="sh"><div class="sno">// STEP 04</div><div class="stitle">진행 방식</div></div>
        <div class="plist2" id="proclist"></div>
      </div>

      <!-- STEP 5 -->
      <div class="sp" id="s5">
        <div class="sh"><div class="sno">// STEP 05</div><div class="stitle">확인 & 시작</div></div>
        <div class="cgrid" id="cgrid"></div>
        <div class="dt-title" style="margin-bottom:9px">참가자</div>
        <div class="pt-badges" id="ptbadges"></div>
      </div>

    </div><!-- /sw -->

    <div id="snav">
      <button class="bprev" id="bprev" onclick="prevS()" style="display:none">← 이전</button>
      <button class="bnext" id="bnext" onclick="nextS()">다음 → 게임 모드</button>
    </div>
  </div>

  <!-- ══ RIGHT PANEL ══ -->
  <div id="right">
    <div id="pvhdr">
      <div style="display:flex;align-items:center;gap:12px">
        <div class="pvtitle">전광판 미리보기</div>
        <div class="pvbadge">● LIVE</div>
      </div>
      <div class="pvacts">
        <button class="pvbtn" onclick="resetPv()">↺ 초기화</button>
        <button class="pvbtn p" onclick="openDisp()">⬜ HDMI 전광판 열기</button>
      </div>
    </div>

    <div id="pvcw">
      <div id="pvc">
        <!-- 헤더 -->
        <div id="pvh">
          <div><div id="pv-ename">SGP 행사</div><div id="pv-sub"></div></div>
          <div id="pv-live">● LIVE</div>
        </div>
        <!-- 메인 -->
        <div id="pvm">
          <div id="pvt">
            <div class="tvlbl">CHALLENGER</div>
            <div id="pv-chal">—</div>
            <div id="pv-time">00:00.000</div>
            <div id="pv-lap">LAP 1 / 1</div>
          </div>
          <div id="pvr"></div>
        </div>
        <!-- 푸터 -->
        <div id="pvf">
          <div id="pv-gname">SGP PLATFORM</div>
          <div id="pv-clk">--:--:--</div>
        </div>
        <!-- 티커 -->
        <div id="pvtk"><div id="pvtki"></div></div>
      </div>
    </div>

    <!-- 블록 토글 -->
    <div id="pvctrls">
      <span class="pvcl">블록 표시</span>
      <div class="pvct on" onclick="togBlk('pvh',this)"><span class="pvcd"></span>헤더</div>
      <div class="pvct on" onclick="togBlk('pvt',this)"><span class="pvcd"></span>타이머</div>
      <div class="pvct on" onclick="togBlk('pvr',this)"><span class="pvcd"></span>순위</div>
      <div class="pvct on" onclick="togBlk('pvf',this)"><span class="pvcd"></span>푸터</div>
      <div class="pvct on" onclick="togBlk('pvtk',this)"><span class="pvcd"></span>티커</div>
    </div>
  </div>

</div><!-- /split -->

<button id="fab" onclick="togMob()">📺</button>
<div id="tc"></div>

<script src="js/app.js"></script>
<script src="js/export.js"></script>
<script>
/* ── DATA ── */
const SGAMES=[
  {id:'timelap', icon:'🏁',name:'타임랩',   desc:'출발~결승 시간 측정. 바퀴·랩타임 자동 기록.',tag:'속도/시간',cat:'speed',  ac:'#e63946'},
  {id:'reaction',icon:'⚡',name:'반응속도', desc:'신호 후 버튼 누르는 속도 측정.',              tag:'속도/시간',cat:'speed',  ac:'#ff6b35'},
  {id:'jump',    icon:'🦘',name:'점프력',   desc:'점프 높이·체공 시간 측정.',                  tag:'순간/힘',  cat:'power',  ac:'#7b2fff'},
  {id:'balance', icon:'⚖️', name:'균형감각', desc:'센서 기반 밸런스 지속 시간 기록.',           tag:'순간/힘',  cat:'power',  ac:'#06d6a0'},
  {id:'accuracy',icon:'🎯',name:'정확도',   desc:'타겟 히트 정확도. 복수 라운드 평균.',         tag:'정확도',   cat:'target', ac:'#ffd60a'},
  {id:'endurance',icon:'🔥',name:'지속력',  desc:'일정 자세 유지 시간. 센서 탈락 감지.',        tag:'정확도',   cat:'target', ac:'#ff6b35'},
];
const PGAMES=[
  {id:'athletics', icon:'🏃',name:'육상',    desc:'트랙·필드·도로 종목.',                      tag:'육상',     cat:'field',  ac:'#e63946'},
  {id:'swimming',  icon:'🏊',name:'수영',    desc:'종목별 타임 기록. 체급·부문별 지원.',        tag:'수상',     cat:'aqua',   ac:'#4cc9f0'},
  {id:'cycling',   icon:'🚴',name:'자전거',  desc:'타임·랩 기록. 도로·트랙 지원.',             tag:'사이클',   cat:'cycle',  ac:'#ffd60a'},
  {id:'archery',   icon:'🏹',name:'양궁',    desc:'거리별 점수 집계. 단체·개인전.',             tag:'정확도',   cat:'target', ac:'#06d6a0'},
  {id:'taekwondo', icon:'🥋',name:'태권도',  desc:'심판 채점 입력. 체급·종목별.',               tag:'무술',     cat:'martial',ac:'#7b2fff'},
  {id:'weightlift',icon:'🏋️',name:'역도',   desc:'무게 기록. 체급별 자동 분류 및 순위.',       tag:'힘',       cat:'power',  ac:'#ff6b35'},
];
const ALLG=[...SGAMES,...PGAMES];
const REGMODES=[
  {id:'ind',    icon:'🧑', name:'개인전',       sub:'개인별 기록'},
  {id:'weight', icon:'⚖️', name:'체급 개인전',   sub:'체급별 분류'},
  {id:'divind', icon:'🏷️', name:'부문+체급 개인',sub:'부문·체급 혼합'},
  {id:'team',   icon:'👥', name:'팀전',         sub:'팀 단위 기록'},
  {id:'teamwt', icon:'🏅', name:'체급 팀전',     sub:'팀+체급'},
  {id:'divteam',icon:'🎖️', name:'부문+체급 팀',  sub:'부문·팀·체급'},
];
const PROCS=[
  {id:'ind-rec',  icon:'🏁',name:'개별 기록',    desc:'모든 참가자가 각자 기록. 시간·점수 기준 자동 순위.'},
  {id:'ind-tour', icon:'🏆',name:'개별 토너먼트', desc:'1:1 대진표로 승자가 다음 라운드 진출.'},
  {id:'team-rec', icon:'📊',name:'팀 기록',       desc:'팀원 기록 합산 또는 평균으로 순위 결정.'},
  {id:'team-ind', icon:'🎽',name:'팀 개별 기록',  desc:'팀 내 개인 기록 따로 집계, 팀 점수도 합산.'},
  {id:'team-tour',icon:'🥇',name:'팀 토너먼트',   desc:'팀 대 팀 대진표. 승자 다음 라운드 진출.'},
];
const DITEMS=[
  {k:'eventname',l:'행사명',  def:true},
  {k:'subtitle', l:'부제목',  def:false},
  {k:'gamename', l:'종목명',  def:false},
  {k:'date',     l:'일시',    def:false},
  {k:'place',    l:'장소',    def:false},
  {k:'sponsor',  l:'후원',    def:false},
  {k:'slogan1',  l:'슬로건1', def:false},
  {k:'slogan2',  l:'슬로건2', def:false},
];
const TC=['#e63946','#4cc9f0','#06d6a0','#ffd60a','#7b2fff','#ff6b35','#f72585','#4361ee'];

/* ── STATE ── */
let cs=1;
const SL=['기본정보','게임모드','참가자','진행방식','확인/시작'];
let S={
  en:'',sub:'',gl:'',dt:'',pl:'',sp:'',s1:'',s2:'',
  di:{eventname:true},
  gtab:'sensor',selG:'timelap',cat:'all',laps:1,
  rm:'ind',pts:[],proc:'ind-rec',
};

/* ── INIT ── */
window.addEventListener('DOMContentLoaded',()=>{
  try{const a=App.getState();if(a.event?.name)S.en=a.event.name;if(a.participants?.length)S.pts=[...a.participants];if(a.settings?.laps)S.laps=a.settings.laps;}catch(e){}
  DITEMS.forEach(d=>{if(S.di[d.k]===undefined)S.di[d.k]=d.def;});
  buildNav();buildChips();buildGG();buildMG();buildProc();renderPA();updateNav();updatePv();startClk();
  // restore
  document.getElementById('f-en').value=S.en;
  document.getElementById('f-sub').value=S.sub;
  document.getElementById('f-gl').value=S.gl;
  document.getElementById('f-dt').value=S.dt;
  document.getElementById('f-pl').value=S.pl;
  document.getElementById('f-sp').value=S.sp;
  document.getElementById('f-s1').value=S.s1;
  document.getElementById('f-s2').value=S.s2;
});

/* ── NAV ── */
function buildNav(){
  const w=document.getElementById('navsteps');w.innerHTML='';
  for(let i=1;i<=5;i++){
    if(i>1){const sep=document.createElement('span');sep.className='nsi-sep';sep.textContent='›';w.appendChild(sep);}
    const d=document.createElement('div');
    d.className='nsi'+(i===cs?' active':i<cs?' done':'');
    d.onclick=()=>goS(i);
    d.innerHTML=`<span class="nsi-num">${String(i).padStart(2,'0')}</span><span class="nsi-label">${SL[i-1]}</span>`;
    w.appendChild(d);
  }
}
function goS(n){
  document.getElementById('s'+cs).classList.remove('active');
  cs=Math.max(1,Math.min(5,n));
  document.getElementById('s'+cs).classList.add('active');
  buildNav();updateNav();
  if(cs===5)buildConfirm();
  updatePv();
}
function nextS(){if(cs<5)goS(cs+1);}
function prevS(){if(cs>1)goS(cs-1);}
function updateNav(){
  document.getElementById('bprev').style.display=cs===1?'none':'';
  const bn=document.getElementById('bnext');
  if(cs===5){bn.style.display='none';}
  else{bn.style.display='';const lb=['','다음 → 게임 모드','다음 → 참가자','다음 → 진행방식','다음 → 확인&시작'];bn.textContent=lb[cs]||'다음 →';}
}

/* ── CHIPS ── */
function buildChips(){
  const w=document.getElementById('dtchips');w.innerHTML='';
  DITEMS.forEach(d=>{
    const el=document.createElement('div');
    el.className='dtc'+(S.di[d.k]?' on':'');
    el.innerHTML=`<div class="dtc-dot"></div>${d.l}`;
    el.onclick=()=>{S.di[d.k]=!S.di[d.k];el.classList.toggle('on');updatePv();};
    w.appendChild(el);
  });
}
function fc(){
  S.en=document.getElementById('f-en').value;
  S.sub=document.getElementById('f-sub').value;
  S.gl=document.getElementById('f-gl').value;
  S.dt=document.getElementById('f-dt').value;
  S.pl=document.getElementById('f-pl').value;
  S.sp=document.getElementById('f-sp').value;
  S.s1=document.getElementById('f-s1').value;
  S.s2=document.getElementById('f-s2').value;
  updatePv();
}

/* ── GAME GRID ── */
function buildGG(){
  const games=S.gtab==='sensor'?SGAMES:PGAMES;
  const cats=[...new Set(games.map(g=>g.cat))];
  const cl={speed:'속도/시간',power:'힘/순간',target:'정확도',field:'육상',aqua:'수상',cycle:'사이클',martial:'무술'};
  const fw=document.getElementById('gfilters');fw.innerHTML='';
  const a=document.createElement('span');a.className='gfb'+(S.cat==='all'?' active':'');a.textContent='전체';a.onclick=()=>{S.cat='all';buildGG();};fw.appendChild(a);
  cats.forEach(c=>{const b=document.createElement('span');b.className='gfb'+(S.cat===c?' active':'');b.textContent=cl[c]||c;b.onclick=()=>{S.cat=c;buildGG();};fw.appendChild(b);});
  const gw=document.getElementById('ggrid');gw.innerHTML='';
  const filtered=S.cat==='all'?games:games.filter(g=>g.cat===S.cat);
  filtered.forEach(g=>{
    const d=document.createElement('div');
    d.className='gc'+(S.selG===g.id?' sel':'');
    if(S.selG===g.id)d.style.setProperty('--red',g.ac);
    d.innerHTML=`<div class="gc-icon">${g.icon}</div><div class="gc-name">${g.name}</div><div class="gc-desc">${g.desc}</div><div class="gc-tag">${g.tag}</div>`;
    d.onclick=()=>{S.selG=g.id;buildGG();updatePv();};
    gw.appendChild(d);
  });
  document.getElementById('lapv').textContent=S.laps;
}
function switchTab(t){S.gtab=t;S.cat='all';document.getElementById('tab-s').classList.toggle('active',t==='sensor');document.getElementById('tab-p').classList.toggle('active',t==='sport');buildGG();}
function chLaps(d){S.laps=Math.max(1,Math.min(20,S.laps+d));document.getElementById('lapv').textContent=S.laps;updatePv();}

/* ── MODE GRID ── */
function buildMG(){
  const w=document.getElementById('mgrid');w.innerHTML='';
  REGMODES.forEach(m=>{
    const d=document.createElement('div');
    d.className='mc'+(S.rm===m.id?' sel':'');
    d.innerHTML=`<div class="mc-icon">${m.icon}</div><div class="mc-name">${m.name}</div><div class="mc-sub">${m.sub}</div>`;
    d.onclick=()=>{S.rm=m.id;buildMG();renderPA();};
    w.appendChild(d);
  });
}

/* ── PARTICIPANT AREA ── */
function renderPA(){
  const isT=S.rm.startsWith('team')||S.rm==='divteam';
  document.getElementById('ptarea').innerHTML=`
    <div class="pa">
      <div class="par">
        <input class="fi" id="pti" placeholder="${isT?'팀 이름':'참가자 이름'} 입력" onkeydown="if(event.key==='Enter')addPt()">
        <button class="badd" onclick="addPt()">+ 추가</button>
      </div>
      <div class="plist" id="plist"></div>
      <button class="bxls" onclick="impXls()">📊 엑셀에서 불러오기</button>
    </div>`;
  renderPL();
}
function renderPL(){
  const l=document.getElementById('plist');if(!l)return;l.innerHTML='';
  S.pts.forEach((p,i)=>{
    const d=document.createElement('div');d.className='ptag';
    d.innerHTML=`<div class="pt-clr" style="background:${p.color||TC[i%TC.length]}"></div><div class="pt-nm">${p.name}</div><div class="pt-x" onclick="delPt('${p.id}')">×</div>`;
    l.appendChild(d);
  });
}
function addPt(){
  const inp=document.getElementById('pti');if(!inp)return;
  const nm=inp.value.trim();if(!nm){toast('이름을 입력해주세요.','error');return;}
  S.pts.push({id:'p_'+Date.now()+'_'+Math.random().toString(36).slice(2,5),name:nm,color:TC[S.pts.length%TC.length]});
  inp.value='';inp.focus();renderPL();updatePv();
  try{App.setState({participants:S.pts});}catch(e){}
}
function delPt(id){S.pts=S.pts.filter(p=>p.id!==id);renderPL();updatePv();try{App.setState({participants:S.pts});}catch(e){}}
function impXls(){
  try{if(typeof ExcelIO!=='undefined'&&ExcelIO.importExcel){ExcelIO.importExcel(rows=>{rows.forEach((r,i)=>{if(r.name)S.pts.push({id:'p_'+Date.now()+'_'+i,name:r.name,color:TC[S.pts.length%TC.length]});});renderPL();updatePv();try{App.setState({participants:S.pts});}catch(e){}});}else toast('엑셀 기능 준비 중','info');}
  catch(e){toast('엑셀 오류','error');}
}

/* ── PROC ── */
function buildProc(){
  const w=document.getElementById('proclist');w.innerHTML='';
  PROCS.forEach(p=>{
    const d=document.createElement('div');
    d.className='pcard'+(S.proc===p.id?' sel':'');
    d.innerHTML=`<div class="pci">${p.icon}</div><div><div class="pc-name">${p.name}</div><div class="pc-desc">${p.desc}</div></div>`;
    d.onclick=()=>{S.proc=p.id;buildProc();};
    w.appendChild(d);
  });
}

/* ── CONFIRM ── */
function buildConfirm(){
  const g=ALLG.find(x=>x.id===S.selG)||{name:S.selG};
  const pr=PROCS.find(x=>x.id===S.proc)||{name:S.proc};
  const rm=REGMODES.find(x=>x.id===S.rm)||{name:S.rm};
  const items=[
    {k:'행사명',v:S.en||'—'},{k:'종목명',v:S.gl||g.name||'—'},
    {k:'일시',v:S.dt||'—'},{k:'장소',v:S.pl||'—'},
    {k:'게임',v:g.name||'—'},{k:'바퀴',v:S.laps+'바퀴'},
    {k:'참가방식',v:rm.name},{k:'진행방식',v:pr.name},
  ];
  const cg=document.getElementById('cgrid');cg.innerHTML='';
  items.forEach(x=>{const d=document.createElement('div');d.className='cbox';d.innerHTML=`<div class="ck">${x.k}</div><div class="cv${x.v==='—'?' empty':''}">${x.v}</div>`;cg.appendChild(d);});
  const pb=document.getElementById('ptbadges');pb.innerHTML='';
  if(!S.pts.length){pb.innerHTML='<div style="color:var(--text3);font-size:13px">참가자 없음</div>';}
  else{S.pts.slice(0,20).forEach(p=>{const d=document.createElement('div');d.className='ptbadge';d.innerHTML=`<div style="width:7px;height:7px;border-radius:50%;background:${p.color}"></div>${p.name}`;pb.appendChild(d);});if(S.pts.length>20){const m=document.createElement('div');m.className='ptbadge';m.textContent=`+${S.pts.length-20}명`;pb.appendChild(m);}}
  // start button
  const nav=document.getElementById('snav');
  if(!nav.querySelector('.bstart')){
    const a=document.createElement('a');a.href='game.html';a.className='bstart';a.onclick=saveAll;a.innerHTML='🚀 게임 시작';nav.appendChild(a);
  }
}
function saveAll(){
  try{
    App.setState({event:{name:S.en||'SGP 행사',subtitle:S.sub},gameType:S.selG,mode:S.proc.startsWith('team')?'team':'individual',participants:S.pts,settings:{laps:S.laps}});
    localStorage.setItem('sgp_display_config',JSON.stringify({eventName:S.en,subtitle:S.sub,gameLabel:S.gl,slogan1:S.s1,slogan2:S.s2,sponsor:S.sp,displayItems:S.di}));
  }catch(e){}
}

/* ── PREVIEW UPDATE ── */
function updatePv(){
  const sh=k=>S.di[k];
  document.getElementById('pv-ename').textContent=(sh('eventname')&&S.en)||'SGP 행사';
  document.getElementById('pv-sub').textContent=(sh('subtitle')&&S.sub)||'';
  document.getElementById('pv-chal').textContent=S.pts.length?S.pts[0].name:'—';
  document.getElementById('pv-lap').textContent=`LAP 1 / ${S.laps}`;
  buildRanks();
  const g=ALLG.find(x=>x.id===S.selG);
  document.getElementById('pv-gname').textContent=(sh('gamename')&&(S.gl||g?.name))||g?.name||'SGP PLATFORM';
  buildTicker();
  try{localStorage.setItem('sgp_display_config',JSON.stringify({eventName:S.en,subtitle:S.sub,gameLabel:S.gl,slogan1:S.s1,slogan2:S.s2,sponsor:S.sp,displayItems:S.di}));}catch(e){}
}
function buildRanks(){
  const w=document.getElementById('pvr');w.innerHTML='';
  const medals=['🥇','🥈','🥉'];
  for(let i=0;i<6;i++){
    const p=S.pts[i];
    const d=document.createElement('div');
    d.className='rrow'+(i===0?' r1':'')+(p?'':' empty');
    const rn=i<3?medals[i]:`<span style="color:var(--text3)">${i+1}</span>`;
    const clr=p?p.color:'var(--border2)';
    d.innerHTML=`<div class="rno">${rn}</div><div class="rdot" style="background:${clr}"></div><div class="rnm">${p?p.name:'—'}</div><div class="rtm">${p?'—:--':'——'}</div>`;
    w.appendChild(d);
  }
}
function buildTicker(){
  const sh=k=>S.di[k];
  const parts=[];
  if(sh('eventname')&&S.en) parts.push('★ '+S.en);
  if(sh('slogan1')&&S.s1) parts.push('▶ '+S.s1);
  if(sh('slogan2')&&S.s2) parts.push('▶ '+S.s2);
  if(sh('date')&&S.dt) parts.push('📅 '+S.dt);
  if(sh('place')&&S.pl) parts.push('📍 '+S.pl);
  if(sh('sponsor')&&S.sp) parts.push('🤝 '+S.sp);
  if(!parts.length) parts.push('SGP PLATFORM','⚡ SENSOR GAME PLATFORM','★ READY');
  const t=parts.join('          ');
  document.getElementById('pvtki').textContent=t+'          '+t;
}

/* ── BLOCK TOGGLE ── */
function togBlk(id,el){
  el.classList.toggle('on');
  document.getElementById(id).classList.toggle('pv-hidden',!el.classList.contains('on'));
}

/* ── CLOCK ── */
function startClk(){
  function tick(){const n=new Date();const h=String(n.getHours()).padStart(2,'0');const m=String(n.getMinutes()).padStart(2,'0');const s=String(n.getSeconds()).padStart(2,'0');const el=document.getElementById('pv-clk');if(el)el.textContent=`${h}:${m}:${s}`;}
  tick();setInterval(tick,1000);
}

/* ── DISPLAY ── */
function openDisp(){saveAll();window.open('display.html','sgp_disp','width=1280,height=720');}
function resetPv(){S.pts=[];renderPL();updatePv();toast('미리보기 초기화','info');}

/* ── MOBILE ── */
let mobOpen=false;
function togMob(){
  const fab=document.getElementById('fab');
  if(!mobOpen){
    const r=document.getElementById('right');
    const ov=document.createElement('div');
    ov.id='mobov';ov.style.cssText='position:fixed;inset:0;z-index:150;background:var(--bg);padding-top:var(--nav-h);display:flex;flex-direction:column;overflow:hidden';
    ov.appendChild(r.cloneNode(true));
    document.body.appendChild(ov);
    fab.textContent='✕';mobOpen=true;
  }else{
    const ov=document.getElementById('mobov');if(ov)ov.remove();
    fab.textContent='📺';mobOpen=false;
  }
}

/* ── TOAST ── */
function toast(msg,type='info'){
  const c=document.getElementById('tc');
  const d=document.createElement('div');d.className='tos '+(type||'');d.textContent=msg;
  c.appendChild(d);setTimeout(()=>d.remove(),3000);
}
</script>
